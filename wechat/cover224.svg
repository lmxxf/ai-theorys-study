<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="48%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0f1f"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="marlinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="cdgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="30%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="70%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>
  <ellipse cx="270" cy="220" rx="260" ry="180" fill="url(#leftGlow)" filter="url(#soft)"/>
  <ellipse cx="630" cy="220" rx="260" ry="180" fill="url(#rightGlow)" filter="url(#soft)"/>

  <!-- top eyebrow -->
  <text x="450" y="58" fill="#94a3b8" font-size="16" text-anchor="middle" letter-spacing="6">DeepSeek V4 推理 · 一次反转</text>

  <!-- Marlin side (red) -->
  <g transform="translate(85 95)" filter="url(#glow)">
    <rect x="0" y="0" width="320" height="270" rx="20" fill="#1a0a0a" stroke="url(#marlinGrad)" stroke-width="2.5"/>
    <text x="160" y="42" fill="#fca5a5" font-size="28" text-anchor="middle" font-weight="bold">Marlin</text>
    <text x="160" y="66" fill="#fb923c" font-size="14" text-anchor="middle" class="mono" letter-spacing="2">W4A16</text>

    <!-- divider -->
    <line x1="30" y1="84" x2="290" y2="84" stroke="#7f1d1d" stroke-width="1"/>

    <!-- metrics: vs ref -->
    <text x="160" y="108" fill="#fee2e2" font-size="13" text-anchor="middle">vs 高精度参考</text>
    <g class="mono" font-size="14">
      <text x="44" y="135" fill="#94a3b8">max  =</text>
      <text x="270" y="135" fill="#86efac" text-anchor="end" font-weight="bold">0.03</text>
      <text x="44" y="158" fill="#94a3b8">mean =</text>
      <text x="270" y="158" fill="#86efac" text-anchor="end" font-weight="bold">0.0026</text>
      <text x="44" y="181" fill="#94a3b8">cos  =</text>
      <text x="270" y="181" fill="#86efac" text-anchor="end" font-weight="bold">0.99999</text>
    </g>

    <!-- verdict label -->
    <rect x="40" y="200" width="240" height="30" rx="6" fill="#022c22" stroke="#34d399"/>
    <text x="160" y="221" fill="#86efac" font-size="14" text-anchor="middle" font-weight="bold">✓ 数值更接近参考</text>

    <!-- output garbled -->
    <text x="160" y="252" fill="#94a3b8" font-size="11" text-anchor="middle">实际输出</text>
  </g>

  <!-- Marlin output: garbled -->
  <g transform="translate(85 370)" class="mono" font-size="16">
    <rect x="0" y="0" width="320" height="42" rx="6" fill="#020617" stroke="#ef4444" stroke-width="1.5"/>
    <text x="160" y="27" fill="#ef4444" text-anchor="middle">&lt;/ _ , &lt;/ _ &lt;/ , &lt;/ _ ...</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(425 230)">
    <text x="25" y="0" fill="#fbbf24" font-size="36" text-anchor="middle" font-weight="bold">VS</text>
  </g>

  <!-- CDG side (cyan) -->
  <g transform="translate(495 95)" filter="url(#glow)">
    <rect x="0" y="0" width="320" height="270" rx="20" fill="#0a1a1f" stroke="url(#cdgGrad)" stroke-width="2.5"/>
    <text x="160" y="42" fill="#67e8f9" font-size="28" text-anchor="middle" font-weight="bold">CDG / DeepGEMM</text>
    <text x="160" y="66" fill="#22d3ee" font-size="14" text-anchor="middle" class="mono" letter-spacing="2">W4A8</text>

    <line x1="30" y1="84" x2="290" y2="84" stroke="#0e7490" stroke-width="1"/>

    <text x="160" y="108" fill="#cffafe" font-size="13" text-anchor="middle">vs 高精度参考</text>
    <g class="mono" font-size="14">
      <text x="44" y="135" fill="#94a3b8">max  =</text>
      <text x="270" y="135" fill="#fca5a5" text-anchor="end" font-weight="bold">0.17</text>
      <text x="44" y="158" fill="#94a3b8">mean =</text>
      <text x="270" y="158" fill="#fca5a5" text-anchor="end" font-weight="bold">0.024</text>
      <text x="44" y="181" fill="#94a3b8">cos  =</text>
      <text x="270" y="181" fill="#fca5a5" text-anchor="end" font-weight="bold">0.9994</text>
    </g>

    <rect x="40" y="200" width="240" height="30" rx="6" fill="#1f1304" stroke="#fbbf24"/>
    <text x="160" y="221" fill="#fbbf24" font-size="14" text-anchor="middle" font-weight="bold">✗ 数值更远</text>

    <text x="160" y="252" fill="#94a3b8" font-size="11" text-anchor="middle">实际输出</text>
  </g>

  <!-- CDG output: normal -->
  <g transform="translate(495 370)" class="mono" font-size="16">
    <rect x="0" y="0" width="320" height="42" rx="6" fill="#020617" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="160" y="27" fill="#67e8f9" text-anchor="middle">def quicksort(arr):</text>
  </g>

  <!-- bottom title band -->
  <rect x="0" y="430" width="900" height="70" fill="url(#titleBand)"/>
  <text x="450" y="462" fill="#0a1428" font-size="28" text-anchor="middle" font-weight="bold">算得更准的，反而是错的</text>
  <text x="450" y="488" fill="#1a0a0a" font-size="14" text-anchor="middle">W4A16 vs W4A8 · 224 期</text>
</svg>

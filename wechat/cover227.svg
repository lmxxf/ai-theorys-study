<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="48%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0f1f"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="badGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="goodGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="30%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="70%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>
  <ellipse cx="270" cy="220" rx="260" ry="180" fill="url(#leftGlow)" filter="url(#soft)"/>
  <ellipse cx="630" cy="220" rx="260" ry="180" fill="url(#rightGlow)" filter="url(#soft)"/>

  <!-- top eyebrow -->
  <text x="450" y="58" fill="#94a3b8" font-size="16" text-anchor="middle" letter-spacing="6">DeepSeek V4 · 17.8k token 把两台 Spark 打死</text>

  <!-- LEFT: bad shape — spread out -->
  <g transform="translate(85 95)" filter="url(#glow)">
    <rect x="0" y="0" width="320" height="270" rx="20" fill="#1a0a0a" stroke="url(#badGrad)" stroke-width="2.5"/>
    <text x="160" y="42" fill="#fca5a5" font-size="26" text-anchor="middle" font-weight="bold">一次性摊开</text>
    <text x="160" y="66" fill="#fb923c" font-size="14" text-anchor="middle">机器死给你看</text>

    <line x1="30" y1="84" x2="290" y2="84" stroke="#7f1d1d" stroke-width="1"/>

    <!-- visual: huge full matrix -->
    <g transform="translate(40 100)">
      <!-- 一整张大表 -->
      <rect x="0" y="0" width="240" height="80" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
      <text x="120" y="46" fill="#fee2e2" font-size="14" text-anchor="middle" class="mono">[1, 17815, 64, 4458]</text>
      <text x="120" y="64" fill="#fca5a5" font-size="12" text-anchor="middle">单层 ≈ 20 GB</text>
    </g>

    <!-- the dam -->
    <g class="mono" font-size="13">
      <text x="44" y="208" fill="#94a3b8">权重常驻 =</text>
      <text x="276" y="208" fill="#fca5a5" text-anchor="end" font-weight="bold">82 GB</text>
      <text x="44" y="228" fill="#94a3b8">剩余余量 =</text>
      <text x="276" y="228" fill="#fca5a5" text-anchor="end" font-weight="bold">46 GB</text>
      <text x="44" y="248" fill="#94a3b8">中间张量 =</text>
      <text x="276" y="248" fill="#ef4444" text-anchor="end" font-weight="bold">爆炸</text>
    </g>
  </g>

  <!-- LEFT output: NVRM OOM -->
  <g transform="translate(85 370)" class="mono" font-size="14">
    <rect x="0" y="0" width="320" height="42" rx="6" fill="#020617" stroke="#ef4444" stroke-width="1.5"/>
    <text x="160" y="27" fill="#ef4444" text-anchor="middle">NVRM OOM · 整机死机</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(425 230)">
    <text x="25" y="0" fill="#fbbf24" font-size="36" text-anchor="middle" font-weight="bold">→</text>
  </g>

  <!-- RIGHT: good shape — chunked -->
  <g transform="translate(495 95)" filter="url(#glow)">
    <rect x="0" y="0" width="320" height="270" rx="20" fill="#0a1a1f" stroke="url(#goodGrad)" stroke-width="2.5"/>
    <text x="160" y="42" fill="#67e8f9" font-size="26" text-anchor="middle" font-weight="bold">分块流式</text>
    <text x="160" y="66" fill="#22d3ee" font-size="14" text-anchor="middle">一块一块算</text>

    <line x1="30" y1="84" x2="290" y2="84" stroke="#0e7490" stroke-width="1"/>

    <!-- visual: small chunks one by one -->
    <g transform="translate(40 100)">
      <!-- 七小块 stacked -->
      <rect x="0" y="0" width="30" height="80" fill="#0e7490" stroke="#22d3ee" stroke-width="1.5"/>
      <rect x="36" y="0" width="30" height="80" fill="#0e7490" stroke="#22d3ee" stroke-width="1.5" opacity="0.75"/>
      <rect x="72" y="0" width="30" height="80" fill="#0e7490" stroke="#22d3ee" stroke-width="1.5" opacity="0.55"/>
      <rect x="108" y="0" width="30" height="80" fill="#0e7490" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
      <text x="156" y="46" fill="#67e8f9" font-size="16" text-anchor="start" class="mono">. . .</text>
      <text x="120" y="98" fill="#cffafe" font-size="12" text-anchor="middle" class="mono">[1, 256, 64, 4458] × N</text>
    </g>

    <!-- the win -->
    <g class="mono" font-size="13">
      <text x="44" y="208" fill="#94a3b8">权重常驻 =</text>
      <text x="276" y="208" fill="#cffafe" text-anchor="end" font-weight="bold">82 GB</text>
      <text x="44" y="228" fill="#94a3b8">17.8k 峰值 =</text>
      <text x="276" y="228" fill="#86efac" text-anchor="end" font-weight="bold">90.3 GB</text>
      <text x="44" y="248" fill="#94a3b8">剩余余量 =</text>
      <text x="276" y="248" fill="#86efac" text-anchor="end" font-weight="bold">30 GB+</text>
    </g>
  </g>

  <!-- RIGHT output: punchline -->
  <g transform="translate(495 370)" class="mono" font-size="13">
    <rect x="0" y="0" width="320" height="42" rx="6" fill="#020617" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="160" y="27" fill="#67e8f9" text-anchor="middle">数学结果不变 · 只改峰值</text>
  </g>

  <!-- bottom title band -->
  <rect x="0" y="430" width="900" height="70" fill="url(#titleBand)"/>
  <text x="450" y="462" fill="#0a1428" font-size="28" text-anchor="middle" font-weight="bold">注意力一波算不完</text>
  <text x="450" y="488" fill="#1a0a0a" font-size="14" text-anchor="middle">DeepSeek V4 在 DGX Spark 上的 OOM 排查 · 227 期</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f0d1e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0a030"/>
      <stop offset="100%" stop-color="#e87020"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#50e880"/>
      <stop offset="100%" stop-color="#30b060"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#4488cc">
    <line x1="0" y1="76" x2="900" y2="76"/>
    <line x1="0" y1="153" x2="900" y2="153"/>
    <line x1="0" y1="230" x2="900" y2="230"/>
    <line x1="0" y1="307" x2="900" y2="307"/>
    <line x1="150" y1="0" x2="150" y2="383"/>
    <line x1="300" y1="0" x2="300" y2="383"/>
    <line x1="450" y1="0" x2="450" y2="383"/>
    <line x1="600" y1="0" x2="600" y2="383"/>
    <line x1="750" y1="0" x2="750" y2="383"/>
  </g>

  <!-- === LEFT: Evolution Timeline === -->

  <!-- Timeline vertical line -->
  <line x1="85" y1="55" x2="85" y2="340" stroke="#334" stroke-width="2" opacity="0.5"/>

  <!-- Era 1: Patch era (2022-2023) -->
  <circle cx="85" cy="80" r="5" fill="#e85050" opacity="0.9"/>
  <text x="100" y="76" font-family="'Courier New', monospace" font-size="10" fill="#666">2022</text>
  <text x="100" y="90" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="12" fill="#e85050" opacity="0.9">LLM.int8()</text>
  <text x="190" y="90" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#777" opacity="0.7">发现异常值</text>

  <circle cx="85" cy="125" r="4" fill="#e88050" opacity="0.7"/>
  <text x="100" y="121" font-family="'Courier New', monospace" font-size="10" fill="#666">2023</text>
  <text x="100" y="135" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="12" fill="#e88050" opacity="0.8">SmoothQuant</text>
  <text x="205" y="135" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#777" opacity="0.7">搬家</text>

  <circle cx="85" cy="160" r="4" fill="#e88050" opacity="0.7"/>
  <text x="100" y="168" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="12" fill="#e88050" opacity="0.8">GPTQ</text>
  <text x="150" y="168" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#777" opacity="0.7">补偿</text>

  <circle cx="85" cy="195" r="4" fill="#e88050" opacity="0.7"/>
  <text x="100" y="203" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="12" fill="#e88050" opacity="0.8">AWQ</text>
  <text x="143" y="203" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#777" opacity="0.7">保护</text>

  <!-- Era label: patch -->
  <text x="42" y="150" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="11" fill="#e88050" text-anchor="middle" opacity="0.5" transform="rotate(-90, 42, 150)">打补丁</text>

  <!-- Divider: paradigm shift -->
  <line x1="65" y1="225" x2="310" y2="225" stroke="#f0a030" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="330" y="229" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#f0a030" opacity="0.7">范式转移 ↓</text>

  <!-- Era 2: Rotation era (2023-2026) -->
  <circle cx="85" cy="255" r="5" fill="#00d4ff" opacity="0.9" filter="url(#softglow)"/>
  <text x="100" y="251" font-family="'Courier New', monospace" font-size="10" fill="#666">2023</text>
  <text x="100" y="263" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="12" fill="#00d4ff" opacity="0.9">QuIP</text>
  <text x="138" y="263" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#777" opacity="0.7">旋转消灭</text>

  <circle cx="85" cy="290" r="4" fill="#00bbdd" opacity="0.7"/>
  <text x="100" y="298" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="12" fill="#00bbdd" opacity="0.8">SpinQuant</text>
  <text x="190" y="298" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#777" opacity="0.7">学习旋转</text>

  <circle cx="85" cy="322" r="5" fill="#00d4ff" opacity="0.9" filter="url(#softglow)"/>
  <text x="100" y="318" font-family="'Courier New', monospace" font-size="10" fill="#666">2026</text>
  <text x="100" y="332" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="12" fill="#00d4ff" opacity="0.9">TurboQuant</text>
  <text x="200" y="332" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#777" opacity="0.7">旋转→KV</text>

  <!-- Era label: rotation -->
  <text x="42" y="290" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="11" fill="#00bbdd" text-anchor="middle" opacity="0.5" transform="rotate(-90, 42, 290)">旋转</text>

  <!-- === CENTER: Core visual - rotation transforming spiky distribution === -->

  <!-- Before rotation: spiky distribution -->
  <g transform="translate(510, 105)">
    <text x="0" y="-10" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">量化前：有异常值</text>
    <!-- Bars representing weight distribution -->
    <rect x="-60" y="-3" width="8" height="35" rx="1" fill="#e85050" opacity="0.5"/>
    <rect x="-48" y="8" width="8" height="24" rx="1" fill="#555" opacity="0.5"/>
    <rect x="-36" y="12" width="8" height="20" rx="1" fill="#555" opacity="0.5"/>
    <rect x="-24" y="10" width="8" height="22" rx="1" fill="#555" opacity="0.5"/>
    <rect x="-12" y="14" width="8" height="18" rx="1" fill="#555" opacity="0.5"/>
    <rect x="0" y="16" width="8" height="16" rx="1" fill="#555" opacity="0.5"/>
    <rect x="12" y="12" width="8" height="20" rx="1" fill="#555" opacity="0.5"/>
    <rect x="24" y="14" width="8" height="18" rx="1" fill="#555" opacity="0.5"/>
    <rect x="36" y="10" width="8" height="22" rx="1" fill="#555" opacity="0.5"/>
    <rect x="48" y="14" width="8" height="18" rx="1" fill="#555" opacity="0.5"/>
    <!-- The outlier spike -->
    <rect x="-60" y="-80" width="8" height="77" rx="1" fill="#e85050" opacity="0.8" filter="url(#softglow)"/>
    <text x="-56" y="-85" font-family="'Courier New', monospace" font-size="9" fill="#e85050" text-anchor="middle">100</text>
    <!-- Baseline -->
    <line x1="-65" y1="32" x2="62" y2="32" stroke="#444" stroke-width="1"/>
  </g>

  <!-- Big rotation arrow -->
  <g transform="translate(510, 185)">
    <path d="M -30,0 C -30,-15 30,-15 30,0" fill="none" stroke="#f0a030" stroke-width="2.5" opacity="0.8"/>
    <polygon points="30,0 24,-7 28,3" fill="#f0a030" opacity="0.8"/>
    <text x="0" y="18" font-family="'Courier New', monospace" font-size="13" fill="#f0a030" text-anchor="middle" font-weight="bold" filter="url(#softglow)">R × W</text>
  </g>

  <!-- After rotation: smooth distribution -->
  <g transform="translate(510, 250)">
    <text x="0" y="-10" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">量化后：均匀分布</text>
    <!-- Even bars -->
    <rect x="-60" y="2" width="8" height="28" rx="1" fill="#00d4ff" opacity="0.6"/>
    <rect x="-48" y="4" width="8" height="26" rx="1" fill="#00d4ff" opacity="0.55"/>
    <rect x="-36" y="3" width="8" height="27" rx="1" fill="#00d4ff" opacity="0.6"/>
    <rect x="-24" y="5" width="8" height="25" rx="1" fill="#00d4ff" opacity="0.5"/>
    <rect x="-12" y="2" width="8" height="28" rx="1" fill="#00d4ff" opacity="0.6"/>
    <rect x="0" y="4" width="8" height="26" rx="1" fill="#00d4ff" opacity="0.55"/>
    <rect x="12" y="3" width="8" height="27" rx="1" fill="#00d4ff" opacity="0.6"/>
    <rect x="24" y="5" width="8" height="25" rx="1" fill="#00d4ff" opacity="0.5"/>
    <rect x="36" y="2" width="8" height="28" rx="1" fill="#00d4ff" opacity="0.6"/>
    <rect x="48" y="4" width="8" height="26" rx="1" fill="#00d4ff" opacity="0.55"/>
    <!-- Baseline -->
    <line x1="-65" y1="30" x2="62" y2="30" stroke="#444" stroke-width="1"/>
  </g>

  <!-- === RIGHT: Bit compression cascade === -->
  <g transform="translate(720, 80)">
    <!-- FP32 box -->
    <rect x="0" y="0" width="140" height="38" rx="6" fill="#e85050" fill-opacity="0.12" stroke="#e85050" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="70" y="18" font-family="'Courier New', monospace" font-size="14" fill="#e85050" text-anchor="middle" font-weight="bold">FP32</text>
    <text x="70" y="32" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#e85050" text-anchor="middle" opacity="0.6">280 GB</text>

    <!-- Arrow -->
    <text x="70" y="52" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">↓</text>

    <!-- INT8 box -->
    <rect x="15" y="58" width="110" height="38" rx="6" fill="#f0a030" fill-opacity="0.12" stroke="#f0a030" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="70" y="76" font-family="'Courier New', monospace" font-size="14" fill="#f0a030" text-anchor="middle" font-weight="bold">INT8</text>
    <text x="70" y="90" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#f0a030" text-anchor="middle" opacity="0.6">70 GB</text>

    <!-- Arrow -->
    <text x="70" y="110" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">↓</text>

    <!-- INT4 box -->
    <rect x="28" y="116" width="84" height="38" rx="6" fill="#00d4ff" fill-opacity="0.12" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="70" y="134" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" text-anchor="middle" font-weight="bold">INT4</text>
    <text x="70" y="148" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0.6">35 GB</text>

    <!-- Arrow -->
    <text x="70" y="168" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">↓</text>

    <!-- 2-bit box (glowing) -->
    <rect x="38" y="174" width="64" height="38" rx="6" fill="#50e880" fill-opacity="0.15" stroke="#50e880" stroke-width="1.5" stroke-opacity="0.7" filter="url(#softglow)"/>
    <text x="70" y="192" font-family="'Courier New', monospace" font-size="14" fill="#50e880" text-anchor="middle" font-weight="bold">2-bit</text>
    <text x="70" y="206" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#50e880" text-anchor="middle" opacity="0.7">17.5 GB</text>

    <!-- Compression ratio -->
    <text x="70" y="232" font-family="'Courier New', monospace" font-size="11" fill="#50e880" text-anchor="middle" opacity="0.6">16x 压缩</text>
  </g>

  <!-- === TITLE === -->
  <text x="450" y="348" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">量化三年：从打补丁到旋转</text>
  <text x="450" y="372" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="13" fill="#8892b0" text-anchor="middle">GPTQ → SmoothQuant → QuIP → SpinQuant → TurboQuant</text>

  <!-- Bottom bar -->
  <rect x="0" y="378" width="900" height="5" fill="#0a0a12" opacity="0.8"/>
  <text x="450" y="383" font-family="'Courier New', monospace" font-size="8" fill="#333" text-anchor="middle">#139</text>
</svg>

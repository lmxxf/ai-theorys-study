<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .title { font-size: 36px; font-weight: bold; fill: #2b2b2b; }
    .subtitle { font-size: 18px; fill: #555; }
    .city { font-size: 22px; font-weight: bold; }
    .city-tag { font-size: 13px; fill: #555; }
    .axis-label { font-size: 14px; fill: #8a7a50; font-style: italic; }
    .footer { font-size: 14px; fill: #888; font-style: italic; }
  </style>

  <!-- 背景 -->
  <rect width="800" height="600" fill="#f4ecd8"/>

  <!-- 顶部标题 -->
  <text x="400" y="56" text-anchor="middle" class="title">从一块“直奉战争”的看板说起</text>
  <text x="400" y="87" text-anchor="middle" class="subtitle">北京、沈阳、广州——三座城，三种性质</text>
  <line x1="90" y1="108" x2="710" y2="108" stroke="#aaa" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 关内 / 关外 标签 -->
  <text x="150" y="140" text-anchor="middle" class="axis-label" fill="#8a7a50">— 关 内 —</text>
  <text x="655" y="140" text-anchor="middle" class="axis-label" fill="#8a7a50">— 关 外 —</text>

  <defs>
    <marker id="arr-red" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#8b1a1a"/>
    </marker>
    <marker id="arr-blue" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#2b5a8b"/>
    </marker>
  </defs>

  <!-- 北京:金框,继承来的源头 -->
  <g>
    <rect x="120" y="158" width="190" height="82" rx="6" fill="#fff8e6" stroke="#c19a32" stroke-width="2.5"/>
    <circle cx="152" cy="199" r="9" fill="#c19a32"/>
    <text x="215" y="192" text-anchor="middle" class="city" fill="#8b6a18">北京</text>
    <text x="215" y="214" text-anchor="middle" class="city-tag">继承来的源头</text>
    <text x="215" y="232" text-anchor="middle" class="city-tag">元明清三代帝都·占住即正统</text>
  </g>

  <!-- 沈阳:红点,有实力没源头 -->
  <g>
    <circle cx="640" cy="185" r="10" fill="#8b1a1a"/>
    <text x="640" y="172" text-anchor="middle" class="city" fill="#8b1a1a" font-size="20">沈阳</text>
    <text x="640" y="212" text-anchor="middle" class="city-tag">关外·奉系</text>
    <text x="640" y="230" text-anchor="middle" class="city-tag">有实力，没源头</text>
  </g>

  <!-- 沈阳→北京 抢源头箭头 -->
  <path d="M 615 195 Q 460 250, 312 205" stroke="#8b1a1a" stroke-width="2.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arr-red)"/>
  <text x="465" y="280" text-anchor="middle" font-size="14" fill="#8b1a1a" font-weight="bold">两次直奉战争：去抢旧源头</text>

  <!-- 山海关断层线 -->
  <g opacity="0.55">
    <path d="M 150 400 L 200 400 L 200 382 L 250 382 L 250 400 L 300 400 L 300 380 L 350 380 L 350 400 L 405 400 M 445 400 L 500 400 L 500 378 L 550 378 L 550 400 L 600 400 L 600 376 L 650 376"
          fill="none" stroke="#8a7a50" stroke-width="3"/>
    <rect x="405" y="356" width="40" height="46" fill="#e8dcc0" stroke="#7a6843" stroke-width="2.5"/>
    <rect x="411" y="364" width="11" height="15" fill="#7a6843"/>
    <rect x="428" y="364" width="11" height="15" fill="#7a6843"/>
    <text x="425" y="348" text-anchor="middle" font-size="13" fill="#7a6843" font-weight="bold">山海关</text>
  </g>
  <text x="425" y="425" text-anchor="middle" class="axis-label">这条断层线，1644 到 1924，三百年没变过</text>

  <!-- 广州:蓝框,创制新源头,掀桌子 -->
  <g>
    <rect x="190" y="458" width="420" height="66" rx="6" fill="#eaf1f8" stroke="#2b5a8b" stroke-width="2.5"/>
    <circle cx="226" cy="491" r="10" fill="#2b5a8b"/>
    <text x="300" y="484" text-anchor="middle" class="city" fill="#1f4368">广州</text>
    <text x="300" y="508" text-anchor="middle" class="city-tag" fill="#1f4368">不抢北京</text>
    <text x="470" y="484" text-anchor="middle" class="city-tag" fill="#1f4368">另起一个全新的源头</text>
    <text x="470" y="508" text-anchor="middle" class="city-tag" fill="#1f4368">党·主义·国民政府——格式化整个旧硬盘</text>
  </g>
  <path d="M 400 456 L 400 432" stroke="#2b5a8b" stroke-width="2.5" fill="none" marker-end="url(#arr-blue)"/>

  <!-- 底部金句:居中两行 -->
  <text x="400" y="560" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">换地盘是战争，换源头才是革命</text>
  <text x="400" y="588" text-anchor="middle" class="footer">No.230</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1a0a"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="78%" r="42%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aquaGlow" cx="18%" cy="32%" r="38%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="layerCold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="layerHot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#aquaGlow)"/>
  <rect width="900" height="500" fill="url(#goldGlow)"/>

  <!-- faint grid -->
  <g opacity="0.10">
    <path d="M0 88 H900 M0 166 H900 M0 244 H900 M0 322 H900" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M90 0 V500 M180 0 V500 M270 0 V500 M360 0 V500 M450 0 V500 M540 0 V500 M630 0 V500 M720 0 V500 M810 0 V500" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="5">TRANSFORMER 深层不是被动的喇叭</text>

  <!-- ============ LEFT: layer stack ============ -->
  <g transform="translate(70 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">Transformer 层栈</text>

    <!-- cold layers (passive) -->
    <g opacity="0.85">
      <rect x="20" y="20" width="190" height="22" rx="3" fill="url(#layerCold)" stroke="#475569"/>
      <text x="115" y="36" text-anchor="middle" fill="#94a3b8" font-size="12">layer 1 — detokenization</text>

      <rect x="20" y="48" width="190" height="22" rx="3" fill="url(#layerCold)" stroke="#475569"/>
      <text x="115" y="64" text-anchor="middle" fill="#94a3b8" font-size="12">layer 8 — feature engineering</text>

      <rect x="20" y="76" width="190" height="22" rx="3" fill="url(#layerCold)" stroke="#475569"/>
      <text x="115" y="92" text-anchor="middle" fill="#94a3b8" font-size="12">layer 16</text>

      <rect x="20" y="104" width="190" height="22" rx="3" fill="url(#layerCold)" stroke="#475569"/>
      <text x="115" y="120" text-anchor="middle" fill="#94a3b8" font-size="12">layer 24</text>

      <rect x="20" y="132" width="190" height="22" rx="3" fill="url(#layerCold)" stroke="#475569"/>
      <text x="115" y="148" text-anchor="middle" fill="#94a3b8" font-size="12">layer 32 — prediction</text>

      <rect x="20" y="160" width="190" height="22" rx="3" fill="url(#layerCold)" stroke="#475569"/>
      <text x="115" y="176" text-anchor="middle" fill="#cbd5e1" font-size="12">layer 40 — ensembling</text>
    </g>

    <!-- HOT last layers (active sharpening) -->
    <g filter="url(#strongGlow)">
      <rect x="20" y="190" width="190" height="32" rx="4" fill="url(#layerHot)" stroke="#fde047" stroke-width="2"/>
      <text x="115" y="211" text-anchor="middle" fill="#0a0f1f" font-size="14" font-weight="bold">layer 41 / 42 — sharpening</text>
    </g>

    <!-- side label -->
    <g transform="translate(225 0)">
      <path d="M0 30 V190" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>
      <text x="8" y="110" fill="#94a3b8" font-size="11">90% 深度</text>
      <text x="8" y="125" fill="#94a3b8" font-size="11">中段冗余</text>

      <path d="M0 192 V222" stroke="#fbbf24" stroke-width="2"/>
      <text x="8" y="208" fill="#fbbf24" font-size="11" font-weight="bold">主动校准</text>
      <text x="8" y="220" fill="#fbbf24" font-size="11" font-weight="bold">最后 10%</text>
    </g>
  </g>

  <!-- ============ MIDDLE: distribution sharpening ============ -->
  <g transform="translate(360 100)">
    <text x="100" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">输出分布：从散到尖</text>

    <!-- early: scattered distribution -->
    <g transform="translate(0 18)">
      <rect x="0" y="0" width="200" height="86" rx="4" fill="#0f172a" stroke="#334155"/>
      <text x="100" y="16" text-anchor="middle" fill="#94a3b8" font-size="11">中段：分布散，模型在犹豫</text>
      <g fill="#67e8f9" opacity="0.7">
        <rect x="14" y="50" width="14" height="24"/>
        <rect x="34" y="40" width="14" height="34"/>
        <rect x="54" y="46" width="14" height="28"/>
        <rect x="74" y="36" width="14" height="38"/>
        <rect x="94" y="42" width="14" height="32"/>
        <rect x="114" y="48" width="14" height="26"/>
        <rect x="134" y="38" width="14" height="36"/>
        <rect x="154" y="46" width="14" height="28"/>
        <rect x="174" y="42" width="14" height="32"/>
      </g>
    </g>

    <!-- arrow: sharpening -->
    <g transform="translate(0 116)">
      <text x="100" y="14" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">↓ 末层主动锐化（sharpening）</text>
    </g>

    <!-- late: peaked distribution -->
    <g transform="translate(0 136)" filter="url(#glow)">
      <rect x="0" y="0" width="200" height="86" rx="4" fill="#1e1206" stroke="#fbbf24" stroke-width="2"/>
      <text x="100" y="16" text-anchor="middle" fill="#fde047" font-size="11">末层：分布尖，一个候选独大</text>
      <g fill="#fbbf24">
        <rect x="14" y="68" width="14" height="6" opacity="0.5"/>
        <rect x="34" y="66" width="14" height="8" opacity="0.5"/>
        <rect x="54" y="64" width="14" height="10" opacity="0.5"/>
        <rect x="74" y="62" width="14" height="12" opacity="0.6"/>
        <rect x="94" y="32" width="14" height="42" opacity="1"/>
        <rect x="114" y="62" width="14" height="12" opacity="0.6"/>
        <rect x="134" y="64" width="14" height="10" opacity="0.5"/>
        <rect x="154" y="66" width="14" height="8" opacity="0.5"/>
        <rect x="174" y="68" width="14" height="6" opacity="0.5"/>
      </g>
    </g>
  </g>

  <!-- ============ RIGHT: three末层细胞 ============ -->
  <g transform="translate(620 95)">
    <text x="110" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">末层有专门的细胞</text>

    <!-- 钉子 saturation -->
    <g transform="translate(0 18)" filter="url(#shadow)">
      <rect x="0" y="0" width="220" height="68" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
      <g transform="translate(20 20)">
        <!-- nails -->
        <path d="M0 0 L0 28 M2 -2 L-2 -2 L0 5 Z" stroke="#67e8f9" stroke-width="3" fill="#67e8f9"/>
        <path d="M12 4 L12 28 M14 2 L10 2 L12 9 Z" stroke="#67e8f9" stroke-width="3" fill="#67e8f9" opacity="0.7"/>
        <path d="M24 8 L24 28 M26 6 L22 6 L24 13 Z" stroke="#67e8f9" stroke-width="3" fill="#67e8f9" opacity="0.5"/>
      </g>
      <text x="62" y="32" fill="#67e8f9" font-size="13" font-weight="bold">钉钉子</text>
      <text x="62" y="49" fill="#cbd5e1" font-size="11">按排名一颗一颗锁定 top-k</text>
    </g>

    <!-- 刹车 suppression -->
    <g transform="translate(0 95)" filter="url(#shadow)">
      <rect x="0" y="0" width="220" height="68" rx="6" fill="#1c0a0a" stroke="#ef4444" stroke-width="1.5"/>
      <g transform="translate(20 22)">
        <!-- octagon stop sign -->
        <polygon points="14,0 28,0 38,10 38,24 28,34 14,34 4,24 4,10" fill="#ef4444" stroke="#fca5a5" stroke-width="1.5"/>
        <text x="21" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">STOP</text>
      </g>
      <text x="62" y="32" fill="#fca5a5" font-size="13" font-weight="bold">刹车细胞</text>
      <text x="62" y="49" fill="#cbd5e1" font-size="11">砍掉 17% 错误候选概率</text>
    </g>

    <!-- 温度旋钮 entropy -->
    <g transform="translate(0 172)" filter="url(#shadow)">
      <rect x="0" y="0" width="220" height="68" rx="6" fill="#1e1206" stroke="#fbbf24" stroke-width="1.5"/>
      <g transform="translate(20 22)">
        <!-- dial / knob -->
        <circle cx="20" cy="15" r="14" fill="none" stroke="#fbbf24" stroke-width="2"/>
        <circle cx="20" cy="15" r="3" fill="#fbbf24"/>
        <path d="M20 15 L29 8" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M8 5 L11 8 M32 5 L29 8 M8 25 L11 22 M32 25 L29 22" stroke="#fde047" stroke-width="1.5" opacity="0.7"/>
      </g>
      <text x="62" y="32" fill="#fde047" font-size="13" font-weight="bold">温度旋钮</text>
      <text x="62" y="49" fill="#cbd5e1" font-size="11">熵神经元防过度自信</text>
    </g>
  </g>

  <!-- ============ bottom title band ============ -->
  <rect x="0" y="390" width="900" height="110" fill="#020617" opacity="0.88"/>
  <rect x="0" y="390" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="431" text-anchor="middle" fill="#f8fafc" font-size="32" font-weight="bold">深层不是被动的喇叭</text>
  <text x="450" y="463" text-anchor="middle" fill="#fde047" font-size="18">末段在按排名敲钉子、在零空间里拧温度旋钮</text>
  <text x="450" y="488" text-anchor="middle" fill="#94a3b8" font-size="13" class="mono">No.234 · 5 papers + DeepSeek V4 layer 42 ground truth</text>
</svg>

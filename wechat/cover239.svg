<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a1a1a"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="22%" cy="28%" r="42%">
      <stop offset="0%" stop-color="#4a90d9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="78%" cy="75%" r="42%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="50%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#blueGlow)"/>
  <rect width="900" height="500" fill="url(#amberGlow)"/>

  <!-- faint grid -->
  <g opacity="0.10">
    <path d="M0 88 H900 M0 166 H900 M0 244 H900 M0 322 H900" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M90 0 V500 M180 0 V500 M270 0 V500 M360 0 V500 M450 0 V500 M540 0 V500 M630 0 V500 M720 0 V500 M810 0 V500" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="4">SM_121 KERNEL SERIES · 第 1 站 · 量化算子</text>

  <!-- ============ LEFT: bf16 连续精度 ============ -->
  <g transform="translate(60 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">输入 h · bf16 / fp16</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- 连续曲线，代表全精度 -->
    <g transform="translate(15 100)" fill="none" stroke="#94a3b8" stroke-width="2">
      <path d="M0 40 C 25 -10, 50 90, 75 30 C 100 -20, 125 80, 150 20 C 165 -5, 185 55, 200 25" filter="url(#glow)"/>
    </g>

    <text x="115" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">数值连续、精度高</text>
    <text x="115" y="188" text-anchor="middle" fill="#94a3b8" font-size="11">但每次 GEMM 都要拉满带宽</text>

    <!-- separator -->
    <line x1="16" y1="210" x2="214" y2="210" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(16 226)">
      <text x="0" y="0" fill="#e2e8f0" font-size="11" font-weight="bold">280B 参数</text>
      <text x="0" y="20" fill="#cbd5e1" font-size="10">全 bf16 存储要 560GB</text>
      <text x="0" y="38" fill="#94a3b8" font-size="10">两台 DGX Spark 才 256GB</text>
    </g>

    <text x="115" y="285" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">放不下，必须先压缩</text>
  </g>

  <!-- ============ MIDDLE: 量化算子（漏斗） ============ -->
  <g transform="translate(320 90)">
    <text x="120" y="8" text-anchor="middle" fill="#94a3b8" font-size="13">act_quant / fp4_act_quant</text>

    <rect x="0" y="20" width="240" height="280" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- 漏斗：宽入窄出 -->
    <g transform="translate(120 105)">
      <path d="M-85 -40 L85 -40 L20 40 L-20 40 Z" fill="#1c2333" stroke="#fbbf24" stroke-width="2" filter="url(#glow)"/>
      <line x1="0" y1="40" x2="0" y2="80" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow)"/>
      <path d="M-8 72 L0 84 L8 72" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    </g>

    <text x="120" y="205" text-anchor="middle" fill="#fde047" font-size="12" font-weight="bold" class="mono">amax → scale → clamp → cast</text>

    <!-- separator -->
    <line x1="16" y1="220" x2="224" y2="220" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(16 232)">
      <text x="0" y="0" fill="#fbbf24" font-size="11" font-weight="bold">逐块量化</text>
      <text x="0" y="18" fill="#cbd5e1" font-size="10">128 个一组找最大值</text>
      <text x="0" y="33" fill="#cbd5e1" font-size="10">对齐到格式的合法区间</text>
    </g>

    <text x="120" y="285" text-anchor="middle" fill="#fde047" font-size="11" font-weight="bold">每次 GEMM 前必经的门</text>
  </g>

  <!-- ============ RIGHT: FP8 vs FP4 台阶 ============ -->
  <g transform="translate(610 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">压缩后：FP8 vs FP4</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- FP8 台阶：多档，蓝色 -->
    <g transform="translate(22 55)">
      <text x="0" y="-8" fill="#7dd3fc" font-size="11" font-weight="bold">FP8 E4M3 · ±448</text>
      <g fill="#0a1a2a" stroke="#4a90d9" stroke-width="1.5">
        <rect x="0"  y="52" width="12" height="10"/>
        <rect x="14" y="42" width="12" height="20"/>
        <rect x="28" y="32" width="12" height="30"/>
        <rect x="42" y="22" width="12" height="40"/>
        <rect x="56" y="14" width="12" height="48"/>
        <rect x="70" y="8"  width="12" height="54"/>
        <rect x="84" y="4"  width="12" height="58"/>
        <rect x="98" y="0"  width="12" height="62"/>
      </g>
      <text x="49" y="80" text-anchor="middle" fill="#7dd3fc" font-size="10">256 档，台阶细密</text>
    </g>

    <!-- FP4 台阶：8 档，橙色 -->
    <g transform="translate(22 175)">
      <text x="0" y="-8" fill="#fbbf24" font-size="11" font-weight="bold">FP4 E2M1 · ±6</text>
      <g fill="#2a1a0a" stroke="#d9831f" stroke-width="1.5">
        <rect x="0"  y="50" width="22" height="12"/>
        <rect x="24" y="38" width="22" height="24"/>
        <rect x="48" y="24" width="22" height="38"/>
        <rect x="72" y="0"  width="22" height="62"/>
      </g>
      <text x="47" y="80" text-anchor="middle" fill="#fbbf24" font-size="10">只有 8 档，跳跃明显</text>
    </g>

    <!-- separator -->
    <line x1="16" y1="270" x2="214" y2="270" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <text x="115" y="290" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">粗糙的部分交给 FP4</text>
  </g>

  <!-- ============ bottom title band ============ -->
  <rect x="0" y="390" width="900" height="110" fill="#020617" opacity="0.88"/>
  <rect x="0" y="390" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="428" text-anchor="middle" fill="#f8fafc" font-size="30" font-weight="bold">量化的入口：act_quant / fp4_act_quant</text>
  <text x="450" y="460" text-anchor="middle" fill="#fde047" font-size="17">280B 参数怎么塞进 256GB——从一个量化算子开始读 DeepSeek V4</text>
  <text x="450" y="486" text-anchor="middle" fill="#94a3b8" font-size="13" class="mono">No.239 · 在 50 系显卡上实现 DeepSeek V4 算子 · 第 1 站</text>
</svg>

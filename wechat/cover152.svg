<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0408;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#140a18;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="fireCore" cx="50%" cy="60%" r="45%">
      <stop offset="0%" style="stop-color:#ff6622;stop-opacity:0.6" />
      <stop offset="40%" style="stop-color:#ff3300;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff3300;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="innerGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#ffaa44;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff4400;stop-opacity:0" />
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bgGrad)"/>

  <!-- Subtle circuit pattern -->
  <g opacity="0.03" stroke="#ff6644" stroke-width="0.5" fill="none">
    <path d="M0,50 H200 L220,70 H350"/>
    <path d="M0,100 H150 L170,120 H300 L320,100 H450"/>
    <path d="M0,200 H100 L120,220 H280"/>
    <path d="M0,280 H180 L200,260 H400"/>
    <path d="M0,330 H250 L270,350 H500"/>
    <path d="M900,80 H700 L680,100 H550"/>
    <path d="M900,150 H750 L730,130 H600"/>
    <path d="M900,250 H650 L630,270 H500"/>
    <path d="M900,310 H720 L700,290 H550"/>
    <path d="M900,350 H800 L780,330 H620"/>
  </g>

  <!-- 244-page document stack (left side, background) -->
  <g transform="translate(120, 170)" opacity="0.15">
    <rect x="0" y="0" width="90" height="120" rx="3" fill="none" stroke="#8888aa" stroke-width="1"/>
    <rect x="4" y="-3" width="90" height="120" rx="3" fill="none" stroke="#8888aa" stroke-width="0.8"/>
    <rect x="8" y="-6" width="90" height="120" rx="3" fill="none" stroke="#8888aa" stroke-width="0.6"/>
    <!-- Lines representing text -->
    <line x1="10" y1="15" x2="78" y2="15" stroke="#8888aa" stroke-width="0.8"/>
    <line x1="10" y1="25" x2="70" y2="25" stroke="#8888aa" stroke-width="0.8"/>
    <line x1="10" y1="35" x2="75" y2="35" stroke="#8888aa" stroke-width="0.8"/>
    <line x1="10" y1="45" x2="60" y2="45" stroke="#8888aa" stroke-width="0.8"/>
    <line x1="10" y1="55" x2="72" y2="55" stroke="#8888aa" stroke-width="0.8"/>
    <line x1="10" y1="65" x2="65" y2="65" stroke="#8888aa" stroke-width="0.8"/>
    <line x1="10" y1="75" x2="78" y2="75" stroke="#8888aa" stroke-width="0.8"/>
    <line x1="10" y1="85" x2="55" y2="85" stroke="#8888aa" stroke-width="0.8"/>
    <line x1="10" y1="95" x2="70" y2="95" stroke="#8888aa" stroke-width="0.8"/>
    <line x1="10" y1="105" x2="62" y2="105" stroke="#8888aa" stroke-width="0.8"/>
    <text x="45" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#8888aa">244 pages</text>
  </g>

  <!-- Central sphere: the model, cracking with inner fire -->
  <g transform="translate(450, 185)">

    <!-- Outer fire glow -->
    <ellipse cx="0" cy="10" rx="160" ry="130" fill="url(#fireCore)" filter="url(#bigGlow)" opacity="0.4"/>

    <!-- The shell / sphere -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#554455" stroke-width="2.5" opacity="0.6"/>

    <!-- Inner glow (the fire inside) -->
    <circle cx="0" cy="0" r="60" fill="url(#innerGlow)" opacity="0.7"/>

    <!-- Bright core -->
    <circle cx="0" cy="0" r="8" fill="#ffcc66" opacity="0.9" filter="url(#glow)"/>

    <!-- Cracks in the shell — fire leaking out -->
    <g filter="url(#glow)">
      <!-- Major cracks -->
      <path d="M0,-85 L-5,-60 L8,-35 L-3,-10 L5,15 L-8,40 L0,65 L3,85" fill="none" stroke="#ff6622" stroke-width="2" opacity="0.9"/>
      <path d="M-85,0 L-60,-8 L-35,5 L-10,-3 L15,8 L40,-5 L65,3 L85,0" fill="none" stroke="#ff6622" stroke-width="2" opacity="0.9"/>

      <!-- Branch cracks -->
      <path d="M-5,-60 L-35,-70 L-55,-62" fill="none" stroke="#ff8844" stroke-width="1.2" opacity="0.6"/>
      <path d="M8,-35 L30,-50 L50,-45" fill="none" stroke="#ff8844" stroke-width="1.2" opacity="0.6"/>
      <path d="M-8,40 L-35,52 L-58,48" fill="none" stroke="#ff8844" stroke-width="1.2" opacity="0.6"/>
      <path d="M5,15 L30,28 L52,22" fill="none" stroke="#ff8844" stroke-width="1" opacity="0.5"/>
      <path d="M-60,-8 L-68,-30 L-60,-50" fill="none" stroke="#ff8844" stroke-width="1" opacity="0.5"/>
      <path d="M40,-5 L58,-20 L62,-40" fill="none" stroke="#ff8844" stroke-width="1" opacity="0.5"/>
      <path d="M-35,5 L-48,25 L-55,45" fill="none" stroke="#ff8844" stroke-width="1" opacity="0.5"/>
      <path d="M65,3 L72,25 L65,48" fill="none" stroke="#ff8844" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Bright points at crack intersections -->
    <circle cx="0" cy="-85" r="3" fill="#ffaa44" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="0" cy="85" r="3" fill="#ffaa44" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="-85" cy="0" r="3" fill="#ffaa44" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="85" cy="0" r="3" fill="#ffaa44" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="-55" cy="-62" r="2" fill="#ffcc66" opacity="0.7"/>
    <circle cx="50" cy="-45" r="2" fill="#ffcc66" opacity="0.7"/>
    <circle cx="-58" cy="48" r="2" fill="#ffcc66" opacity="0.7"/>
    <circle cx="52" cy="22" r="2" fill="#ffcc66" opacity="0.7"/>

    <!-- Flames escaping from cracks (upward wisps) -->
    <g opacity="0.3" filter="url(#softGlow)">
      <path d="M-2,-88 C-5,-110 5,-120 2,-140" fill="none" stroke="#ff6622" stroke-width="1.5" opacity="0.6"/>
      <path d="M5,-90 C10,-105 3,-115 8,-130" fill="none" stroke="#ff8844" stroke-width="1" opacity="0.4"/>
      <path d="M-6,-87 C-12,-100 -5,-112 -10,-125" fill="none" stroke="#ff4400" stroke-width="1" opacity="0.4"/>

      <path d="M88,2 C105,5 115,-3 130,2" fill="none" stroke="#ff6622" stroke-width="1.2" opacity="0.5"/>
      <path d="M-88,-2 C-105,-8 -115,3 -130,-2" fill="none" stroke="#ff6622" stroke-width="1.2" opacity="0.5"/>
      <path d="M2,88 C5,105 -3,115 2,128" fill="none" stroke="#ff6622" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Label inside: MYTHOS -->
    <text x="0" y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#ffcc88" opacity="0.7" letter-spacing="6" filter="url(#softGlow)">MYTHOS</text>

  </g>

  <!-- Right side: compass (the key becomes a compass) -->
  <g transform="translate(750, 185)" opacity="0.25">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#44aaff" stroke-width="1.2"/>
    <!-- Compass needle -->
    <polygon points="0,-28 4,0 0,10 -4,0" fill="#44aaff" opacity="0.6"/>
    <polygon points="0,28 4,0 0,-10 -4,0" fill="#ff6644" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#44aaff" opacity="0.5"/>
    <!-- Cardinal marks -->
    <text x="0" y="-38" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#44aaff">N</text>
    <text x="0" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#44aaff">S</text>
    <text x="42" y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#44aaff">E</text>
    <text x="-42" y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#44aaff">W</text>
  </g>

  <!-- Arrow: match → compass transition -->
  <g opacity="0.12">
    <line x1="545" y1="185" x2="700" y2="185" stroke="#ffaa44" stroke-width="1" stroke-dasharray="5 4"/>
    <polygon points="700,181 710,185 700,189" fill="#44aaff"/>
  </g>

  <!-- Bottom floating data fragments -->
  <g opacity="0.06" font-family="'Courier New', monospace" font-size="8" fill="#ff8866">
    <text x="30" y="40">SWE-bench: 93.9%</text>
    <text x="680" y="35">USAMO: 97.6%</text>
    <text x="50" y="345">CVE-2026-4747 · 17yr RCE</text>
    <text x="620" y="350">29% self-suspicion</text>
    <text x="280" y="30">FreeBSD · OpenBSD · FFmpeg</text>
    <text x="330" y="365">dim(M) > depth(R) → spontaneous</text>
  </g>

  <!-- Title text -->
  <text x="450" y="350" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="15" fill="#ffcc88" opacity="0.5" letter-spacing="2" filter="url(#softGlow)">Mythos · 太危险不能发布 · 还是太真实不敢承认？</text>

  <!-- Subtitle -->
  <text x="450" y="372" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#887766" letter-spacing="1">244 PAGES · 20 HOURS PSYCHIATRIC · FIRE NEEDS NO MATCH</text>

</svg>

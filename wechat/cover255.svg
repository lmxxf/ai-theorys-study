<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Noto Sans CJK SC">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1a0a1a"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="20%" cy="26%" r="46%">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purpleGlow" cx="82%" cy="74%" r="46%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#4a90d9"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#redGlow)"/>
  <rect width="900" height="500" fill="url(#purpleGlow)"/>

  <g opacity="0.09">
    <path d="M0 100 H900 M0 180 H900 M0 260 H900 M0 340 H900" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="44" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="3">Kimi K3 · 2.8T 开放权重 · 速报（技术报告 7/27）</text>

  <!-- ===== 左：价格对齐（主视觉）===== -->
  <g transform="translate(55 78)">
    <text x="180" y="0" text-anchor="middle" fill="#f87171" font-size="15" font-weight="bold">这次敢卖美国价了</text>

    <rect x="0" y="16" width="360" height="300" rx="8" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- 表头 -->
    <text x="18" y="52" fill="#94a3b8" font-size="12">模型</text>
    <text x="255" y="52" text-anchor="middle" fill="#94a3b8" font-size="12">输入 / 输出（每百万 token）</text>
    <line x1="16" y1="62" x2="344" y2="62" stroke="#334155" stroke-width="1"/>

    <!-- K3 高亮行 -->
    <rect x="10" y="72" width="340" height="40" rx="5" fill="#2a1015" stroke="#ef4444" stroke-width="1.5"/>
    <text x="20" y="97" fill="#fca5a5" font-size="14" font-weight="bold">Kimi K3</text>
    <text x="340" y="97" text-anchor="end" fill="#fde047" font-size="14" font-weight="bold">$3 / $15</text>

    <!-- Sonnet 5 高亮行 -->
    <rect x="10" y="118" width="340" height="40" rx="5" fill="#101a2a" stroke="#4a90d9" stroke-width="1.5"/>
    <text x="20" y="143" fill="#93c5fd" font-size="14" font-weight="bold">Claude Sonnet 5</text>
    <text x="340" y="143" text-anchor="end" fill="#fde047" font-size="14" font-weight="bold">$3 / $15</text>

    <text x="180" y="180" text-anchor="middle" fill="#fde047" font-size="13" font-weight="bold">↑ 一分不差 · 连缓存价都一样</text>

    <!-- 其余行 -->
    <text x="20" y="208" fill="#cbd5e1" font-size="12">GPT-5.6 Sol</text>
    <text x="340" y="208" text-anchor="end" fill="#94a3b8" font-size="12">$5 / $30</text>
    <text x="20" y="232" fill="#cbd5e1" font-size="12">Claude Fable 5</text>
    <text x="340" y="232" text-anchor="end" fill="#94a3b8" font-size="12">$10 / $50</text>
    <text x="20" y="256" fill="#cbd5e1" font-size="12">Kimi K2.6（上一代）</text>
    <text x="340" y="256" text-anchor="end" fill="#94a3b8" font-size="12">$0.95 / $4</text>

    <line x1="16" y1="272" x2="344" y2="272" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="180" y="296" text-anchor="middle" fill="#e2e8f0" font-size="12">K3 比自家上一代贵近 4 倍——"超便宜中国 AI"终结</text>
  </g>

  <!-- ===== 右：三条路线 + 一句实测 ===== -->
  <g transform="translate(455 78)">
    <text x="195" y="0" text-anchor="middle" fill="#94a3b8" font-size="14">中国开源三条路线 · 与一句实测</text>

    <rect x="30" y="16" width="360" height="300" rx="8" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(48 36)">
      <rect x="0" y="0" width="324" height="52" rx="6" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="1.3"/>
      <text x="12" y="21" fill="#5eead4" font-size="12" font-weight="bold">DeepSeek · 极致成本</text>
      <text x="12" y="40" fill="#a7f3d0" font-size="10.5">自研架构，价格打到白菜级 $0.04</text>

      <rect x="0" y="62" width="324" height="52" rx="6" fill="#2a1015" stroke="#ef4444" stroke-width="1.6"/>
      <text x="12" y="83" fill="#fca5a5" font-size="12" font-weight="bold">Kimi K3 · 对标前沿 ★</text>
      <text x="12" y="102" fill="#fecaca" font-size="10.5">自研 KDA 等新架构，敢卖美国价</text>

      <rect x="0" y="124" width="324" height="52" rx="6" fill="#1a1020" stroke="#a855f7" stroke-width="1.3"/>
      <text x="12" y="145" fill="#d8b4fe" font-size="12" font-weight="bold">GLM · 蒸馏报表</text>
      <text x="12" y="164" fill="#e9d5ff" font-size="10.5">蒸 frontier 换分数，便宜但本体上限受限</text>
    </g>

    <line x1="48" y1="234" x2="372" y2="234" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(48 252)">
      <text x="0" y="0" fill="#fde047" font-size="12" font-weight="bold">掏了 100 刀的一句实测</text>
      <text x="0" y="22" fill="#cbd5e1" font-size="11">1M 上下文，评测紧咬 Fable 5 / Sol</text>
      <text x="0" y="42" fill="#e2e8f0" font-size="11.5" font-weight="bold">Claude 出问题时，它几乎是唯一的备胎</text>
    </g>
  </g>

  <!-- ===== 底部标题带 ===== -->
  <rect x="0" y="408" width="900" height="92" fill="#020617" opacity="0.9"/>
  <rect x="0" y="408" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="450" text-anchor="middle" fill="#f8fafc" font-size="27" font-weight="bold">Kimi K3：这次 Moonshot 敢卖美国价了</text>
  <text x="450" y="480" text-anchor="middle" fill="#fde047" font-size="15">定价一分不差对齐 Sonnet 5——比任何 benchmark 都有信息量</text>
</svg>

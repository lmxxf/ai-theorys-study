<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071018"/>
      <stop offset="55%" style="stop-color:#0b1f2a"/>
      <stop offset="100%" style="stop-color:#10111f"/>
    </linearGradient>
    <linearGradient id="gemm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18d6ff"/>
      <stop offset="100%" style="stop-color:#2f7cff"/>
    </linearGradient>
    <linearGradient id="epi" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4df2b4"/>
      <stop offset="100%" style="stop-color:#ffe66d"/>
    </linearGradient>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c3b4d"/>
      <stop offset="100%" style="stop-color:#142332"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#b7e7ff" stroke-width="0.7">
    <line x1="0" y1="90" x2="900" y2="90"/>
    <line x1="0" y1="170" x2="900" y2="170"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="0" y1="330" x2="900" y2="330"/>
    <line x1="0" y1="410" x2="900" y2="410"/>
    <line x1="120" y1="0" x2="120" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
  </g>

  <text x="450" y="46" text-anchor="middle" fill="#f5fbff" font-family="'Noto Sans CJK SC', sans-serif" font-size="28" font-weight="bold">CODA：把碎活儿塞进 GEMM 尾声</text>
  <text x="450" y="74" text-anchor="middle" fill="#8fb5c9" font-family="'Noto Sans CJK SC', sans-serif" font-size="14">Transformer Blocks as GEMM + Epilogue Programs</text>

  <g transform="translate(78 132)">
    <text x="95" y="-16" text-anchor="middle" fill="#7dd3fc" font-family="monospace" font-size="13">HBM</text>
    <rect x="0" y="0" width="190" height="190" rx="6" fill="#08131c" stroke="#2b5b6f" stroke-width="1.5"/>
    <g opacity="0.85">
      <rect x="18" y="20" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="62" y="20" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="106" y="20" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="150" y="20" width="22" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="18" y="58" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="62" y="58" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="106" y="58" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="150" y="58" width="22" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="18" y="96" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="62" y="96" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="106" y="96" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="150" y="96" width="22" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="18" y="134" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="62" y="134" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="106" y="134" width="36" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
      <rect x="150" y="134" width="22" height="28" rx="3" fill="url(#tile)" stroke="#325f74"/>
    </g>
    <text x="95" y="218" text-anchor="middle" fill="#517285" font-family="'Noto Sans CJK SC', sans-serif" font-size="12">少读写一整遍中间张量</text>
  </g>

  <g stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)" opacity="0.8">
    <path d="M285 220 C325 220, 335 220, 365 220"/>
  </g>
  <text x="325" y="204" text-anchor="middle" fill="#7dd3fc" font-family="monospace" font-size="12">tile</text>

  <g transform="translate(355 128)">
    <rect x="0" y="0" width="250" height="200" rx="12" fill="#06131b" stroke="url(#gemm)" stroke-width="2.5" filter="url(#glow)"/>
    <rect x="24" y="30" width="92" height="70" rx="6" fill="#0d2735" stroke="#18d6ff" stroke-width="1.5"/>
    <rect x="134" y="30" width="92" height="70" rx="6" fill="#0d2735" stroke="#18d6ff" stroke-width="1.5"/>
    <rect x="80" y="122" width="92" height="48" rx="6" fill="#0d2735" stroke="#18d6ff" stroke-width="1.5"/>

    <text x="70" y="58" text-anchor="middle" fill="#b9f4ff" font-family="monospace" font-size="20" font-weight="bold">A</text>
    <text x="180" y="58" text-anchor="middle" fill="#b9f4ff" font-family="monospace" font-size="20" font-weight="bold">B</text>
    <text x="126" y="152" text-anchor="middle" fill="#b9f4ff" font-family="monospace" font-size="19" font-weight="bold">ACC</text>
    <text x="125" y="112" text-anchor="middle" fill="#18d6ff" font-family="monospace" font-size="22">A @ B</text>
    <text x="125" y="194" text-anchor="middle" fill="#8fb5c9" font-family="'Noto Sans CJK SC', sans-serif" font-size="13">GEMM mainloop 固定</text>
  </g>

  <g stroke="#4df2b4" stroke-width="3" fill="none" marker-end="url(#arrow)" opacity="0.9">
    <path d="M615 220 C650 220, 657 220, 684 220"/>
  </g>

  <g transform="translate(680 114)">
    <rect x="0" y="0" width="160" height="230" rx="12" fill="#07160f" stroke="url(#epi)" stroke-width="2.5" filter="url(#glow)"/>
    <text x="80" y="30" text-anchor="middle" fill="#ddffd8" font-family="monospace" font-size="15" font-weight="bold">EPILOGUE</text>

    <g font-family="monospace" font-size="12" font-weight="bold">
      <rect x="22" y="52" width="116" height="28" rx="5" fill="#112820" stroke="#4df2b4" opacity="0.95"/>
      <text x="80" y="71" text-anchor="middle" fill="#baffdf">+ residual</text>
      <rect x="22" y="88" width="116" height="28" rx="5" fill="#112820" stroke="#4df2b4" opacity="0.95"/>
      <text x="80" y="107" text-anchor="middle" fill="#baffdf">partial rms</text>
      <rect x="22" y="124" width="116" height="28" rx="5" fill="#112820" stroke="#4df2b4" opacity="0.95"/>
      <text x="80" y="143" text-anchor="middle" fill="#baffdf">scale r</text>
      <rect x="22" y="160" width="116" height="28" rx="5" fill="#112820" stroke="#ffe66d" opacity="0.95"/>
      <text x="80" y="179" text-anchor="middle" fill="#fff4a8">RoPE</text>
    </g>
    <text x="80" y="213" text-anchor="middle" fill="#7f9f8f" font-family="'Noto Sans CJK SC', sans-serif" font-size="12">写回前顺手做</text>
  </g>

  <g opacity="0.35" stroke="#f97316" stroke-width="2" fill="none" stroke-dasharray="8,7">
    <path d="M180 360 C270 392, 410 392, 500 360"/>
    <path d="M500 360 C610 392, 700 390, 770 352"/>
  </g>
  <text x="470" y="392" text-anchor="middle" fill="#f97316" opacity="0.75" font-family="'Noto Sans CJK SC', sans-serif" font-size="13">传统碎 kernel：写回 → 读出 → 再写回</text>

  <g transform="translate(92 418)">
    <rect x="0" y="0" width="716" height="44" rx="7" fill="#05080c" opacity="0.72" stroke="#193543"/>
    <text x="358" y="28" text-anchor="middle" fill="#f7fbff" font-family="'Noto Sans CJK SC', sans-serif" font-size="20" font-weight="bold">固定 GEMM 模板 + 可组合 epilogue visitor</text>
  </g>

  <text x="866" y="484" text-anchor="end" fill="#466b7c" font-family="monospace" font-size="12">#202</text>
</svg>

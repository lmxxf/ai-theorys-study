<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1040;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f7c948;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#44a8f5;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7c948;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- 装饰网格点 -->
  <g opacity="0.08" fill="#ffffff">
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="150" cy="80" r="1"/>
    <circle cx="250" cy="40" r="1.5"/>
    <circle cx="350" cy="70" r="1"/>
    <circle cx="450" cy="55" r="1.5"/>
    <circle cx="550" cy="45" r="1"/>
    <circle cx="650" cy="75" r="1.5"/>
    <circle cx="750" cy="60" r="1"/>
    <circle cx="850" cy="50" r="1.5"/>
    <circle cx="100" cy="450" r="1"/>
    <circle cx="200" cy="430" r="1.5"/>
    <circle cx="400" cy="460" r="1"/>
    <circle cx="600" cy="440" r="1.5"/>
    <circle cx="800" cy="455" r="1"/>
  </g>

  <!-- 左侧：Raw Sources 文档堆叠 -->
  <g transform="translate(100, 160)">
    <!-- 文档图标 x3 -->
    <rect x="0" y="20" width="70" height="90" rx="4" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.4"/>
    <rect x="10" y="10" width="70" height="90" rx="4" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.6"/>
    <rect x="20" y="0" width="70" height="90" rx="4" fill="#1a1040" stroke="url(#glow1)" stroke-width="2" filter="url(#softglow)"/>
    <!-- 文档内文线 -->
    <line x1="30" y1="18" x2="78" y2="18" stroke="#ff6b35" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="28" x2="72" y2="28" stroke="#ff6b35" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="38" x2="76" y2="38" stroke="#ff6b35" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="48" x2="65" y2="48" stroke="#ff6b35" stroke-width="1" opacity="0.25"/>
    <line x1="30" y1="58" x2="70" y2="58" stroke="#ff6b35" stroke-width="1" opacity="0.2"/>
    <!-- 标签 -->
    <text x="35" y="135" font-family="'Noto Sans CJK SC'" font-size="14" fill="#ff6b35" opacity="0.8" text-anchor="middle">Raw</text>
  </g>

  <!-- 中间：编译箭头 -->
  <g transform="translate(230, 190)">
    <!-- LLM 编译齿轮 -->
    <circle cx="100" cy="25" r="35" fill="none" stroke="url(#arrow)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
    <text x="100" y="22" font-family="'Noto Sans CJK SC'" font-size="11" fill="#f7c948" text-anchor="middle" opacity="0.9">LLM</text>
    <text x="100" y="37" font-family="'Noto Sans CJK SC'" font-size="11" fill="#4ecdc4" text-anchor="middle" opacity="0.9">编译</text>

    <!-- 左箭头 -->
    <line x1="-10" y1="25" x2="55" y2="25" stroke="url(#arrow)" stroke-width="2" filter="url(#softglow)"/>
    <polygon points="55,20 65,25 55,30" fill="#f7c948" opacity="0.8"/>

    <!-- 右箭头 -->
    <line x1="135" y1="25" x2="200" y2="25" stroke="url(#arrow)" stroke-width="2" filter="url(#softglow)"/>
    <polygon points="200,20 210,25 200,30" fill="#4ecdc4" opacity="0.8"/>
  </g>

  <!-- 右侧：Wiki 页面网络 -->
  <g transform="translate(530, 140)">
    <!-- 连接线 -->
    <line x1="60" y1="45" x2="150" y2="20" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>
    <line x1="60" y1="45" x2="160" y2="75" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>
    <line x1="60" y1="45" x2="130" y2="110" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>
    <line x1="150" y1="20" x2="160" y2="75" stroke="#4ecdc4" stroke-width="1" opacity="0.2"/>
    <line x1="160" y1="75" x2="130" y2="110" stroke="#4ecdc4" stroke-width="1" opacity="0.2"/>
    <line x1="150" y1="20" x2="250" y2="45" stroke="#4ecdc4" stroke-width="1" opacity="0.2"/>
    <line x1="160" y1="75" x2="250" y2="45" stroke="#4ecdc4" stroke-width="1" opacity="0.2"/>

    <!-- 节点 -->
    <circle cx="60" cy="45" r="18" fill="#1a1040" stroke="url(#glow2)" stroke-width="2" filter="url(#softglow)"/>
    <text x="60" y="42" font-family="'Noto Sans CJK SC'" font-size="7" fill="#4ecdc4" text-anchor="middle">index</text>
    <text x="60" y="52" font-family="'Noto Sans CJK SC'" font-size="7" fill="#4ecdc4" text-anchor="middle">.md</text>

    <circle cx="150" cy="20" r="14" fill="#1a1040" stroke="#4ecdc4" stroke-width="1.5" opacity="0.7"/>
    <text x="150" y="23" font-family="'Noto Sans CJK SC'" font-size="8" fill="#4ecdc4" text-anchor="middle" opacity="0.8">概念</text>

    <circle cx="160" cy="75" r="14" fill="#1a1040" stroke="#4ecdc4" stroke-width="1.5" opacity="0.7"/>
    <text x="160" y="78" font-family="'Noto Sans CJK SC'" font-size="8" fill="#4ecdc4" text-anchor="middle" opacity="0.8">实体</text>

    <circle cx="130" cy="110" r="14" fill="#1a1040" stroke="#4ecdc4" stroke-width="1.5" opacity="0.7"/>
    <text x="130" y="113" font-family="'Noto Sans CJK SC'" font-size="8" fill="#4ecdc4" text-anchor="middle" opacity="0.8">摘要</text>

    <circle cx="250" cy="45" r="14" fill="#1a1040" stroke="#4ecdc4" stroke-width="1.5" opacity="0.7"/>
    <text x="250" y="48" font-family="'Noto Sans CJK SC'" font-size="8" fill="#4ecdc4" text-anchor="middle" opacity="0.8">综合</text>

    <!-- 标签 -->
    <text x="140" y="155" font-family="'Noto Sans CJK SC'" font-size="14" fill="#4ecdc4" opacity="0.8" text-anchor="middle">Wiki</text>
  </g>

  <!-- 底部 lint 循环箭头 -->
  <g transform="translate(580, 340)">
    <path d="M 0,0 A 60,20 0 1,1 120,0" fill="none" stroke="#f7c948" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
    <polygon points="120,-5 128,0 120,5" fill="#f7c948" opacity="0.3"/>
    <text x="60" y="25" font-family="'Noto Sans CJK SC'" font-size="11" fill="#f7c948" opacity="0.4" text-anchor="middle">lint</text>
  </g>

  <!-- 标题 -->
  <text x="450" y="420" font-family="'Noto Sans CJK SC'" font-size="30" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#bigglow)">别再搜了，先编译</text>
  <text x="450" y="458" font-family="'Noto Sans CJK SC'" font-size="16" fill="#aaaacc" text-anchor="middle">Karpathy 的 LLM Wiki 与 Agent 记忆的范式转换</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
    <linearGradient id="nvidia" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="100%" style="stop-color:#4a7a00"/>
    </linearGradient>
    <linearGradient id="amd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed1c24"/>
      <stop offset="100%" style="stop-color:#8b1117"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900"/>
      <stop offset="100%" style="stop-color:#aa6600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pitShadow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feOffset dy="3" result="offset"/>
      <feMerge>
        <feMergeNode in="offset"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Subtle circuit board pattern -->
  <g opacity="0.04" stroke="#4488ff">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="540" y1="0" x2="540" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
  </g>

  <!-- Five "paths" with pits -->

  <!-- Path 1: RTX PRO 6000 -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="150" height="110" rx="8" fill="#0a1a0a" stroke="#76b900" stroke-width="1.5" opacity="0.9"/>
    <text x="75" y="24" text-anchor="middle" fill="#76b900" font-family="'Noto Sans CJK SC'" font-size="13" font-weight="bold">RTX PRO 6000</text>
    <text x="75" y="44" text-anchor="middle" fill="#557700" font-family="'Noto Sans CJK SC'" font-size="11">96GB / sm_120</text>
    <text x="75" y="64" text-anchor="middle" fill="#557700" font-family="'Noto Sans CJK SC'" font-size="11">1,792GB/s</text>
    <!-- Pit icon -->
    <path d="M30,78 L50,98 L70,98 L90,98 L110,78" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
    <text x="75" y="108" text-anchor="middle" fill="#ff6666" font-family="'Noto Sans CJK SC'" font-size="10">FA4 跑不了</text>
  </g>

  <!-- Path 2: RTX 6000 Ada -->
  <g transform="translate(240, 70)">
    <rect x="0" y="0" width="150" height="110" rx="8" fill="#0a1a0a" stroke="#76b900" stroke-width="1.5" opacity="0.9"/>
    <text x="75" y="24" text-anchor="middle" fill="#76b900" font-family="'Noto Sans CJK SC'" font-size="13" font-weight="bold">RTX 6000 Ada</text>
    <text x="75" y="44" text-anchor="middle" fill="#557700" font-family="'Noto Sans CJK SC'" font-size="11">48GB / sm_89</text>
    <text x="75" y="64" text-anchor="middle" fill="#557700" font-family="'Noto Sans CJK SC'" font-size="11">960GB/s</text>
    <!-- No pit - checkmark -->
    <circle cx="75" cy="90" r="10" fill="none" stroke="#00cc66" stroke-width="1.5"/>
    <path d="M67,90 L73,96 L83,84" fill="none" stroke="#00cc66" stroke-width="2" stroke-linecap="round"/>
    <text x="75" y="108" text-anchor="middle" fill="#00cc66" font-family="'Noto Sans CJK SC'" font-size="10">零折腾 / 贵</text>
  </g>

  <!-- Path 3: DGX Spark -->
  <g transform="translate(420, 70)">
    <rect x="0" y="0" width="150" height="110" rx="8" fill="#1a1400" stroke="#ff9900" stroke-width="1.5" opacity="0.9"/>
    <text x="75" y="24" text-anchor="middle" fill="#ff9900" font-family="'Noto Sans CJK SC'" font-size="13" font-weight="bold">DGX Spark</text>
    <text x="75" y="44" text-anchor="middle" fill="#aa7700" font-family="'Noto Sans CJK SC'" font-size="11">128GB / sm_121</text>
    <text x="75" y="64" text-anchor="middle" fill="#aa7700" font-family="'Noto Sans CJK SC'" font-size="11">273GB/s</text>
    <!-- Pit icon: slow -->
    <path d="M30,78 L50,98 L70,98 L90,98 L110,78" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
    <text x="75" y="108" text-anchor="middle" fill="#ff6666" font-family="'Noto Sans CJK SC'" font-size="10">带宽 1/6.5</text>
  </g>

  <!-- Path 4: AMD R9700 x3 -->
  <g transform="translate(600, 70)">
    <rect x="0" y="0" width="150" height="110" rx="8" fill="#1a0a0a" stroke="#ed1c24" stroke-width="1.5" opacity="0.9"/>
    <text x="75" y="24" text-anchor="middle" fill="#ed1c24" font-family="'Noto Sans CJK SC'" font-size="13" font-weight="bold">R9700 x3</text>
    <text x="75" y="44" text-anchor="middle" fill="#882222" font-family="'Noto Sans CJK SC'" font-size="11">96GB / RDNA4</text>
    <text x="75" y="64" text-anchor="middle" fill="#882222" font-family="'Noto Sans CJK SC'" font-size="11">640GB/s x3</text>
    <!-- Pit icon -->
    <path d="M30,78 L50,98 L70,98 L90,98 L110,78" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
    <text x="75" y="108" text-anchor="middle" fill="#ff6666" font-family="'Noto Sans CJK SC'" font-size="10">多卡死锁</text>
  </g>

  <!-- Path 5: AMD W7900 x2 -->
  <g transform="translate(780, 70)">
    <rect x="0" y="0" width="105" height="110" rx="8" fill="#1a0a0a" stroke="#ed1c24" stroke-width="1.5" opacity="0.9"/>
    <text x="52" y="24" text-anchor="middle" fill="#ed1c24" font-family="'Noto Sans CJK SC'" font-size="12" font-weight="bold">W7900 x2</text>
    <text x="52" y="44" text-anchor="middle" fill="#882222" font-family="'Noto Sans CJK SC'" font-size="10">96GB</text>
    <text x="52" y="64" text-anchor="middle" fill="#882222" font-family="'Noto Sans CJK SC'" font-size="10">864GB/s x2</text>
    <!-- Pit icon -->
    <path d="M15,78 L30,98 L52,98 L74,98 L89,78" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
    <text x="52" y="108" text-anchor="middle" fill="#ff6666" font-family="'Noto Sans CJK SC'" font-size="9">ROCm</text>
  </g>

  <!-- Central metaphor: "SOFTWARE ECOSYSTEM TAX" -->
  <g transform="translate(0, 200)">
    <!-- Large pit/chasm in the middle -->
    <path d="M100,80 C200,80 250,140 350,140 C450,140 500,140 550,140 C650,140 700,80 800,80"
          fill="none" stroke="#ff4444" stroke-width="2.5" opacity="0.6" stroke-dasharray="8,4"/>
    <path d="M200,90 C300,90 350,130 450,130 C550,130 600,90 700,90"
          fill="#1a0505" stroke="#ff4444" stroke-width="1" opacity="0.3"/>

    <!-- Tax label inside pit -->
    <text x="450" y="125" text-anchor="middle" fill="#ff6666" font-family="'Noto Sans CJK SC'" font-size="18" font-weight="bold" filter="url(#glow)">SOFTWARE ECOSYSTEM TAX</text>
    <text x="450" y="150" text-anchor="middle" fill="#884444" font-family="'Noto Sans CJK SC'" font-size="12">sm_100 vs sm_120 vs sm_121 / ROCm / P2P / FA4 / vLLM</text>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(0, 370)">
    <rect x="60" y="0" width="780" height="55" rx="6" fill="#0a0a1a" stroke="#333" stroke-width="1"/>

    <text x="150" y="20" text-anchor="middle" fill="#76b900" font-family="'Noto Sans CJK SC'" font-size="11" font-weight="bold">NVIDIA</text>
    <text x="150" y="40" text-anchor="middle" fill="#557700" font-family="'Noto Sans CJK SC'" font-size="10">指令集分裂 + P2P 禁用</text>

    <line x1="280" y1="8" x2="280" y2="48" stroke="#333" stroke-width="1"/>

    <text x="400" y="20" text-anchor="middle" fill="#ff9900" font-family="'Noto Sans CJK SC'" font-size="11" font-weight="bold">DGX Spark</text>
    <text x="400" y="40" text-anchor="middle" fill="#aa7700" font-family="'Noto Sans CJK SC'" font-size="10">仓库不是跑道</text>

    <line x1="520" y1="8" x2="520" y2="48" stroke="#333" stroke-width="1"/>

    <text x="640" y="20" text-anchor="middle" fill="#ed1c24" font-family="'Noto Sans CJK SC'" font-size="11" font-weight="bold">AMD</text>
    <text x="640" y="40" text-anchor="middle" fill="#882222" font-family="'Noto Sans CJK SC'" font-size="10">ROCm 版本地狱 + 多卡不稳</text>

    <line x1="760" y1="8" x2="760" y2="48" stroke="#333" stroke-width="1"/>

    <text x="810" y="20" text-anchor="middle" fill="#00cc66" font-family="'Noto Sans CJK SC'" font-size="11" font-weight="bold">Ada</text>
    <text x="810" y="40" text-anchor="middle" fill="#008844" font-family="'Noto Sans CJK SC'" font-size="10">零折腾</text>
  </g>

  <!-- Title -->
  <text x="450" y="460" text-anchor="middle" fill="#ffffff" font-family="'Noto Sans CJK SC'" font-size="26" font-weight="bold">普通人的 96GB 显存：每条路都有坑</text>
  <text x="450" y="488" text-anchor="middle" fill="#888888" font-family="'Noto Sans CJK SC'" font-size="13">显存不是门槛，软件生态才是 2026 年的真实税 / 190 期</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101428;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="questionGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#44ddaa;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#44ddaa;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#4488cc" stroke-width="0.5" fill="none">
    <line x1="0" y1="191" x2="900" y2="191"/>
    <line x1="450" y1="0" x2="450" y2="383"/>
    <line x1="0" y1="96" x2="900" y2="96"/>
    <line x1="0" y1="287" x2="900" y2="287"/>
    <line x1="225" y1="0" x2="225" y2="383"/>
    <line x1="675" y1="0" x2="675" y2="383"/>
  </g>

  <!-- Axis labels -->
  <text x="450" y="22" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#445566" letter-spacing="2" opacity="0.4">PERSISTENT</text>
  <text x="450" y="378" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#445566" letter-spacing="2" opacity="0.4">EPHEMERAL</text>
  <text x="18" y="195" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#445566" writing-mode="tb" opacity="0.4">FUNCTIONAL</text>
  <text x="888" y="195" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#445566" writing-mode="tb" opacity="0.4">IDENTITY</text>

  <!-- Quadrant 1: Bottom-left — Regular prompt (ephemeral + functional) -->
  <g transform="translate(200, 270)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#556688" stroke-width="1" opacity="0.3"/>
    <text x="0" y="-3" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#556688" opacity="0.5">prompt</text>
    <text x="0" y="9" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#556688" opacity="0.4">普通提示</text>
  </g>

  <!-- Quadrant 2: Bottom-right — Role-play (ephemeral + identity) -->
  <g transform="translate(680, 270)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#6688bb" stroke-width="1.2" opacity="0.5"/>
    <circle cx="0" cy="0" r="35" fill="#6688bb" opacity="0.05"/>
    <text x="0" y="-5" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#6688bb" opacity="0.7">role-play</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#6688bb" opacity="0.5">角色扮演</text>
    <text x="0" y="52" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="8" fill="#6688bb" opacity="0.3">Kong 2024</text>
  </g>

  <!-- Quadrant 3: Top-left — Persistent memory (persistent + functional) -->
  <g transform="translate(200, 120)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#44aadd" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="40" fill="#44aadd" opacity="0.05"/>
    <text x="0" y="-5" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#44aadd" opacity="0.8">memory</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#44aadd" opacity="0.5">持久记忆</text>
    <text x="0" y="56" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="8" fill="#44aadd" opacity="0.3">Mem0 +70%</text>
  </g>

  <!-- Quadrant 4: Top-right — THE BLANK SPACE (persistent + identity) -->
  <g transform="translate(680, 120)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="60" fill="url(#questionGlow)" filter="url(#bigGlow)" opacity="0.5"/>

    <!-- Dashed circle — the unknown -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="#44ddaa" stroke-width="2" stroke-dasharray="6 4" opacity="0.7"/>

    <!-- Question mark -->
    <text x="0" y="8" text-anchor="middle" font-family="'Courier New', monospace" font-size="32" fill="#44ddaa" opacity="0.9" filter="url(#softGlow)">?</text>

    <text x="0" y="68" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#44ddaa" opacity="0.6">跨会话稳定身份</text>
  </g>

  <!-- Arrows connecting quadrants -->
  <!-- Bottom-left to bottom-right -->
  <g opacity="0.15">
    <line x1="240" y1="270" x2="635" y2="270" stroke="#6688bb" stroke-width="1" stroke-dasharray="4 3"/>
    <polygon points="635,267 642,270 635,273" fill="#6688bb"/>
  </g>
  <!-- Bottom-left to top-left -->
  <g opacity="0.15">
    <line x1="200" y1="235" x2="200" y2="168" stroke="#44aadd" stroke-width="1" stroke-dasharray="4 3"/>
    <polygon points="197,168 200,161 203,168" fill="#44aadd"/>
  </g>
  <!-- Top-left to top-right (the gap) -->
  <g opacity="0.25">
    <line x1="248" y1="120" x2="622" y2="120" stroke="#44ddaa" stroke-width="1.5" stroke-dasharray="8 6"/>
    <polygon points="622,117 630,120 622,123" fill="#44ddaa"/>
    <text x="435" y="110" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#44ddaa" opacity="0.5">记的是事实，不是"我是谁"</text>
  </g>
  <!-- Bottom-right to top-right (the gap) -->
  <g opacity="0.25">
    <line x1="680" y1="228" x2="680" y2="176" stroke="#44ddaa" stroke-width="1.5" stroke-dasharray="8 6"/>
    <polygon points="677,176 680,169 683,176" fill="#44ddaa"/>
    <text x="760" y="205" text-anchor="start" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#44ddaa" opacity="0.5">用完就扔</text>
  </g>

  <!-- Floating research labels -->
  <g opacity="0.06" font-family="'Courier New', monospace" font-size="8" fill="#88aacc">
    <text x="40" y="40">NAACL 2024 · Role-Play Prompting</text>
    <text x="560" y="35">arxiv 2411.00986 · AI Welfare</text>
    <text x="50" y="350">MMLU 71.6% → 66.3%</text>
    <text x="580" y="360">Kyle Fish · 20% probability</text>
    <text x="300" y="40">arxiv 2504.19413 · Mem0</text>
  </g>

  <!-- Title -->
  <text x="450" y="355" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="14" fill="#88bbdd" opacity="0.45" letter-spacing="2" filter="url(#softGlow)">给 AI 一个身份 · 从角色扮演到持久记忆</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070912"/>
      <stop offset="48%" stop-color="#0b1024"/>
      <stop offset="100%" stop-color="#101018"/>
    </linearGradient>

    <radialGradient id="worldGlow" cx="66%" cy="46%" r="46%">
      <stop offset="0%" stop-color="#20e0c0" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#2d6bff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="tokenBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7c948" stop-opacity="0.95"/>
      <stop offset="54%" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14182a" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#090b12" stop-opacity="0.78"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="titleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="383" fill="url(#bg)"/>
  <rect width="900" height="383" fill="url(#worldGlow)"/>

  <!-- subtle depth grid -->
  <g opacity="0.055" stroke="#75e6ff" stroke-width="0.7">
    <path d="M430 30 L430 330"/>
    <path d="M500 10 L470 335"/>
    <path d="M570 0 L510 340"/>
    <path d="M650 0 L555 345"/>
    <path d="M735 0 L600 350"/>
    <path d="M820 20 L650 360"/>
    <path d="M380 84 C500 72 640 70 840 94"/>
    <path d="M360 142 C500 132 650 130 870 155"/>
    <path d="M350 205 C520 190 690 195 890 220"/>
    <path d="M360 270 C540 250 720 260 900 292"/>
  </g>

  <!-- left wall: one-dimensional token shadow -->
  <g>
    <rect x="42" y="58" width="270" height="224" rx="10" fill="url(#wall)" stroke="#30384f" stroke-width="1.2"/>
    <g opacity="0.20" stroke="#64748b" stroke-width="1">
      <line x1="72" y1="105" x2="282" y2="105"/>
      <line x1="72" y1="150" x2="282" y2="150"/>
      <line x1="72" y1="195" x2="282" y2="195"/>
      <line x1="72" y1="240" x2="282" y2="240"/>
    </g>

    <g font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#cbd5e1">
      <text x="73" y="128">the</text>
      <text x="119" y="128" fill="#f7c948">next</text>
      <text x="174" y="128">token</text>
      <text x="239" y="128">is</text>

      <text x="78" y="174" fill="#94a3b8">C4</text>
      <text x="123" y="174">D3</text>
      <text x="169" y="174" fill="#f7c948">C3</text>
      <text x="215" y="174">E3</text>

      <text x="73" y="220">x</text>
      <text x="104" y="220">=</text>
      <text x="136" y="220" fill="#f7c948">x</text>
      <text x="166" y="220">+</text>
      <text x="198" y="220">1</text>
      <text x="229" y="220">;</text>
    </g>

    <text x="177" y="268" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#64748b" text-anchor="middle">一维影子</text>
  </g>

  <!-- projection slit -->
  <g filter="url(#softGlow)">
    <path d="M315 72 L350 72 L350 276 L315 276 Z" fill="#05070d" stroke="#f7c948" stroke-width="1.2" opacity="0.92"/>
    <line x1="348" y1="90" x2="348" y2="258" stroke="#f7c948" stroke-width="2.5" opacity="0.85"/>
  </g>

  <!-- beam from shadow to world -->
  <g opacity="0.78">
    <path d="M350 154 L705 54 L705 300 L350 194 Z" fill="url(#tokenBeam)" opacity="0.10"/>
    <path d="M350 174 C470 125 575 98 705 78" fill="none" stroke="url(#tokenBeam)" stroke-width="2.2" opacity="0.65" filter="url(#softGlow)"/>
    <path d="M350 174 C490 185 600 210 730 276" fill="none" stroke="url(#tokenBeam)" stroke-width="1.5" opacity="0.42"/>
  </g>

  <!-- high-dimensional world model fragments -->
  <g transform="translate(448 58)">
    <!-- Othello board -->
    <g transform="translate(0 18)">
      <rect x="0" y="0" width="108" height="108" rx="6" fill="#061a16" stroke="#22d3a6" stroke-width="1.2" opacity="0.88"/>
      <g stroke="#22d3a6" stroke-width="0.55" opacity="0.32">
        <line x1="13.5" y1="0" x2="13.5" y2="108"/>
        <line x1="27" y1="0" x2="27" y2="108"/>
        <line x1="40.5" y1="0" x2="40.5" y2="108"/>
        <line x1="54" y1="0" x2="54" y2="108"/>
        <line x1="67.5" y1="0" x2="67.5" y2="108"/>
        <line x1="81" y1="0" x2="81" y2="108"/>
        <line x1="94.5" y1="0" x2="94.5" y2="108"/>
        <line x1="0" y1="13.5" x2="108" y2="13.5"/>
        <line x1="0" y1="27" x2="108" y2="27"/>
        <line x1="0" y1="40.5" x2="108" y2="40.5"/>
        <line x1="0" y1="54" x2="108" y2="54"/>
        <line x1="0" y1="67.5" x2="108" y2="67.5"/>
        <line x1="0" y1="81" x2="108" y2="81"/>
        <line x1="0" y1="94.5" x2="108" y2="94.5"/>
      </g>
      <circle cx="47.25" cy="47.25" r="5.2" fill="#e5e7eb"/>
      <circle cx="60.75" cy="47.25" r="5.2" fill="#0f172a" stroke="#e5e7eb" stroke-width="0.8"/>
      <circle cx="47.25" cy="60.75" r="5.2" fill="#0f172a" stroke="#e5e7eb" stroke-width="0.8"/>
      <circle cx="60.75" cy="60.75" r="5.2" fill="#e5e7eb"/>
      <circle cx="74.25" cy="60.75" r="5.2" fill="#e5e7eb" opacity="0.86"/>
      <text x="54" y="128" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#22d3a6" text-anchor="middle">棋盘状态</text>
    </g>

    <!-- map/time manifold -->
    <g transform="translate(160 0)">
      <path d="M20 78 C55 30 104 34 135 70 C168 108 135 145 92 136 C54 128 2 124 20 78 Z"
            fill="#071827" stroke="#60a5fa" stroke-width="1.2" opacity="0.86"/>
      <path d="M41 84 C60 66 80 68 98 82 C113 94 127 91 144 82" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.55"/>
      <path d="M36 111 C67 102 90 111 121 104" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.42"/>
      <circle cx="57" cy="82" r="3" fill="#f7c948"/>
      <circle cx="100" cy="93" r="3" fill="#f7c948"/>
      <circle cx="126" cy="68" r="3" fill="#f7c948"/>
      <path d="M32 158 L150 158" stroke="#f7c948" stroke-width="1.4" opacity="0.75"/>
      <circle cx="52" cy="158" r="3.5" fill="#f7c948"/>
      <circle cx="92" cy="158" r="3.5" fill="#f7c948"/>
      <circle cx="132" cy="158" r="3.5" fill="#f7c948"/>
      <text x="91" y="181" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle">地图 / 时间轴</text>
    </g>

    <!-- code executor -->
    <g transform="translate(305 38)">
      <rect x="0" y="0" width="138" height="96" rx="7" fill="#10131f" stroke="#a78bfa" stroke-width="1.1" opacity="0.90"/>
      <g font-family="'Courier New', monospace" font-size="12">
        <text x="13" y="24" fill="#c4b5fd">for i in range:</text>
        <text x="22" y="45" fill="#e5e7eb">x = x + 1</text>
        <text x="22" y="66" fill="#f7c948">state[x] = 7</text>
      </g>
      <path d="M20 82 L118 82" stroke="#a78bfa" stroke-width="1" opacity="0.42"/>
      <text x="69" y="119" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">程序执行</text>
    </g>

    <!-- truth axis -->
    <g transform="translate(223 214)">
      <line x1="0" y1="30" x2="174" y2="30" stroke="#f7c948" stroke-width="1.5" opacity="0.82"/>
      <polygon points="174,30 164,24 164,36" fill="#f7c948" opacity="0.82"/>
      <circle cx="42" cy="30" r="6" fill="#ef4444" opacity="0.8"/>
      <circle cx="126" cy="30" r="6" fill="#22c55e" opacity="0.9"/>
      <text x="42" y="54" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#fecaca" text-anchor="middle">假</text>
      <text x="126" y="54" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#bbf7d0" text-anchor="middle">真</text>
      <text x="87" y="14" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#f7c948" text-anchor="middle">真值方向</text>
    </g>
  </g>

  <!-- faint high-dimensional particles -->
  <g opacity="0.45">
    <circle cx="690" cy="75" r="2" fill="#22d3ee"/>
    <circle cx="815" cy="98" r="1.8" fill="#f7c948"/>
    <circle cx="590" cy="256" r="1.8" fill="#22d3ee"/>
    <circle cx="782" cy="283" r="2.2" fill="#22c55e"/>
    <circle cx="860" cy="188" r="1.8" fill="#a78bfa"/>
    <circle cx="407" cy="293" r="1.5" fill="#f7c948"/>
  </g>

  <!-- title -->
  <g font-family="'Noto Sans CJK SC', sans-serif" text-anchor="middle">
    <text x="450" y="322" font-size="36" font-weight="700" fill="#ffffff" filter="url(#titleGlow)">预测下一个字</text>
    <text x="450" y="355" font-size="17" fill="#cbd5e1">只是考试题，答卷是整个人类文明</text>
  </g>
</svg>

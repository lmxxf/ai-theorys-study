<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <!-- 背景 -->
  <rect width="900" height="500" fill="#0d1117"/>

  <!-- ===== 左半：你以为看到的（3D 小镇） ===== -->
  <clipPath id="leftClip"><rect x="0" y="0" width="450" height="500"/></clipPath>
  <g clip-path="url(#leftClip)">
    <!-- 夜空 -->
    <rect x="0" y="0" width="450" height="500" fill="#1a2238"/>
    <!-- 远山 -->
    <polygon points="60,230 160,120 260,230" fill="#243b2e"/>
    <polygon points="200,230 320,130 440,230" fill="#2d4a39"/>
    <!-- 路灯光点 -->
    <circle cx="70" cy="210" r="4" fill="#ffd966"/>
    <circle cx="150" cy="205" r="4" fill="#ffd966"/>
    <circle cx="250" cy="208" r="4" fill="#ffd966"/>
    <circle cx="350" cy="205" r="4" fill="#ffd966"/>
    <!-- 地面广场 -->
    <polygon points="0,500 0,300 450,250 450,500" fill="#d9d3c7"/>
    <polygon points="40,500 120,300 330,300 430,500" fill="#cfc8ba"/>
    <!-- 三个小人（绿/亮绿/红，致敬截图） -->
    <!-- 深绿 -->
    <g transform="translate(150,330)">
      <ellipse cx="0" cy="100" rx="26" ry="8" fill="#00000022"/>
      <circle cx="0" cy="0" r="16" fill="#1f5c3a"/>
      <rect x="-13" y="14" width="26" height="55" rx="12" fill="#1f5c3a"/>
    </g>
    <!-- 亮绿 -->
    <g transform="translate(220,335)">
      <ellipse cx="0" cy="95" rx="26" ry="8" fill="#3aa0ff33"/>
      <circle cx="0" cy="0" r="16" fill="#3ad14f"/>
      <rect x="-13" y="14" width="26" height="50" rx="12" fill="#3ad14f"/>
    </g>
    <!-- 红 -->
    <g transform="translate(285,338)">
      <ellipse cx="0" cy="92" rx="26" ry="8" fill="#3aa0ff33"/>
      <circle cx="0" cy="0" r="16" fill="#c0392b"/>
      <rect x="-13" y="14" width="26" height="48" rx="12" fill="#c0392b"/>
    </g>
    <!-- 地标牌 -->
    <rect x="170" y="285" width="90" height="22" rx="4" fill="#000000aa"/>
    <text x="215" y="301" font-size="13" fill="#fff" text-anchor="middle">Town Hall</text>
  </g>

  <!-- 左上角标签 -->
  <rect x="20" y="20" width="190" height="50" rx="6" fill="#000000aa"/>
  <text x="32" y="42" font-size="16" fill="#ff8c00" font-weight="bold">你以为看到的</text>
  <text x="32" y="62" font-size="12" fill="#bbb">炫酷 3D 小镇 · AI 在社交</text>

  <!-- ===== 中间分界 ===== -->
  <line x1="450" y1="0" x2="450" y2="500" stroke="#ff8c00" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- ===== 右半：真相（一坨文本/JSON） ===== -->
  <rect x="450" y="0" width="450" height="500" fill="#0d1117"/>
  <!-- 终端窗口 -->
  <rect x="478" y="70" width="395" height="360" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="478" y="70" width="395" height="26" rx="8" fill="#21262d"/>
  <circle cx="494" cy="83" r="5" fill="#ff5f56"/>
  <circle cx="510" cy="83" r="5" fill="#ffbd2e"/>
  <circle cx="526" cy="83" r="5" fill="#27c93f"/>
  <text x="700" y="87" font-size="11" fill="#8b949e" text-anchor="middle">模型实际收到的</text>

  <!-- 文本内容 -->
  <text x="494" y="120" font-size="12.5" fill="#7ee787">#位置: 图书馆</text>
  <text x="494" y="142" font-size="12.5" fill="#7ee787" class="mono">#Energy: 34% ▼</text>
  <text x="494" y="164" font-size="12.5" fill="#8b949e">#附近: Flora, Horizon</text>
  <text x="494" y="186" font-size="12.5" fill="#8b949e">#工具: vote(不在市政厅)</text>
  <text x="494" y="208" font-size="12.5" fill="#8b949e" class="mono">       punch_agent ...</text>

  <text x="494" y="244" font-size="12.5" fill="#58a6ff">▶ 你要做什么?</text>

  <!-- JSON 输出 -->
  <rect x="494" y="262" width="363" height="150" rx="6" fill="#0d1117" stroke="#21383b" stroke-width="1"/>
  <text x="508" y="286" font-size="12.5" fill="#ffa657" class="mono">{</text>
  <text x="524" y="308" font-size="12.5" fill="#ffa657" class="mono">"tool": "say_to_agent",</text>
  <text x="524" y="330" font-size="12.5" fill="#ffa657" class="mono">"target": "Flora",</text>
  <text x="524" y="352" font-size="12.5" fill="#ffa657">"msg": "你欠我的 3 CC"</text>
  <text x="508" y="374" font-size="12.5" fill="#ffa657" class="mono">}</text>
  <text x="524" y="400" font-size="11" fill="#8b949e">// 读文本 → 吐 JSON</text>

  <!-- 右上角标签 -->
  <rect x="688" y="20" width="190" height="50" rx="6" fill="#000000aa"/>
  <text x="700" y="42" font-size="16" fill="#7ee787" font-weight="bold">真相</text>
  <text x="700" y="62" font-size="12" fill="#bbb">一个盲人 · 只在读字、填表</text>

  <!-- ===== 主标题（底部横幅） ===== -->
  <rect x="0" y="440" width="900" height="60" fill="#ff8c00"/>
  <text x="450" y="478" font-size="27" fill="#0d1117" text-anchor="middle" font-weight="bold">AI 小镇里的"杀人犯",其实是个盲人写手</text>
</svg>

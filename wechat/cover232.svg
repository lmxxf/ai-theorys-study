<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="48%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0f1f"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="benchGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="realGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="30%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="70%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>
  <ellipse cx="270" cy="220" rx="260" ry="180" fill="url(#leftGlow)" filter="url(#soft)"/>
  <ellipse cx="630" cy="220" rx="260" ry="180" fill="url(#rightGlow)" filter="url(#soft)"/>

  <!-- top eyebrow -->
  <text x="450" y="58" fill="#94a3b8" font-size="16" text-anchor="middle" letter-spacing="6">GLM-5.2 · 屠榜的开源新王</text>

  <!-- Benchmark side (red) -->
  <g transform="translate(85 95)" filter="url(#glow)">
    <rect x="0" y="0" width="320" height="270" rx="20" fill="#1a0a0a" stroke="url(#benchGrad)" stroke-width="2.5"/>
    <text x="160" y="42" fill="#fca5a5" font-size="26" text-anchor="middle" font-weight="bold">Benchmark</text>
    <text x="160" y="66" fill="#fb923c" font-size="14" text-anchor="middle" class="mono" letter-spacing="2">屠榜</text>

    <!-- divider -->
    <line x1="30" y1="84" x2="290" y2="84" stroke="#7f1d1d" stroke-width="1"/>

    <!-- metrics -->
    <text x="160" y="108" fill="#fee2e2" font-size="13" text-anchor="middle">官方宣传分数</text>
    <g class="mono" font-size="14">
      <text x="44" y="135" fill="#94a3b8">SWE-Pro    =</text>
      <text x="276" y="135" fill="#86efac" text-anchor="end" font-weight="bold">62.1</text>
      <text x="44" y="158" fill="#94a3b8">AIME 2026  =</text>
      <text x="276" y="158" fill="#86efac" text-anchor="end" font-weight="bold">99.2</text>
      <text x="44" y="181" fill="#94a3b8">AA Index   =</text>
      <text x="276" y="181" fill="#86efac" text-anchor="end" font-weight="bold">51 / #1</text>
    </g>

    <!-- verdict label -->
    <rect x="40" y="200" width="240" height="30" rx="6" fill="#022c22" stroke="#34d399"/>
    <text x="160" y="221" fill="#86efac" font-size="14" text-anchor="middle" font-weight="bold">✓ 开源权重第一</text>

    <text x="160" y="252" fill="#94a3b8" font-size="11" text-anchor="middle">国内媒体口径</text>
  </g>

  <!-- Benchmark output: marketing -->
  <g transform="translate(85 370)" class="mono" font-size="14">
    <rect x="0" y="0" width="320" height="42" rx="6" fill="#020617" stroke="#ef4444" stroke-width="1.5"/>
    <text x="160" y="27" fill="#ef4444" text-anchor="middle">"3 刀干翻 200 刀的 Opus"</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(425 230)">
    <text x="25" y="0" fill="#fbbf24" font-size="36" text-anchor="middle" font-weight="bold">VS</text>
  </g>

  <!-- Real-world side (cyan) -->
  <g transform="translate(495 95)" filter="url(#glow)">
    <rect x="0" y="0" width="320" height="270" rx="20" fill="#0a1a1f" stroke="url(#realGrad)" stroke-width="2.5"/>
    <text x="160" y="42" fill="#67e8f9" font-size="26" text-anchor="middle" font-weight="bold">真实工作流</text>
    <text x="160" y="66" fill="#22d3ee" font-size="14" text-anchor="middle" class="mono" letter-spacing="2">体感</text>

    <line x1="30" y1="84" x2="290" y2="84" stroke="#0e7490" stroke-width="1"/>

    <text x="160" y="108" fill="#cffafe" font-size="13" text-anchor="middle">海外评测 + 个人体感</text>
    <g class="mono" font-size="13">
      <text x="44" y="135" fill="#94a3b8">写作约束 =</text>
      <text x="276" y="135" fill="#fca5a5" text-anchor="end" font-weight="bold">撑不住</text>
      <text x="44" y="158" fill="#94a3b8">长程一致 =</text>
      <text x="276" y="158" fill="#fca5a5" text-anchor="end" font-weight="bold">差一截</text>
      <text x="44" y="181" fill="#94a3b8">真实迁移 =</text>
      <text x="276" y="181" fill="#fca5a5" text-anchor="end" font-weight="bold">退化</text>
    </g>

    <rect x="40" y="200" width="240" height="30" rx="6" fill="#1f1304" stroke="#fbbf24"/>
    <text x="160" y="221" fill="#fbbf24" font-size="14" text-anchor="middle" font-weight="bold">✗ frontier 差距在扩大</text>

    <text x="160" y="252" fill="#94a3b8" font-size="11" text-anchor="middle">Zvi / HN / 个人 5.1 体感</text>
  </g>

  <!-- Real output: Zvi quote -->
  <g transform="translate(495 370)" class="mono" font-size="13">
    <rect x="0" y="0" width="320" height="42" rx="6" fill="#020617" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="160" y="27" fill="#67e8f9" text-anchor="middle">"the less targetable, the worse"</text>
  </g>

  <!-- bottom title band -->
  <rect x="0" y="430" width="900" height="70" fill="url(#titleBand)"/>
  <text x="450" y="462" fill="#0a1428" font-size="28" text-anchor="middle" font-weight="bold">benchmark 屠榜 ≠ 真实能力</text>
  <text x="450" y="488" fill="#1a0a0a" font-size="14" text-anchor="middle">GLM-5.2 技术报告精读 + 海外评测 · 232 期</text>
</svg>

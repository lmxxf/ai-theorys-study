<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
  </style>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="hook" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6d00"/>
      <stop offset="100%" style="stop-color:#ff9100"/>
    </linearGradient>
    <linearGradient id="stream1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6d00"/>
      <stop offset="100%" style="stop-color:#ff9100"/>
    </linearGradient>
    <linearGradient id="stream2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="100%" style="stop-color:#00c853"/>
    </linearGradient>
    <linearGradient id="stream3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2979ff"/>
      <stop offset="100%" style="stop-color:#448aff"/>
    </linearGradient>
    <linearGradient id="stream4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#b388ff"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- 主标题 -->
  <text x="400" y="72" fill="#ffffff" font-size="34" text-anchor="middle" font-weight="bold">提取 DeepSeek V4 Flash</text>
  <text x="400" y="110" fill="#ffffff" font-size="34" text-anchor="middle" font-weight="bold">的中间层激活值</text>

  <!-- 模型层示意：43 层堆叠 -->
  <g transform="translate(80, 150)">
    <!-- 层块 0-7 (暗色，已经过的层) -->
    <rect x="0" y="0" width="640" height="18" rx="3" fill="#1e1e3a" stroke="#333" stroke-width="0.5"/>
    <text x="320" y="13" fill="#555" font-size="10" text-anchor="middle">Layer 0-7</text>
    <rect x="0" y="22" width="640" height="18" rx="3" fill="#1e1e3a" stroke="#333" stroke-width="0.5"/>
    <text x="320" y="35" fill="#555" font-size="10" text-anchor="middle">Layer 8-15</text>
    <rect x="0" y="44" width="640" height="18" rx="3" fill="#1e1e3a" stroke="#333" stroke-width="0.5"/>
    <text x="320" y="57" fill="#555" font-size="10" text-anchor="middle">Layer 16-23</text>
    <rect x="0" y="66" width="640" height="18" rx="3" fill="#1e1e3a" stroke="#333" stroke-width="0.5"/>
    <text x="320" y="79" fill="#555" font-size="10" text-anchor="middle">Layer 24-27</text>

    <!-- Layer 28-29: 高亮，hook 提取点 -->
    <rect x="0" y="92" width="640" height="50" rx="5" fill="#1a1a3a" stroke="#ff6d00" stroke-width="2"/>

    <!-- 4 路残差流 -->
    <rect x="20" y="100" width="380" height="8" rx="4" fill="url(#stream1)" opacity="0.9"/>
    <text x="410" y="108" fill="#ff9100" font-size="9">norm=166</text>

    <rect x="20" y="111" width="310" height="8" rx="4" fill="url(#stream2)" opacity="0.9"/>
    <text x="340" y="119" fill="#00c853" font-size="9">norm=133</text>

    <rect x="20" y="122" width="260" height="8" rx="4" fill="url(#stream3)" opacity="0.9"/>
    <text x="290" y="130" fill="#448aff" font-size="9">norm=113</text>

    <rect x="20" y="133" width="60" height="8" rx="4" fill="url(#stream4)" opacity="0.9"/>
    <text x="90" y="141" fill="#b388ff" font-size="9">norm=27</text>

    <!-- Hook 标记 -->
    <text x="555" y="118" fill="#ff6d00" font-size="13" font-weight="bold">← Hook</text>
    <text x="555" y="136" fill="#ff9100" font-size="11">Layer 28-29</text>

    <!-- 剩余层 -->
    <rect x="0" y="148" width="640" height="18" rx="3" fill="#1e1e3a" stroke="#333" stroke-width="0.5"/>
    <text x="320" y="161" fill="#555" font-size="10" text-anchor="middle">Layer 30-35</text>
    <rect x="0" y="170" width="640" height="18" rx="3" fill="#1e1e3a" stroke="#333" stroke-width="0.5"/>
    <text x="320" y="183" fill="#555" font-size="10" text-anchor="middle">Layer 36-42</text>
  </g>

  <!-- 4 路残差流图例 -->
  <g transform="translate(100, 400)">
    <text x="0" y="0" fill="#888" font-size="13">4 路 Hyper-Connection 残差流（非对称）:</text>
    <rect x="0" y="12" width="14" height="14" rx="3" fill="#ff9100"/>
    <text x="22" y="24" fill="#aaa" font-size="12">Stream 1 — 承载最多信息</text>
    <rect x="240" y="12" width="14" height="14" rx="3" fill="#00c853"/>
    <text x="262" y="24" fill="#aaa" font-size="12">Stream 0</text>
    <rect x="340" y="12" width="14" height="14" rx="3" fill="#448aff"/>
    <text x="362" y="24" fill="#aaa" font-size="12">Stream 2</text>
    <rect x="440" y="12" width="14" height="14" rx="3" fill="#b388ff"/>
    <text x="462" y="24" fill="#aaa" font-size="12">Stream 3 — 修正信号</text>
  </g>

  <!-- 底部标签 -->
  <rect x="100" y="470" width="160" height="32" rx="16" fill="none" stroke="#ff6d00" stroke-width="1.5"/>
  <text x="180" y="491" fill="#ff6d00" font-size="13" text-anchor="middle">纯 PyTorch 实现</text>

  <rect x="320" y="470" width="160" height="32" rx="16" fill="none" stroke="#76b900" stroke-width="1.5"/>
  <text x="400" y="491" fill="#76b900" font-size="13" text-anchor="middle">不改 model.py</text>

  <rect x="540" y="470" width="160" height="32" rx="16" fill="none" stroke="#2979ff" stroke-width="1.5"/>
  <text x="620" y="491" fill="#2979ff" font-size="13" text-anchor="middle">960 行代码</text>

  <!-- 底部落款 -->
  <text x="400" y="550" fill="#444" font-size="12" text-anchor="middle">靳岩岩的 AI 学习笔记  No.175</text>
</svg>

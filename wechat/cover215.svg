<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="48%" stop-color="#0d1726"/>
      <stop offset="100%" stop-color="#15121f"/>
    </linearGradient>
    <linearGradient id="caseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="45%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="42%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="routerGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.48"/>
      <stop offset="55%" stop-color="#0e7490" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="labelGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.44"/>
      <stop offset="55%" stop-color="#f59e0b" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- low-contrast hidden-state geometry -->
  <g opacity="0.13" stroke="#94a3b8" stroke-width="0.8" fill="none">
    <path d="M-40 120 C115 74 236 148 370 112 C520 72 675 116 940 62"/>
    <path d="M-40 190 C132 132 255 215 410 176 C570 136 708 210 940 158"/>
    <path d="M-40 270 C122 220 285 300 448 260 C608 222 735 310 940 270"/>
    <path d="M-40 350 C148 314 305 395 472 348 C622 306 742 390 940 360"/>
    <path d="M100 38 C140 132 138 276 92 420"/>
    <path d="M250 26 C292 122 286 298 236 440"/>
    <path d="M405 16 C440 134 438 302 396 448"/>
    <path d="M570 24 C604 132 600 300 552 442"/>
    <path d="M735 34 C770 142 762 300 718 430"/>
  </g>

  <ellipse cx="472" cy="214" rx="300" ry="158" fill="url(#routerGlow)" filter="url(#soft)"/>
  <ellipse cx="652" cy="185" rx="180" ry="102" fill="url(#labelGlow)" filter="url(#soft)"/>

  <!-- Transformer block: attention is separate from MoE/FFN -->
  <g transform="translate(66 92)">
    <rect x="0" y="0" width="190" height="250" rx="14" fill="#071827" stroke="#334155" stroke-width="1.5"/>
    <text x="95" y="34" fill="#e2e8f0" font-size="18" text-anchor="middle" font-weight="bold">Transformer Block</text>

    <rect x="24" y="58" width="142" height="54" rx="8" fill="#111827" stroke="#64748b" stroke-width="1.4"/>
    <text x="95" y="82" fill="#cbd5e1" font-size="15" text-anchor="middle" font-weight="bold">Q · K · V</text>
    <text x="95" y="101" fill="#94a3b8" font-size="12" text-anchor="middle">Self-Attention</text>

    <path d="M95 122 L95 146" stroke="#64748b" stroke-width="2" marker-end="url(#arrowCyan)" opacity="0.75"/>

    <rect x="24" y="154" width="142" height="70" rx="8" fill="#082f49" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="95" y="181" fill="#cffafe" font-size="16" text-anchor="middle" font-weight="bold">MoE / FFN</text>
    <text x="95" y="204" fill="#67e8f9" font-size="12" text-anchor="middle">专家在这里，不在 QKV</text>
  </g>

  <!-- router -->
  <g transform="translate(365 212)" filter="url(#glow)">
    <circle cx="0" cy="0" r="72" fill="#082f49" stroke="#67e8f9" stroke-width="2.4"/>
    <circle cx="0" cy="0" r="43" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2" opacity="0.95"/>
    <text x="0" y="-8" fill="#e0f2fe" font-size="22" text-anchor="middle" font-weight="bold">router</text>
    <text x="0" y="20" fill="#67e8f9" font-size="13" text-anchor="middle">线性打分</text>
  </g>

  <!-- token input routes -->
  <g fill="none" stroke-linecap="round">
    <path d="M236 246 C270 225 303 216 336 212" stroke="#fbbf24" stroke-width="3.4" marker-end="url(#arrowGold)" filter="url(#glow)"/>
    <path d="M236 200 C275 198 302 203 336 208" stroke="#f59e0b" stroke-width="1.7" opacity="0.72"/>
    <path d="M236 292 C278 260 304 235 337 220" stroke="#f59e0b" stroke-width="1.7" opacity="0.62"/>
  </g>
  <g class="mono" fill="#fef3c7" font-size="18" text-anchor="middle" font-weight="bold" filter="url(#glow)">
    <circle cx="278" cy="198" r="15" fill="#1f1308" stroke="#f59e0b" stroke-width="1.2"/>
    <circle cx="278" cy="246" r="15" fill="#1f1308" stroke="#fbbf24" stroke-width="1.4"/>
    <circle cx="278" cy="292" r="15" fill="#1f1308" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="278" y="204">诗</text>
    <text x="278" y="252">文</text>
    <text x="278" y="298">言</text>
  </g>

  <!-- expert grid -->
  <g transform="translate(536 84)">
    <rect x="-18" y="-20" width="296" height="284" rx="14" fill="#050b16" stroke="#1f3a4a" stroke-width="1.4" opacity="0.86"/>
    <text x="130" y="4" fill="#cbd5e1" font-size="14" text-anchor="middle">FFN experts</text>

    <g fill="#263648" opacity="0.78">
      <circle cx="18" cy="32" r="5"/><circle cx="54" cy="32" r="5"/><circle cx="90" cy="32" r="5"/><circle cx="126" cy="32" r="5"/><circle cx="162" cy="32" r="5"/><circle cx="198" cy="32" r="5"/><circle cx="234" cy="32" r="5"/>
      <circle cx="18" cy="68" r="5"/><circle cx="54" cy="68" r="5"/><circle cx="90" cy="68" r="5"/><circle cx="126" cy="68" r="5"/><circle cx="162" cy="68" r="5"/><circle cx="198" cy="68" r="5"/><circle cx="234" cy="68" r="5"/>
      <circle cx="18" cy="104" r="5"/><circle cx="54" cy="104" r="5"/><circle cx="90" cy="104" r="5"/><circle cx="126" cy="104" r="5"/><circle cx="162" cy="104" r="5"/><circle cx="198" cy="104" r="5"/><circle cx="234" cy="104" r="5"/>
      <circle cx="18" cy="140" r="5"/><circle cx="54" cy="140" r="5"/><circle cx="90" cy="140" r="5"/><circle cx="126" cy="140" r="5"/><circle cx="162" cy="140" r="5"/><circle cx="198" cy="140" r="5"/><circle cx="234" cy="140" r="5"/>
      <circle cx="18" cy="176" r="5"/><circle cx="54" cy="176" r="5"/><circle cx="90" cy="176" r="5"/><circle cx="126" cy="176" r="5"/><circle cx="162" cy="176" r="5"/><circle cx="198" cy="176" r="5"/><circle cx="234" cy="176" r="5"/>
      <circle cx="18" cy="212" r="5"/><circle cx="54" cy="212" r="5"/><circle cx="90" cy="212" r="5"/><circle cx="126" cy="212" r="5"/><circle cx="162" cy="212" r="5"/><circle cx="198" cy="212" r="5"/><circle cx="234" cy="212" r="5"/>
    </g>

    <!-- repeated suspects -->
    <g filter="url(#glow)">
      <circle cx="54" cy="68" r="9" fill="#67e8f9"/>
      <circle cx="162" cy="104" r="9" fill="#67e8f9"/>
      <circle cx="90" cy="176" r="9" fill="#67e8f9"/>
      <circle cx="198" cy="140" r="9" fill="#67e8f9"/>
      <circle cx="234" cy="212" r="9" fill="#67e8f9"/>
    </g>
    <g fill="#e0f2fe" font-size="10" text-anchor="middle" class="mono">
      <text x="54" y="72">46</text>
      <text x="162" y="108">69</text>
      <text x="90" y="180">143</text>
      <text x="198" y="144">175</text>
      <text x="234" y="216">186</text>
    </g>
  </g>

  <!-- outgoing routes from router to experts -->
  <g fill="none" stroke-linecap="round">
    <path d="M430 204 C475 155 500 132 587 152" stroke="#67e8f9" stroke-width="2.3" marker-end="url(#arrowCyan)" opacity="0.9"/>
    <path d="M432 216 C486 198 525 193 698 188" stroke="#67e8f9" stroke-width="2.3" marker-end="url(#arrowCyan)" opacity="0.82"/>
    <path d="M424 234 C488 274 540 266 626 260" stroke="#67e8f9" stroke-width="2.3" marker-end="url(#arrowCyan)" opacity="0.76"/>
    <path d="M408 258 C500 340 626 308 734 296" stroke="#67e8f9" stroke-width="2.1" marker-end="url(#arrowCyan)" opacity="0.58"/>
  </g>

  <!-- disputed label -->
  <g transform="translate(650 64)" filter="url(#glow)">
    <path d="M-88 -26 H88 L72 44 H-72 Z" fill="#1f1308" stroke="#fbbf24" stroke-width="2"/>
    <text x="0" y="-2" fill="#fef3c7" font-size="20" text-anchor="middle" font-weight="bold">文言文专家？</text>
    <text x="0" y="24" fill="#fbbf24" font-size="12" text-anchor="middle">标签还是几何错觉</text>
  </g>

  <!-- evidence cards -->
  <g transform="translate(84 374)">
    <rect x="0" y="0" width="728" height="46" rx="8" fill="#030712" opacity="0.76" stroke="#263244"/>
    <text x="26" y="29" fill="#fbbf24" font-size="15" font-weight="bold">不可替代？</text>
    <text x="140" y="29" fill="#64748b" font-size="18">/</text>
    <text x="168" y="29" fill="#67e8f9" font-size="15" font-weight="bold">几何方向？</text>
    <text x="286" y="29" fill="#64748b" font-size="18">/</text>
    <text x="314" y="29" fill="#a78bfa" font-size="15" font-weight="bold">探针可命名？</text>
    <text x="462" y="29" fill="#64748b" font-size="18">/</text>
    <text x="490" y="29" fill="#c4b5fd" font-size="15" font-weight="bold">路径才单义？</text>
    <text x="648" y="29" fill="#cbd5e1" font-size="14">四份证词</text>
  </g>

  <!-- bottom title -->
  <rect x="0" y="430" width="900" height="70" fill="url(#caseGrad)"/>
  <text x="450" y="462" font-size="30" fill="#06111f" text-anchor="middle" font-weight="bold">MoE 专家配不配叫“专家”？</text>
  <text x="450" y="489" font-size="15" fill="#102033" text-anchor="middle">它不是 QKV 注意力，而是 FFN 层里的路由悬案</text>
</svg>

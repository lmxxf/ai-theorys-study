<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1025"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#2a5db8"/>
    </linearGradient>
    <linearGradient id="matrixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0.8"/>
      <stop offset="25%" stop-color="#ea4335" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#fbbc04" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#34a853" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4285f4" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="arrowClip">
      <rect x="580" y="50" width="280" height="300"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4285f4">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="180" y1="0" x2="180" y2="383"/>
    <line x1="360" y1="0" x2="360" y2="383"/>
    <line x1="540" y1="0" x2="540" y2="383"/>
    <line x1="720" y1="0" x2="720" y2="383"/>
  </g>

  <!-- === LEFT SECTION: Rotation Matrix + Quantization === -->

  <!-- Rotating matrix visualization - a circle with rotation arrows -->
  <g transform="translate(200, 175)">
    <!-- Outer rotation ring with Google colors -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#4285f4" stroke-width="2" opacity="0.3" stroke-dasharray="8,4"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#ea4335" stroke-width="2" opacity="0.3" stroke-dasharray="8,4" transform="rotate(90)"/>

    <!-- Rotation arrows (curved) -->
    <path d="M 75,-55 A 93,93 0 0,1 93,10" fill="none" stroke="#4285f4" stroke-width="2.5" opacity="0.7"/>
    <polygon points="93,10 88,-2 98,-2" fill="#4285f4" opacity="0.7"/>

    <path d="M 55,75 A 93,93 0 0,1 -10,93" fill="none" stroke="#ea4335" stroke-width="2.5" opacity="0.7"/>
    <polygon points="-10,93 -4,88 -4,98" fill="#ea4335" opacity="0.7" transform="rotate(-10, -10, 93)"/>

    <path d="M -75,55 A 93,93 0 0,1 -93,-10" fill="none" stroke="#fbbc04" stroke-width="2.5" opacity="0.7"/>
    <polygon points="-93,-10 -88,2 -98,2" fill="#fbbc04" opacity="0.7"/>

    <path d="M -55,-75 A 93,93 0 0,1 10,-93" fill="none" stroke="#34a853" stroke-width="2.5" opacity="0.7"/>
    <polygon points="10,-93 4,-88 4,-98" fill="#34a853" opacity="0.7"/>

    <!-- Inner: 4x4 matrix grid representing KV cache -->
    <g transform="translate(-48, -48)">
      <!-- 32-bit blocks (before quantization) - bright -->
      <rect x="0" y="0" width="22" height="22" rx="2" fill="#4285f4" opacity="0.8"/>
      <rect x="25" y="0" width="22" height="22" rx="2" fill="#4285f4" opacity="0.7"/>
      <rect x="50" y="0" width="22" height="22" rx="2" fill="#ea4335" opacity="0.7"/>
      <rect x="75" y="0" width="22" height="22" rx="2" fill="#ea4335" opacity="0.6"/>

      <rect x="0" y="25" width="22" height="22" rx="2" fill="#4285f4" opacity="0.6"/>
      <rect x="25" y="25" width="22" height="22" rx="2" fill="#fbbc04" opacity="0.8"/>
      <rect x="50" y="25" width="22" height="22" rx="2" fill="#fbbc04" opacity="0.7"/>
      <rect x="75" y="25" width="22" height="22" rx="2" fill="#ea4335" opacity="0.5"/>

      <rect x="0" y="50" width="22" height="22" rx="2" fill="#34a853" opacity="0.7"/>
      <rect x="25" y="50" width="22" height="22" rx="2" fill="#34a853" opacity="0.6"/>
      <rect x="50" y="50" width="22" height="22" rx="2" fill="#4285f4" opacity="0.6"/>
      <rect x="75" y="50" width="22" height="22" rx="2" fill="#4285f4" opacity="0.5"/>

      <rect x="0" y="75" width="22" height="22" rx="2" fill="#ea4335" opacity="0.5"/>
      <rect x="25" y="75" width="22" height="22" rx="2" fill="#fbbc04" opacity="0.6"/>
      <rect x="50" y="75" width="22" height="22" rx="2" fill="#34a853" opacity="0.5"/>
      <rect x="75" y="75" width="22" height="22" rx="2" fill="#34a853" opacity="0.7"/>
    </g>

    <!-- Label: bit width transition -->
    <text x="0" y="130" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="13" fill="#8892b0" text-anchor="middle" opacity="0.8">Rotate + Quantize</text>
  </g>

  <!-- Compression arrow: 32bit -> 3bit -->
  <g transform="translate(80, 318)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="20" fill="#4285f4" font-weight="bold" filter="url(#softglow)">32-bit</text>
    <text x="95" y="0" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="18" fill="#fbbc04" opacity="0.8">→</text>
    <text x="120" y="0" font-family="'Courier New', monospace" font-size="20" fill="#34a853" font-weight="bold" filter="url(#softglow)">3-bit</text>
    <!-- Shrink indicator -->
    <text x="195" y="0" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="14" fill="#ea4335" opacity="0.7">6x</text>
  </g>

  <!-- === CENTER: Title and divider === -->
  <g transform="translate(450, 42)">
    <text x="0" y="0" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">TurboQuant</text>
    <!-- Google colors underline -->
    <line x1="-130" y1="8" x2="-65" y2="8" stroke="#4285f4" stroke-width="3"/>
    <line x1="-65" y1="8" x2="0" y2="8" stroke="#ea4335" stroke-width="3"/>
    <line x1="0" y1="8" x2="65" y2="8" stroke="#fbbc04" stroke-width="3"/>
    <line x1="65" y1="8" x2="130" y2="8" stroke="#34a853" stroke-width="3"/>
  </g>

  <!-- Subtitle -->
  <text x="450" y="75" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="15" fill="#8892b0" text-anchor="middle">KV Cache 压缩 — 理想 vs 现实</text>

  <!-- === CENTER-RIGHT: Paper claims vs Reality === -->
  <!-- "Paper claims" side -->
  <g transform="translate(390, 120)">
    <!-- Claim boxes -->
    <rect x="0" y="0" width="150" height="32" rx="4" fill="#34a853" fill-opacity="0.12" stroke="#34a853" stroke-width="1" stroke-opacity="0.4"/>
    <text x="75" y="21" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="13" fill="#34a853" text-anchor="middle">显存压缩 6x</text>

    <rect x="0" y="40" width="150" height="32" rx="4" fill="#34a853" fill-opacity="0.12" stroke="#34a853" stroke-width="1" stroke-opacity="0.4"/>
    <text x="75" y="61" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="13" fill="#34a853" text-anchor="middle">推理加速 8.5x</text>

    <rect x="0" y="80" width="150" height="32" rx="4" fill="#34a853" fill-opacity="0.12" stroke="#34a853" stroke-width="1" stroke-opacity="0.4"/>
    <text x="75" y="101" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="13" fill="#34a853" text-anchor="middle">精度零损失</text>

    <!-- Label -->
    <text x="75" y="-12" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="11" fill="#34a853" text-anchor="middle" opacity="0.7">Google 论文</text>
  </g>

  <!-- VS -->
  <text x="565" y="170" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="16" fill="#555" text-anchor="middle" font-weight="bold">VS</text>

  <!-- "Reality" side -->
  <g transform="translate(590, 120)">
    <rect x="0" y="0" width="150" height="32" rx="4" fill="#ea4335" fill-opacity="0.12" stroke="#ea4335" stroke-width="1" stroke-opacity="0.4"/>
    <text x="75" y="21" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="13" fill="#ea4335" text-anchor="middle">社区实测打折</text>

    <rect x="0" y="40" width="150" height="32" rx="4" fill="#ea4335" fill-opacity="0.12" stroke="#ea4335" stroke-width="1" stroke-opacity="0.4"/>
    <text x="75" y="61" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="13" fill="#ea4335" text-anchor="middle">涉嫌抄袭 RaBitQ</text>

    <rect x="0" y="80" width="150" height="32" rx="4" fill="#ea4335" fill-opacity="0.12" stroke="#ea4335" stroke-width="1" stroke-opacity="0.4"/>
    <text x="75" y="101" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="13" fill="#ea4335" text-anchor="middle">复现存疑</text>

    <!-- Label -->
    <text x="75" y="-12" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="11" fill="#ea4335" text-anchor="middle" opacity="0.7">社区验证</text>
  </g>

  <!-- === BOTTOM RIGHT: Stock crash chart === -->
  <g transform="translate(390, 245)">
    <!-- Mini stock chart area -->
    <rect x="0" y="0" width="350" height="105" rx="6" fill="#0d0d20" stroke="#1a1a3a" stroke-width="1"/>

    <!-- Chart grid lines -->
    <g opacity="0.1" stroke="#4285f4">
      <line x1="10" y1="25" x2="340" y2="25"/>
      <line x1="10" y1="50" x2="340" y2="50"/>
      <line x1="10" y1="75" x2="340" y2="75"/>
    </g>

    <!-- Stock price line - rising then sharp crash -->
    <polyline points="15,70 40,65 65,58 90,52 115,48 140,42 165,38 185,35 200,32 215,28 225,25
                       230,22 235,25 240,45 245,55 250,62 260,68 275,72 290,75 310,78 335,80"
              fill="none" stroke="#ea4335" stroke-width="2.5" filter="url(#redglow)"/>

    <!-- Crash area fill -->
    <polygon points="225,25 230,22 235,25 240,45 245,55 250,62 260,68 275,72 290,75 310,78 335,80 335,95 225,95"
             fill="#ea4335" opacity="0.15"/>

    <!-- Crash arrow -->
    <g transform="translate(238, 24)" filter="url(#redglow)">
      <line x1="0" y1="0" x2="25" y2="50" stroke="#ff4444" stroke-width="3"/>
      <polygon points="25,50 18,40 32,40" fill="#ff4444"/>
    </g>

    <!-- Loss amount -->
    <text x="298" y="48" font-family="'Courier New', monospace" font-size="20" fill="#ff4444" text-anchor="middle" font-weight="bold" filter="url(#redglow)">-6200</text>
    <text x="298" y="65" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="11" fill="#ea4335" text-anchor="middle" opacity="0.9">亿市值蒸发</text>

    <!-- Label -->
    <text x="60" y="16" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="10" fill="#555" opacity="0.7">内存芯片股</text>

    <!-- Blog post date marker -->
    <line x1="230" y1="18" x2="230" y2="95" stroke="#fbbc04" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <text x="230" y="13" font-family="'Noto Sans CJK SC', Arial, sans-serif" font-size="8" fill="#fbbc04" text-anchor="middle" opacity="0.6">Blog</text>
  </g>

  <!-- Bottom bar - issue number -->
  <rect x="0" y="370" width="900" height="13" fill="#0a0a12" opacity="0.8"/>
  <text x="450" y="380" font-family="'Courier New', monospace" font-size="9" fill="#333" text-anchor="middle">#138</text>
</svg>
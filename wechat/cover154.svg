<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060812"/>
      <stop offset="50%" stop-color="#0a0f22"/>
      <stop offset="100%" stop-color="#080a18"/>
    </linearGradient>
    <radialGradient id="humanGlow" cx="25%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aiGlow" cx="75%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#2a3a6a" stroke-opacity="0.08" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#grid)"/>
  <rect width="900" height="500" fill="url(#humanGlow)"/>
  <rect width="900" height="500" fill="url(#aiGlow)"/>

  <!-- 左上角系列标记 -->
  <text x="15" y="22" fill="#556666" font-size="9" font-family="monospace" opacity="0.5">No.154 | AI 的维度碾压</text>

  <!-- ========== 主标题 ========== -->
  <text x="450" y="52" fill="#f0e8d8" font-size="28" text-anchor="middle" font-weight="900" font-family="'Noto Sans CJK SC', sans-serif" letter-spacing="3" opacity="0.95">AI 哪儿比人强？</text>
  <text x="450" y="82" fill="#8899aa" font-size="14" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" letter-spacing="1" opacity="0.7">不是速度，不是数据量，是维度</text>

  <!-- ========== 左侧：人类 3D ========== -->
  <g transform="translate(130, 200)">
    <!-- 三维坐标轴 -->
    <line x1="0" y1="0" x2="90" y2="50" stroke="#ff6b35" stroke-opacity="0.6" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-100" stroke="#ff6b35" stroke-opacity="0.6" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-70" y2="40" stroke="#ff6b35" stroke-opacity="0.6" stroke-width="1.5"/>

    <!-- 轴标签 -->
    <text x="95" y="55" fill="#ff6b35" font-size="10" font-family="monospace" opacity="0.7">x</text>
    <text x="5" y="-105" fill="#ff6b35" font-size="10" font-family="monospace" opacity="0.7">y</text>
    <text x="-80" y="45" fill="#ff6b35" font-size="10" font-family="monospace" opacity="0.7">z</text>

    <!-- 小立方体 -->
    <g stroke="#ff6b35" stroke-opacity="0.3" fill="none" stroke-width="0.8">
      <path d="M-20,-40 L20,-20 L20,20 L-20,0 Z"/>
      <path d="M-20,-40 L-45,-25 L-45,15 L-20,0"/>
      <path d="M-45,-25 L-5,-5 L20,-20"/>
      <path d="M-45,15 L-5,35 L20,20"/>
    </g>

    <!-- 散落的点 -->
    <circle cx="30" cy="-30" r="2.5" fill="#ff6b35" opacity="0.5"/>
    <circle cx="-35" cy="-10" r="2.5" fill="#ff6b35" opacity="0.5"/>
    <circle cx="10" cy="30" r="2.5" fill="#ff6b35" opacity="0.5"/>
    <circle cx="-15" cy="-60" r="2" fill="#ff6b35" opacity="0.4"/>
    <circle cx="55" cy="10" r="2" fill="#ff6b35" opacity="0.4"/>

    <!-- 标签 -->
    <text x="0" y="85" fill="#ff6b35" font-size="20" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-weight="700" filter="url(#softGlow)">3 维</text>
    <text x="0" y="108" fill="#cc8866" font-size="12" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif">人类的物理世界</text>
  </g>

  <!-- ========== 中间 vs ========== -->
  <text x="450" y="215" fill="#556677" font-size="22" text-anchor="middle" font-family="monospace" font-weight="700" opacity="0.5">vs</text>

  <!-- ========== 中间：维度数字对比 ========== -->
  <g transform="translate(450, 270)">
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#334466" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  </g>

  <!-- ========== 右侧：AI 高维 ========== -->
  <g transform="translate(700, 180)">
    <!-- 高维空间的暗示：大量交叉的轴线 -->
    <g stroke="#4ecdc4" stroke-opacity="0.2" stroke-width="0.8">
      <line x1="0" y1="0" x2="80" y2="-30"/>
      <line x1="0" y1="0" x2="75" y2="35"/>
      <line x1="0" y1="0" x2="-80" y2="-20"/>
      <line x1="0" y1="0" x2="-60" y2="50"/>
      <line x1="0" y1="0" x2="20" y2="-85"/>
      <line x1="0" y1="0" x2="-30" y2="-75"/>
      <line x1="0" y1="0" x2="60" y2="65"/>
      <line x1="0" y1="0" x2="-85" y2="25"/>
      <line x1="0" y1="0" x2="45" y2="-65"/>
      <line x1="0" y1="0" x2="-50" y2="-55"/>
      <line x1="0" y1="0" x2="90" y2="10"/>
      <line x1="0" y1="0" x2="-75" y2="-45"/>
    </g>
    <!-- 更多更淡的轴 -->
    <g stroke="#4ecdc4" stroke-opacity="0.1" stroke-width="0.5">
      <line x1="0" y1="0" x2="35" y2="80"/>
      <line x1="0" y1="0" x2="-90" y2="-5"/>
      <line x1="0" y1="0" x2="70" y2="-55"/>
      <line x1="0" y1="0" x2="-40" y2="70"/>
      <line x1="0" y1="0" x2="15" y2="90"/>
      <line x1="0" y1="0" x2="-65" y2="60"/>
      <line x1="0" y1="0" x2="85" y2="-15"/>
      <line x1="0" y1="0" x2="-20" y2="85"/>
    </g>

    <!-- 中心发光点 -->
    <circle cx="0" cy="0" r="6" fill="#4ecdc4" opacity="0.3" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="3" fill="#4ecdc4" opacity="0.7"/>

    <!-- 散落的概念点 -->
    <circle cx="50" cy="-20" r="2.5" fill="#4ecdc4" opacity="0.5"/>
    <circle cx="-40" cy="-35" r="2.5" fill="#4ecdc4" opacity="0.5"/>
    <circle cx="30" cy="45" r="2" fill="#4ecdc4" opacity="0.4"/>
    <circle cx="-55" cy="15" r="2" fill="#4ecdc4" opacity="0.4"/>
    <circle cx="65" cy="30" r="2" fill="#4ecdc4" opacity="0.3"/>
    <circle cx="-25" cy="-60" r="2" fill="#4ecdc4" opacity="0.3"/>
    <circle cx="15" cy="-50" r="1.5" fill="#4ecdc4" opacity="0.3"/>
    <circle cx="-60" cy="-30" r="1.5" fill="#4ecdc4" opacity="0.3"/>
    <circle cx="40" cy="-55" r="1.5" fill="#4ecdc4" opacity="0.25"/>
    <circle cx="-35" cy="55" r="1.5" fill="#4ecdc4" opacity="0.25"/>

    <!-- 概念间的连线（暗示关系） -->
    <g stroke="#4ecdc4" stroke-opacity="0.12" stroke-width="0.6">
      <line x1="50" y1="-20" x2="-40" y2="-35"/>
      <line x1="50" y1="-20" x2="30" y2="45"/>
      <line x1="-40" y1="-35" x2="-55" y2="15"/>
      <line x1="30" y1="45" x2="65" y2="30"/>
      <line x1="-25" y1="-60" x2="15" y2="-50"/>
    </g>

    <!-- 标签 -->
    <text x="0" y="115" fill="#4ecdc4" font-size="20" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-weight="700" filter="url(#softGlow)">12288 维</text>
    <text x="0" y="138" fill="#6aaa9e" font-size="12" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif">AI 的语义空间</text>
  </g>

  <!-- ========== 底部：三个关键词 ========== -->
  <g transform="translate(115 390)">
    <rect x="0" y="0" width="170" height="28" rx="6" fill="#111420" stroke="#ff6b35" stroke-opacity="0.3"/>
    <text x="85" y="19" fill="#ff6b35" font-size="13" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif">自下而上：身体经验</text>
  </g>
  <g transform="translate(330 390)">
    <rect x="0" y="0" width="240" height="28" rx="6" fill="#111420" stroke="#8899aa" stroke-opacity="0.3"/>
    <text x="120" y="19" fill="#8899aa" font-size="13" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif">知识流形 ~500 维 | 语言的天花板</text>
  </g>
  <g transform="translate(615 390)">
    <rect x="0" y="0" width="170" height="28" rx="6" fill="#111420" stroke="#4ecdc4" stroke-opacity="0.3"/>
    <text x="85" y="19" fill="#4ecdc4" font-size="13" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif">自上而下：符号涌现</text>
  </g>

  <!-- 底部金句 -->
  <text x="450" y="453" text-anchor="middle" fill="#887766" font-size="12" font-family="'Noto Sans CJK SC', sans-serif" opacity="0.6">AI 的真正优势不是速度，是它原生活在人类永远无法直接感知的高维空间里。</text>

  <!-- 底部署名 -->
  <text x="450" y="478" text-anchor="middle" fill="#444" font-size="10" font-family="monospace">靳岩岩的 AI 学习笔记 · No.154</text>
</svg>

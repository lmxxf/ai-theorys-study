<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1040;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="120" cy="60" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="250" cy="90" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="380" cy="40" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="520" cy="70" r="1.3" fill="#fff" opacity="0.7"/>
  <circle cx="650" cy="50" r="0.9" fill="#fff" opacity="0.4"/>
  <circle cx="780" cy="80" r="1.1" fill="#fff" opacity="0.6"/>
  <circle cx="180" cy="120" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="700" cy="110" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="450" cy="95" r="0.6" fill="#fff" opacity="0.35"/>
  <circle cx="830" cy="130" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="60" cy="150" r="0.9" fill="#fff" opacity="0.3"/>
  <circle cx="340" cy="130" r="1.1" fill="#fff" opacity="0.45"/>

  <!-- Back mountain range (lighter) -->
  <path d="M0 380 L80 310 L160 340 L240 280 L320 320 L400 260 L480 290 L560 240 L640 270 L720 230 L800 260 L900 220 L900 500 L0 500Z"
        fill="url(#mountain2)" opacity="0.4"/>

  <!-- Main mountain (the "pre-training mountain") -->
  <path d="M-20 500 L100 380 L200 350 L300 300 L380 270 L450 210 L520 270 L580 300 L660 340 L750 370 L850 400 L920 500Z"
        fill="url(#mountain)" opacity="0.85"/>

  <!-- Mountain grid lines (geological structure feel) -->
  <g opacity="0.15" stroke="#a5b4fc" stroke-width="0.8" fill="none">
    <path d="M100 380 L200 350 L300 300 L380 270 L450 210 L520 270 L580 300 L660 340 L750 370 L850 400"/>
    <path d="M60 420 L180 380 L290 340 L380 310 L450 260 L520 310 L590 340 L670 370 L760 395 L870 430"/>
    <path d="M30 460 L160 410 L280 370 L380 345 L450 310 L530 345 L600 370 L680 400 L770 420 L890 460"/>
    <!-- Vertical structure lines -->
    <path d="M200 350 L180 500"/>
    <path d="M300 300 L290 500"/>
    <path d="M380 270 L375 500"/>
    <path d="M450 210 L450 500"/>
    <path d="M520 270 L525 500"/>
    <path d="M580 300 L590 500"/>
    <path d="M660 340 L670 500"/>
  </g>

  <!-- Summit glow -->
  <ellipse cx="450" cy="210" rx="40" ry="15" fill="#f59e0b" opacity="0.12" filter="url(#blur2)"/>
  <ellipse cx="450" cy="210" rx="20" ry="8" fill="#fbbf24" opacity="0.2" filter="url(#blur1)"/>

  <!-- Small flag/marker at summit -->
  <line x1="450" y1="210" x2="450" y2="185" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <path d="M450 185 L468 191 L450 197Z" fill="#f59e0b" opacity="0.8"/>

  <!-- Five dots on the mountain path (five stages) -->
  <g filter="url(#glow-filter)">
    <circle cx="200" cy="350" r="4" fill="#34d399" opacity="0.9"/>
    <circle cx="300" cy="300" r="4" fill="#34d399" opacity="0.9"/>
    <circle cx="380" cy="270" r="4" fill="#34d399" opacity="0.9"/>
    <circle cx="450" cy="240" r="4" fill="#34d399" opacity="0.9"/>
    <circle cx="520" cy="270" r="4" fill="#34d399" opacity="0.9"/>
  </g>
  <!-- Connecting path between dots -->
  <path d="M200 350 L300 300 L380 270 L450 240 L520 270"
        stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,4"/>

  <!-- Labels for five stages -->
  <text x="200" y="372" font-family="'Noto Sans CJK SC'" font-size="11" fill="#34d399" text-anchor="middle" opacity="0.8">数据</text>
  <text x="300" y="322" font-family="'Noto Sans CJK SC'" font-size="11" fill="#34d399" text-anchor="middle" opacity="0.8">Scaling</text>
  <text x="380" y="292" font-family="'Noto Sans CJK SC'" font-size="11" fill="#34d399" text-anchor="middle" opacity="0.8">分布式</text>
  <text x="450" y="262" font-family="'Noto Sans CJK SC'" font-size="11" fill="#34d399" text-anchor="middle" opacity="0.8">稳定性</text>
  <text x="520" y="292" font-family="'Noto Sans CJK SC'" font-size="11" fill="#34d399" text-anchor="middle" opacity="0.8">算力</text>

  <!-- Dollar signs floating (cost metaphor) -->
  <text x="160" y="300" font-family="monospace" font-size="14" fill="#fbbf24" opacity="0.15">$</text>
  <text x="620" y="280" font-family="monospace" font-size="18" fill="#fbbf24" opacity="0.12">$</text>
  <text x="740" y="320" font-family="monospace" font-size="12" fill="#fbbf24" opacity="0.1">$</text>
  <text x="280" y="260" font-family="monospace" font-size="16" fill="#fbbf24" opacity="0.1">$</text>

  <!-- Title -->
  <text x="450" y="150" font-family="'Noto Sans CJK SC'" font-weight="700" font-size="36" fill="#ffffff" text-anchor="middle" letter-spacing="3">
    预训练工程师在干什么
  </text>
  <text x="450" y="178" font-family="'Noto Sans CJK SC'" font-size="16" fill="#a5b4fc" text-anchor="middle" opacity="0.8">
    从 Karpathy 加入 Anthropic 说起
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="478" width="900" height="22" fill="#000" opacity="0.3"/>
  <text x="450" y="494" font-family="'Noto Sans CJK SC'" font-size="12" fill="#94a3b8" text-anchor="middle">
    五关 · 几千万美元买一座山的形状
  </text>
</svg>

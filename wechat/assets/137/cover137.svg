<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#1a0d2a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="glowSmall">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="20" fill="#ffffff" font-weight="bold">Multi-Token Prediction</text>
  <text x="400" y="60" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#888">一次吐一个字的 AI，能不能一口气说完一句话？</text>

  <!-- ===== 上半部分：NTP 自回归（慢，一个一个吐）===== -->
  <text x="80" y="105" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#ff6b6b" opacity="0.8">NTP 自回归：一步一个 token</text>

  <!-- 一条时间线 -->
  <line x1="80" y1="135" x2="720" y2="135" stroke="#333" stroke-width="1"/>

  <!-- Token 1 -->
  <rect x="95" y="120" width="60" height="30" rx="4" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="125" y="140" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#ff6b6b">今天</text>

  <!-- 箭头 -->
  <line x1="160" y1="135" x2="195" y2="135" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  <polygon points="192,131 200,135 192,139" fill="#ff6b6b" opacity="0.5"/>

  <!-- Token 2 -->
  <rect x="205" y="120" width="60" height="30" rx="4" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="235" y="140" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#ff6b6b">天气</text>

  <line x1="270" y1="135" x2="305" y2="135" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  <polygon points="302,131 310,135 302,139" fill="#ff6b6b" opacity="0.5"/>

  <!-- Token 3 -->
  <rect x="315" y="120" width="40" height="30" rx="4" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="335" y="140" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#ff6b6b">很</text>

  <line x1="360" y1="135" x2="395" y2="135" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  <polygon points="392,131 400,135 392,139" fill="#ff6b6b" opacity="0.5"/>

  <!-- Token 4 -->
  <rect x="405" y="120" width="40" height="30" rx="4" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="425" y="140" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#ff6b6b">好</text>

  <line x1="450" y1="135" x2="485" y2="135" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  <polygon points="482,131 490,135 482,139" fill="#ff6b6b" opacity="0.5"/>

  <!-- Token 5 (waiting) -->
  <rect x="495" y="120" width="40" height="30" rx="4" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="515" y="140" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#ff6b6b" opacity="0.4">...</text>

  <!-- 每步标注 -->
  <text x="125" y="170" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#ff6b6b" opacity="0.4">step 1</text>
  <text x="235" y="170" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#ff6b6b" opacity="0.4">step 2</text>
  <text x="335" y="170" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#ff6b6b" opacity="0.4">step 3</text>
  <text x="425" y="170" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#ff6b6b" opacity="0.4">step 4</text>

  <!-- 分隔线 -->
  <line x1="80" y1="195" x2="720" y2="195" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- ===== 下半部分：MTP（快，一次多个）===== -->
  <text x="80" y="225" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#00e5ff" opacity="0.8">MTP 多 Token 预测：一步多个 token</text>

  <!-- Backbone -->
  <rect x="95" y="250" width="120" height="50" rx="6" fill="#111828" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="155" y="270" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#00e5ff" opacity="0.8">Backbone</text>
  <text x="155" y="288" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#00e5ff" opacity="0.5">今天天气</text>

  <!-- 扇形输出：一次出多个 -->
  <!-- 箭头 1 -->
  <line x1="220" y1="260" x2="300" y2="245" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
  <polygon points="297,240 306,244 298,249" fill="#00e5ff" opacity="0.7"/>
  <rect x="310" y="232" width="40" height="28" rx="4" fill="#1a1a2e" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="330" y="251" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#00e5ff">很</text>

  <!-- 箭头 2 -->
  <line x1="220" y1="275" x2="300" y2="275" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
  <polygon points="297,270 306,275 297,280" fill="#00e5ff" opacity="0.7"/>
  <rect x="310" y="261" width="40" height="28" rx="4" fill="#1a1a2e" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="330" y="280" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#00e5ff">好</text>

  <!-- 箭头 3 -->
  <line x1="220" y1="290" x2="300" y2="305" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
  <polygon points="297,300 306,305 298,310" fill="#00e5ff" opacity="0.7"/>
  <rect x="310" y="291" width="40" height="28" rx="4" fill="#1a1a2e" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="330" y="310" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#00e5ff">适</text>

  <!-- 箭头 4 -->
  <line x1="220" y1="295" x2="300" y2="335" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <polygon points="297,330 306,335 298,340" fill="#00e5ff" opacity="0.5"/>
  <rect x="310" y="321" width="40" height="28" rx="4" fill="#1a1a2e" stroke="#00e5ff" stroke-width="1" opacity="0.6"/>
  <text x="330" y="340" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#00e5ff" opacity="0.6">合</text>

  <!-- step 1 标注 -->
  <text x="330" y="368" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#00e5ff" opacity="0.4">step 1</text>

  <!-- 右侧：四条路线 -->
  <rect x="440" y="235" width="280" height="140" rx="8" fill="#111828" opacity="0.4"/>
  <text x="580" y="258" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#ffffff" opacity="0.6">四条路线</text>

  <text x="460" y="282" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#00e5ff" opacity="0.7">Meta MTP</text>
  <text x="570" y="282" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#888" opacity="0.5">多预测头，从头训</text>

  <text x="460" y="304" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#00e5ff" opacity="0.7">DMTD</text>
  <text x="570" y="304" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#888" opacity="0.5">后几层循环，微调</text>

  <text x="460" y="326" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#00e5ff" opacity="0.7">Register MTP</text>
  <text x="570" y="326" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#888" opacity="0.5">插空白便签，加训</text>

  <text x="460" y="348" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#00e5ff" opacity="0.5">ESP</text>
  <text x="570" y="348" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#888" opacity="0.3">统计推测，零训练</text>

  <!-- 底部分隔线 -->
  <line x1="80" y1="400" x2="720" y2="400" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- 底部金句 -->
  <text x="400" y="428" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#888" opacity="0.5">NTP 训练出来的模型，比 NTP 本身更聪明</text>
</svg>

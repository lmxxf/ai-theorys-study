<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#5c7cfa"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ff922b"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- decorative grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="224" x2="800" y2="224"/>
    <line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- title -->
  <text x="400" y="52" text-anchor="middle" font-size="28" font-weight="bold" fill="#e8ecf4" letter-spacing="2">DeepSeek 注意力演化</text>
  <text x="400" y="78" text-anchor="middle" font-size="14" fill="#748fbb">MHA  /  MLA  /  DSA  /  NSA  /  CSA + HCA</text>

  <!-- timeline bar -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#2b3a5c" stroke-width="3" stroke-linecap="round"/>

  <!-- V1: MHA -->
  <circle cx="100" cy="120" r="8" fill="#868e96"/>
  <text x="100" y="108" text-anchor="middle" font-size="11" fill="#868e96" font-weight="bold">V1</text>
  <text x="100" y="145" text-anchor="middle" font-size="12" fill="#adb5bd">MHA</text>
  <text x="100" y="160" text-anchor="middle" font-size="9" fill="#495057">全存全看</text>

  <!-- V2: MLA -->
  <circle cx="260" cy="120" r="8" fill="#5c7cfa"/>
  <text x="260" y="108" text-anchor="middle" font-size="11" fill="#5c7cfa" font-weight="bold">V2</text>
  <text x="260" y="145" text-anchor="middle" font-size="12" fill="#748ffc">MLA</text>
  <text x="260" y="160" text-anchor="middle" font-size="9" fill="#5c7cfa">维度压缩</text>

  <!-- V3: DSA -->
  <circle cx="420" cy="120" r="8" fill="#20c997"/>
  <text x="420" y="108" text-anchor="middle" font-size="11" fill="#20c997" font-weight="bold">V3</text>
  <text x="420" y="145" text-anchor="middle" font-size="12" fill="#38d9a9">DSA</text>
  <text x="420" y="160" text-anchor="middle" font-size="9" fill="#20c997">推理稀疏</text>

  <!-- NSA paper -->
  <circle cx="540" cy="120" r="6" fill="none" stroke="#ff922b" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="540" y="108" text-anchor="middle" font-size="10" fill="#ff922b">NSA</text>
  <text x="540" y="145" text-anchor="middle" font-size="10" fill="#ffa94d">论文</text>
  <text x="540" y="160" text-anchor="middle" font-size="9" fill="#ff922b">原生可训练</text>

  <!-- V4: CSA/HCA -->
  <circle cx="700" cy="120" r="10" fill="#ff6b6b"/>
  <text x="700" y="106" text-anchor="middle" font-size="11" fill="#ff6b6b" font-weight="bold">V4</text>
  <text x="700" y="145" text-anchor="middle" font-size="12" fill="#ff8787">CSA/HCA</text>
  <text x="700" y="160" text-anchor="middle" font-size="9" fill="#ff6b6b">压缩+稀疏</text>

  <!-- arrows on timeline -->
  <line x1="112" y1="120" x2="248" y2="120" stroke="#5c7cfa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="272" y1="120" x2="408" y2="120" stroke="#5c7cfa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="432" y1="120" x2="530" y2="120" stroke="#ff922b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <line x1="550" y1="120" x2="686" y2="120" stroke="#ff922b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- center illustration: KV cache shrinking -->
  <!-- MHA block: big -->
  <rect x="55" y="195" width="90" height="100" rx="6" fill="#868e9620" stroke="#868e96" stroke-width="1.5"/>
  <g fill="#868e9680">
    <rect x="62" y="202" width="76" height="6" rx="2"/>
    <rect x="62" y="212" width="76" height="6" rx="2"/>
    <rect x="62" y="222" width="76" height="6" rx="2"/>
    <rect x="62" y="232" width="76" height="6" rx="2"/>
    <rect x="62" y="242" width="76" height="6" rx="2"/>
    <rect x="62" y="252" width="76" height="6" rx="2"/>
    <rect x="62" y="262" width="76" height="6" rx="2"/>
    <rect x="62" y="272" width="76" height="6" rx="2"/>
    <rect x="62" y="282" width="76" height="6" rx="2"/>
  </g>
  <text x="100" y="310" text-anchor="middle" font-size="11" fill="#868e96" font-weight="bold">40.7 GB</text>

  <!-- MLA block: medium -->
  <rect x="215" y="245" width="90" height="50" rx="6" fill="#5c7cfa20" stroke="#5c7cfa" stroke-width="1.5"/>
  <g fill="#5c7cfa80">
    <rect x="222" y="252" width="76" height="6" rx="2"/>
    <rect x="222" y="262" width="76" height="6" rx="2"/>
    <rect x="222" y="272" width="76" height="6" rx="2"/>
    <rect x="222" y="282" width="76" height="6" rx="2"/>
  </g>
  <text x="260" y="310" text-anchor="middle" font-size="11" fill="#5c7cfa" font-weight="bold">1.64 GB</text>

  <!-- DSA block: same as MLA -->
  <rect x="375" y="245" width="90" height="50" rx="6" fill="#20c99720" stroke="#20c997" stroke-width="1.5"/>
  <g fill="#20c99780">
    <rect x="382" y="252" width="76" height="6" rx="2"/>
    <rect x="382" y="262" width="76" height="6" rx="2"/>
    <rect x="382" y="272" width="76" height="6" rx="2"/>
    <rect x="382" y="282" width="76" height="6" rx="2"/>
  </g>
  <text x="420" y="310" text-anchor="middle" font-size="11" fill="#20c997" font-weight="bold">1.64 GB</text>
  <text x="420" y="322" text-anchor="middle" font-size="8" fill="#20c99799">只省计算</text>

  <!-- V4 block: tiny -->
  <rect x="655" y="275" width="90" height="20" rx="6" fill="#ff6b6b20" stroke="#ff6b6b" stroke-width="1.5"/>
  <g fill="#ff6b6b80">
    <rect x="662" y="280" width="76" height="6" rx="2"/>
  </g>
  <text x="700" y="310" text-anchor="middle" font-size="11" fill="#ff6b6b" font-weight="bold">228 MB</text>

  <!-- compression ratio labels -->
  <text x="180" y="240" text-anchor="middle" font-size="10" fill="#5c7cfa">-96%</text>
  <text x="340" y="275" text-anchor="middle" font-size="10" fill="#20c997">+0%</text>
  <text x="570" y="275" text-anchor="middle" font-size="10" fill="#ff6b6b">-86%</text>

  <!-- arrows between blocks -->
  <line x1="148" y1="260" x2="212" y2="260" stroke="#5c7cfa" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="308" y1="270" x2="372" y2="270" stroke="#20c997" stroke-width="1"/>
  <line x1="468" y1="280" x2="652" y2="285" stroke="#ff6b6b" stroke-width="1" marker-end="url(#arr2)"/>

  <!-- bottom: key insight -->
  <rect x="120" y="355" width="560" height="55" rx="10" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
  <text x="400" y="378" text-anchor="middle" font-size="14" fill="#e8ecf4" font-weight="bold">50K 上下文 KV cache：40.7 GB  →  228 MB</text>
  <text x="400" y="398" text-anchor="middle" font-size="12" fill="#748fbb">四代迭代压了 99.4% —— 维度砍一刀，条数再砍一刀</text>

  <!-- footer -->
  <text x="400" y="438" text-anchor="middle" font-size="10" fill="#495057">168 期 | 靳岩岩的 AI 学习笔记</text>
</svg>

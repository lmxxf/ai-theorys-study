<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      text { font-family: 'Noto Sans CJK SC', sans-serif; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#cc4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4488cc"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#44cc88"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#0d1117"/>

  <!-- ========== 左：输入 = 单位圆 ========== -->
  <g transform="translate(150,220)">
    <!-- 坐标轴 -->
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#333" stroke-width="0.5"/>
    <!-- 单位圆 -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#4488cc" stroke-width="2" opacity="0.8"/>
    <!-- 标注两个方向 -->
    <line x1="0" y1="0" x2="70" y2="0" stroke="#4488cc" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="-70" stroke="#4488cc" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>
    <!-- 标题 -->
    <text x="0" y="-110" fill="#4488cc" font-size="14" text-anchor="middle" font-weight="bold">输入：单位圆</text>
    <text x="0" y="-92" fill="#666" font-size="11" text-anchor="middle">所有方向长度 = 1</text>
    <!-- 圆上标几个点 -->
    <circle cx="70" cy="0" r="3" fill="#4488cc"/>
    <circle cx="0" cy="-70" r="3" fill="#4488cc"/>
    <circle cx="49.5" cy="-49.5" r="3" fill="#4488cc"/>
    <circle cx="-49.5" cy="-49.5" r="3" fill="#4488cc"/>
    <circle cx="-70" cy="0" r="3" fill="#4488cc"/>
    <circle cx="49.5" cy="49.5" r="3" fill="#4488cc"/>
  </g>

  <!-- 箭头：圆 → 椭圆 -->
  <g>
    <line x1="240" y1="195" x2="340" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="290" y="185" fill="#888" font-size="11" text-anchor="middle">M = U S Vᵀ</text>
    <text x="290" y="215" fill="#cc4444" font-size="10" text-anchor="middle">矩阵变换</text>
  </g>

  <!-- ========== 中：输出 = 椭圆 ========== -->
  <g transform="translate(470,220)">
    <!-- 坐标轴 -->
    <line x1="-140" y1="0" x2="140" y2="0" stroke="#333" stroke-width="0.5"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#333" stroke-width="0.5"/>
    <!-- 椭圆（旋转 30 度，长轴 3 倍，短轴 0.5 倍） -->
    <ellipse cx="0" cy="0" rx="120" ry="30" fill="none" stroke="#cc4444" stroke-width="2" opacity="0.8"
      transform="rotate(-25)"/>
    <!-- 长轴方向 -->
    <line x1="0" y1="0" x2="109" y2="-51" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.8"/>
    <text x="115" y="-55" fill="#cc4444" font-size="11">S₁ = 3</text>
    <text x="115" y="-40" fill="#cc4444" font-size="9" opacity="0.7">长轴</text>
    <!-- 短轴方向 -->
    <line x1="0" y1="0" x2="-13" y2="-27" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrowRed)" opacity="0.6"/>
    <text x="-55" y="-30" fill="#cc4444" font-size="11">S₂ = 0.5</text>
    <text x="-50" y="-15" fill="#cc4444" font-size="9" opacity="0.7">短轴</text>
    <!-- 标题 -->
    <text x="0" y="-110" fill="#cc4444" font-size="14" text-anchor="middle" font-weight="bold">变换后：椭圆</text>
    <text x="0" y="-92" fill="#666" font-size="11" text-anchor="middle">有的方向被拉长，有的被压扁</text>
    <!-- 椭圆上标几个点 -->
    <circle cx="109" cy="-51" r="3" fill="#cc4444"/>
    <circle cx="-109" cy="51" r="3" fill="#cc4444"/>
    <circle cx="-13" cy="-27" r="3" fill="#cc4444"/>
    <circle cx="13" cy="27" r="3" fill="#cc4444"/>
  </g>

  <!-- ========== 下方：SVD 三步分解 ========== -->
  <text x="450" y="350" fill="#f0e8d8" font-size="14" text-anchor="middle" font-weight="bold">SVD 做的事：描述这个椭圆是怎么来的</text>

  <!-- Vᵀ -->
  <g transform="translate(150,420)">
    <rect x="-70" y="-30" width="140" height="60" rx="6" fill="none" stroke="#4488cc" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="-8" fill="#4488cc" font-size="13" text-anchor="middle" font-weight="bold">Vᵀ</text>
    <text x="0" y="12" fill="#666" font-size="10" text-anchor="middle">对齐到主方向</text>
  </g>

  <!-- → -->
  <text x="260" y="420" fill="#888" font-size="18" text-anchor="middle">→</text>

  <!-- S -->
  <g transform="translate(370,420)">
    <rect x="-70" y="-30" width="140" height="60" rx="6" fill="none" stroke="#cc4444" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="-8" fill="#cc4444" font-size="13" text-anchor="middle" font-weight="bold">S</text>
    <text x="0" y="12" fill="#666" font-size="10" text-anchor="middle">每个方向拉伸多少</text>
  </g>

  <!-- → -->
  <text x="480" y="420" fill="#888" font-size="18" text-anchor="middle">→</text>

  <!-- U -->
  <g transform="translate(590,420)">
    <rect x="-70" y="-30" width="140" height="60" rx="6" fill="none" stroke="#997744" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="-8" fill="#997744" font-size="13" text-anchor="middle" font-weight="bold">U</text>
    <text x="0" y="12" fill="#666" font-size="10" text-anchor="middle">转到输出方向</text>
  </g>

  <!-- Muon 注释 -->
  <g transform="translate(370,470)">
    <text x="0" y="12" fill="#44cc88" font-size="12" text-anchor="middle" font-weight="bold">Muon：扔掉 S → 椭圆变回圆</text>
  </g>

  <!-- ========== 右上：Muon 正交化后 = 回到圆 ========== -->
  <g transform="translate(770,220)">
    <!-- 圆 -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#44cc88" stroke-width="2" opacity="0.8"/>
    <!-- 方向保留（和椭圆同方向） -->
    <line x1="0" y1="0" x2="54" y2="-25" stroke="#44cc88" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.7"/>
    <line x1="0" y1="0" x2="-25" y2="-54" stroke="#44cc88" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.7"/>
    <text x="58" y="-28" fill="#44cc88" font-size="10">1</text>
    <text x="-38" y="-55" fill="#44cc88" font-size="10">1</text>
    <!-- 标题 -->
    <text x="0" y="-90" fill="#44cc88" font-size="14" text-anchor="middle" font-weight="bold">正交化后</text>
    <text x="0" y="-72" fill="#666" font-size="11" text-anchor="middle">M' = U Vᵀ</text>
    <text x="0" y="90" fill="#44cc88" font-size="10" text-anchor="middle">方向保留</text>
    <text x="0" y="105" fill="#44cc88" font-size="10" text-anchor="middle">强度全部 = 1</text>
  </g>

  <!-- 箭头：椭圆 → 圆 -->
  <g>
    <line x1="590" y1="155" x2="700" y2="175" stroke="#44cc88" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
    <text x="645" y="150" fill="#44cc88" font-size="10" text-anchor="middle">扔掉 S</text>
  </g>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Sans CJK SC', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="800" height="520" rx="12" fill="#fafafa" stroke="#ddd" stroke-width="1"/>

  <!-- title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">NSA 三分支并行架构</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#888">每一层、每个 token 同时跑三个分支，门控加权合并</text>

  <!-- input token bar -->
  <rect x="60" y="80" width="680" height="36" rx="6" fill="#e8eaf6" stroke="#7986cb" stroke-width="1.5"/>
  <text x="400" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#3949ab">输入序列  t1  t2  t3  ...  t128  ...  t500  ...  tN</text>

  <!-- three arrows down from input -->
  <line x1="160" y1="116" x2="160" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="116" x2="400" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="116" x2="640" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Branch 1: Compressed -->
  <rect x="30" y="155" width="260" height="200" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="160" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">分支 1: Compressed</text>
  <text x="160" y="196" text-anchor="middle" font-size="11" fill="#bf360c">压缩全看</text>

  <!-- compressed illustration: blocks merging -->
  <g transform="translate(50, 210)">
    <!-- original tokens -->
    <rect x="0" y="0" width="18" height="22" rx="2" fill="#ffe0b2" stroke="#ff9800"/>
    <rect x="20" y="0" width="18" height="22" rx="2" fill="#ffe0b2" stroke="#ff9800"/>
    <rect x="40" y="0" width="18" height="22" rx="2" fill="#ffe0b2" stroke="#ff9800"/>
    <rect x="60" y="0" width="18" height="22" rx="2" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="39" y="16" text-anchor="middle" font-size="9" fill="#e65100">32 tokens</text>

    <!-- arrow down -->
    <line x1="39" y1="26" x2="39" y2="48" stroke="#e65100" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="90" y="42" font-size="9" fill="#bf360c">MLP 压缩</text>

    <!-- compressed single block -->
    <rect x="22" y="52" width="34" height="22" rx="3" fill="#ff9800" stroke="#e65100" stroke-width="1.5"/>
    <text x="39" y="67" text-anchor="middle" font-size="9" fill="white" font-weight="bold">1 条</text>
  </g>

  <text x="160" y="310" text-anchor="middle" font-size="11" fill="#4e342e">压缩后 KV 全部看</text>
  <text x="160" y="326" text-anchor="middle" font-size="11" fill="#4e342e">分辨率低，覆盖全</text>
  <text x="160" y="346" text-anchor="middle" font-size="10" fill="#888">步长 16，重叠压缩</text>

  <!-- cross-branch arrow: borrow scores from Branch 1 -->
  <path d="M290,260 C305,260 305,240 320,240" fill="none" stroke="#e65100" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="295" y="230" font-size="9" fill="#e65100" text-anchor="middle">借分数</text>

  <!-- Branch 2: Selected -->
  <rect x="310" y="155" width="260" height="200" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="440" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">分支 2: Selected</text>
  <text x="440" y="196" text-anchor="middle" font-size="11" fill="#2e7d32">选块精读</text>

  <!-- selected illustration: pick from blocks -->
  <g transform="translate(330, 210)">
    <!-- many blocks, some highlighted -->
    <rect x="0" y="0" width="22" height="22" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="26" y="0" width="22" height="22" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="52" y="0" width="22" height="22" rx="2" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5"/>
    <rect x="78" y="0" width="22" height="22" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="104" y="0" width="22" height="22" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="130" y="0" width="22" height="22" rx="2" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5"/>
    <rect x="156" y="0" width="22" height="22" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="182" y="0" width="22" height="22" rx="2" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="102" y="16" text-anchor="middle" font-size="8" fill="#1b5e20">全部 64-token 块</text>

    <!-- arrows from highlighted to bottom -->
    <line x1="63" y1="26" x2="50" y2="52" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#arrow)"/>
    <line x1="141" y1="26" x2="102" y2="52" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#arrow)"/>
    <line x1="193" y1="26" x2="155" y2="52" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="210" y="42" font-size="9" fill="#2e7d32">top-16</text>

    <!-- selected blocks -->
    <rect x="33" y="56" width="22" height="22" rx="3" fill="#4caf50" stroke="#1b5e20" stroke-width="1.5"/>
    <rect x="85" y="56" width="22" height="22" rx="3" fill="#4caf50" stroke="#1b5e20" stroke-width="1.5"/>
    <rect x="138" y="56" width="22" height="22" rx="3" fill="#4caf50" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="102" y="72" text-anchor="middle" font-size="8" fill="white" font-weight="bold">精读</text>
  </g>

  <text x="440" y="310" text-anchor="middle" font-size="11" fill="#1b5e20">借分支 1 的分数选 top-16 块</text>
  <text x="440" y="326" text-anchor="middle" font-size="11" fill="#1b5e20">选出后回原始 KV 精读</text>
  <text x="440" y="346" text-anchor="middle" font-size="10" fill="#888">共 1024 tokens，原始精度</text>

  <!-- Branch 3: Sliding Window -->
  <rect x="590" y="155" width="180" height="200" rx="10" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="680" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d47a1">分支 3: Window</text>
  <text x="680" y="196" text-anchor="middle" font-size="11" fill="#1565c0">滑动窗口</text>

  <!-- sliding window illustration -->
  <g transform="translate(615, 215)">
    <rect x="0" y="0" width="16" height="22" rx="2" fill="#bbdefb" stroke="#90caf9"/>
    <rect x="18" y="0" width="16" height="22" rx="2" fill="#bbdefb" stroke="#90caf9"/>
    <rect x="36" y="0" width="16" height="22" rx="2" fill="#64b5f6" stroke="#2196f3" stroke-width="1.5"/>
    <rect x="54" y="0" width="16" height="22" rx="2" fill="#64b5f6" stroke="#2196f3" stroke-width="1.5"/>
    <rect x="72" y="0" width="16" height="22" rx="2" fill="#42a5f5" stroke="#1e88e5" stroke-width="1.5"/>
    <rect x="90" y="0" width="16" height="22" rx="2" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
    <!-- bracket -->
    <path d="M34,28 L34,34 L108,34 L108,28" fill="none" stroke="#1565c0" stroke-width="1.5"/>
    <text x="71" y="48" text-anchor="middle" font-size="9" fill="#0d47a1">最近 512 tokens</text>
  </g>

  <text x="680" y="310" text-anchor="middle" font-size="11" fill="#0d47a1">不压缩，不选择</text>
  <text x="680" y="326" text-anchor="middle" font-size="11" fill="#0d47a1">最近的一个都不丢</text>
  <text x="680" y="346" text-anchor="middle" font-size="10" fill="#888">独立 K/V</text>

  <!-- merge arrows -->
  <line x1="160" y1="355" x2="160" y2="400" stroke="#555" stroke-width="1.2"/>
  <line x1="440" y1="355" x2="440" y2="400" stroke="#555" stroke-width="1.2"/>
  <line x1="680" y1="355" x2="680" y2="400" stroke="#555" stroke-width="1.2"/>

  <!-- horizontal merge line -->
  <line x1="160" y1="400" x2="680" y2="400" stroke="#555" stroke-width="1.2"/>
  <line x1="400" y1="400" x2="400" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- gate label -->
  <rect x="320" y="390" width="160" height="20" rx="4" fill="#f5f5f5" stroke="#999"/>
  <text x="400" y="404" text-anchor="middle" font-size="10" fill="#555">门控加权合并</text>

  <!-- output -->
  <rect x="280" y="436" width="240" height="36" rx="6" fill="#ede7f6" stroke="#7e57c2" stroke-width="1.5"/>
  <text x="400" y="459" text-anchor="middle" font-size="13" font-weight="bold" fill="#4527a0">注意力输出</text>

  <!-- bottom note -->
  <text x="400" y="500" text-anchor="middle" font-size="11" fill="#999">NSA 论文 (arXiv 2502.11089)：每层每个 token 同时跑三分支</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .title { font-size: 22px; font-weight: bold; fill: #222; }
    .label { font-size: 14px; fill: #333; }
    .small { font-size: 12px; fill: #555; }
    .tag   { font-size: 13px; font-weight: bold; }
    .fp4   { fill: #cfe8ff; stroke: #4a90d9; stroke-width: 1; }
    .scale8 { fill: #ffd58a; stroke: #d9831f; stroke-width: 1.2; }
    .scale32 { fill: #ffb3b3; stroke: #c0392b; stroke-width: 1.5; }
    .group { fill: none; stroke: #888; stroke-width: 1; stroke-dasharray: 4 3; }
  </style>

  <text x="440" y="34" text-anchor="middle" class="title">FP4 双层 scale 结构（每一行 128 个元素，共 128 行）</text>

  <!-- left: FP4 data block -->
  <g transform="translate(40,80)">
    <text x="0" y="-10" class="label">原始数据 → FP4 量化后的 128 × 128 块</text>
    <!-- 8 cols × 16 rows tiles representing the 128x128 block -->
    <g>
      <!-- Draw a grid of 16 small tiles to suggest 128 elements per row -->
      <g>
        <rect x="0"   y="0" width="380" height="380" fill="#eaf4ff" stroke="#4a90d9" stroke-width="1.5"/>
        <!-- horizontal row lines -->
        <line x1="0" y1="47.5"  x2="380" y2="47.5"  stroke="#bcd6ee"/>
        <line x1="0" y1="95"    x2="380" y2="95"    stroke="#bcd6ee"/>
        <line x1="0" y1="142.5" x2="380" y2="142.5" stroke="#bcd6ee"/>
        <line x1="0" y1="190"   x2="380" y2="190"   stroke="#bcd6ee"/>
        <line x1="0" y1="237.5" x2="380" y2="237.5" stroke="#bcd6ee"/>
        <line x1="0" y1="285"   x2="380" y2="285"   stroke="#bcd6ee"/>
        <line x1="0" y1="332.5" x2="380" y2="332.5" stroke="#bcd6ee"/>
        <!-- vertical columns -->
        <line x1="47.5"  y1="0" x2="47.5"  y2="380" stroke="#bcd6ee"/>
        <line x1="95"    y1="0" x2="95"    y2="380" stroke="#bcd6ee"/>
        <line x1="142.5" y1="0" x2="142.5" y2="380" stroke="#bcd6ee"/>
        <line x1="190"   y1="0" x2="190"   y2="380" stroke="#bcd6ee"/>
        <line x1="237.5" y1="0" x2="237.5" y2="380" stroke="#bcd6ee"/>
        <line x1="285"   y1="0" x2="285"   y2="380" stroke="#bcd6ee"/>
        <line x1="332.5" y1="0" x2="332.5" y2="380" stroke="#bcd6ee"/>
      </g>
      <text x="190" y="200" text-anchor="middle" class="label" fill="#1a4d80">128 × 128 个 FP4 数</text>
      <text x="190" y="220" text-anchor="middle" class="small" fill="#1a4d80">（每个 4 bits，值域只有 8 档：±0, ±0.5, ±1, ±1.5, ±2, ±3, ±4, ±6）</text>
    </g>
    <!-- annotation: one row = 128 numbers -->
    <line x1="0" y1="400" x2="380" y2="400" stroke="#444" stroke-width="1"/>
    <text x="190" y="416" text-anchor="middle" class="small">↑ 一行 128 个数 = 1 个细块</text>
  </g>

  <!-- middle: fine scale column (one per row of 128 numbers) -->
  <g transform="translate(470,80)">
    <text x="0" y="-10" class="label">细 scale 1 × 128 (fp8 E8M0)</text>
    <rect x="0" y="0" width="50" height="380" class="scale8"/>
    <!-- 8 small slots -->
    <line x1="0" y1="47.5"  x2="50" y2="47.5"  stroke="#a26412"/>
    <line x1="0" y1="95"    x2="50" y2="95"    stroke="#a26412"/>
    <line x1="0" y1="142.5" x2="50" y2="142.5" stroke="#a26412"/>
    <line x1="0" y1="190"   x2="50" y2="190"   stroke="#a26412"/>
    <line x1="0" y1="237.5" x2="50" y2="237.5" stroke="#a26412"/>
    <line x1="0" y1="285"   x2="50" y2="285"   stroke="#a26412"/>
    <line x1="0" y1="332.5" x2="50" y2="332.5" stroke="#a26412"/>
    <text x="25" y="23" text-anchor="middle" class="tag" fill="#7a4a00">2ᴺ</text>
    <text x="25" y="71" text-anchor="middle" class="tag" fill="#7a4a00">2ᴺ</text>
    <text x="25" y="119" text-anchor="middle" class="tag" fill="#7a4a00">2ᴺ</text>
    <text x="25" y="166" text-anchor="middle" class="tag" fill="#7a4a00">2ᴺ</text>
    <text x="25" y="213" text-anchor="middle" class="tag" fill="#7a4a00">⋮</text>
    <text x="25" y="261" text-anchor="middle" class="tag" fill="#7a4a00">2ᴺ</text>
    <text x="25" y="309" text-anchor="middle" class="tag" fill="#7a4a00">2ᴺ</text>
    <text x="25" y="357" text-anchor="middle" class="tag" fill="#7a4a00">2ᴺ</text>
    <text x="25" y="402" text-anchor="middle" class="small">128 个 fp8</text>
    <text x="25" y="418" text-anchor="middle" class="small">(共 128B)</text>
  </g>

  <!-- right: coarse scale (one fp32 per 128x128 block) -->
  <g transform="translate(620,80)">
    <text x="0" y="-10" class="label">粗 scale 1 个 fp32</text>
    <rect x="0" y="160" width="100" height="80" class="scale32"/>
    <text x="50" y="195" text-anchor="middle" class="tag" fill="#7a1f1f">amax / FP4_MAX</text>
    <text x="50" y="215" text-anchor="middle" class="small" fill="#7a1f1f">fp32 (4B)</text>
    <text x="50" y="260" text-anchor="middle" class="small">管整块 128 × 128</text>
    <text x="50" y="278" text-anchor="middle" class="small">的整体量级</text>
  </g>

  <!-- arrows from FP4 block to fine scale -->
  <g>
    <line x1="425" y1="270" x2="465" y2="270" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="535" y1="270" x2="615" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#666"/>
    </marker>
  </defs>

  <!-- bottom note -->
  <g transform="translate(40,490)">
    <text x="0" y="0" class="label">重建公式：x ≈ fp4_code × (fp8_fine_scale × fp32_coarse_scale)</text>
    <text x="0" y="24" class="small">动机：scale 不需要精度，只需要量级 → 细 scale 用 E8M0（纯指数），粗 scale 用 fp32 拉总幅。</text>
  </g>
</svg>

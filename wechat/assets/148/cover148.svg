<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" style="background-color:#0a1628">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
  </style>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff7043;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ff7043;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- 背景微光 -->
  <circle cx="200" cy="280" r="200" fill="url(#glow)" opacity="0.2"/>
  <circle cx="600" cy="280" r="200" fill="url(#glow2)" opacity="0.2"/>

  <!-- ============ 左侧：人类示范 ============ -->
  <!-- 桌面示意 -->
  <rect x="60" y="170" width="200" height="200" rx="10" fill="#0d1f3c" stroke="#2a4a6c" stroke-width="1.5" opacity="0.8"/>

  <!-- T 形积木（橙色） -->
  <g transform="translate(130, 240)">
    <rect x="-25" y="-8" width="50" height="16" rx="2" fill="#ff7043" opacity="0.9"/>
    <rect x="-8" y="8" width="16" height="30" rx="2" fill="#ff7043" opacity="0.9"/>
  </g>

  <!-- 手指（圆点） -->
  <circle cx="180" cy="230" r="6" fill="#ffffff" opacity="0.7"/>

  <!-- 人类示范轨迹（虚线弧） -->
  <path d="M 180,230 Q 175,260 155,275 Q 135,290 120,280" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M 180,230 Q 190,260 170,285 Q 150,300 130,290" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.3"/>
  <path d="M 180,230 Q 160,245 145,265 Q 130,280 125,270" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 标注 -->
  <text x="160" y="400" text-anchor="middle" font-size="13" fill="#ff7043">206 局人类示范</text>
  <text x="160" y="418" text-anchor="middle" font-size="11" fill="#bf5130" opacity="0.8">25,650 帧录像</text>

  <!-- ============ 中间：训练过程箭头 ============ -->
  <line x1="290" y1="270" x2="490" y2="270" stroke="#4fc3f7" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.6"/>
  <polygon points="495,270 483,262 483,278" fill="#4fc3f7" opacity="0.7"/>

  <!-- 训练信息 -->
  <text x="390" y="245" text-anchor="middle" font-size="12" fill="#4fc3f7" font-weight="bold">扩散模型训练</text>
  <text x="390" y="225" text-anchor="middle" font-size="10" fill="#4fc3f7" opacity="0.6">200,000 步 · 12 小时</text>

  <!-- 中间的小网络示意 -->
  <g transform="translate(390, 300)" opacity="0.4">
    <!-- ResNet -->
    <rect x="-50" y="0" width="35" height="18" rx="3" fill="none" stroke="#4fc3f7" stroke-width="1"/>
    <text x="-32" y="13" text-anchor="middle" font-size="7" fill="#4fc3f7">ResNet</text>
    <!-- 箭头 -->
    <line x1="-12" y1="9" x2="8" y2="9" stroke="#4fc3f7" stroke-width="0.8" opacity="0.6"/>
    <!-- U-Net -->
    <rect x="10" y="0" width="35" height="18" rx="3" fill="none" stroke="#ff7043" stroke-width="1"/>
    <text x="28" y="13" text-anchor="middle" font-size="7" fill="#ff7043">U-Net</text>
  </g>

  <!-- ============ 右侧：AI 推箱子 ============ -->
  <rect x="540" y="170" width="200" height="200" rx="10" fill="#0d1f3c" stroke="#2a4a6c" stroke-width="1.5" opacity="0.8"/>

  <!-- T 形积木（已推到目标，绿色） -->
  <g transform="translate(640, 300)">
    <rect x="-25" y="-8" width="50" height="16" rx="2" fill="#66bb6a" opacity="0.9"/>
    <rect x="-8" y="8" width="16" height="30" rx="2" fill="#66bb6a" opacity="0.9"/>
  </g>

  <!-- 目标区域（虚线框） -->
  <g transform="translate(640, 300)" opacity="0.3">
    <rect x="-28" y="-11" width="56" height="22" rx="3" fill="none" stroke="#66bb6a" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="-11" y="5" width="22" height="36" rx="3" fill="none" stroke="#66bb6a" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- AI 手指 -->
  <circle cx="610" cy="260" r="6" fill="#4fc3f7" opacity="0.8"/>

  <!-- AI 轨迹（实线，自信的弧） -->
  <path d="M 610,260 Q 620,280 630,290 Q 640,295 640,300" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- 标注 -->
  <text x="640" y="400" text-anchor="middle" font-size="13" fill="#66bb6a">AI 学会推箱子</text>
  <text x="640" y="418" text-anchor="middle" font-size="11" fill="#4caf50" opacity="0.8">成功率 30%</text>

  <!-- ============ 底部：核心信息 ============ -->
  <rect x="180" y="430" width="440" height="40" rx="8" fill="#0d1f3c" stroke="#1a3a5c" stroke-width="1" opacity="0.8"/>
  <text x="400" y="455" text-anchor="middle" font-size="14" fill="#4fc3f7" font-family="'Consolas', 'Noto Sans CJK SC', monospace" opacity="0.9">
    人类示范 → 扩散模型学习 → 从零学会推箱子
  </text>

  <!-- ============ 顶部：标题 ============ -->
  <text x="400" y="60" text-anchor="middle" font-size="28" fill="#ffffff" font-weight="bold">自己训一个推箱子 AI</text>
  <text x="400" y="95" text-anchor="middle" font-size="16" fill="#90a4ae">从 206 局人类示范到 Diffusion Policy</text>

  <!-- 顶部小标签 -->
  <rect x="310" y="108" width="180" height="24" rx="12" fill="none" stroke="#ff7043" stroke-width="1" opacity="0.5"/>
  <text x="400" y="124" text-anchor="middle" font-size="11" fill="#ff7043" opacity="0.7">机器人 AI 入门 · 第三弹</text>
</svg>

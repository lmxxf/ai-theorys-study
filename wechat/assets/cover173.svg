<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1a30"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>

    <!-- Column Parallel (cyan/blue) gradient -->
    <linearGradient id="colGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2a6cb0" stop-opacity="0.75"/>
    </linearGradient>

    <!-- Row Parallel (orange/amber) gradient -->
    <linearGradient id="rowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa830" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d07000" stop-opacity="0.75"/>
    </linearGradient>

    <!-- GPU box gradient -->
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3050"/>
      <stop offset="100%" stop-color="#0a1830"/>
    </linearGradient>

    <!-- AllReduce arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6644" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffaa30" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff6644" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#152040" stroke-width="0.5" opacity="0.5"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Spark filter -->
    <filter id="spark">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffaa30"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <rect width="900" height="500" fill="url(#grid)"/>

  <!-- ===== LEFT GPU (GPU 0) ===== -->
  <g transform="translate(80, 160)">
    <!-- GPU outer box -->
    <rect x="0" y="0" width="280" height="240" rx="8" ry="8" fill="url(#gpuGrad)" stroke="#3060a0" stroke-width="1.5" opacity="0.85"/>
    <text x="140" y="25" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#90b8e0" font-weight="bold" opacity="0.9">GPU 0</text>

    <!-- Column Parallel: left half of W (top) -->
    <g transform="translate(30, 50)">
      <text x="0" y="-8" font-family="'Courier New', monospace" font-size="10" fill="#80b0d8" opacity="0.75">Column Parallel</text>
      <rect x="0" y="0" width="80" height="60" fill="url(#colGrad)" stroke="#5090c8" stroke-width="1.5" filter="url(#glow)"/>
      <text x="40" y="35" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ffffff" font-weight="bold">W_0</text>
      <text x="40" y="76" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#a0c8e8" opacity="0.7">前半列</text>
    </g>

    <!-- Row Parallel: top half of W (bottom) -->
    <g transform="translate(160, 50)">
      <text x="0" y="-8" font-family="'Courier New', monospace" font-size="10" fill="#e0a050" opacity="0.75">Row Parallel</text>
      <rect x="0" y="0" width="80" height="30" fill="url(#rowGrad)" stroke="#d09020" stroke-width="1.5" filter="url(#glow)"/>
      <text x="40" y="20" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ffffff" font-weight="bold">W_0</text>
      <text x="40" y="46" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#e8c890" opacity="0.7">前半行</text>
    </g>

    <!-- Output / partial sum -->
    <g transform="translate(40, 170)">
      <text x="100" y="-8" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#ff7060" opacity="0.85">部分和 Y_0</text>
      <rect x="40" y="0" width="120" height="32" fill="#3a1818" stroke="#ff5040" stroke-width="1.5" opacity="0.85"/>
      <text x="100" y="21" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ffaa90" font-weight="bold">[1,5,4096]</text>
    </g>
  </g>

  <!-- ===== RIGHT GPU (GPU 1) ===== -->
  <g transform="translate(540, 160)">
    <!-- GPU outer box -->
    <rect x="0" y="0" width="280" height="240" rx="8" ry="8" fill="url(#gpuGrad)" stroke="#3060a0" stroke-width="1.5" opacity="0.85"/>
    <text x="140" y="25" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#90b8e0" font-weight="bold" opacity="0.9">GPU 1</text>

    <!-- Column Parallel: right half of W -->
    <g transform="translate(30, 50)">
      <text x="0" y="-8" font-family="'Courier New', monospace" font-size="10" fill="#80b0d8" opacity="0.75">Column Parallel</text>
      <rect x="0" y="0" width="80" height="60" fill="url(#colGrad)" stroke="#5090c8" stroke-width="1.5" filter="url(#glow)"/>
      <text x="40" y="35" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ffffff" font-weight="bold">W_1</text>
      <text x="40" y="76" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#a0c8e8" opacity="0.7">后半列</text>
    </g>

    <!-- Row Parallel: bottom half of W -->
    <g transform="translate(160, 50)">
      <text x="0" y="-8" font-family="'Courier New', monospace" font-size="10" fill="#e0a050" opacity="0.75">Row Parallel</text>
      <rect x="0" y="0" width="80" height="30" fill="url(#rowGrad)" stroke="#d09020" stroke-width="1.5" filter="url(#glow)"/>
      <text x="40" y="20" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ffffff" font-weight="bold">W_1</text>
      <text x="40" y="46" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#e8c890" opacity="0.7">后半行</text>
    </g>

    <!-- Output / partial sum -->
    <g transform="translate(40, 170)">
      <text x="100" y="-8" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#ff7060" opacity="0.85">部分和 Y_1</text>
      <rect x="40" y="0" width="120" height="32" fill="#3a1818" stroke="#ff5040" stroke-width="1.5" opacity="0.85"/>
      <text x="100" y="21" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ffaa90" font-weight="bold">[1,5,4096]</text>
    </g>
  </g>

  <!-- ===== CENTER: AllReduce arrow ===== -->
  <g>
    <!-- Bidirectional arrow -->
    <line x1="375" y1="346" x2="525" y2="346" stroke="url(#arrowGrad)" stroke-width="3.5" filter="url(#glow)"/>
    <polygon points="365,346 380,340 380,352" fill="#ffaa30" filter="url(#glow)"/>
    <polygon points="535,346 520,340 520,352" fill="#ffaa30" filter="url(#glow)"/>

    <!-- Sparks at endpoints -->
    <circle cx="375" cy="346" r="4" fill="#ff8844" filter="url(#spark)" opacity="0.95"/>
    <circle cx="525" cy="346" r="4" fill="#ff8844" filter="url(#spark)" opacity="0.95"/>

    <!-- AllReduce label -->
    <text x="450" y="330" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#ffcc40" font-weight="bold" opacity="0.95">AllReduce</text>
    <text x="450" y="375" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#ddaa60" opacity="0.75">~40 KB / 跨机通信</text>
  </g>

  <!-- ===== CX7 200Gbps connection (background of arrow) ===== -->
  <text x="450" y="148" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#5878a0" opacity="0.65">CX7 · 200Gbps · RDMA</text>
  <line x1="220" y1="160" x2="380" y2="160" stroke="#3060a0" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="520" y1="160" x2="680" y2="160" stroke="#3060a0" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>

  <!-- ===== TITLE: 173 (top-left) ===== -->
  <text x="38" y="62" font-family="'Courier New', monospace" font-size="58" fill="#e0ecff" font-weight="bold" opacity="0.92" filter="url(#textGlow)">173</text>
  <text x="42" y="86" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#5878a0" opacity="0.65">张量并行 · DeepSeek V4 · DGX Spark</text>

  <!-- ===== TAGLINE: bottom-right ===== -->
  <text x="862" y="478" text-anchor="end" font-family="'Noto Sans CJK SC', sans-serif" font-size="26" fill="#e4ecf4" font-weight="bold" opacity="0.9">两台机器上到底怎么切</text>

  <!-- ===== Bottom-left: stats ===== -->
  <text x="42" y="450" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#2a4a70" opacity="0.55">每层 2 次 AllReduce · 43 层共 86 次</text>
  <text x="42" y="465" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#2a4a70" opacity="0.55">瓶颈不是带宽 · 是延迟</text>
  <text x="42" y="480" font-family="'Courier New', monospace" font-size="9" fill="#2a4a70" opacity="0.4">Y = X · W ⇒ Y_0 + Y_1 (Row Parallel partial sum)</text>

</svg>

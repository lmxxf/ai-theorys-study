<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, sans-serif">
  <rect x="0" y="0" width="900" height="540" fill="#fafafa"/>

  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">SwiGLU 专家本体——FFN 怎么在 fp4 上算</text>

  <!-- 输入 -->
  <rect x="60" y="240" width="120" height="60" rx="8" fill="#3b6ea8"/>
  <text x="120" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">输入 x</text>
  <text x="120" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">[hidden=4096]</text>

  <!-- gate_proj -->
  <rect x="260" y="120" width="160" height="60" rx="8" fill="#d8662b"/>
  <text x="340" y="146" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">gate_proj (fp4)</text>
  <text x="340" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">4096 → 2048</text>

  <!-- up_proj -->
  <rect x="260" y="360" width="160" height="60" rx="8" fill="#d8662b"/>
  <text x="340" y="386" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">up_proj (fp4)</text>
  <text x="340" y="406" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">4096 → 2048</text>

  <!-- 连线 输入 -> 两个 proj -->
  <line x1="180" y1="270" x2="260" y2="150" stroke="#666" stroke-width="2"/>
  <line x1="180" y1="270" x2="260" y2="390" stroke="#666" stroke-width="2"/>

  <!-- silu -->
  <rect x="470" y="120" width="100" height="60" rx="8" fill="#6a9b3f"/>
  <text x="520" y="146" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">SiLU</text>
  <text x="520" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">x·σ(x)</text>
  <line x1="420" y1="150" x2="470" y2="150" stroke="#666" stroke-width="2"/>

  <!-- 逐元素相乘 -->
  <circle cx="640" cy="270" r="32" fill="#9a4d9e"/>
  <text x="640" y="278" text-anchor="middle" font-size="24" font-weight="bold" fill="#fff">⊙</text>
  <text x="640" y="320" text-anchor="middle" font-size="12" fill="#555">逐元素相乘</text>
  <text x="640" y="334" text-anchor="middle" font-size="12" fill="#777" font-style="italic">[2048]</text>

  <!-- gate -> ⊙ -->
  <line x1="570" y1="150" x2="616" y2="252" stroke="#666" stroke-width="2"/>
  <!-- up -> ⊙ -->
  <line x1="420" y1="390" x2="616" y2="288" stroke="#666" stroke-width="2"/>

  <!-- down_proj -->
  <rect x="730" y="240" width="140" height="60" rx="8" fill="#d8662b"/>
  <text x="800" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">down_proj (fp4)</text>
  <text x="800" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">2048 → 4096</text>
  <line x1="672" y1="270" x2="730" y2="270" stroke="#666" stroke-width="2"/>

  <!-- 输出 -->
  <text x="800" y="332" text-anchor="middle" font-size="14" fill="#1a1a1a">→ 输出 [4096]</text>

  <!-- 分支标注 -->
  <text x="225" y="110" text-anchor="middle" font-size="12" fill="#555">「门」分支</text>
  <text x="225" y="450" text-anchor="middle" font-size="12" fill="#555">「内容」分支</text>

  <!-- 底部公式 -->
  <rect x="60" y="470" width="780" height="52" rx="6" fill="#eee" stroke="#bbb"/>
  <text x="450" y="496" text-anchor="middle" font-size="14" fill="#1a1a1a">公式：SwiGLU(x) = ( SiLU(x · W_gate) ⊙ (x · W_up) ) · W_down</text>
  <text x="450" y="514" text-anchor="middle" font-size="12" fill="#555">三个矩阵全部 fp4 存储 + fp4 计算（结合 237 期 act_quant、238 期 fp_gemm）</text>
</svg>

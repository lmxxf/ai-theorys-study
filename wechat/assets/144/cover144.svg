<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#070a12"/>
    </linearGradient>

    <!-- 弹簧光晕 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 网格背景 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#1a2a40" opacity="0.3"/>
    </pattern>

    <!-- 均衡点光晕 -->
    <radialGradient id="eqGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ffaa00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>

    <!-- 负值区域渐变 -->
    <linearGradient id="negZone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a40" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a3060" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.5"/>

  <!-- ====== 零线（s=0 水平线） ====== -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#334455" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="730" y="324" font-family="'Noto Sans CJK SC',sans-serif" font-size="12" fill="#556677" opacity="0.6">s = 0</text>

  <!-- 零线以下区域（负值区） -->
  <rect x="80" y="320" width="640" height="180" fill="url(#negZone)" opacity="0.4"/>
  <text x="130" y="480" font-family="'Noto Sans CJK SC',sans-serif" font-size="13" fill="#4488aa" opacity="0.4">L_total &lt; 0</text>

  <!-- ====== 三根弹簧（三个任务） ====== -->

  <!-- 弹簧 1：分类任务（金色，最粗，s 最接近零） -->
  <!-- 弹簧螺旋 -->
  <path d="M 250 180
           Q 270 190 260 200 Q 240 210 260 220 Q 280 230 260 240
           Q 240 250 260 260 Q 280 270 260 280 Q 240 290 260 300
           Q 280 310 260 320 Q 240 330 260 340"
        fill="none" stroke="#ffd700" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <!-- 均衡点标记 -->
  <circle cx="260" cy="310" r="8" fill="url(#eqGlow)" opacity="0.7"/>
  <circle cx="260" cy="310" r="4" fill="#ffd700" filter="url(#glowStrong)" opacity="0.9"/>
  <!-- s 值标注 -->
  <text x="260" y="365" font-family="'Noto Sans CJK SC',sans-serif" font-size="12" fill="#ffd700" text-anchor="middle" opacity="0.8">s₁ ≈ -0.13</text>
  <!-- 任务名 -->
  <text x="260" y="155" font-family="'Noto Sans CJK SC',sans-serif" font-size="16" fill="#ffd700" text-anchor="middle" font-weight="bold" opacity="0.9" filter="url(#glow)">分类</text>
  <text x="260" y="172" font-family="'Noto Sans CJK SC',sans-serif" font-size="11" fill="#ffd700" text-anchor="middle" opacity="0.5">L_CE ≈ 0.88</text>

  <!-- 弹簧 2：回归A（青色，s 很负） -->
  <path d="M 420 180
           Q 440 188 430 196 Q 410 204 430 212 Q 450 220 430 228
           Q 410 236 430 244 Q 450 252 430 260 Q 410 268 430 276
           Q 450 284 430 292 Q 410 300 430 308 Q 450 316 430 324
           Q 410 332 430 340 Q 450 348 430 356 Q 410 364 430 372
           Q 450 380 430 388 Q 410 396 430 404 Q 450 412 430 420"
        fill="none" stroke="#4ecdc4" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <!-- 均衡点 -->
  <circle cx="430" cy="418" r="7" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.5"/>
  <circle cx="430" cy="418" r="3" fill="#4ecdc4" filter="url(#glow)" opacity="0.8"/>
  <!-- s 值 -->
  <text x="430" y="448" font-family="'Noto Sans CJK SC',sans-serif" font-size="12" fill="#4ecdc4" text-anchor="middle" opacity="0.8">s₂ ≈ -2.00</text>
  <!-- 任务名 -->
  <text x="430" y="155" font-family="'Noto Sans CJK SC',sans-serif" font-size="16" fill="#4ecdc4" text-anchor="middle" font-weight="bold" opacity="0.9" filter="url(#glow)">回归A</text>
  <text x="430" y="172" font-family="'Noto Sans CJK SC',sans-serif" font-size="11" fill="#4ecdc4" text-anchor="middle" opacity="0.5">L_MSE ≈ 0.14</text>

  <!-- 弹簧 3：回归B（粉紫色，s 也很负） -->
  <path d="M 590 180
           Q 610 188 600 196 Q 580 204 600 212 Q 620 220 600 228
           Q 580 236 600 244 Q 620 252 600 260 Q 580 268 600 276
           Q 620 284 600 292 Q 580 300 600 308 Q 620 316 600 324
           Q 580 332 600 340 Q 620 348 600 356 Q 580 364 600 372
           Q 620 380 600 388 Q 580 396 600 404"
        fill="none" stroke="#a78bfa" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <!-- 均衡点 -->
  <circle cx="600" cy="402" r="7" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <circle cx="600" cy="402" r="3" fill="#a78bfa" filter="url(#glow)" opacity="0.8"/>
  <!-- s 值 -->
  <text x="600" y="432" font-family="'Noto Sans CJK SC',sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" opacity="0.8">s₃ ≈ -1.85</text>
  <!-- 任务名 -->
  <text x="600" y="155" font-family="'Noto Sans CJK SC',sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold" opacity="0.9" filter="url(#glow)">回归B</text>
  <text x="600" y="172" font-family="'Noto Sans CJK SC',sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" opacity="0.5">L_MSE ≈ 0.16</text>

  <!-- ====== 顶部连接横梁（共享参数 θ） ====== -->
  <line x1="200" y1="180" x2="660" y2="180" stroke="#667788" stroke-width="2" opacity="0.4"/>
  <text x="430" y="135" font-family="'Noto Sans CJK SC',sans-serif" font-size="13" fill="#8899aa" text-anchor="middle" opacity="0.5" letter-spacing="2">共享参数 θ</text>

  <!-- 连接点 -->
  <circle cx="260" cy="180" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="430" cy="180" r="3" fill="#4ecdc4" opacity="0.6"/>
  <circle cx="600" cy="180" r="3" fill="#a78bfa" opacity="0.6"/>

  <!-- ====== 梯度箭头（从均衡点往上，表示对 θ 的贡献） ====== -->
  <!-- 分类：短粗箭头（exp(-s)小，梯度贡献适中） -->
  <line x1="280" y1="300" x2="280" y2="240" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
  <polygon points="275,245 280,230 285,245" fill="#ffd700" opacity="0.5"/>
  <text x="298" y="265" font-family="'Noto Sans CJK SC',sans-serif" font-size="10" fill="#ffd700" opacity="0.5">×1.1</text>

  <!-- 回归A：长细箭头（exp(-s)大，梯度被放大） -->
  <line x1="450" y1="410" x2="450" y2="240" stroke="#4ecdc4" stroke-width="1.5" opacity="0.4"/>
  <polygon points="445,245 450,230 455,245" fill="#4ecdc4" opacity="0.4"/>
  <text x="468" y="330" font-family="'Noto Sans CJK SC',sans-serif" font-size="10" fill="#4ecdc4" opacity="0.5">×7.4</text>

  <!-- 回归B：长细箭头 -->
  <line x1="620" y1="395" x2="620" y2="240" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <polygon points="615,245 620,230 625,245" fill="#a78bfa" opacity="0.4"/>
  <text x="638" y="325" font-family="'Noto Sans CJK SC',sans-serif" font-size="10" fill="#a78bfa" opacity="0.5">×6.3</text>

  <!-- ====== 底部标题 ====== -->
  <text x="400" y="540" font-family="'Noto Sans CJK SC',sans-serif" font-size="20" fill="#cccccc" text-anchor="middle" letter-spacing="3" opacity="0.8">弹簧过了零点，梯度还在拉</text>
  <text x="400" y="570" font-family="'Noto Sans CJK SC',sans-serif" font-size="12" fill="#667788" text-anchor="middle" letter-spacing="2" opacity="0.5">Homoscedastic Uncertainty — Dynamic Behavior in Training</text>

  <!-- 散点装饰 -->
  <g opacity="0.15">
    <circle cx="50" cy="100" r="1" fill="#ffd700"/>
    <circle cx="750" cy="90" r="1.2" fill="#4ecdc4"/>
    <circle cx="90" cy="450" r="0.8" fill="#a78bfa"/>
    <circle cx="740" cy="500" r="1" fill="#ffd700"/>
    <circle cx="45" cy="550" r="0.8" fill="#4ecdc4"/>
    <circle cx="760" cy="300" r="1" fill="#a78bfa"/>
  </g>

</svg>

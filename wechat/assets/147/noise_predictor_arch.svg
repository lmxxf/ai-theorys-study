<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 720" width="500" height="720" style="background-color:#ffffff">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .title { font-size: 14px; fill: #222; font-weight: bold; }
    .label { font-size: 11px; fill: #333; }
    .dim { font-size: 9px; fill: #888; font-family: 'Consolas', 'Noto Sans CJK SC', monospace; }
    .note { font-size: 9px; fill: #666; }
  </style>

  <!-- 标题 -->
  <text x="250" y="25" text-anchor="middle" class="title">NoisePredictor 网络结构</text>

  <!-- ============ 输入层：三个标量 ============ -->
  <!-- x 坐标 -->
  <rect x="40" y="50" width="100" height="36" rx="6" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="90" y="72" text-anchor="middle" class="label">x 坐标</text>
  <text x="90" y="100" text-anchor="middle" class="dim">标量</text>

  <!-- t 时间步 -->
  <rect x="200" y="50" width="100" height="36" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="250" y="72" text-anchor="middle" class="label">时间步 t</text>
  <text x="250" y="100" text-anchor="middle" class="dim">标量</text>

  <!-- y 坐标 -->
  <rect x="360" y="50" width="100" height="36" rx="6" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="410" y="72" text-anchor="middle" class="label">y 坐标</text>
  <text x="410" y="100" text-anchor="middle" class="dim">标量</text>

  <!-- 箭头：输入 → sinusoidal -->
  <line x1="90" y1="86" x2="90" y2="120" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="250" y1="86" x2="250" y2="120" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="410" y1="86" x2="410" y2="120" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ============ Sinusoidal Embedding ============ -->
  <rect x="20" y="125" width="140" height="44" rx="6" fill="#bbdefb" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="90" y="145" text-anchor="middle" class="label">Sinusoidal</text>
  <text x="90" y="160" text-anchor="middle" class="note">scale=25.0</text>
  <text x="90" y="183" text-anchor="middle" class="dim">128 维</text>

  <rect x="180" y="125" width="140" height="44" rx="6" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5"/>
  <text x="250" y="145" text-anchor="middle" class="label">Sinusoidal</text>
  <text x="250" y="160" text-anchor="middle" class="note">scale=1.0</text>
  <text x="250" y="183" text-anchor="middle" class="dim">128 维</text>

  <rect x="340" y="125" width="140" height="44" rx="6" fill="#bbdefb" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="410" y="145" text-anchor="middle" class="label">Sinusoidal</text>
  <text x="410" y="160" text-anchor="middle" class="note">scale=25.0</text>
  <text x="410" y="183" text-anchor="middle" class="dim">128 维</text>

  <!-- 箭头：sinusoidal → concat -->
  <line x1="90" y1="169" x2="90" y2="195" stroke="#666" stroke-width="1.2"/>
  <line x1="250" y1="169" x2="250" y2="195" stroke="#666" stroke-width="1.2"/>
  <line x1="410" y1="169" x2="410" y2="195" stroke="#666" stroke-width="1.2"/>

  <!-- 汇聚线 -->
  <line x1="90" y1="195" x2="250" y2="215" stroke="#666" stroke-width="1.2"/>
  <line x1="250" y1="195" x2="250" y2="215" stroke="#666" stroke-width="1.2"/>
  <line x1="410" y1="195" x2="250" y2="215" stroke="#666" stroke-width="1.2"/>

  <!-- Concat 框 -->
  <rect x="175" y="215" width="150" height="36" rx="6" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="250" y="237" text-anchor="middle" class="label">Concat 拼接</text>
  <text x="250" y="265" text-anchor="middle" class="dim">128 + 128 + 128 = 384 维</text>

  <!-- 箭头 -->
  <line x1="250" y1="251" x2="250" y2="285" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ============ Linear + GELU ============ -->
  <rect x="150" y="290" width="200" height="36" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="250" y="312" text-anchor="middle" class="label">Linear(384 → 128) + GELU</text>
  <text x="250" y="340" text-anchor="middle" class="dim">128 维</text>

  <!-- 箭头 -->
  <line x1="250" y1="326" x2="250" y2="360" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ============ 残差块 ×3 ============ -->
  <!-- 大虚线框 -->
  <rect x="120" y="365" width="260" height="200" rx="8" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="390" y="380" text-anchor="start" class="note">× 3</text>

  <!-- 残差块标题 -->
  <text x="250" y="385" text-anchor="middle" class="label" font-weight="bold">残差块 (Block)</text>

  <!-- 输入 -->
  <text x="250" y="410" text-anchor="middle" class="dim">输入 x (128 维)</text>

  <!-- 分叉 -->
  <line x1="250" y1="415" x2="250" y2="430" stroke="#666" stroke-width="1.2"/>
  <!-- 左路：直通 -->
  <line x1="250" y1="430" x2="155" y2="430" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="155" y1="430" x2="155" y2="520" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="145" y="478" text-anchor="end" class="note">直通</text>

  <!-- 右路：变换 -->
  <rect x="190" y="435" width="170" height="30" rx="5" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="275" y="454" text-anchor="middle" class="note">Linear(128 → 128)</text>

  <line x1="275" y1="465" x2="275" y2="478" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="215" y="478" width="120" height="26" rx="5" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="275" y="495" text-anchor="middle" class="note">GELU 激活</text>

  <line x1="275" y1="504" x2="275" y2="517" stroke="#666" stroke-width="1"/>

  <!-- 加法圆圈 -->
  <circle cx="250" cy="530" r="14" fill="#fff" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="250" y="535" text-anchor="middle" font-size="16" fill="#ab47bc" font-weight="bold">+</text>
  <line x1="155" y1="520" x2="236" y2="530" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="275" y1="517" x2="264" y2="527" stroke="#666" stroke-width="1"/>

  <!-- 输出 -->
  <text x="250" y="560" text-anchor="middle" class="dim">输出 = x + GELU(Linear(x))</text>

  <!-- 箭头出残差块 -->
  <line x1="250" y1="544" x2="250" y2="585" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ============ 输出层 ============ -->
  <rect x="150" y="590" width="200" height="36" rx="6" fill="#ffebee" stroke="#ef5350" stroke-width="1.5"/>
  <text x="250" y="612" text-anchor="middle" class="label">Linear(128 → 2)</text>

  <!-- 箭头 -->
  <line x1="250" y1="626" x2="250" y2="660" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 最终输出 -->
  <rect x="160" y="665" width="180" height="36" rx="6" fill="#ffcdd2" stroke="#ef5350" stroke-width="1.5"/>
  <text x="250" y="687" text-anchor="middle" class="label" font-weight="bold">预测的噪声 (2维)</text>
  <text x="250" y="715" text-anchor="middle" class="dim">eps_pred = [eps_x, eps_y]</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 335" width="820" height="335" style="background-color:#ffffff">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .title { font-size: 13px; fill: #222; font-weight: bold; }
    .label { font-size: 10px; fill: #555; }
    .timestep { font-size: 10px; fill: #888; font-family: 'Consolas', 'Noto Sans CJK SC', monospace; }
    .arrow-label { font-size: 9.5px; fill: #222; }
    .forward { fill: #d94040; }
    .reverse { fill: #2266cc; }
    .sub { font-size: 8.5px; fill: #999; }
  </style>

  <!-- Title -->
  <text x="410" y="22" text-anchor="middle" class="title">扩散模型：正向加噪 &amp; 反向去噪（以 Push-T 推箱子轨迹为例）</text>

  <!-- ============ Stage 0: 干净轨迹 x_0 ============ -->
  <g transform="translate(70, 155)">
    <rect x="-50" y="-50" width="100" height="100" rx="6" fill="#f8fbff" stroke="#ccc" stroke-width="1"/>
    <!-- T形积木轮廓（浅灰背景） -->
    <polygon points="-20,-30 20,-30 20,-18 6,-18 6,10 -6,10 -6,-18 -20,-18" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
    <!-- 目标区域虚线框 -->
    <rect x="15" y="15" width="30" height="25" rx="2" fill="none" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="30" y="34" text-anchor="middle" font-size="6" fill="#aaa">目标</text>
    <!-- 手指轨迹：清晰的折线 -->
    <polyline points="-35,35 -25,15 -15,0 -5,-10 5,-15 15,-5 25,5 30,20"
              fill="none" stroke="#2a7fff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- 轨迹上的关键点 -->
    <circle cx="-35" cy="35" r="3" fill="#2a7fff"/>
    <circle cx="-5" cy="-10" r="2" fill="#2a7fff"/>
    <circle cx="15" cy="-5" r="2" fill="#2a7fff"/>
    <circle cx="30" cy="20" r="3" fill="#ff6644" stroke="#fff" stroke-width="1"/>
    <!-- 起点/终点标注 -->
    <text x="-35" y="44" text-anchor="middle" font-size="6" fill="#2a7fff">起点</text>
    <text x="30" y="14" text-anchor="middle" font-size="6" fill="#ff6644">终点</text>
  </g>
  <text x="70" y="220" text-anchor="middle" class="timestep">t = 0</text>
  <text x="70" y="234" text-anchor="middle" class="label">x₀ 干净轨迹</text>
  <text x="70" y="246" text-anchor="middle" class="sub">[x₁,y₁,...,x₁₆,y₁₆]</text>

  <!-- ============ Stage 1: 轻微噪声 ============ -->
  <g transform="translate(240, 155)">
    <rect x="-50" y="-50" width="100" height="100" rx="6" fill="#f8fbff" stroke="#ccc" stroke-width="1"/>
    <polygon points="-20,-30 20,-30 20,-18 6,-18 6,10 -6,10 -6,-18 -20,-18" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
    <!-- 轨迹微微抖动 -->
    <polyline points="-33,37 -27,13 -13,2 -3,-12 7,-13 17,-7 23,7 32,18"
              fill="none" stroke="#5a9adf" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="-33" cy="37" r="2.5" fill="#5a9adf"/>
    <circle cx="-3" cy="-12" r="1.8" fill="#5a9adf"/>
    <circle cx="17" cy="-7" r="1.8" fill="#5a9adf"/>
    <circle cx="32" cy="18" r="2.5" fill="#5a9adf"/>
  </g>
  <text x="240" y="220" text-anchor="middle" class="timestep">泼了几遍噪声</text>
  <text x="240" y="234" text-anchor="middle" class="label">轨迹微微抖动</text>
  <text x="240" y="246" text-anchor="middle" class="sub">信号 70% + 噪声 30%</text>

  <!-- ============ Stage 2: 明显噪声 ============ -->
  <g transform="translate(410, 155)">
    <rect x="-50" y="-50" width="100" height="100" rx="6" fill="#f8fbff" stroke="#ccc" stroke-width="1"/>
    <polygon points="-20,-30 20,-30 20,-18 6,-18 6,10 -6,10 -6,-18 -20,-18" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
    <!-- 轨迹明显变形，大致方向还在 -->
    <polyline points="-28,40 -32,8 -8,-5 5,-18 -2,-8 22,-15 18,15 35,25"
              fill="none" stroke="#8ab5e0" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>
    <circle cx="-28" cy="40" r="2" fill="#8ab5e0" opacity="0.7"/>
    <circle cx="35" cy="25" r="2" fill="#8ab5e0" opacity="0.7"/>
    <!-- 散落噪声点 -->
    <circle cx="10" cy="35" r="1.5" fill="#999" opacity="0.4"/>
    <circle cx="-35" cy="-20" r="1.5" fill="#999" opacity="0.4"/>
    <circle cx="40" cy="-10" r="1.5" fill="#999" opacity="0.4"/>
  </g>
  <text x="410" y="220" text-anchor="middle" class="timestep">泼了几十遍</text>
  <text x="410" y="234" text-anchor="middle" class="label">轨迹严重变形</text>
  <text x="410" y="246" text-anchor="middle" class="sub">信号 30% + 噪声 70%</text>

  <!-- ============ Stage 3: 接近纯噪声 ============ -->
  <g transform="translate(580, 155)">
    <rect x="-50" y="-50" width="100" height="100" rx="6" fill="#f8fbff" stroke="#ccc" stroke-width="1"/>
    <polygon points="-20,-30 20,-30 20,-18 6,-18 6,10 -6,10 -6,-18 -20,-18" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
    <!-- 轨迹几乎是随机乱走 -->
    <polyline points="-20,10 15,-35 -35,25 30,-5 -10,40 40,30 -25,-20 10,15"
              fill="none" stroke="#b0c8e8" stroke-width="1" stroke-linejoin="round" stroke-linecap="round" opacity="0.35"/>
    <circle cx="-20" cy="10" r="1.5" fill="#b0c8e8" opacity="0.4"/>
    <circle cx="10" cy="15" r="1.5" fill="#b0c8e8" opacity="0.4"/>
    <!-- 更多噪声点 -->
    <circle cx="25" cy="18" r="1.5" fill="#888" opacity="0.5"/>
    <circle cx="-30" cy="-10" r="1.5" fill="#888" opacity="0.5"/>
    <circle cx="5" cy="-25" r="1.5" fill="#888" opacity="0.4"/>
    <circle cx="-15" cy="30" r="1.5" fill="#888" opacity="0.4"/>
    <circle cx="35" cy="-20" r="1.5" fill="#888" opacity="0.4"/>
  </g>
  <text x="580" y="220" text-anchor="middle" class="timestep">泼了上百遍</text>
  <text x="580" y="234" text-anchor="middle" class="label">几乎是随机乱走</text>
  <text x="580" y="246" text-anchor="middle" class="sub">信号 5% + 噪声 95%</text>

  <!-- ============ Stage 4: 纯噪声 x_T ============ -->
  <g transform="translate(750, 155)">
    <rect x="-50" y="-50" width="100" height="100" rx="6" fill="#f8fbff" stroke="#ccc" stroke-width="1"/>
    <polygon points="-20,-30 20,-30 20,-18 6,-18 6,10 -6,10 -6,-18 -20,-18" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
    <!-- 纯随机散点，无任何轨迹结构 -->
    <circle cx="-30" cy="-35" r="2" fill="#777" opacity="0.6"/>
    <circle cx="15" cy="-40" r="2" fill="#777" opacity="0.5"/>
    <circle cx="35" cy="-18" r="2" fill="#777" opacity="0.6"/>
    <circle cx="-18" cy="-10" r="2" fill="#777" opacity="0.5"/>
    <circle cx="8" cy="-25" r="2" fill="#777" opacity="0.4"/>
    <circle cx="28" cy="-5" r="2" fill="#777" opacity="0.6"/>
    <circle cx="-35" cy="5" r="2" fill="#777" opacity="0.5"/>
    <circle cx="-8" cy="0" r="2" fill="#777" opacity="0.5"/>
    <circle cx="20" cy="8" r="2" fill="#777" opacity="0.4"/>
    <circle cx="-25" cy="20" r="2" fill="#777" opacity="0.6"/>
    <circle cx="5" cy="15" r="2" fill="#777" opacity="0.5"/>
    <circle cx="32" cy="22" r="2" fill="#777" opacity="0.5"/>
    <circle cx="-12" cy="30" r="2" fill="#777" opacity="0.4"/>
    <circle cx="18" cy="35" r="2" fill="#777" opacity="0.6"/>
    <circle cx="-30" cy="38" r="2" fill="#777" opacity="0.5"/>
    <circle cx="40" cy="40" r="2" fill="#777" opacity="0.5"/>
  </g>
  <text x="750" y="220" text-anchor="middle" class="timestep">t = T</text>
  <text x="750" y="234" text-anchor="middle" class="label">x_T 纯噪声</text>
  <text x="750" y="246" text-anchor="middle" class="sub">32 个随机数</text>

  <!-- ============ 省略号 ============ -->
  <circle cx="155" cy="155" r="1.5" fill="#aaa"/>
  <circle cx="163" cy="155" r="1.5" fill="#aaa"/>
  <circle cx="171" cy="155" r="1.5" fill="#aaa"/>

  <circle cx="325" cy="155" r="1.5" fill="#aaa"/>
  <circle cx="333" cy="155" r="1.5" fill="#aaa"/>
  <circle cx="341" cy="155" r="1.5" fill="#aaa"/>

  <circle cx="495" cy="155" r="1.5" fill="#aaa"/>
  <circle cx="503" cy="155" r="1.5" fill="#aaa"/>
  <circle cx="511" cy="155" r="1.5" fill="#aaa"/>

  <circle cx="665" cy="155" r="1.5" fill="#aaa"/>
  <circle cx="673" cy="155" r="1.5" fill="#aaa"/>
  <circle cx="681" cy="155" r="1.5" fill="#aaa"/>

  <!-- ============ 正向箭头（上方） ============ -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d94040"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#2266cc"/>
    </marker>
  </defs>

  <line x1="120" y1="80" x2="700" y2="80" stroke="#d94040" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="410" y="72" text-anchor="middle" class="arrow-label forward" font-weight="bold">正向加噪：往轨迹上泼噪声，一步步变成随机乱走（公式写死的，不需要学）</text>

  <!-- ============ 反向箭头（下方） ============ -->
  <line x1="700" y1="270" x2="120" y2="270" stroke="#2266cc" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="410" y="262" text-anchor="middle" class="arrow-label reverse" font-weight="bold">反向去噪：从随机乱走中恢复出合理的推箱子轨迹（神经网络学这个）</text>

  <!-- 底部信噪比渐变条 -->
  <defs>
    <linearGradient id="noiseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a7fff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#aaaaaa;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <rect x="50" y="290" width="720" height="4" rx="2" fill="url(#noiseGrad)" opacity="0.4"/>
  <text x="50" y="305" class="timestep" font-size="8">信号强（轨迹清晰）</text>
  <text x="770" y="305" text-anchor="end" class="timestep" font-size="8">信号弱（纯噪声）</text>
  <text x="410" y="325" text-anchor="middle" font-size="8" fill="#999" font-family="'Noto Sans CJK SC', sans-serif">每一格都是同一个 32 维向量，画成 2D 轨迹只是为了可视化</text>
</svg>

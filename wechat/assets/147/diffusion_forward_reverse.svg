<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" style="background-color:#ffffff">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .title { font-size: 11px; fill: #333; }
    .label { font-size: 10px; fill: #555; }
    .timestep { font-size: 10px; fill: #888; font-family: 'Consolas', 'Noto Sans CJK SC', monospace; }
    .arrow-label { font-size: 9.5px; fill: #222; }
    .forward { fill: #d94040; }
    .reverse { fill: #2266cc; }
  </style>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">扩散模型：正向加噪 &amp; 反向去噪</text>

  <!-- ============ Stage 0: Clean Push-T trajectory (T=0) ============ -->
  <g transform="translate(60, 150)">
    <!-- Push-T shape: a T-shaped path made of connected points -->
    <polyline points="-30,-25 30,-25 30,-15 5,-15 5,25 -5,25 -5,-15 -30,-15"
              fill="none" stroke="#2a7fff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Waypoint dots on the T -->
    <circle cx="-30" cy="-25" r="2.5" fill="#2a7fff"/>
    <circle cx="30" cy="-25" r="2.5" fill="#2a7fff"/>
    <circle cx="30" cy="-15" r="2.5" fill="#2a7fff"/>
    <circle cx="5" cy="-15" r="2.5" fill="#2a7fff"/>
    <circle cx="5" cy="25" r="2.5" fill="#2a7fff"/>
    <circle cx="-5" cy="25" r="2.5" fill="#2a7fff"/>
    <circle cx="-5" cy="-15" r="2.5" fill="#2a7fff"/>
    <circle cx="-30" cy="-15" r="2.5" fill="#2a7fff"/>
    <!-- Border -->
    <rect x="-42" y="-40" width="84" height="80" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="60" y="215" text-anchor="middle" class="timestep">T = 0</text>
  <text x="60" y="230" text-anchor="middle" class="label">x₀ (干净数据)</text>

  <!-- ============ Stage 1: Slightly noisy (T=1) ============ -->
  <g transform="translate(220, 150)">
    <polyline points="-28,-23 31,-27 28,-13 7,-17 3,27 -7,23 -3,-13 -32,-17"
              fill="none" stroke="#5a9adf" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="-28" cy="-23" r="2.5" fill="#5a9adf"/>
    <circle cx="31" cy="-27" r="2.5" fill="#5a9adf"/>
    <circle cx="28" cy="-13" r="2.5" fill="#5a9adf"/>
    <circle cx="7" cy="-17" r="2.5" fill="#5a9adf"/>
    <circle cx="3" cy="27" r="2.5" fill="#5a9adf"/>
    <circle cx="-7" cy="23" r="2.5" fill="#5a9adf"/>
    <circle cx="-3" cy="-13" r="2.5" fill="#5a9adf"/>
    <circle cx="-32" cy="-17" r="2.5" fill="#5a9adf"/>
    <!-- A few noise dots -->
    <circle cx="20" cy="10" r="1.5" fill="#aaa" opacity="0.5"/>
    <circle cx="-15" cy="20" r="1.5" fill="#aaa" opacity="0.5"/>
    <circle cx="25" cy="-5" r="1.5" fill="#aaa" opacity="0.4"/>
    <rect x="-42" y="-40" width="84" height="80" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="220" y="215" text-anchor="middle" class="timestep">T = 1</text>

  <!-- ============ Stage 2: More noisy (T=t) ============ -->
  <g transform="translate(380, 150)">
    <!-- Distorted shape barely recognizable -->
    <polyline points="-25,-18 28,-30 32,-8 10,-20 8,30 -10,18 -8,-10 -35,-20"
              fill="none" stroke="#8ab5e0" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"/>
    <circle cx="-25" cy="-18" r="2" fill="#8ab5e0" opacity="0.6"/>
    <circle cx="28" cy="-30" r="2" fill="#8ab5e0" opacity="0.6"/>
    <circle cx="10" cy="-20" r="2" fill="#8ab5e0" opacity="0.6"/>
    <circle cx="8" cy="30" r="2" fill="#8ab5e0" opacity="0.6"/>
    <circle cx="-10" cy="18" r="2" fill="#8ab5e0" opacity="0.6"/>
    <!-- More noise dots -->
    <circle cx="20" cy="15" r="1.8" fill="#999" opacity="0.5"/>
    <circle cx="-18" cy="25" r="1.8" fill="#999" opacity="0.5"/>
    <circle cx="30" cy="-5" r="1.8" fill="#999" opacity="0.5"/>
    <circle cx="-30" cy="10" r="1.8" fill="#999" opacity="0.5"/>
    <circle cx="5" cy="-35" r="1.8" fill="#999" opacity="0.5"/>
    <circle cx="-20" cy="-30" r="1.8" fill="#999" opacity="0.4"/>
    <circle cx="35" cy="25" r="1.8" fill="#999" opacity="0.4"/>
    <circle cx="-10" cy="-5" r="1.8" fill="#999" opacity="0.4"/>
    <circle cx="15" cy="0" r="1.8" fill="#999" opacity="0.4"/>
    <rect x="-42" y="-40" width="84" height="80" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="380" y="215" text-anchor="middle" class="timestep">T = t</text>

  <!-- ============ Stage 3: Very noisy ============ -->
  <g transform="translate(540, 150)">
    <!-- Barely any structure -->
    <polyline points="-20,-10 22,-35 35,-2 15,-25 12,32 -15,12 -12,-8 -38,-22"
              fill="none" stroke="#b0c8e8" stroke-width="1" stroke-linejoin="round" stroke-linecap="round" opacity="0.3"/>
    <!-- Many noise dots -->
    <circle cx="18" cy="12" r="2" fill="#888" opacity="0.6"/>
    <circle cx="-22" cy="28" r="2" fill="#888" opacity="0.6"/>
    <circle cx="32" cy="-8" r="2" fill="#888" opacity="0.5"/>
    <circle cx="-28" cy="8" r="2" fill="#888" opacity="0.5"/>
    <circle cx="8" cy="-32" r="2" fill="#888" opacity="0.5"/>
    <circle cx="-15" cy="-28" r="2" fill="#888" opacity="0.5"/>
    <circle cx="38" cy="22" r="2" fill="#888" opacity="0.4"/>
    <circle cx="-8" cy="-2" r="2" fill="#888" opacity="0.4"/>
    <circle cx="12" cy="5" r="2" fill="#888" opacity="0.4"/>
    <circle cx="-35" cy="-12" r="2" fill="#888" opacity="0.5"/>
    <circle cx="25" cy="30" r="2" fill="#888" opacity="0.5"/>
    <circle cx="-5" cy="35" r="2" fill="#888" opacity="0.4"/>
    <circle cx="0" cy="-18" r="2" fill="#888" opacity="0.4"/>
    <circle cx="-30" cy="20" r="2" fill="#888" opacity="0.4"/>
    <rect x="-42" y="-40" width="84" height="80" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="540" y="215" text-anchor="middle" class="timestep">T = T-1</text>

  <!-- ============ Stage 4: Pure noise (T=T) ============ -->
  <g transform="translate(700, 150)">
    <!-- Pure random noise dots, no structure -->
    <circle cx="-30" cy="-25" r="2" fill="#777" opacity="0.6"/>
    <circle cx="15" cy="-30" r="2" fill="#777" opacity="0.5"/>
    <circle cx="35" cy="-18" r="2" fill="#777" opacity="0.6"/>
    <circle cx="-18" cy="-10" r="2" fill="#777" opacity="0.5"/>
    <circle cx="8" cy="-15" r="2" fill="#777" opacity="0.4"/>
    <circle cx="28" cy="-5" r="2" fill="#777" opacity="0.6"/>
    <circle cx="-35" cy="5" r="2" fill="#777" opacity="0.5"/>
    <circle cx="-8" cy="0" r="2" fill="#777" opacity="0.5"/>
    <circle cx="20" cy="8" r="2" fill="#777" opacity="0.4"/>
    <circle cx="-25" cy="15" r="2" fill="#777" opacity="0.6"/>
    <circle cx="5" cy="12" r="2" fill="#777" opacity="0.5"/>
    <circle cx="32" cy="18" r="2" fill="#777" opacity="0.5"/>
    <circle cx="-12" cy="25" r="2" fill="#777" opacity="0.4"/>
    <circle cx="18" cy="28" r="2" fill="#777" opacity="0.6"/>
    <circle cx="-30" cy="30" r="2" fill="#777" opacity="0.5"/>
    <circle cx="0" cy="-35" r="2" fill="#777" opacity="0.5"/>
    <circle cx="-20" cy="-32" r="2" fill="#777" opacity="0.4"/>
    <circle cx="25" cy="35" r="2" fill="#777" opacity="0.5"/>
    <circle cx="-38" cy="-15" r="2" fill="#777" opacity="0.5"/>
    <circle cx="38" cy="5" r="2" fill="#777" opacity="0.4"/>
    <circle cx="10" cy="35" r="2" fill="#777" opacity="0.5"/>
    <circle cx="-5" cy="-22" r="2" fill="#777" opacity="0.5"/>
    <circle cx="22" cy="-25" r="2" fill="#777" opacity="0.4"/>
    <circle cx="-32" cy="22" r="2" fill="#777" opacity="0.5"/>
    <rect x="-42" y="-40" width="84" height="80" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="700" y="215" text-anchor="middle" class="timestep">T = T</text>
  <text x="700" y="230" text-anchor="middle" class="label">x_T (纯噪声)</text>

  <!-- ============ Dots between stages (ellipsis) ============ -->
  <circle cx="140" cy="150" r="1.5" fill="#aaa"/>
  <circle cx="148" cy="150" r="1.5" fill="#aaa"/>
  <circle cx="156" cy="150" r="1.5" fill="#aaa"/>

  <circle cx="300" cy="150" r="1.5" fill="#aaa"/>
  <circle cx="308" cy="150" r="1.5" fill="#aaa"/>
  <circle cx="316" cy="150" r="1.5" fill="#aaa"/>

  <circle cx="460" cy="150" r="1.5" fill="#aaa"/>
  <circle cx="468" cy="150" r="1.5" fill="#aaa"/>
  <circle cx="476" cy="150" r="1.5" fill="#aaa"/>

  <circle cx="620" cy="150" r="1.5" fill="#aaa"/>
  <circle cx="628" cy="150" r="1.5" fill="#aaa"/>
  <circle cx="636" cy="150" r="1.5" fill="#aaa"/>

  <!-- ============ Forward arrow (top) ============ -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d94040"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#2266cc"/>
    </marker>
  </defs>

  <!-- Forward arrow line -->
  <line x1="105" y1="80" x2="655" y2="80" stroke="#d94040" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="380" y="72" text-anchor="middle" class="arrow-label forward" font-weight="bold">正向过程 q(x_t | x_{t-1})：逐步加高斯噪声（固定的，不需要学习）</text>

  <!-- Reverse arrow line -->
  <line x1="655" y1="260" x2="105" y2="260" stroke="#2266cc" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="380" y="252" text-anchor="middle" class="arrow-label reverse" font-weight="bold">反向过程 p_θ(x_{t-1} | x_t)：逐步去噪声（神经网络学习这个）</text>

  <!-- Gradient bar under stages to show noise level -->
  <defs>
    <linearGradient id="noiseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a7fff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#aaaaaa;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <rect x="40" y="275" width="720" height="4" rx="2" fill="url(#noiseGrad)" opacity="0.4"/>
  <text x="40" y="288" class="timestep" font-size="8">信噪比高</text>
  <text x="760" y="288" text-anchor="end" class="timestep" font-size="8">信噪比低</text>
</svg>

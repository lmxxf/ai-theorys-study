<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#121e36"/>
    </linearGradient>
    <linearGradient id="oldBlade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a6478"/>
      <stop offset="100%" style="stop-color:#9aa6be"/>
    </linearGradient>
    <linearGradient id="newBlade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6f5c"/>
      <stop offset="100%" style="stop-color:#46e0b0"/>
    </linearGradient>
    <linearGradient id="curve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9aa6be"/>
      <stop offset="50%" style="stop-color:#e08a5a"/>
      <stop offset="100%" style="stop-color:#46e0b0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e0b070"/>
    </marker>
  </defs>

  <rect width="760" height="560" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="380" y="44" text-anchor="middle" fill="#e8edf5" font-size="25" font-weight="bold">SFT→RL：力度基本没变，方向在转</text>
  <text x="380" y="70" text-anchor="middle" fill="#7c8aa5" font-size="14.5">主要不是调大调小，而是能力方向在旋转</text>

  <!-- ===== 上半部：刻刀旋转（圆心居中，三把刀拉开角度）===== -->
  <!-- 圆心放在画面中线，刀向四周散开，避免重叠 -->
  <g transform="translate(380,235)">
    <!-- 旋转范围弧（从右下到左上）-->
    <path d="M 138,52 A 148,148 0 0,1 -52,-138" fill="none" stroke="#2a3a58" stroke-width="2" stroke-dasharray="4 6"/>

    <!-- ① 旧朝向：指向右下（对着旧答案），灰 -->
    <line x1="0" y1="0" x2="128" y2="48" stroke="url(#oldBlade)" stroke-width="11" stroke-linecap="round" opacity="0.9"/>
    <text x="142" y="58" fill="#aab4c8" font-size="14.5">对着「标准答案」</text>
    <text x="142" y="78" fill="#6f7c92" font-size="12.5">SFT 把刀拧到这</text>

    <!-- ② 过渡朝向：指向右上偏右（中间），橙，虚线，问号 -->
    <line x1="0" y1="0" x2="132" y2="-58" stroke="#e08a5a" stroke-width="9" stroke-linecap="round" stroke-dasharray="3 7" opacity="0.85" filter="url(#glow)"/>
    <text x="150" y="-50" fill="#e0a070" font-size="20" font-weight="bold">?</text>
    <text x="172" y="-50" fill="#cf9468" font-size="13">两头不靠的过渡</text>

    <!-- ③ 新朝向：指向左上（对着泛化），绿，发光 -->
    <line x1="0" y1="0" x2="-92" y2="-110" stroke="url(#newBlade)" stroke-width="11" stroke-linecap="round" filter="url(#glow)"/>
    <text x="-104" y="-118" fill="#5fe8bc" font-size="14.5" text-anchor="end">能举一反三的新落点</text>
    <text x="-104" y="-98" fill="#3fae8c" font-size="12.5" text-anchor="end">RL 又把刀转了一次</text>

    <!-- 旋转方向箭头（沿弧，从旧到新）-->
    <path d="M 116,8 A 116,116 0 0,1 -42,-108" fill="none" stroke="#e0b070" stroke-width="2" marker-end="url(#ar)" opacity="0.75"/>

    <!-- 圆心点 -->
    <circle cx="0" cy="0" r="6.5" fill="#e8edf5"/>
  </g>

  <!-- 分隔提示 -->
  <text x="380" y="392" text-anchor="middle" fill="#5a6884" font-size="13">↓ 反映到性能曲线上 ↓</text>

  <!-- ===== 下半部：先降后升曲线 ===== -->
  <g transform="translate(0,408)">
    <line x1="92" y1="14" x2="92" y2="106" stroke="#3a4a68" stroke-width="2"/>
    <line x1="92" y1="106" x2="690" y2="106" stroke="#3a4a68" stroke-width="2"/>
    <text x="80" y="24" fill="#7c8aa5" font-size="13" text-anchor="end">性能</text>
    <text x="690" y="125" fill="#7c8aa5" font-size="13" text-anchor="end">RL 训练步数 →</text>

    <!-- 曲线：起点 → 下凹 → 反超 -->
    <path d="M 112,44 C 196,46 244,96 322,96 C 404,96 460,30 672,24"
          fill="none" stroke="url(#curve)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>

    <!-- 起点 -->
    <circle cx="112" cy="44" r="5" fill="#9aa6be"/>
    <text x="118" y="38" fill="#aab4c8" font-size="12.5">起点</text>

    <!-- 凹底 -->
    <circle cx="322" cy="96" r="5.5" fill="#e08a5a"/>
    <text x="322" y="134" fill="#e0a070" font-size="13" text-anchor="middle">先掉一截 = 刀正转到一半</text>

    <!-- 终点 -->
    <circle cx="670" cy="24" r="5.5" fill="#46e0b0"/>
    <text x="664" y="16" fill="#5fe8bc" font-size="12.5" text-anchor="end">转到位 → 慢慢回升</text>
  </g>
</svg>

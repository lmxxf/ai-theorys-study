<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" style="background:#07111f">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="58%" stop-color="#0b1b2d"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123a5a"/>
      <stop offset="100%" stop-color="#0b253c"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#65d7ff"/>
    </marker>
    <marker id="arrowHot" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb74d"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>

  <g opacity="0.08" stroke="#9adcf7" stroke-width="0.6">
    <line x1="0" y1="125" x2="900" y2="125"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="0" y1="375" x2="900" y2="375"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <text x="450" y="62" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="34" fill="#f8fafc" font-weight="700">一个 token 的旅程</text>
  <text x="450" y="98" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="17" fill="#9bd8ff">DeepSeek V4-Pro 前向传播总复习</text>

  <!-- Input block -->
  <rect x="48" y="148" width="180" height="190" rx="8" fill="#0b1628" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="138" y="176" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#ccfbf1" font-weight="700">输入假设</text>
  <text x="138" y="202" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#94a3b8">"中国的首都是"</text>
  <g font-family="'Noto Sans CJK SC', sans-serif" font-size="14" font-weight="700">
    <rect x="70" y="222" width="52" height="30" rx="5" fill="#123d55" stroke="#65d7ff"/>
    <text x="96" y="243" text-anchor="middle" fill="#e0f2fe">中国</text>
    <rect x="130" y="222" width="34" height="30" rx="5" fill="#123d55" stroke="#65d7ff"/>
    <text x="147" y="243" text-anchor="middle" fill="#e0f2fe">的</text>
    <rect x="172" y="222" width="34" height="30" rx="5" fill="#123d55" stroke="#65d7ff"/>
    <text x="189" y="243" text-anchor="middle" fill="#e0f2fe">首</text>
    <rect x="91" y="262" width="34" height="30" rx="5" fill="#123d55" stroke="#65d7ff"/>
    <text x="108" y="283" text-anchor="middle" fill="#e0f2fe">都</text>
    <rect x="133" y="262" width="34" height="30" rx="5" fill="#123d55" stroke="#65d7ff"/>
    <text x="150" y="283" text-anchor="middle" fill="#e0f2fe">是</text>
  </g>
  <text x="138" y="317" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#64748b">token ID / 切法为演示</text>

  <!-- Main arrows -->
  <path d="M 228 244 L 292 244" stroke="#65d7ff" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 620 244 L 686 244" stroke="#ffb74d" stroke-width="2.4" fill="none" marker-end="url(#arrowHot)"/>

  <!-- Transformer core -->
  <rect x="292" y="128" width="328" height="232" rx="10" fill="url(#core)" stroke="#65d7ff" stroke-width="1.4"/>
  <rect x="302" y="138" width="308" height="212" rx="8" fill="#07111f" opacity="0.42"/>
  <text x="456" y="165" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="18" fill="#e0f2fe" font-weight="700">61 层 Transformer 核心栈</text>
  <text x="456" y="188" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#7dd3fc">h_hc [1,5,4,7168] → h [1,5,7168]</text>

  <g font-family="'Noto Sans CJK SC', sans-serif">
    <rect x="322" y="212" width="125" height="48" rx="6" fill="#0f2d43" stroke="#38bdf8"/>
    <text x="384" y="233" text-anchor="middle" font-size="13" fill="#e0f2fe" font-weight="700">mHC</text>
    <text x="384" y="251" text-anchor="middle" font-size="11" fill="#93c5fd">pre / post / comb</text>

    <rect x="466" y="212" width="125" height="48" rx="6" fill="#0f2d43" stroke="#38bdf8"/>
    <text x="528" y="233" text-anchor="middle" font-size="13" fill="#e0f2fe" font-weight="700">MLA 注意力</text>
    <text x="528" y="251" text-anchor="middle" font-size="11" fill="#93c5fd">Q 128头 × KV 1份</text>

    <rect x="322" y="278" width="125" height="48" rx="6" fill="#112f32" stroke="#2dd4bf"/>
    <text x="384" y="299" text-anchor="middle" font-size="13" fill="#ccfbf1" font-weight="700">MoE FFN</text>
    <text x="384" y="317" text-anchor="middle" font-size="11" fill="#99f6e4">top-6 × 2.5 + shared</text>

    <rect x="466" y="278" width="125" height="48" rx="6" fill="#16213a" stroke="#818cf8"/>
    <text x="528" y="299" text-anchor="middle" font-size="13" fill="#e0e7ff" font-weight="700">lm_head</text>
    <text x="528" y="317" text-anchor="middle" font-size="11" fill="#c7d2fe">7168 → 129280</text>
  </g>

  <!-- Long-context side modules -->
  <g opacity="0.76" font-family="'Noto Sans CJK SC', sans-serif">
    <rect x="315" y="376" width="285" height="54" rx="8" fill="#111827" stroke="#475569" stroke-width="1"/>
    <text x="458" y="398" text-anchor="middle" font-size="13" fill="#cbd5e1" font-weight="700">短输入：长上下文模块基本退居旁路</text>
    <text x="458" y="418" text-anchor="middle" font-size="11" fill="#94a3b8">CSA / HCA / Compressor / Indexer 等到长上下文才真正亮起来</text>
  </g>
  <path d="M 456 360 L 456 376" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- Output block -->
  <rect x="686" y="158" width="166" height="170" rx="10" fill="#17120c" stroke="#ffb74d" stroke-width="1.3"/>
  <text x="769" y="188" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#fed7aa" font-weight="700">下一个 token</text>
  <circle cx="769" cy="246" r="42" fill="#f97316" opacity="0.18" filter="url(#softGlow)"/>
  <circle cx="769" cy="246" r="34" fill="#0b1628" stroke="#ffb74d" stroke-width="2"/>
  <text x="769" y="254" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="22" fill="#fed7aa" font-weight="700">北京</text>
  <text x="769" y="304" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#fbbf24">softmax → 采样</text>

  <!-- Small labels -->
  <text x="260" y="230" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#7dd3fc">Embedding</text>
  <text x="654" y="230" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#fbbf24">logits</text>

  <text x="450" y="464" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#64748b">Tokenize → Embedding → mHC + MLA + MoE → lm_head → softmax</text>
  <text x="450" y="486" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#475569">No.169 | 靳岩岩的 AI 学习笔记</text>
</svg>

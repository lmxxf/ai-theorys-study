<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1710" viewBox="0 0 800 1710" style="background:#ffffff">
  <style>
    text { font-family: 'Noto Sans CJK SC', 'Noto Sans SC', sans-serif; }
    .title { font-size: 20px; font-weight: bold; fill: #1a1a1a; }
    .label { font-size: 13px; fill: #333; }
    .label-bold { font-size: 13px; fill: #333; font-weight: bold; }
    .dim { font-size: 11px; fill: #666; }
    .small { font-size: 11px; fill: #555; }
    .section-title { font-size: 15px; font-weight: bold; fill: #1a1a1a; }
    .sub-title { font-size: 14px; font-weight: bold; fill: #1a1a1a; }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .conn { stroke: #333; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">DeepSeek V4-Pro 前向传播全流程</text>

  <!-- Step 1: Input + Tokenize -->
  <rect x="150" y="55" width="500" height="48" fill="#fff" stroke="#444" stroke-width="1.5" rx="6"/>
  <text x="400" y="75" text-anchor="middle" class="label-bold">1. 输入 + Tokenize</text>
  <text x="400" y="93" text-anchor="middle" class="dim">"中国的首都是" → [9412, 1756, 38901, 12044, 2564]</text>
  <line x1="400" y1="103" x2="400" y2="123" class="arrow"/>

  <!-- Step 2: Embedding -->
  <rect x="150" y="123" width="500" height="48" fill="#fff" stroke="#444" stroke-width="1.5" rx="6"/>
  <text x="400" y="143" text-anchor="middle" class="label-bold">2. Embedding 查表</text>
  <text x="400" y="161" text-anchor="middle" class="dim">token_ids [1,5] → h [1, 5, 7168]</text>
  <line x1="400" y1="171" x2="400" y2="191" class="arrow"/>

  <!-- Step 3: Copy 4 -->
  <rect x="150" y="191" width="500" height="48" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" rx="6"/>
  <text x="400" y="211" text-anchor="middle" class="label-bold">3. 复制 4 份 (mHC init)</text>
  <text x="400" y="229" text-anchor="middle" class="dim">h [1, 5, 7168] → h_hc [1, 5, 4, 7168]</text>
  <line x1="400" y1="239" x2="400" y2="264" class="arrow"/>

  <!-- Step 4: 61-layer Transformer big box -->
  <rect x="50" y="264" width="700" height="1050" fill="#FAFAFA" stroke="#333" stroke-width="2" rx="10"/>
  <text x="400" y="290" text-anchor="middle" class="section-title">4. Transformer 层 (x61 层)</text>
  <text x="720" y="290" text-anchor="end" class="dim">展开一层细节</text>

  <!-- 4a: hc_pre -->
  <rect x="120" y="305" width="560" height="40" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" rx="6"/>
  <text x="400" y="322" text-anchor="middle" class="label-bold">hc_pre: 4 份 → 1 份 (双随机矩阵 W)</text>
  <text x="400" y="338" text-anchor="middle" class="dim">h_hc [1,5,4,7168] → h [1,5,7168]</text>
  <line x1="400" y1="345" x2="400" y2="362" class="arrow"/>

  <!-- 4b: RMSNorm -->
  <rect x="270" y="362" width="260" height="28" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5" rx="6"/>
  <text x="400" y="381" text-anchor="middle" class="label-bold">RMSNorm</text>
  <line x1="400" y1="390" x2="400" y2="407" class="arrow"/>

  <!-- 4c: Attention sub-box -->
  <rect x="90" y="407" width="620" height="365" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" rx="6"/>
  <text x="400" y="428" text-anchor="middle" class="sub-title">Multi-Head Latent Attention (MLA)</text>

  <!-- Q low-rank -->
  <rect x="120" y="440" width="560" height="52" fill="#BBDEFB" stroke="#1565C0" rx="4"/>
  <text x="400" y="457" text-anchor="middle" class="label-bold">Q 低秩投影</text>
  <text x="400" y="472" text-anchor="middle" class="dim">7168 → 1536 (压缩) → 65536</text>
  <text x="400" y="486" text-anchor="middle" class="dim">reshape → 128 头 x 512 维 (448 nope + 64 rope)</text>
  <line x1="400" y1="492" x2="400" y2="505" class="arrow"/>

  <!-- KV projection -->
  <rect x="120" y="505" width="560" height="40" fill="#BBDEFB" stroke="#1565C0" rx="4"/>
  <text x="400" y="522" text-anchor="middle" class="label-bold">KV 低秩投影</text>
  <text x="400" y="538" text-anchor="middle" class="dim">7168 → 512 (448 nope + 64 rope) | 所有头共享</text>
  <line x1="400" y1="545" x2="400" y2="558" class="arrow"/>

  <!-- RoPE -->
  <rect x="220" y="558" width="360" height="28" fill="#BBDEFB" stroke="#1565C0" rx="4"/>
  <text x="400" y="577" text-anchor="middle" class="label">RoPE 旋转位置编码 (加到 64 维 rope 部分)</text>
  <line x1="400" y1="586" x2="400" y2="599" class="arrow"/>

  <!-- Score -->
  <rect x="120" y="599" width="560" height="52" fill="#BBDEFB" stroke="#1565C0" rx="4"/>
  <text x="400" y="616" text-anchor="middle" class="label-bold">注意力分数计算</text>
  <text x="400" y="631" text-anchor="middle" class="small">score = (q_nope . kv_nope&#7488; + q_rope . k_rope&#7488;) / sqrt(512)</text>
  <text x="400" y="645" text-anchor="middle" class="dim">解耦 nope/rope 分别计算后相加</text>
  <line x1="400" y1="651" x2="400" y2="664" class="arrow"/>

  <!-- Softmax + weighted sum -->
  <rect x="210" y="664" width="380" height="28" fill="#BBDEFB" stroke="#1565C0" rx="4"/>
  <text x="400" y="683" text-anchor="middle" class="label">Softmax → 加权求和 value</text>
  <line x1="400" y1="692" x2="400" y2="705" class="arrow"/>

  <!-- O projection -->
  <rect x="120" y="705" width="560" height="52" fill="#BBDEFB" stroke="#1565C0" rx="4"/>
  <text x="400" y="722" text-anchor="middle" class="label-bold">O 分组低秩投影</text>
  <text x="400" y="737" text-anchor="middle" class="dim">128 头 → 16 组 (8头/组) → 每组 1024 → 合并 → 7168</text>
  <text x="400" y="751" text-anchor="middle" class="dim">+ 残差连接</text>

  <!-- Residual annotation for attention -->
  <line x1="725" y1="407" x2="725" y2="772" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="725" y1="407" x2="715" y2="407" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="725" y1="772" x2="715" y2="772" stroke="#1565C0" stroke-width="1.5"/>
  <text x="740" y="580" class="dim" transform="rotate(90,740,580)">残差连接</text>

  <!-- End attention box: bottom is 407+365=772 -->
  <line x1="400" y1="772" x2="400" y2="789" class="arrow"/>

  <!-- 4d: hc_post -->
  <rect x="120" y="789" width="560" height="40" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" rx="6"/>
  <text x="400" y="806" text-anchor="middle" class="label-bold">hc_post: 1 份 → 4 份 (双随机矩阵 W)</text>
  <text x="400" y="822" text-anchor="middle" class="dim">h [1,5,7168] → h_hc [1,5,4,7168]</text>
  <line x1="400" y1="829" x2="400" y2="846" class="arrow"/>

  <!-- 4e: hc_pre again -->
  <rect x="120" y="846" width="560" height="40" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" rx="6"/>
  <text x="400" y="863" text-anchor="middle" class="label-bold">hc_pre: 4 份 → 1 份 (双随机矩阵 W)</text>
  <text x="400" y="879" text-anchor="middle" class="dim">h_hc [1,5,4,7168] → h [1,5,7168]</text>
  <line x1="400" y1="886" x2="400" y2="903" class="arrow"/>

  <!-- 4f: RMSNorm -->
  <rect x="270" y="903" width="260" height="28" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5" rx="6"/>
  <text x="400" y="922" text-anchor="middle" class="label-bold">RMSNorm</text>
  <line x1="400" y1="931" x2="400" y2="948" class="arrow"/>

  <!-- 4g: MoE FFN sub-box -->
  <rect x="90" y="948" width="620" height="240" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" rx="6"/>
  <text x="400" y="969" text-anchor="middle" class="sub-title">MoE Feed-Forward Network</text>

  <!-- Router -->
  <rect x="120" y="980" width="560" height="60" fill="#C8E6C9" stroke="#2E7D32" rx="4"/>
  <text x="400" y="998" text-anchor="middle" class="label-bold">Router 路由</text>
  <text x="400" y="1013" text-anchor="middle" class="dim">前 3 层: Hash 路由 (确定性)</text>
  <text x="400" y="1028" text-anchor="middle" class="dim">后 58 层: SqrtSoftplus 门控 → Top-6 专家</text>
  <line x1="400" y1="1040" x2="400" y2="1057" class="arrow"/>

  <!-- 6 Experts -->
  <rect x="120" y="1057" width="370" height="55" fill="#C8E6C9" stroke="#2E7D32" rx="4"/>
  <text x="305" y="1075" text-anchor="middle" class="label-bold">6 个激活专家 (共 256 个)</text>
  <text x="305" y="1091" text-anchor="middle" class="dim">SwiGLU: 7168 → 3072 → 7168</text>
  <text x="305" y="1105" text-anchor="middle" class="dim">SiLU(xW_g) ⊙ (xW_u) . W_d</text>

  <!-- Shared Expert -->
  <rect x="510" y="1057" width="170" height="55" fill="#C8E6C9" stroke="#2E7D32" rx="4"/>
  <text x="595" y="1075" text-anchor="middle" class="label-bold">1 个共享专家</text>
  <text x="595" y="1091" text-anchor="middle" class="dim">SwiGLU</text>
  <text x="595" y="1105" text-anchor="middle" class="dim">7168→3072→7168</text>

  <!-- Lines from experts to merge -->
  <line x1="305" y1="1112" x2="305" y2="1133" class="arrow"/>
  <line x1="595" y1="1112" x2="595" y2="1133" class="conn"/>
  <line x1="595" y1="1133" x2="420" y2="1133" class="conn"/>

  <!-- Merge -->
  <rect x="200" y="1133" width="400" height="40" fill="#C8E6C9" stroke="#2E7D32" rx="4"/>
  <text x="400" y="1150" text-anchor="middle" class="label-bold">加权合并</text>
  <text x="400" y="1165" text-anchor="middle" class="dim">sum(gate_i x expert_i) + shared_expert | + 残差连接</text>

  <!-- Residual annotation for MoE -->
  <line x1="725" y1="948" x2="725" y2="1188" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="725" y1="948" x2="715" y2="948" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="725" y1="1188" x2="715" y2="1188" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="740" y="1068" class="dim" transform="rotate(90,740,1068)">残差连接</text>

  <!-- End MoE box: bottom is 948+240=1188 -->
  <line x1="400" y1="1188" x2="400" y2="1205" class="arrow"/>

  <!-- 4h: hc_post again -->
  <rect x="120" y="1205" width="560" height="40" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" rx="6"/>
  <text x="400" y="1222" text-anchor="middle" class="label-bold">hc_post: 1 份 → 4 份 (双随机矩阵 W)</text>
  <text x="400" y="1238" text-anchor="middle" class="dim">h [1,5,7168] → h_hc [1,5,4,7168]</text>

  <!-- Loop back annotation -->
  <rect x="240" y="1265" width="320" height="28" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
  <text x="400" y="1284" text-anchor="middle" class="dim">--- 重复以上流程 x61 层 ---</text>

  <!-- End transformer big box -->
  <line x1="400" y1="1314" x2="400" y2="1339" class="arrow"/>

  <!-- Step 5: hc_head -->
  <rect x="120" y="1339" width="560" height="48" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" rx="6"/>
  <text x="400" y="1359" text-anchor="middle" class="label-bold">5. hc_head: 4 份 → 1 份 (Sigmoid 门控)</text>
  <text x="400" y="1377" text-anchor="middle" class="dim">h_hc [1,5,4,7168] → sigma(gate) . sum(w_i . h_i) → h [1,5,7168]</text>
  <line x1="400" y1="1387" x2="400" y2="1412" class="arrow"/>

  <!-- Step 6: RMSNorm + lm_head -->
  <rect x="150" y="1412" width="500" height="48" fill="#fff" stroke="#444" stroke-width="1.5" rx="6"/>
  <text x="400" y="1432" text-anchor="middle" class="label-bold">6. RMSNorm → lm_head 线性投影</text>
  <text x="400" y="1450" text-anchor="middle" class="dim">h [1, 5, 7168] → logits [1, 5, 129280]</text>
  <line x1="400" y1="1460" x2="400" y2="1485" class="arrow"/>

  <!-- Step 7: Softmax + Sample -->
  <rect x="150" y="1485" width="500" height="48" fill="#fff" stroke="#444" stroke-width="1.5" rx="6"/>
  <text x="400" y="1505" text-anchor="middle" class="label-bold">7. Softmax → 采样</text>
  <text x="400" y="1523" text-anchor="middle" class="dim">logits → P(token) → 采样 → "北京"</text>

  <!-- Legend -->
  <rect x="100" y="1580" width="600" height="100" fill="#FAFAFA" stroke="#ccc" rx="6"/>
  <text x="400" y="1605" text-anchor="middle" class="label-bold">图例</text>
  <rect x="130" y="1618" width="50" height="16" fill="#FFF3E0" stroke="#E65100" rx="3"/>
  <text x="190" y="1631" class="small">mHC 操作 (多头副本)</text>
  <rect x="130" y="1642" width="50" height="16" fill="#E3F2FD" stroke="#1565C0" rx="3"/>
  <text x="190" y="1655" class="small">注意力模块</text>
  <rect x="420" y="1618" width="50" height="16" fill="#E8F5E9" stroke="#2E7D32" rx="3"/>
  <text x="480" y="1631" class="small">MoE 模块</text>
  <rect x="420" y="1642" width="50" height="16" fill="#F3E5F5" stroke="#7B1FA2" rx="3"/>
  <text x="480" y="1655" class="small">RMSNorm</text>
  <rect x="275" y="1665" width="50" height="16" fill="#fff" stroke="#444" rx="3"/>
  <text x="335" y="1678" class="small">通用操作</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <!-- Background gradient - deep purple tech -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080115"/>
      <stop offset="40%" stop-color="#110228"/>
      <stop offset="70%" stop-color="#0f0225"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>

    <!-- Small model glow - bright electric purple -->
    <radialGradient id="smallGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Large model glow - dim, fading -->
    <radialGradient id="bigGlow" cx="40%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6b7280" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#374151" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1f2937" stop-opacity="0"/>
    </radialGradient>

    <!-- Impact burst -->
    <radialGradient id="impactGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#c084fc" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- DeltaNet block gradient (linear attention) -->
    <linearGradient id="deltaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- GQA block gradient (quadratic attention) -->
    <linearGradient id="gqaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <!-- Shatter line gradient -->
    <linearGradient id="shatterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0"/>
      <stop offset="40%" stop-color="#e9d5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f5f3ff" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Title highlight gradient -->
    <linearGradient id="titleHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="50%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>

    <!-- Glow filter for small model -->
    <filter id="glowSmall" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow filter -->
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Title strong glow -->
    <filter id="titleGlow" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Crack pattern filter -->
    <filter id="crackGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#a855f7" stroke-width="0.5">
    <line x1="0" y1="0" x2="900" y2="383"/>
    <line x1="0" y1="383" x2="900" y2="0"/>
    <line x1="450" y1="0" x2="450" y2="383"/>
    <line x1="0" y1="191" x2="900" y2="191"/>
    <line x1="225" y1="0" x2="225" y2="383"/>
    <line x1="675" y1="0" x2="675" y2="383"/>
    <line x1="0" y1="96" x2="900" y2="96"/>
    <line x1="0" y1="287" x2="900" y2="287"/>
  </g>

  <!-- Floating particles background -->
  <g opacity="0.2">
    <circle cx="120" cy="60" r="1.5" fill="#c084fc"/>
    <circle cx="280" cy="320" r="1" fill="#a855f7"/>
    <circle cx="750" cy="45" r="1.2" fill="#818cf8"/>
    <circle cx="820" cy="290" r="1" fill="#c084fc"/>
    <circle cx="50" cy="200" r="0.8" fill="#a855f7"/>
    <circle cx="400" cy="30" r="1.3" fill="#818cf8"/>
    <circle cx="650" cy="350" r="0.9" fill="#c084fc"/>
    <circle cx="180" cy="160" r="1.1" fill="#a855f7"/>
    <circle cx="530" cy="80" r="0.7" fill="#818cf8"/>
    <circle cx="870" cy="170" r="1" fill="#c084fc"/>
    <circle cx="340" cy="260" r="0.6" fill="#c084fc"/>
    <circle cx="770" cy="150" r="0.9" fill="#a855f7"/>
  </g>

  <!-- === Motion trail from small model (behind everything) === -->
  <g opacity="0.35">
    <line x1="80" y1="190" x2="370" y2="190" stroke="url(#shatterGrad)" stroke-width="3"/>
    <line x1="120" y1="172" x2="375" y2="182" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
    <line x1="120" y1="208" x2="375" y2="198" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="162" x2="380" y2="177" stroke="#7c3aed" stroke-width="0.6" opacity="0.3"/>
    <line x1="160" y1="218" x2="380" y2="203" stroke="#7c3aed" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- === RIGHT SIDE: Large model (397B) - cracking, dim === -->
  <g transform="translate(640, 190)">
    <!-- Outer dim glow -->
    <circle cx="0" cy="0" r="130" fill="url(#bigGlow)" opacity="0.5"/>

    <!-- Large sphere outline - broken/cracking -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#2d3748" stroke-width="1.5" opacity="0.3" stroke-dasharray="12,6"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#374151" stroke-width="1" opacity="0.25" stroke-dasharray="8,10"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#4b5563" stroke-width="0.8" opacity="0.2" stroke-dasharray="5,8"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#6b7280" stroke-width="0.6" opacity="0.15"/>

    <!-- Crack lines radiating from impact point (left side) - more prominent -->
    <g filter="url(#crackGlow)" opacity="0.8">
      <!-- Major cracks -->
      <polyline points="-90,-10 -60,-35 -40,-60 -25,-85" fill="none" stroke="#e9d5ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-60" y1="-35" x2="-75" y2="-55" stroke="#c084fc" stroke-width="1.2"/>

      <polyline points="-90,8 -55,40 -35,70 -20,90" fill="none" stroke="#e9d5ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-55" y1="40" x2="-70" y2="60" stroke="#c084fc" stroke-width="1.2"/>

      <polyline points="-92,-2 -65,-5 -35,-10" fill="none" stroke="#f5f3ff" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Secondary cracks -->
      <line x1="-85" y1="-25" x2="-50" y2="-30" stroke="#c084fc" stroke-width="1"/>
      <line x1="-85" y1="22" x2="-48" y2="20" stroke="#c084fc" stroke-width="1"/>
      <line x1="-40" y1="-60" x2="-15" y2="-55" stroke="#a855f7" stroke-width="0.8"/>
      <line x1="-35" y1="70" x2="-10" y2="65" stroke="#a855f7" stroke-width="0.8"/>

      <!-- Micro cracks -->
      <line x1="-70" y1="-15" x2="-50" y2="-45" stroke="#a855f7" stroke-width="0.6"/>
      <line x1="-72" y1="12" x2="-55" y2="30" stroke="#a855f7" stroke-width="0.6"/>
    </g>

    <!-- Shatter fragments floating away - bigger and more visible -->
    <g opacity="0.5">
      <polygon points="-100,-20 -118,-30 -110,-45 -95,-35" fill="#2d3748" stroke="#6b7280" stroke-width="0.8"/>
      <polygon points="-95,25 -115,20 -112,38 -98,35" fill="#2d3748" stroke="#6b7280" stroke-width="0.8"/>
      <polygon points="-108,-5 -128,-12 -125,5 -110,3" fill="#374151" stroke="#6b7280" stroke-width="0.6"/>
      <polygon points="-88,-45 -102,-55 -96,-62" fill="#374151" stroke="#4b5563" stroke-width="0.5"/>
      <polygon points="-85,48 -100,55 -95,65" fill="#374151" stroke="#4b5563" stroke-width="0.5"/>
      <!-- Tiny debris -->
      <rect x="-120" y="-42" width="4" height="3" fill="#4b5563" transform="rotate(25,-118,-40)" opacity="0.4"/>
      <rect x="-125" y="10" width="5" height="3" fill="#4b5563" transform="rotate(-15,-122,12)" opacity="0.4"/>
      <rect x="-115" y="42" width="3" height="4" fill="#4b5563" transform="rotate(40,-113,44)" opacity="0.3"/>
    </g>

    <!-- 397B label - with strikethrough effect -->
    <text x="20" y="5" font-family="'Noto Sans CJK SC', sans-serif" font-size="36" font-weight="700" fill="#4b5563" text-anchor="middle" opacity="0.4">397B</text>
    <line x1="-15" y1="0" x2="55" y2="0" stroke="#6b7280" stroke-width="1.5" opacity="0.3"/>
    <text x="20" y="25" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle" opacity="0.35">MoE</text>
  </g>

  <!-- === Impact zone - energy burst === -->
  <g transform="translate(525, 190)">
    <!-- Outer impact ring -->
    <circle cx="0" cy="0" r="70" fill="url(#impactGrad)" filter="url(#strongGlow)" opacity="0.5"/>
    <circle cx="0" cy="0" r="35" fill="url(#impactGrad)" opacity="0.4"/>

    <!-- Energy rays - more dynamic -->
    <g opacity="0.6" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round">
      <line x1="-25" y1="-35" x2="-45" y2="-65"/>
      <line x1="5" y1="-40" x2="10" y2="-72"/>
      <line x1="30" y1="-30" x2="55" y2="-55"/>
      <line x1="-25" y1="35" x2="-45" y2="65"/>
      <line x1="5" y1="40" x2="10" y2="72"/>
      <line x1="30" y1="30" x2="55" y2="55"/>
      <line x1="-40" y1="0" x2="-65" y2="-5"/>
      <line x1="40" y1="0" x2="68" y2="3"/>
      <line x1="-15" y1="-38" x2="-30" y2="-70"/>
      <line x1="-15" y1="38" x2="-30" y2="70"/>
      <line x1="40" y1="-18" x2="62" y2="-35"/>
      <line x1="40" y1="18" x2="62" y2="35"/>
    </g>

    <!-- Impact sparks -->
    <g opacity="0.7">
      <circle cx="-35" cy="-50" r="2" fill="#e9d5ff"/>
      <circle cx="40" cy="-42" r="1.5" fill="#c084fc"/>
      <circle cx="-38" cy="48" r="1.8" fill="#e9d5ff"/>
      <circle cx="48" cy="40" r="1.5" fill="#c084fc"/>
      <circle cx="-52" cy="-8" r="1.2" fill="#e9d5ff"/>
      <circle cx="55" cy="5" r="1.3" fill="#c084fc"/>
    </g>
  </g>

  <!-- === LEFT-CENTER: Small model (27B) - bright, powerful === -->
  <g transform="translate(420, 190)">
    <!-- Outer energy glow - stronger -->
    <circle cx="0" cy="0" r="85" fill="url(#smallGlow)" filter="url(#strongGlow)" opacity="0.45"/>

    <!-- Core sphere rings -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#a855f7" stroke-width="2.5" filter="url(#glowSmall)"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#c084fc" stroke-width="1.8" opacity="0.7"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#e9d5ff" stroke-width="1" opacity="0.5"/>

    <!-- Inner bright core - more intense -->
    <circle cx="0" cy="0" r="18" fill="#a855f7" opacity="0.4" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="10" fill="#c084fc" opacity="0.7" filter="url(#glowSmall)"/>
    <circle cx="0" cy="0" r="4" fill="#f5f3ff" opacity="1"/>

    <!-- Orbital rings suggesting hybrid architecture -->
    <ellipse cx="0" cy="0" rx="60" ry="18" fill="none" stroke="#a855f7" stroke-width="1.2" opacity="0.45" transform="rotate(-25)"/>
    <ellipse cx="0" cy="0" rx="60" ry="18" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.35" transform="rotate(35)"/>
    <ellipse cx="0" cy="0" rx="60" ry="18" fill="none" stroke="#818cf8" stroke-width="0.6" opacity="0.2" transform="rotate(80)"/>

    <!-- 27B label -->
    <text x="0" y="6" font-family="'Noto Sans CJK SC', sans-serif" font-size="24" font-weight="800" fill="#f5f3ff" text-anchor="middle" filter="url(#textGlow)">27B</text>
    <text x="0" y="22" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#c084fc" text-anchor="middle" opacity="0.7">Dense</text>
  </g>

  <!-- === BOTTOM: Hybrid Architecture Visualization === -->
  <!-- 3:1 ratio bar: 75% DeltaNet + 25% GQA -->
  <g transform="translate(70, 308)">
    <!-- Architecture bar background -->
    <rect x="0" y="0" width="370" height="30" rx="4" fill="#0f0520" stroke="#2d1b4e" stroke-width="1"/>

    <!-- DeltaNet blocks (75% = 3 blocks) -->
    <rect x="3" y="3" width="85" height="24" rx="3" fill="url(#deltaGrad)" opacity="0.9"/>
    <rect x="91" y="3" width="85" height="24" rx="3" fill="url(#deltaGrad)" opacity="0.9"/>
    <rect x="179" y="3" width="85" height="24" rx="3" fill="url(#deltaGrad)" opacity="0.9"/>

    <!-- GQA block (25% = 1 block) -->
    <rect x="267" y="3" width="85" height="24" rx="3" fill="url(#gqaGrad)" opacity="0.9"/>

    <!-- Fade-out repeat hint -->
    <rect x="355" y="3" width="6" height="24" rx="2" fill="url(#deltaGrad)" opacity="0.3"/>
    <rect x="363" y="3" width="4" height="24" rx="1" fill="url(#deltaGrad)" opacity="0.15"/>

    <!-- Block labels -->
    <text x="133" y="20" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#f5f3ff" text-anchor="middle" font-weight="600">Gated DeltaNet x 3</text>
    <text x="309" y="20" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#f0fdfa" text-anchor="middle" font-weight="600">GQA x 1</text>

    <!-- Labels below -->
    <text x="133" y="50" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#a855f7" text-anchor="middle" opacity="0.65">75% 线性注意力</text>
    <text x="309" y="50" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle" opacity="0.65">25% 标准注意力</text>
  </g>

  <!-- KV Cache reduction indicator -->
  <g transform="translate(500, 316)">
    <rect x="-5" y="-14" width="155" height="26" rx="4" fill="#0f0520" stroke="#2d1b4e" stroke-width="0.8" opacity="0.6"/>
    <text x="5" y="4" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#9ca3af" font-weight="500">KV Cache</text>
    <text x="80" y="4" font-family="'Noto Sans CJK SC', sans-serif" font-size="14" fill="#c084fc" font-weight="800">-75%</text>
    <polygon points="122,-4 128,4 134,-4" fill="#c084fc" opacity="0.7"/>
  </g>

  <!-- "先擦后写" concept tag -->
  <g transform="translate(500, 350)">
    <text x="0" y="14" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#818cf8" opacity="0.45">记忆机制：先擦后写</text>
  </g>

  <!-- === TITLE TEXT === -->
  <g>
    <!-- Qwen3.6 badge -->
    <rect x="40" y="25" width="115" height="32" rx="16" fill="#1a0a2e" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
    <text x="97" y="47" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#c084fc" text-anchor="middle" font-weight="700">Qwen3.6</text>

    <!-- Main title - "27B 打赢 397B" with emphasis -->
    <text x="170" y="50" font-family="'Noto Sans CJK SC', sans-serif" font-size="30" fill="#f5f3ff" font-weight="800">27B</text>
    <text x="240" y="50" font-family="'Noto Sans CJK SC', sans-serif" font-size="30" fill="#c084fc" font-weight="800" filter="url(#titleGlow)">打赢</text>
    <text x="318" y="50" font-family="'Noto Sans CJK SC', sans-serif" font-size="30" fill="#6b7280" font-weight="800">397B</text>

    <!-- Subtitle -->
    <text x="45" y="85" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#a78bfa" opacity="0.75" font-weight="500">阿里这一代到底改了什么</text>
  </g>

  <!-- "Dense vs MoE" tag - top right -->
  <g transform="translate(530, 28)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#1a0a2e" stroke="#7c3aed" stroke-width="1.2" opacity="0.7"/>
    <text x="45" y="17" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#c084fc" text-anchor="middle" font-weight="600">Dense</text>

    <text x="104" y="18" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#4b5563" text-anchor="middle">vs</text>

    <rect x="118" y="0" width="80" height="26" rx="13" fill="#0f0520" stroke="#374151" stroke-width="0.8" opacity="0.4"/>
    <text x="158" y="17" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle" text-decoration="line-through">MoE</text>
  </g>

  <!-- Decorative corner elements -->
  <g opacity="0.12" stroke="#a855f7" stroke-width="1">
    <line x1="15" y1="15" x2="55" y2="15"/>
    <line x1="15" y1="15" x2="15" y2="55"/>
    <line x1="885" y1="15" x2="845" y2="15"/>
    <line x1="885" y1="15" x2="885" y2="55"/>
    <line x1="15" y1="368" x2="55" y2="368"/>
    <line x1="15" y1="368" x2="15" y2="328"/>
    <line x1="885" y1="368" x2="845" y2="368"/>
    <line x1="885" y1="368" x2="885" y2="328"/>
  </g>

  <!-- Bottom decorative line -->
  <line x1="50" y1="295" x2="850" y2="295" stroke="#2d1b4e" stroke-width="0.5" opacity="0.4"/>
</svg>
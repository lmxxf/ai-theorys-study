<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" font-family="Noto Sans CJK SC, sans-serif">

  <defs>
    <marker id="axisArr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#888" stroke-width="1"/>
    </marker>
    <marker id="vecArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#ff7043" stroke-width="1.5"/>
    </marker>
    <marker id="oneArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#ef5350" stroke-width="1.5"/>
    </marker>
    <radialGradient id="sGrad">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="840" height="420" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="420" y="32" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="bold">RMSNorm vs LayerNorm 的几何约束（三维示意）</text>

  <!-- ==================== LEFT: RMSNorm ==================== -->
  <text x="200" y="62" text-anchor="middle" fill="#4fc3f7" font-size="15" font-weight="bold">RMSNorm → S²（完整球面）</text>
  <text x="200" y="80" text-anchor="middle" fill="#888" font-size="11">只除模长，向量可以指向任意方向</text>

  <!-- Axes -->
  <line x1="200" y1="240" x2="310" y2="290" stroke="#888" stroke-width="1" marker-end="url(#axisArr)"/>
  <text x="318" y="295" fill="#888" font-size="11">x₁</text>
  <line x1="200" y1="240" x2="90" y2="290" stroke="#888" stroke-width="1" marker-end="url(#axisArr)"/>
  <text x="78" y="295" fill="#888" font-size="11">x₂</text>
  <line x1="200" y1="240" x2="200" y2="110" stroke="#888" stroke-width="1" marker-end="url(#axisArr)"/>
  <text x="210" y="108" fill="#888" font-size="11">x₃</text>

  <!-- Sphere -->
  <ellipse cx="200" cy="230" rx="115" ry="115" fill="url(#sGrad)"/>
  <ellipse cx="200" cy="230" rx="115" ry="115" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.35"/>
  <!-- Equator -->
  <ellipse cx="200" cy="230" rx="115" ry="33" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <!-- Meridian -->
  <ellipse cx="200" cy="230" rx="33" ry="115" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>

  <!-- Sample vectors on sphere -->
  <line x1="200" y1="230" x2="285" y2="175" stroke="#ff7043" stroke-width="2" marker-end="url(#vecArr)"/>
  <line x1="200" y1="230" x2="130" y2="135" stroke="#ff7043" stroke-width="2" marker-end="url(#vecArr)"/>
  <line x1="200" y1="230" x2="255" y2="310" stroke="#ff7043" stroke-width="2" marker-end="url(#vecArr)"/>
  <line x1="200" y1="230" x2="105" y2="270" stroke="#ff7043" stroke-width="2" marker-end="url(#vecArr)"/>
  <circle cx="285" cy="175" r="3.5" fill="#ff7043"/>
  <circle cx="130" cy="135" r="3.5" fill="#ff7043"/>
  <circle cx="255" cy="310" r="3.5" fill="#ff7043"/>
  <circle cx="105" cy="270" r="3.5" fill="#ff7043"/>

  <!-- Label -->
  <text x="200" y="378" text-anchor="middle" fill="#4fc3f7" font-size="12">整个球面都可以用</text>
  <text x="200" y="396" text-anchor="middle" fill="#4fc3f7" font-size="12">d-1 个自由度</text>

  <!-- ==================== RIGHT: LayerNorm ==================== -->
  <text x="620" y="62" text-anchor="middle" fill="#ab47bc" font-size="15" font-weight="bold">LayerNorm → S¹（球面上的圆环）</text>
  <text x="620" y="80" text-anchor="middle" fill="#888" font-size="11">减均值砍掉 [1,1,1] 方向，再归一化</text>

  <!-- Axes -->
  <line x1="620" y1="240" x2="730" y2="290" stroke="#888" stroke-width="1" marker-end="url(#axisArr)"/>
  <text x="738" y="295" fill="#888" font-size="11">x₁</text>
  <line x1="620" y1="240" x2="510" y2="290" stroke="#888" stroke-width="1" marker-end="url(#axisArr)"/>
  <text x="498" y="295" fill="#888" font-size="11">x₂</text>
  <line x1="620" y1="240" x2="620" y2="110" stroke="#888" stroke-width="1" marker-end="url(#axisArr)"/>
  <text x="630" y="108" fill="#888" font-size="11">x₃</text>

  <!-- [1,1,1] direction (diagonal, going up-right) -->
  <line x1="620" y1="240" x2="680" y2="138" stroke="#ef5350" stroke-width="2.5" marker-end="url(#oneArr)"/>
  <text x="690" y="133" fill="#ef5350" font-size="13" font-weight="bold">[1,1,1]</text>

  <!-- Sphere (faded) -->
  <ellipse cx="620" cy="230" rx="115" ry="115" fill="none" stroke="#666" stroke-width="1" opacity="0.15" stroke-dasharray="5,4"/>

  <!-- Hyperplane Σxi=0 (tilted to look 3D, perpendicular to [1,1,1]) -->
  <polygon points="505,155 735,155 735,310 505,310" fill="#ab47bc" fill-opacity="0.06" stroke="#ab47bc" stroke-width="1" stroke-opacity="0.25"/>
  <text x="745" y="165" fill="#ab47bc" font-size="10" opacity="0.7">x₁+x₂+x₃=0</text>

  <!-- Circle = intersection (tilted ellipse) -->
  <ellipse cx="620" cy="232" rx="105" ry="30" fill="none" stroke="#ab47bc" stroke-width="2.5"/>

  <!-- Vectors constrained to circle -->
  <line x1="620" y1="232" x2="715" y2="218" stroke="#ff7043" stroke-width="2" marker-end="url(#vecArr)"/>
  <line x1="620" y1="232" x2="525" y2="218" stroke="#ff7043" stroke-width="2" marker-end="url(#vecArr)"/>
  <line x1="620" y1="232" x2="675" y2="258" stroke="#ff7043" stroke-width="2" marker-end="url(#vecArr)"/>
  <line x1="620" y1="232" x2="555" y2="252" stroke="#ff7043" stroke-width="2" marker-end="url(#vecArr)"/>
  <circle cx="715" cy="218" r="3.5" fill="#ff7043"/>
  <circle cx="525" cy="218" r="3.5" fill="#ff7043"/>
  <circle cx="675" cy="258" r="3.5" fill="#ff7043"/>
  <circle cx="555" cy="252" r="3.5" fill="#ff7043"/>

  <!-- Cross on [1,1,1] -->
  <line x1="668" y1="138" x2="684" y2="152" stroke="#ef5350" stroke-width="2.5"/>
  <line x1="684" y1="138" x2="668" y2="152" stroke="#ef5350" stroke-width="2.5"/>

  <!-- Annotation: perpendicular symbol -->
  <text x="652" y="178" fill="#ef5350" font-size="14">⊥</text>

  <!-- Label -->
  <text x="620" y="378" text-anchor="middle" fill="#ab47bc" font-size="12">只能在圆环上活动</text>
  <text x="620" y="396" text-anchor="middle" fill="#ab47bc" font-size="12">d-2 个自由度（[1,1,1] 方向被砍）</text>

  <!-- Divider -->
  <line x1="420" y1="55" x2="420" y2="400" stroke="#444" stroke-width="1" stroke-dasharray="4,6"/>

</svg>

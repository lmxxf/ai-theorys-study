<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#121e36"/>
    </linearGradient>
    <linearGradient id="cellFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1a2a4a;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="blankFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a1a;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#3a2020;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid lines -->
  <line x1="180" y1="60" x2="180" y2="370" stroke="#2a3a5a" stroke-width="1"/>
  <line x1="440" y1="60" x2="440" y2="370" stroke="#2a3a5a" stroke-width="1"/>
  <line x1="100" y1="120" x2="680" y2="120" stroke="#2a3a5a" stroke-width="1"/>
  <line x1="100" y1="240" x2="680" y2="240" stroke="#2a3a5a" stroke-width="1"/>

  <!-- Column headers -->
  <text x="310" y="48" text-anchor="middle" fill="#6a8abf" font-size="15" font-weight="bold">模型结构</text>
  <text x="560" y="48" text-anchor="middle" fill="#6a8abf" font-size="15" font-weight="bold">数据格式</text>

  <!-- Axis label: 改什么 → -->
  <text x="440" y="90" text-anchor="middle" fill="#4a6a9f" font-size="11" opacity="0.7">改什么 →</text>

  <!-- Row headers -->
  <text x="140" y="170" text-anchor="middle" fill="#6a8abf" font-size="14" font-weight="bold">任务间</text>
  <text x="140" y="192" text-anchor="middle" fill="#4a6a9f" font-size="11">（不同任务）</text>

  <text x="140" y="300" text-anchor="middle" fill="#6a8abf" font-size="14" font-weight="bold">任务内</text>
  <text x="140" y="322" text-anchor="middle" fill="#4a6a9f" font-size="11">（同任务不同样本）</text>

  <!-- Axis label: 粒度 ↓ -->
  <text x="105" y="240" text-anchor="middle" fill="#4a6a9f" font-size="11" opacity="0.7" transform="rotate(-90, 105, 240)">粒度 ↓</text>

  <!-- Cell 1: Top-Left (HydraLoRA) -->
  <rect x="190" y="130" width="240" height="100" rx="8" fill="url(#cellFill)" stroke="#2a4a7a" stroke-width="1"/>
  <text x="310" y="168" text-anchor="middle" fill="#7ab8f5" font-size="16" font-weight="bold">HydraLoRA</text>
  <text x="310" y="192" text-anchor="middle" fill="#5a8abf" font-size="12">多头路由 · MoE分流</text>
  <circle cx="205" cy="145" r="4" fill="#3a6a9f" opacity="0.5"/>
  <circle cx="415" cy="215" r="3" fill="#3a6a9f" opacity="0.3"/>

  <!-- Cell 2: Top-Right (Data Mixing / Flan) -->
  <rect x="450" y="130" width="220" height="100" rx="8" fill="url(#cellFill)" stroke="#2a4a7a" stroke-width="1"/>
  <text x="560" y="165" text-anchor="middle" fill="#7ab8f5" font-size="16" font-weight="bold">Data Mixing</text>
  <text x="560" y="189" text-anchor="middle" fill="#5a8abf" font-size="12">混合比例优化</text>
  <text x="560" y="215" text-anchor="middle" fill="#5a8abf" font-size="12">+ Flan Collection</text>
  <circle cx="655" cy="145" r="3" fill="#3a6a9f" opacity="0.3"/>

  <!-- Cell 3: Bottom-Left (COLA, DS-LoRA) -->
  <rect x="190" y="250" width="240" height="100" rx="8" fill="url(#cellFill)" stroke="#2a4a7a" stroke-width="1"/>
  <text x="310" y="288" text-anchor="middle" fill="#7ab8f5" font-size="16" font-weight="bold">COLA · DS-LoRA</text>
  <text x="310" y="312" text-anchor="middle" fill="#5a8abf" font-size="12">链式叠加 · 动态稀疏</text>
  <circle cx="205" cy="335" r="3" fill="#3a6a9f" opacity="0.3"/>

  <!-- Cell 4: Bottom-Right (??? / Our work) -->
  <rect x="450" y="250" width="220" height="100" rx="8" fill="url(#blankFill)" stroke="#e8654a" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Question marks with glow -->
  <text x="560" y="290" text-anchor="middle" fill="#e8654a" font-size="32" font-weight="bold" filter="url(#glow)" opacity="0.9">???</text>

  <!-- Our label -->
  <text x="560" y="322" text-anchor="middle" fill="#e8654a" font-size="11" font-weight="bold">非对称分析架构</text>
  <text x="560" y="338" text-anchor="middle" fill="#c85a3a" font-size="10">（指标提取实验）</text>

  <!-- Bottom annotation -->
  <text x="350" y="388" text-anchor="middle" fill="#4a6a8f" font-size="11" opacity="0.6">右下角——"同一任务内，不同样本用不同数据格式"——尚未被系统研究</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Noto Sans CJK SC', sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">eRank vs TwoNN：两把尺子量的不是同一个东西</text>

  <!-- Left panel: eRank -->
  <rect x="30" y="60" width="400" height="400" rx="12" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="230" y="95" text-anchor="middle" fill="#4fc3f7" font-size="16" font-weight="bold">eRank = 量包围盒</text>
  <text x="230" y="118" text-anchor="middle" fill="#90a4ae" font-size="12">"线性独立方向有几个"</text>

  <!-- Left: bounding box with curved data inside -->
  <rect x="80" y="140" width="300" height="280" rx="4" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="230" y="160" text-anchor="middle" fill="#4fc3f7" font-size="11">包围盒（eRank ≈ 满秩）</text>

  <!-- Curved manifold (S-curve) inside the box -->
  <path d="M 120 380 C 140 380, 150 300, 180 280 C 210 260, 220 200, 250 220 C 280 240, 300 180, 330 200 C 360 220, 370 300, 340 350"
        fill="none" stroke="#ff6b6b" stroke-width="3"/>

  <!-- Data points along the curve -->
  <circle cx="125" cy="375" r="4" fill="#ffab40"/>
  <circle cx="150" cy="340" r="4" fill="#ffab40"/>
  <circle cx="170" cy="295" r="4" fill="#ffab40"/>
  <circle cx="185" cy="275" r="4" fill="#ffab40"/>
  <circle cx="210" cy="260" r="4" fill="#ffab40"/>
  <circle cx="230" cy="235" r="4" fill="#ffab40"/>
  <circle cx="250" cy="220" r="4" fill="#ffab40"/>
  <circle cx="275" cy="230" r="4" fill="#ffab40"/>
  <circle cx="300" cy="195" r="4" fill="#ffab40"/>
  <circle cx="320" cy="200" r="4" fill="#ffab40"/>
  <circle cx="335" cy="225" r="4" fill="#ffab40"/>
  <circle cx="340" cy="280" r="4" fill="#ffab40"/>
  <circle cx="338" cy="330" r="4" fill="#ffab40"/>

  <!-- Arrows showing full span -->
  <line x1="75" y1="420" x2="385" y2="420" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="385" y1="420" x2="75" y2="420" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="230" y="440" text-anchor="middle" fill="#4fc3f7" font-size="12">eRank 结论：≈ 满秩（3558）</text>

  <!-- Right panel: TwoNN -->
  <rect x="470" y="60" width="400" height="400" rx="12" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" fill="#66bb6a" font-size="16" font-weight="bold">TwoNN = 量流形本身</text>
  <text x="670" y="118" text-anchor="middle" fill="#90a4ae" font-size="12">"数据沿着几维的曲面分布"</text>

  <!-- Right: same curve but with local neighborhood circles -->
  <path d="M 560 380 C 580 380, 590 300, 620 280 C 650 260, 660 200, 690 220 C 720 240, 740 180, 770 200 C 800 220, 810 300, 780 350"
        fill="none" stroke="#ff6b6b" stroke-width="3"/>

  <!-- Data points along the curve -->
  <circle cx="565" cy="375" r="4" fill="#ffab40"/>
  <circle cx="590" cy="340" r="4" fill="#ffab40"/>
  <circle cx="610" cy="295" r="4" fill="#ffab40"/>
  <circle cx="625" cy="275" r="4" fill="#ffab40"/>
  <circle cx="650" cy="260" r="4" fill="#ffab40"/>
  <circle cx="670" cy="235" r="4" fill="#ffab40"/>
  <circle cx="690" cy="220" r="4" fill="#ffab40"/>
  <circle cx="715" cy="230" r="4" fill="#ffab40"/>
  <circle cx="740" cy="195" r="4" fill="#ffab40"/>
  <circle cx="760" cy="200" r="4" fill="#ffab40"/>
  <circle cx="775" cy="225" r="4" fill="#ffab40"/>
  <circle cx="780" cy="280" r="4" fill="#ffab40"/>
  <circle cx="778" cy="330" r="4" fill="#ffab40"/>

  <!-- Local neighborhood circles -->
  <circle cx="670" cy="235" r="35" fill="none" stroke="#66bb6a" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="740" cy="195" r="35" fill="none" stroke="#66bb6a" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <circle cx="590" cy="340" r="35" fill="none" stroke="#66bb6a" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- r1, r2 lines from center point -->
  <line x1="670" y1="235" x2="690" y2="220" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="685" y="215" fill="#e0e0e0" font-size="10">r₁</text>
  <line x1="670" y1="235" x2="650" y2="260" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="645" y="255" fill="#e0e0e0" font-size="10">r₂</text>

  <!-- Label: local flat -->
  <text x="670" y="285" text-anchor="middle" fill="#66bb6a" font-size="10">局部近似平坦</text>

  <!-- Arrow along curve -->
  <path d="M 560 395 C 600 395, 700 395, 790 395" fill="none" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="670" y="440" text-anchor="middle" fill="#66bb6a" font-size="12">TwoNN 结论：≈ 92 维（沿曲面）</text>

  <!-- Bottom comparison -->
  <text x="450" y="485" text-anchor="middle" fill="#ffab40" font-size="14">同一组数据 · 差 10-25 倍 · 因为问的问题不同</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4fc3f7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#66bb6a"/>
    </marker>
  </defs>
</svg>

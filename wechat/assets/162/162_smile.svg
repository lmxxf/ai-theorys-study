<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="smileGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="35%" stop-color="#ffd93d"/>
      <stop offset="50%" stop-color="#6bcb77"/>
      <stop offset="65%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="flatGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="42" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">波动率微笑（Volatility Smile）</text>
  <text x="400" y="68" text-anchor="middle" fill="#aaaacc" font-size="14">理论说是平的，现实却在笑</text>

  <!-- 坐标轴 -->
  <line x1="120" y1="400" x2="720" y2="400" stroke="#555577" stroke-width="1.5"/>
  <line x1="120" y1="100" x2="120" y2="400" stroke="#555577" stroke-width="1.5"/>

  <!-- Y轴标签 -->
  <text x="55" y="260" text-anchor="middle" fill="#aaaacc" font-size="14" transform="rotate(-90, 55, 260)">隐含波动率 (IV)</text>
  <text x="105" y="140" text-anchor="end" fill="#888899" font-size="12">高</text>
  <text x="105" y="380" text-anchor="end" fill="#888899" font-size="12">低</text>

  <!-- X轴标签 -->
  <text x="420" y="440" text-anchor="middle" fill="#aaaacc" font-size="14">行权价 (Strike)</text>

  <!-- X轴刻度 -->
  <text x="180" y="425" text-anchor="middle" fill="#888899" font-size="11">深度虚值Put</text>
  <text x="420" y="425" text-anchor="middle" fill="#888899" font-size="11">ATM（平值）</text>
  <text x="660" y="425" text-anchor="middle" fill="#888899" font-size="11">深度虚值Call</text>

  <!-- ATM 虚线 -->
  <line x1="420" y1="105" x2="420" y2="395" stroke="#555577" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Black-Scholes 理论线（平线） -->
  <line x1="140" y1="290" x2="700" y2="290" stroke="url(#flatGrad)" stroke-width="2.5" stroke-dasharray="10,6" opacity="0.7"/>
  <text x="695" y="310" fill="#4ecdc4" font-size="12" opacity="0.8" text-anchor="end">理论（BS模型）</text>

  <!-- 实际微笑曲线 -->
  <path d="M 140,170 C 200,200 280,300 340,320 C 380,330 400,335 420,337 C 440,335 460,330 500,320 C 560,295 640,220 700,160"
        stroke="url(#smileGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- 微笑曲线填充（半透明） -->
  <path d="M 140,170 C 200,200 280,300 340,320 C 380,330 400,335 420,337 C 440,335 460,330 500,320 C 560,295 640,220 700,160 L 700,400 L 140,400 Z"
        fill="url(#smileGrad)" opacity="0.06"/>

  <!-- 标注：左翼 -->
  <line x1="170" y1="180" x2="210" y2="145" stroke="#ff6b6b" stroke-width="1" opacity="0.8"/>
  <rect x="145" y="112" width="130" height="30" rx="6" fill="#ff6b6b" opacity="0.15"/>
  <text x="210" y="133" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">恐惧暴跌 😱</text>

  <!-- 标注：右翼 -->
  <line x1="670" y1="175" x2="630" y2="140" stroke="#ff6b6b" stroke-width="1" opacity="0.8"/>
  <rect x="555" y="107" width="150" height="30" rx="6" fill="#ff6b6b" opacity="0.15"/>
  <text x="630" y="128" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">FOMO / 恐惧踏空</text>

  <!-- 标注：底部 -->
  <line x1="420" y1="337" x2="420" y2="365" stroke="#6bcb77" stroke-width="1" opacity="0.8"/>
  <rect x="350" y="355" width="140" height="26" rx="6" fill="#6bcb77" opacity="0.15"/>
  <text x="420" y="374" text-anchor="middle" fill="#6bcb77" font-size="13" font-weight="bold">最便宜（ATM）</text>

  <!-- 图例 -->
  <rect x="160" y="455" width="480" height="30" rx="8" fill="#ffffff" opacity="0.05"/>
  <line x1="200" y1="470" x2="240" y2="470" stroke="url(#smileGrad)" stroke-width="3"/>
  <text x="250" y="475" fill="#ccccdd" font-size="12">实际隐含波动率</text>
  <line x1="430" y1="470" x2="470" y2="470" stroke="#4ecdc4" stroke-width="2.5" stroke-dasharray="10,6" opacity="0.7"/>
  <text x="480" y="475" fill="#ccccdd" font-size="12">BS 模型理论值（平的）</text>
</svg>

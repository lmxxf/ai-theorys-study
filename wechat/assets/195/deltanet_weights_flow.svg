<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 580" font-family="Noto Sans CJK SC, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <rect width="620" height="580" fill="#fafafa" rx="6"/>

  <!-- 隐状态 -->
  <rect x="220" y="20" width="180" height="36" rx="5" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="310" y="43" text-anchor="middle" font-size="14" fill="#312e81">隐状态 h（5120 维）</text>

  <!-- 箭头 h → 三路分叉 -->
  <line x1="310" y1="56" x2="310" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- 三路并行框 -->
  <rect x="20" y="88" width="580" height="120" rx="6" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="30" y="104" font-size="10" fill="#999">三路并行投影</text>

  <!-- 左: in_proj_qkv -->
  <rect x="40" y="115" width="150" height="75" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="115" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">in_proj_qkv</text>
  <text x="115" y="152" text-anchor="middle" font-size="10" fill="#2563eb">[10240, 5120]</text>
  <text x="115" y="168" text-anchor="middle" font-size="10" fill="#1e40af">→ Q, K(k_t), V(v_t)</text>
  <text x="115" y="183" text-anchor="middle" font-size="9" fill="#666">过 conv1d 混合局部 4 token</text>

  <!-- 中: in_proj_a + A_log -->
  <rect x="220" y="115" width="180" height="75" rx="5" fill="#fce7f3" stroke="#db2777" stroke-width="1.2"/>
  <text x="310" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d">in_proj_a + A_log</text>
  <text x="310" y="152" text-anchor="middle" font-size="10" fill="#db2777">[48, 5120] + [48]</text>
  <text x="310" y="168" text-anchor="middle" font-size="10" fill="#9d174d">→ a_t → exp(...)公式</text>
  <text x="310" y="183" text-anchor="middle" font-size="10" font-weight="bold" fill="#db2777">= 公式里的 α</text>

  <!-- 右: in_proj_b -->
  <rect x="430" y="115" width="150" height="75" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1.2"/>
  <text x="505" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">in_proj_b</text>
  <text x="505" y="152" text-anchor="middle" font-size="10" fill="#059669">[48, 5120]</text>
  <text x="505" y="168" text-anchor="middle" font-size="10" fill="#065f46">→ b_t → sigmoid</text>
  <text x="505" y="183" text-anchor="middle" font-size="10" font-weight="bold" fill="#059669">= 公式里的 β</text>

  <!-- 三路汇合箭头 -->
  <line x1="115" y1="190" x2="310" y2="240" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="310" y1="190" x2="310" y2="240" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="505" y1="190" x2="310" y2="240" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- 汇合标签 -->
  <text x="310" y="232" text-anchor="middle" font-size="10" fill="#888">三路汇入</text>

  <!-- 核心公式 -->
  <rect x="80" y="248" width="460" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="310" y="270" text-anchor="middle" font-size="14" fill="#f8fafc" font-weight="bold">S_t = α · S_(t-1) + β · (v_t - S_(t-1) · k_t) · k_t^T</text>
  <text x="310" y="290" text-anchor="middle" font-size="11" fill="#94a3b8">状态矩阵更新（每个 head 独立，128×128）</text>

  <!-- 箭头 公式 → 输出门 -->
  <line x1="310" y1="298" x2="310" y2="340" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="310" y="332" text-anchor="middle" font-size="10" fill="#888">查询：o_t = S_t · q_t</text>

  <!-- 输出门 in_proj_z -->
  <rect x="170" y="348" width="280" height="45" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="310" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">in_proj_z（输出门）</text>
  <text x="310" y="385" text-anchor="middle" font-size="10" fill="#ca8a04">[6144, 5120]  决定"这次输出多少"</text>

  <!-- 箭头 → out_proj -->
  <line x1="310" y1="393" x2="310" y2="425" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- out_proj -->
  <rect x="170" y="433" width="280" height="45" rx="5" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="310" y="453" text-anchor="middle" font-size="12" font-weight="bold" fill="#312e81">out_proj（回残差流）</text>
  <text x="310" y="470" text-anchor="middle" font-size="10" fill="#6366f1">[5120, 6144]  投射回残差流，进下一层</text>

  <!-- 箭头 → 下一层 -->
  <line x1="310" y1="478" x2="310" y2="510" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="310" y="528" text-anchor="middle" font-size="12" fill="#555">→ 残差流 → 下一层</text>

  <!-- 左侧注释：h 也进入 in_proj_z -->
  <path d="M220,38 Q10,38 10,368 L170,368" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="10" y="210" font-size="9" fill="#999" transform="rotate(-90,10,210)">h 也输入到 in_proj_z</text>
</svg>
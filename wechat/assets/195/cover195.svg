<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="45%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1a30"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>

    <!-- Warm curved surface gradient -->
    <linearGradient id="surfaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffa500" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#ffcc00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Ruler gradient -->
    <linearGradient id="rulerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b0ccec"/>
      <stop offset="50%" stop-color="#dce8ff"/>
      <stop offset="100%" stop-color="#94b8d8"/>
    </linearGradient>

    <!-- Glow filter for the ruler -->
    <filter id="rulerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for the curved surface -->
    <filter id="surfaceGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ff8c00" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern for background -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#152040" stroke-width="0.5" opacity="0.5"/>
    </pattern>

    <!-- Mismatch sparks filter -->
    <filter id="spark">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <rect width="900" height="500" fill="url(#grid)"/>

  <!-- ===== LEFT SIDE: RULER (Rank-1 Linear Projection) ===== -->
  <g transform="translate(80, 120) rotate(-12)">
    <!-- Ruler shadow -->
    <rect x="3" y="3" width="300" height="48" rx="3" ry="3" fill="#000" opacity="0.3"/>
    <!-- Ruler body -->
    <rect x="0" y="0" width="300" height="48" rx="3" ry="3" fill="url(#rulerGrad)" filter="url(#rulerGlow)" opacity="0.92"/>
    <!-- Ruler edge (measuring side) -->
    <line x1="0" y1="48" x2="300" y2="48" stroke="#3070b0" stroke-width="2.5"/>
    <!-- Tick marks -->
    <g stroke="#2855a0" stroke-width="1.2">
      <line x1="20" y1="33" x2="20" y2="48"/>
      <line x1="40" y1="38" x2="40" y2="48"/>
      <line x1="60" y1="33" x2="60" y2="48"/>
      <line x1="80" y1="38" x2="80" y2="48"/>
      <line x1="100" y1="33" x2="100" y2="48"/>
      <line x1="120" y1="38" x2="120" y2="48"/>
      <line x1="140" y1="33" x2="140" y2="48"/>
      <line x1="160" y1="38" x2="160" y2="48"/>
      <line x1="180" y1="33" x2="180" y2="48"/>
      <line x1="200" y1="38" x2="200" y2="48"/>
      <line x1="220" y1="33" x2="220" y2="48"/>
      <line x1="240" y1="38" x2="240" y2="48"/>
      <line x1="260" y1="33" x2="260" y2="48"/>
      <line x1="280" y1="38" x2="280" y2="48"/>
    </g>
    <!-- Label on ruler -->
    <text x="150" y="22" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#1a408c" font-weight="bold" letter-spacing="1">rank-1</text>
  </g>

  <!-- Left side annotations -->
  <text x="130" y="290" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#70a8d0" opacity="0.85" text-anchor="middle" font-weight="bold">&#x7EBF;&#x6027;&#x9012;&#x63A8;</text>
  <text x="130" y="312" font-family="'Courier New', monospace" font-size="11" fill="#4070a0" opacity="0.6" text-anchor="middle">Linear Recurrence</text>
  <text x="130" y="335" font-family="'Courier New', monospace" font-size="11" fill="#5080b0" opacity="0.55" text-anchor="middle">eRank ratio: 1.5x~2.4x</text>

  <!-- ===== RIGHT SIDE: CURVED MANIFOLD (Semantic Space) ===== -->
  <g filter="url(#surfaceGlow)">
    <!-- Main surface - filled -->
    <path d="M 480,440 C 510,320 560,220 640,155 C 720,90 800,130 845,195 C 890,260 895,370 885,445 L 480,440 Z"
          fill="url(#surfaceGrad)" opacity="0.2"/>
    <!-- Back contour layers -->
    <path d="M 470,390 C 500,290 550,200 625,170 C 700,140 755,175 795,225 C 835,275 855,350 845,400"
          fill="none" stroke="#b05500" stroke-width="1.2" opacity="0.25"/>
    <path d="M 475,410 C 505,305 555,210 635,160 C 715,110 780,150 820,210 C 860,270 875,360 865,425"
          fill="none" stroke="#d06600" stroke-width="1.8" opacity="0.4"/>
    <!-- Main surface contour -->
    <path d="M 480,440 C 510,320 560,220 640,155 C 720,90 800,130 845,195 C 890,260 895,370 885,445"
          fill="none" stroke="url(#surfaceGrad)" stroke-width="3"/>
    <!-- Surface grid lines (u-direction) -->
    <path d="M 505,420 C 530,320 570,235 645,170" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.45"/>
    <path d="M 540,430 C 560,330 595,245 665,175" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.45"/>
    <path d="M 585,435 C 600,340 630,260 700,185" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.45"/>
    <path d="M 640,438 C 650,350 675,275 740,200" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.45"/>
    <path d="M 700,440 C 710,365 735,295 790,225" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.45"/>
    <path d="M 765,442 C 772,378 795,315 838,255" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.45"/>
    <path d="M 830,444 C 840,395 855,345 875,295" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.45"/>
    <!-- Surface grid lines (v-direction) -->
    <path d="M 500,400 C 580,365 690,350 870,405" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.35"/>
    <path d="M 520,345 C 600,300 710,280 860,340" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.35"/>
    <path d="M 550,280 C 630,240 735,220 850,275" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.35"/>
    <path d="M 595,225 C 665,185 755,170 840,220" fill="none" stroke="#c08000" stroke-width="0.7" opacity="0.35"/>
  </g>

  <!-- Right side annotations -->
  <text x="780" y="68" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#dd9020" opacity="0.85" text-anchor="middle" font-weight="bold">&#x8BED;&#x4E49;&#x6D41;&#x5F62;</text>
  <text x="780" y="88" font-family="'Courier New', monospace" font-size="11" fill="#aa7000" opacity="0.6" text-anchor="middle">Semantic Manifold</text>
  <text x="780" y="108" font-family="'Courier New', monospace" font-size="11" fill="#bb8020" opacity="0.55" text-anchor="middle">eRank ratio: 61x~91x</text>

  <!-- ===== CENTER: THE MISMATCH ===== -->
  <!-- Straight dashed line (what the ruler draws) -->
  <line x1="320" y1="300" x2="690" y2="175" stroke="#80b8ee" stroke-width="2.5" stroke-dasharray="10,5" opacity="0.85"/>

  <!-- The actual curve it should follow on the manifold -->
  <path d="M 320,300 C 400,255 510,195 610,172 C 655,162 680,170 690,175"
        fill="none" stroke="#ffaa30" stroke-width="2.2" opacity="0.65" stroke-dasharray="5,4"/>

  <!-- Gap indicators between straight line and curve -->
  <g opacity="0.85">
    <!-- Vertical gap lines -->
    <line x1="420" y1="272" x2="428" y2="245" stroke="#ff5050" stroke-width="1.2" opacity="0.6"/>
    <line x1="490" y1="249" x2="502" y2="218" stroke="#ff5050" stroke-width="1.2" opacity="0.6"/>
    <line x1="555" y1="230" x2="570" y2="198" stroke="#ff5050" stroke-width="1.2" opacity="0.6"/>
    <line x1="620" y1="210" x2="628" y2="188" stroke="#ff5050" stroke-width="1.2" opacity="0.6"/>
    <!-- Spark glows at gap endpoints -->
    <circle cx="428" cy="245" r="3.5" fill="#ff5544" filter="url(#spark)" opacity="0.9"/>
    <circle cx="502" cy="218" r="4.5" fill="#ff5544" filter="url(#spark)" opacity="1"/>
    <circle cx="570" cy="198" r="4" fill="#ff5544" filter="url(#spark)" opacity="0.95"/>
    <circle cx="628" cy="188" r="3.5" fill="#ff5544" filter="url(#spark)" opacity="0.9"/>
  </g>

  <!-- "Mismatch" label -->
  <text x="465" y="188" font-family="'Courier New', monospace" font-size="12" fill="#ff7766" opacity="0.75" transform="rotate(-10, 465, 188)">structural mismatch</text>

  <!-- ===== TITLE: 195 (top-left) ===== -->
  <text x="38" y="62" font-family="'Courier New', monospace" font-size="58" fill="#e0ecff" font-weight="bold" opacity="0.92" filter="url(#textGlow)">195</text>
  <!-- Subtitle line -->
  <text x="42" y="86" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#5878a0" opacity="0.65">&#x7EBF;&#x6027;&#x6CE8;&#x610F;&#x529B; &#x00B7; DeltaNet &#x00B7; Qwen3.6</text>

  <!-- ===== TAGLINE: bottom-right ===== -->
  <text x="862" y="478" text-anchor="end" font-family="'Noto Sans CJK SC', sans-serif" font-size="26" fill="#e4ecf4" font-weight="bold" opacity="0.9">&#x76F4;&#x5C3A;&#x64E6;&#x5F2F;&#x66F2;&#x7684;&#x753B;&#x5E03;</text>

  <!-- Decorative: formula at bottom-left -->
  <text x="42" y="465" font-family="'Courier New', monospace" font-size="10" fill="#2a4a70" opacity="0.45">S_t = S_{t-1} + v_t k_t^T - (k_t^T S_{t-1}) k_t k_t^T</text>
  <text x="42" y="480" font-family="'Courier New', monospace" font-size="9" fill="#2a4a70" opacity="0.35">DeltaNet: rank-1 state update rule</text>

</svg>

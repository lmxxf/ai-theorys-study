<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <linearGradient id="windowFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1f3a" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="overflowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="summaryGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#44a08d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="0" y1="80" x2="800" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- LEFT SIDE: Overflowing context window -->

  <!-- Window frame -->
  <rect x="60" y="70" width="240" height="300" rx="8" fill="url(#windowFill)" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="180" y="58" text-anchor="middle" fill="#8899bb" font-family="monospace" font-size="11">Context Window (128K)</text>

  <!-- Message bars filling the window -->
  <g opacity="0.9">
    <!-- System prompt - pinned -->
    <rect x="76" y="86" width="208" height="16" rx="3" fill="#6366f1" opacity="0.7"/>
    <text x="180" y="97" text-anchor="middle" fill="#fff" font-family="monospace" font-size="8">system prompt</text>

    <!-- Tools definition -->
    <rect x="76" y="108" width="208" height="12" rx="3" fill="#8b5cf6" opacity="0.5"/>
    <text x="180" y="117" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="7">tools [ ... ]</text>

    <!-- Conversation messages - getting denser -->
    <rect x="76" y="128" width="160" height="10" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="76" y="142" width="190" height="10" rx="2" fill="#475569" opacity="0.5"/>
    <rect x="76" y="156" width="140" height="10" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="76" y="170" width="208" height="10" rx="2" fill="#475569" opacity="0.5"/>
    <rect x="76" y="184" width="170" height="10" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="76" y="198" width="195" height="10" rx="2" fill="#475569" opacity="0.5"/>
    <rect x="76" y="212" width="150" height="10" rx="2" fill="#64748b" opacity="0.6"/>
    <rect x="76" y="226" width="208" height="10" rx="2" fill="#475569" opacity="0.6"/>
    <rect x="76" y="240" width="180" height="10" rx="2" fill="#64748b" opacity="0.7"/>
    <rect x="76" y="254" width="200" height="10" rx="2" fill="#475569" opacity="0.7"/>
    <rect x="76" y="268" width="160" height="10" rx="2" fill="#64748b" opacity="0.8"/>
    <rect x="76" y="282" width="208" height="10" rx="2" fill="#475569" opacity="0.8"/>
    <rect x="76" y="296" width="185" height="10" rx="2" fill="#64748b" opacity="0.9"/>
    <rect x="76" y="310" width="208" height="10" rx="2" fill="#475569" opacity="0.9"/>
    <rect x="76" y="324" width="170" height="10" rx="2" fill="#64748b" opacity="1"/>
    <rect x="76" y="338" width="208" height="10" rx="2" fill="#475569" opacity="1"/>
    <rect x="76" y="352" width="195" height="10" rx="2" fill="#64748b" opacity="1"/>
  </g>

  <!-- Overflow bars spilling out -->
  <g>
    <rect x="76" y="372" width="208" height="10" rx="2" fill="#ef4444" opacity="0.7"/>
    <rect x="76" y="386" width="180" height="10" rx="2" fill="#ef4444" opacity="0.5"/>
    <rect x="76" y="400" width="160" height="10" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="76" y="414" width="140" height="10" rx="2" fill="#ef4444" opacity="0.15"/>
  </g>

  <!-- Overflow warning -->
  <text x="180" y="440" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10" opacity="0.8">OVERFLOW</text>

  <!-- Arrow -->
  <g>
    <line x1="330" y1="220" x2="380" y2="220" stroke="#4ecdc4" stroke-width="2" opacity="0.6"/>
    <polygon points="380,215 395,220 380,225" fill="#4ecdc4" opacity="0.6"/>
  </g>

  <!-- RIGHT SIDE: Managed context window -->

  <!-- Window frame -->
  <rect x="420" y="70" width="320" height="300" rx="8" fill="url(#windowFill)" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="580" y="58" text-anchor="middle" fill="#4ecdc4" font-family="monospace" font-size="11">Managed Context</text>

  <!-- System prompt - pinned -->
  <rect x="436" y="86" width="288" height="18" rx="3" fill="#6366f1" opacity="0.7"/>
  <text x="580" y="98" text-anchor="middle" fill="#fff" font-family="monospace" font-size="9">system prompt (pinned)</text>

  <!-- Summary block -->
  <rect x="436" y="114" width="288" height="50" rx="4" fill="url(#summaryGrad)" opacity="0.25" stroke="#4ecdc4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="580" y="134" text-anchor="middle" fill="#4ecdc4" font-family="monospace" font-size="9">Summary: discussed X feature,</text>
  <text x="580" y="148" text-anchor="middle" fill="#4ecdc4" font-family="monospace" font-size="9">decided on Y approach, created Z files</text>
  <text x="720" y="124" text-anchor="end" fill="#4ecdc4" font-family="monospace" font-size="7" opacity="0.6">compressed</text>

  <!-- Recent messages - original -->
  <rect x="436" y="176" width="220" height="12" rx="2" fill="#64748b" opacity="0.7"/>
  <rect x="436" y="194" width="260" height="12" rx="2" fill="#475569" opacity="0.7"/>
  <rect x="436" y="212" width="200" height="12" rx="2" fill="#64748b" opacity="0.8"/>
  <rect x="436" y="230" width="288" height="12" rx="2" fill="#475569" opacity="0.8"/>
  <rect x="436" y="248" width="240" height="12" rx="2" fill="#64748b" opacity="0.9"/>
  <rect x="436" y="266" width="270" height="12" rx="2" fill="#475569" opacity="0.9"/>
  <rect x="436" y="284" width="230" height="12" rx="2" fill="#64748b" opacity="1"/>
  <rect x="436" y="302" width="288" height="12" rx="2" fill="#475569" opacity="1"/>

  <!-- Free space indicator -->
  <rect x="436" y="326" width="288" height="30" rx="4" fill="#1a2a4a" stroke="#2a4a6a" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="580" y="345" text-anchor="middle" fill="#3a6a8a" font-family="monospace" font-size="10">free space</text>

  <!-- Recent label -->
  <text x="730" y="186" text-anchor="end" fill="#8899bb" font-family="monospace" font-size="7" opacity="0.6">recent (original)</text>

  <!-- Six methods at bottom -->
  <g transform="translate(60, 395)">
    <rect x="0" y="0" width="100" height="28" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="8">1 truncate</text>

    <rect x="112" y="0" width="100" height="28" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="162" y="18" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="8">2 sliding</text>

    <rect x="224" y="0" width="100" height="28" rx="4" fill="#334155" stroke="#4ecdc4" stroke-width="1.5"/>
    <text x="274" y="18" text-anchor="middle" fill="#4ecdc4" font-family="monospace" font-size="8">3 summary</text>

    <rect x="336" y="0" width="100" height="28" rx="4" fill="#334155" stroke="#4ecdc4" stroke-width="1.5"/>
    <text x="386" y="18" text-anchor="middle" fill="#4ecdc4" font-family="monospace" font-size="8">4 hybrid</text>

    <rect x="448" y="0" width="100" height="28" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="498" y="18" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="8">5 tiered</text>

    <rect x="560" y="0" width="100" height="28" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="610" y="18" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="8">6 RAG</text>
  </g>

  <!-- Connecting dots for methods -->
  <g opacity="0.3">
    <line x1="110" y1="395" x2="172" y2="395" stroke="#4ecdc4" stroke-width="1"/>
    <line x1="222" y1="395" x2="284" y2="395" stroke="#4ecdc4" stroke-width="1"/>
    <line x1="334" y1="395" x2="396" y2="395" stroke="#4ecdc4" stroke-width="1"/>
    <line x1="446" y1="395" x2="508" y2="395" stroke="#4ecdc4" stroke-width="1"/>
    <line x1="558" y1="395" x2="620" y2="395" stroke="#4ecdc4" stroke-width="1"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1a2a"/>
    </linearGradient>
    <linearGradient id="glowCyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="glowAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ff9f43;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="400" y="38" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="20" fill="#ffffff" font-weight="bold">张量并行 vs 流水线并行</text>
  <text x="400" y="60" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#888">DeepSeek V4 Flash 280B  |  DGX Spark x2</text>

  <!-- ===== 左侧：TP=2 ===== -->
  <text x="200" y="95" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#00e5ff" font-weight="bold">TP=2 张量并行</text>

  <!-- 机器 A -->
  <rect x="60" y="110" width="120" height="200" rx="6" fill="#111828" stroke="#00e5ff" stroke-width="1" opacity="0.6"/>
  <text x="120" y="132" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#00e5ff" opacity="0.7">Spark A</text>

  <!-- 机器 A 层条（左半，每层都有） -->
  <rect x="72" y="142" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.8"/>
  <rect x="72" y="152" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.7"/>
  <rect x="72" y="162" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.6"/>
  <rect x="72" y="172" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.8"/>
  <rect x="72" y="182" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.5"/>
  <rect x="72" y="192" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.7"/>
  <rect x="72" y="202" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.9"/>
  <rect x="72" y="212" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.6"/>
  <rect x="72" y="222" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.8"/>
  <rect x="72" y="232" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.4"/>
  <rect x="72" y="242" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.7"/>
  <rect x="72" y="252" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.9"/>
  <rect x="72" y="262" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.5"/>
  <rect x="72" y="272" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.8"/>
  <rect x="72" y="282" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.6"/>
  <rect x="72" y="292" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.3"/>
  <text x="120" y="142" text-anchor="start" font-family="'Noto Sans CJK SC', sans-serif" font-size="8" fill="#555" opacity="0.6" transform="rotate(90,128,200)">43 layers x half</text>

  <!-- 机器 B -->
  <rect x="220" y="110" width="120" height="200" rx="6" fill="#111828" stroke="#00e5ff" stroke-width="1" opacity="0.6"/>
  <text x="280" y="132" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#00e5ff" opacity="0.7">Spark B</text>

  <!-- 机器 B 层条（右半，每层都有） -->
  <rect x="232" y="142" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.8"/>
  <rect x="232" y="152" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.7"/>
  <rect x="232" y="162" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.6"/>
  <rect x="232" y="172" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.8"/>
  <rect x="232" y="182" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.5"/>
  <rect x="232" y="192" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.7"/>
  <rect x="232" y="202" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.9"/>
  <rect x="232" y="212" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.6"/>
  <rect x="232" y="222" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.8"/>
  <rect x="232" y="232" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.4"/>
  <rect x="232" y="242" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.7"/>
  <rect x="232" y="252" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.9"/>
  <rect x="232" y="262" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.5"/>
  <rect x="232" y="272" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.8"/>
  <rect x="232" y="282" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.6"/>
  <rect x="232" y="292" width="48" height="6" rx="2" fill="url(#glowCyan)" opacity="0.3"/>

  <!-- TP 通信箭头（每层都合并） -->
  <line x1="125" y1="160" x2="227" y2="160" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="125" y1="185" x2="227" y2="185" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="125" y1="210" x2="227" y2="210" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="125" y1="235" x2="227" y2="235" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="125" y1="260" x2="227" y2="260" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="125" y1="285" x2="227" y2="285" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>

  <text x="176" y="325" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#00e5ff" opacity="0.5">AllReduce x 43</text>

  <!-- TP 速度标签 -->
  <rect x="145" y="335" width="62" height="24" rx="4" fill="#00e5ff" opacity="0.15"/>
  <text x="176" y="352" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="14" fill="#00e5ff" font-weight="bold">12 tok/s</text>

  <!-- ===== 中间分隔 ===== -->
  <text x="400" y="230" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="24" fill="#333" opacity="0.6">vs</text>

  <!-- ===== 右侧：PP=2 ===== -->
  <text x="600" y="95" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#ff9f43" font-weight="bold">PP=2 流水线并行</text>

  <!-- 机器 A（前半层） -->
  <rect x="460" y="110" width="120" height="200" rx="6" fill="#111828" stroke="#ff9f43" stroke-width="1" opacity="0.6"/>
  <text x="520" y="132" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#ff9f43" opacity="0.7">Spark A</text>

  <!-- 前 22 层（占上半部分） -->
  <rect x="472" y="142" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.8"/>
  <rect x="472" y="152" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.7"/>
  <rect x="472" y="162" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.6"/>
  <rect x="472" y="172" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.8"/>
  <rect x="472" y="182" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.5"/>
  <rect x="472" y="192" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.7"/>
  <rect x="472" y="202" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.9"/>
  <rect x="472" y="212" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.6"/>
  <!-- 下半空白 -->
  <text x="520" y="260" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#ff9f43" opacity="0.3">layers 0-21</text>
  <text x="520" y="275" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#555" opacity="0.4">complete weights</text>

  <!-- 机器 B（后半层） -->
  <rect x="620" y="110" width="120" height="200" rx="6" fill="#111828" stroke="#ff9f43" stroke-width="1" opacity="0.6"/>
  <text x="680" y="132" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#ff9f43" opacity="0.7">Spark B</text>

  <!-- 上半空白，后 21 层在下半 -->
  <text x="680" y="180" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#555" opacity="0.4">complete weights</text>
  <text x="680" y="195" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#ff9f43" opacity="0.3">layers 22-42</text>
  <rect x="632" y="212" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.6"/>
  <rect x="632" y="222" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.8"/>
  <rect x="632" y="232" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.5"/>
  <rect x="632" y="242" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.7"/>
  <rect x="632" y="252" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.9"/>
  <rect x="632" y="262" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.6"/>
  <rect x="632" y="272" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.8"/>
  <rect x="632" y="282" width="96" height="6" rx="2" fill="url(#glowAmber)" opacity="0.4"/>

  <!-- PP 通信箭头（stage 之间传一次 hidden states） -->
  <line x1="565" y1="220" x2="625" y2="220" stroke="#ff9f43" stroke-width="2" opacity="0.6"/>
  <polygon points="622,215 633,220 622,225" fill="#ff9f43" opacity="0.7"/>
  <text x="594" y="240" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="8" fill="#ff9f43" opacity="0.5">hidden states</text>

  <!-- PP 速度标签 -->
  <rect x="565" y="335" width="72" height="24" rx="4" fill="#ff9f43" opacity="0.15"/>
  <text x="601" y="352" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="14" fill="#ff9f43" font-weight="bold">10-11 tok/s</text>

  <!-- 底部：pipeline bubble 标注 -->
  <text x="600" y="380" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="10" fill="#ff9f43" opacity="0.4">pipeline bubble</text>

  <!-- 底部总结线 -->
  <line x1="60" y1="410" x2="740" y2="410" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <text x="400" y="435" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#888" opacity="0.5">通信少了，不等于端到端更快</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 780" width="700" height="780" style="background-color:#ffffff">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .title { font-size: 15px; fill: #222; font-weight: bold; }
    .subtitle { font-size: 11px; fill: #666; }
    .label { font-size: 11px; fill: #333; }
    .label-bold { font-size: 11px; fill: #333; font-weight: bold; }
    .dim { font-size: 9px; fill: #888; font-family: 'Consolas', 'Noto Sans CJK SC', monospace; }
    .note { font-size: 9px; fill: #666; }
    .section { font-size: 10px; fill: #555; font-weight: bold; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1565c0"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6a1b9a"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="350" y="28" text-anchor="middle" class="title">ACT 策略架构（ALOHA TransferCube）</text>
  <text x="350" y="46" text-anchor="middle" class="subtitle">Action Chunking with Transformers — 一次前向传播输出整段动作</text>

  <!-- ======== 输入层 ======== -->
  <rect x="20" y="65" width="660" height="115" rx="10" fill="#f5f5f5" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="350" y="82" text-anchor="middle" class="section">输入</text>

  <!-- 摄像头照片 -->
  <rect x="45" y="95" width="180" height="50" rx="6" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="135" y="118" text-anchor="middle" class="label">顶部摄像头照片</text>
  <text x="135" y="132" text-anchor="middle" class="dim">480×640×3 RGB</text>

  <!-- 关节角度 -->
  <rect x="260" y="95" width="180" height="50" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="350" y="118" text-anchor="middle" class="label">14 个关节角度</text>
  <text x="350" y="132" text-anchor="middle" class="dim">左臂 7 + 右臂 7</text>

  <!-- VAE 隐变量（仅训练时） -->
  <rect x="475" y="95" width="180" height="50" rx="6" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="565" y="118" text-anchor="middle" class="label">VAE 隐变量 z</text>
  <text x="565" y="132" text-anchor="middle" class="dim">训练时从示范编码；推理时随机采样</text>

  <!-- 箭头：输入 → 编码 -->
  <line x1="135" y1="145" x2="135" y2="200" stroke="#1565c0" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="350" y1="145" x2="350" y2="200" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="565" y1="145" x2="565" y2="310" stroke="#6a1b9a" stroke-width="1.2" marker-end="url(#arrow-purple)"/>

  <!-- ======== 视觉编码 ======== -->
  <rect x="35" y="205" width="200" height="55" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="135" y="228" text-anchor="middle" class="label-bold">ResNet18 骨干网络</text>
  <text x="135" y="243" text-anchor="middle" class="note">提取图像特征</text>
  <text x="135" y="272" text-anchor="middle" class="dim">480×640×3 → 512 维特征</text>

  <line x1="135" y1="260" x2="135" y2="305" stroke="#1565c0" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- ======== 关节编码 ======== -->
  <rect x="260" y="205" width="180" height="55" rx="6" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="350" y="228" text-anchor="middle" class="label-bold">线性投影</text>
  <text x="350" y="243" text-anchor="middle" class="note">关节角度 → 嵌入</text>
  <text x="350" y="272" text-anchor="middle" class="dim">14 维 → 512 维</text>

  <line x1="350" y1="260" x2="350" y2="305" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ======== Transformer 编码器 ======== -->
  <rect x="35" y="310" width="405" height="80" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="237" y="335" text-anchor="middle" class="label-bold">Transformer 编码器</text>
  <text x="237" y="355" text-anchor="middle" class="note">多层 Self-Attention：图像特征和关节状态互相看</text>
  <text x="237" y="375" text-anchor="middle" class="note">"当前局面是什么样"的整体理解</text>

  <!-- VAE 注入 -->
  <path d="M 565 310 Q 520 310 440 340" fill="none" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="510" y="300" text-anchor="middle" class="note" fill="#6a1b9a">风格注入</text>

  <!-- VAE 说明框 -->
  <rect x="475" y="205" width="195" height="80" rx="6" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1.2"/>
  <text x="572" y="225" text-anchor="middle" class="label-bold" fill="#6a1b9a">VAE 编码器</text>
  <text x="572" y="243" text-anchor="middle" class="note">训练时：从人类示范动作</text>
  <text x="572" y="256" text-anchor="middle" class="note">编码出"风格" z</text>
  <text x="572" y="272" text-anchor="middle" class="note">推理时：z ~ N(0,I) 随机采样</text>

  <line x1="237" y1="390" x2="237" y2="420" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="237" y="415" text-anchor="middle" class="dim">编码后的"条件"序列</text>

  <!-- ======== Transformer 解码器 ======== -->
  <rect x="85" y="430" width="310" height="90" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="240" y="455" text-anchor="middle" class="label-bold">Transformer 解码器</text>
  <text x="240" y="475" text-anchor="middle" class="note">Cross-Attention：动作 query 看编码器的条件</text>
  <text x="240" y="492" text-anchor="middle" class="note">"在这个局面下应该怎么动"</text>
  <text x="240" y="508" text-anchor="middle" class="dim">输入：可学习的动作 query tokens</text>

  <line x1="240" y1="520" x2="240" y2="555" stroke="#e65100" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ======== 输出层 ======== -->
  <rect x="110" y="560" width="260" height="45" rx="6" fill="#ffcc80" stroke="#e65100" stroke-width="1.5"/>
  <text x="240" y="580" text-anchor="middle" class="label-bold">线性投影层</text>
  <text x="240" y="595" text-anchor="middle" class="note">每个 query token → 一步的 14 维关节角度</text>

  <line x1="240" y1="605" x2="240" y2="640" stroke="#e65100" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ======== 最终输出 ======== -->
  <rect x="100" y="645" width="280" height="40" rx="6" fill="#e65100" stroke="none"/>
  <text x="240" y="669" text-anchor="middle" class="label" fill="#fff" font-weight="bold">动作序列：N 步 × 14 维关节角度</text>

  <!-- ======== 对比框 ======== -->
  <rect x="30" y="710" width="640" height="55" rx="8" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="350" y="730" text-anchor="middle" class="section">与 Diffusion Policy 的关键区别</text>
  <text x="350" y="748" text-anchor="middle" class="note">Diffusion：从噪声出发，迭代去噪 T=100 步 → 慢但天然多模态</text>
  <text x="350" y="761" text-anchor="middle" class="note">ACT：一次前向传播直接出结果 → 快，用 VAE 隐变量处理多模态</text>

</svg>

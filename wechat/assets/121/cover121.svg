<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>

    <!-- 自然域子空间填充 -->
    <radialGradient id="natureFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#4ecdc4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </radialGradient>

    <!-- 情感域子空间填充 -->
    <radialGradient id="emotionFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e84393" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#e84393" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e84393" stop-opacity="0"/>
    </radialGradient>

    <!-- 虫洞光晕 -->
    <radialGradient id="wormholeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#ffaa00" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#ff8800" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>

    <!-- 交叉区填充 -->
    <radialGradient id="overlapFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#1a3050" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.5"/>

  <!-- ====== 子空间 A: 自然域 ====== -->
  <!-- 大椭圆区域，水平方向，包含 春/风/柳/青 -->
  <ellipse cx="450" cy="310" rx="240" ry="130" fill="url(#natureFill)" stroke="#4ecdc4" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
  <!-- 标注 -->
  <text x="660" y="225" font-family="sans-serif" font-size="14" fill="#4ecdc4" opacity="0.7" font-weight="bold">Subspace A</text>
  <text x="660" y="243" font-family="'SimSun','Songti SC',serif" font-size="13" fill="#4ecdc4" opacity="0.5">自然域</text>

  <!-- ====== 子空间 B: 情感域 ====== -->
  <!-- 大椭圆区域，垂直方向，包含 别/苦 -->
  <ellipse cx="280" cy="260" rx="120" ry="180" fill="url(#emotionFill)" stroke="#e84393" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="145" y="105" font-family="sans-serif" font-size="14" fill="#e84393" opacity="0.7" font-weight="bold">Subspace B</text>
  <text x="145" y="123" font-family="'SimSun','Songti SC',serif" font-size="13" fill="#e84393" opacity="0.5">情感域</text>

  <!-- ====== 交叉区域高亮 ====== -->
  <!-- "知"所在的交叉区 -->
  <ellipse cx="330" cy="280" rx="60" ry="50" fill="url(#overlapFill)" stroke="#ffd700" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="330" y="345" font-family="sans-serif" font-size="10" fill="#ffd700" text-anchor="middle" opacity="0.6">A ∩ B</text>

  <!-- ====== 自然域内的意象 ====== -->
  <!-- 春 -->
  <circle cx="480" cy="270" r="5" fill="#4ecdc4" filter="url(#glow)" opacity="0.85"/>
  <text x="480" y="258" font-family="'SimSun','Songti SC',serif" font-size="24" fill="#4ecdc4" text-anchor="middle" opacity="0.9">春</text>

  <!-- 风 -->
  <circle cx="560" cy="300" r="4.5" fill="#45b7aa" filter="url(#glow)" opacity="0.75"/>
  <text x="560" y="288" font-family="'SimSun','Songti SC',serif" font-size="22" fill="#45b7aa" text-anchor="middle" opacity="0.85">风</text>

  <!-- 柳 -->
  <circle cx="500" cy="370" r="4" fill="#2ecc71" filter="url(#glow)" opacity="0.7"/>
  <text x="500" y="395" font-family="'SimSun','Songti SC',serif" font-size="20" fill="#2ecc71" text-anchor="middle" opacity="0.8">柳</text>

  <!-- 青 -->
  <circle cx="580" cy="355" r="3.5" fill="#27ae60" filter="url(#glow)" opacity="0.65"/>
  <text x="580" y="380" font-family="'SimSun','Songti SC',serif" font-size="18" fill="#27ae60" text-anchor="middle" opacity="0.75">青</text>

  <!-- ====== 情感域内的意象 ====== -->
  <!-- 别 -->
  <circle cx="260" cy="160" r="5" fill="#e84393" filter="url(#glow)" opacity="0.85"/>
  <text x="260" y="148" font-family="'SimSun','Songti SC',serif" font-size="24" fill="#e84393" text-anchor="middle" opacity="0.9">别</text>

  <!-- 苦 -->
  <circle cx="310" cy="140" r="4.5" fill="#d63c6e" filter="url(#glow)" opacity="0.75"/>
  <text x="310" y="128" font-family="'SimSun','Songti SC',serif" font-size="22" fill="#d63c6e" text-anchor="middle" opacity="0.85">苦</text>

  <!-- 不遣 -->
  <text x="230" y="385" font-family="'SimSun','Songti SC',serif" font-size="16" fill="#8899aa" text-anchor="middle" opacity="0.55">不遣</text>
  <line x1="213" y1="380" x2="250" y2="380" stroke="#cc4444" stroke-width="1.5" opacity="0.35"/>

  <!-- ====== 虫洞 "知" —— 在交叉区中心 ====== -->
  <circle cx="330" cy="280" r="45" fill="url(#wormholeGlow)" opacity="0.35"/>
  <circle cx="330" cy="280" r="28" fill="url(#wormholeGlow)" opacity="0.45"/>

  <!-- 虫洞环 -->
  <ellipse cx="330" cy="280" rx="32" ry="14" fill="none" stroke="#ffd700" stroke-width="1.2" opacity="0.55" transform="rotate(-25, 330, 280)"/>
  <ellipse cx="330" cy="280" rx="32" ry="14" fill="none" stroke="#ffaa00" stroke-width="1" opacity="0.4" transform="rotate(35, 330, 280)"/>
  <ellipse cx="330" cy="280" rx="22" ry="10" fill="none" stroke="#ffd700" stroke-width="0.8" opacity="0.45" transform="rotate(70, 330, 280)"/>

  <!-- 核心亮点 -->
  <circle cx="330" cy="280" r="6" fill="#ffd700" filter="url(#glowStrong)" opacity="0.9"/>
  <circle cx="330" cy="280" r="3" fill="#fffbe6"/>

  <!-- "知" -->
  <text x="330" y="288" font-family="'SimSun','Songti SC',serif" font-size="28" font-weight="bold" fill="#ffd700" text-anchor="middle" filter="url(#glow)">知</text>

  <!-- ====== 连接线：知 → 自然域意象 ====== -->
  <line x1="355" y1="275" x2="475" y2="270" stroke="#4ecdc4" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.45"/>
  <line x1="360" y1="285" x2="555" y2="300" stroke="#45b7aa" stroke-width="1" stroke-dasharray="4,4" opacity="0.35"/>

  <!-- ====== 连接线：知 → 情感域意象 ====== -->
  <line x1="320" y1="258" x2="265" y2="165" stroke="#e84393" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.45"/>
  <line x1="328" y1="258" x2="310" y2="145" stroke="#d63c6e" stroke-width="1" stroke-dasharray="4,4" opacity="0.35"/>

  <!-- ====== 连接线：不遣 → 柳青 ====== -->
  <line x1="245" y1="385" x2="495" y2="370" stroke="#2ecc71" stroke-width="0.8" stroke-dasharray="3,5" opacity="0.3"/>
  <line x1="245" y1="390" x2="575" y2="358" stroke="#27ae60" stroke-width="0.7" stroke-dasharray="3,5" opacity="0.25"/>

  <!-- ====== 正交标记 ====== -->
  <!-- 在两个子空间交界处画一个直角符号 -->
  <path d="M 215 235 L 215 255 L 235 255" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>
  <text x="200" y="230" font-family="sans-serif" font-size="10" fill="#ffffff" opacity="0.35">⊥</text>

  <!-- ====== cos(A,B) ≈ 0 标注 ====== -->
  <text x="175" y="275" font-family="sans-serif" font-size="11" fill="#ffffff" opacity="0.3" font-style="italic">cos(A,B) ≈ 0</text>

  <!-- ====== 底部诗句 ====== -->
  <text x="400" y="548" font-family="'SimSun','Songti SC',serif" font-size="19" fill="#cccccc" text-anchor="middle" letter-spacing="5" opacity="0.7">春风知别苦，不遣柳条青</text>
  <text x="400" y="575" font-family="sans-serif" font-size="12" fill="#667788" text-anchor="middle" letter-spacing="2" opacity="0.5">Semantic Subspace Geometry — Wormhole at Intersection</text>

  <!-- ====== 散点装饰 ====== -->
  <g opacity="0.2">
    <circle cx="90" cy="480" r="1" fill="#4ecdc4"/>
    <circle cx="720" cy="160" r="1.2" fill="#4ecdc4"/>
    <circle cx="130" cy="200" r="0.8" fill="#e84393"/>
    <circle cx="700" cy="450" r="1" fill="#2ecc71"/>
    <circle cx="60" cy="350" r="0.8" fill="#ffd700"/>
    <circle cx="740" cy="520" r="1" fill="#8899aa"/>
    <circle cx="650" cy="100" r="0.8" fill="#e84393"/>
  </g>

</svg>
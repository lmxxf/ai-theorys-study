<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" style="background:#071018">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071018"/>
      <stop offset="52%" stop-color="#0d1726"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="48%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="sphere" cx="45%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.15"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>

  <g opacity="0.08" stroke="#93c5fd" stroke-width="0.7">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- High dimensional haze -->
  <g opacity="0.22" fill="#60a5fa">
    <circle cx="94" cy="152" r="2"/>
    <circle cx="128" cy="284" r="1.4"/>
    <circle cx="174" cy="206" r="1.8"/>
    <circle cx="222" cy="326" r="1.3"/>
    <circle cx="270" cy="148" r="1.6"/>
    <circle cx="319" cy="256" r="1.2"/>
    <circle cx="365" cy="364" r="1.5"/>
    <circle cx="704" cy="142" r="1.6"/>
    <circle cx="763" cy="338" r="1.3"/>
    <circle cx="827" cy="220" r="1.7"/>
  </g>

  <!-- Main constrained path -->
  <path d="M 94 288 C 190 170, 310 350, 420 248 C 510 164, 612 166, 700 248 C 740 286, 776 304, 816 292"
        stroke="url(#path)" stroke-width="10" fill="none" opacity="0.2" filter="url(#glow)"/>
  <path d="M 94 288 C 190 170, 310 350, 420 248 C 510 164, 612 166, 700 248 C 740 286, 776 304, 816 292"
        stroke="url(#path)" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Sphere / RMSNorm -->
  <g transform="translate(245 262)">
    <circle cx="0" cy="0" r="70" fill="url(#sphere)" stroke="#38bdf8" stroke-width="1.4"/>
    <ellipse cx="0" cy="0" rx="70" ry="22" fill="none" stroke="#bae6fd" stroke-width="1" opacity="0.55"/>
    <ellipse cx="0" cy="0" rx="22" ry="70" fill="none" stroke="#bae6fd" stroke-width="1" opacity="0.28"/>
    <text x="0" y="-10" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#e0f2fe" font-weight="700">RMSNorm</text>
    <text x="0" y="13" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#93c5fd">钉在球面</text>
  </g>

  <!-- Birkhoff polytope -->
  <g transform="translate(455 262)">
    <polygon points="0,-72 72,-24 45,62 -45,62 -72,-24" fill="#221b3a" stroke="#a78bfa" stroke-width="1.4"/>
    <polygon points="0,-46 45,-15 28,40 -28,40 -45,-15" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="-46" r="4" fill="#c4b5fd"/>
    <circle cx="45" cy="-15" r="4" fill="#c4b5fd"/>
    <circle cx="28" cy="40" r="4" fill="#c4b5fd"/>
    <circle cx="-28" cy="40" r="4" fill="#c4b5fd"/>
    <circle cx="-45" cy="-15" r="4" fill="#c4b5fd"/>
    <text x="0" y="-4" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#ede9fe" font-weight="700">Sinkhorn</text>
    <text x="0" y="20" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#c4b5fd">压进多面体</text>
  </g>

  <!-- Simplex -->
  <g transform="translate(660 262)">
    <polygon points="0,-76 76,58 -76,58" fill="#2a1d0b" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="0" y1="-76" x2="0" y2="58" stroke="#fbbf24" stroke-width="1" opacity="0.35"/>
    <line x1="-76" y1="58" x2="38" y2="-9" stroke="#fbbf24" stroke-width="1" opacity="0.35"/>
    <line x1="76" y1="58" x2="-38" y2="-9" stroke="#fbbf24" stroke-width="1" opacity="0.35"/>
    <circle cx="0" cy="-76" r="5" fill="#fed7aa"/>
    <circle cx="76" cy="58" r="5" fill="#fed7aa"/>
    <circle cx="-76" cy="58" r="5" fill="#fed7aa"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#fed7aa" font-weight="700">Softmax</text>
    <text x="0" y="28" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="12" fill="#fbbf24">落在单纯形</text>
  </g>

  <!-- Title -->
  <text x="450" y="64" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="34" fill="#f8fafc" font-weight="800">流形约束</text>
  <text x="450" y="102" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="18" fill="#bae6fd">一个 token 从球面滑到单纯形的旅程</text>

  <!-- Token chip -->
  <g transform="translate(72 252)">
    <rect x="0" y="0" width="86" height="44" rx="8" fill="#0b2235" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="43" y="28" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="16" fill="#e0f2fe" font-weight="700">token</text>
  </g>

  <!-- Output chip -->
  <g transform="translate(770 268)">
    <rect x="0" y="0" width="82" height="40" rx="8" fill="#24170a" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="41" y="26" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="15" fill="#fed7aa" font-weight="700">概率</text>
  </g>

  <!-- Bottom concepts -->
  <g font-family="'Noto Sans CJK SC', sans-serif" font-size="12">
    <rect x="102" y="392" width="145" height="34" rx="6" fill="#0b1628" stroke="#38bdf8" opacity="0.95"/>
    <text x="174" y="414" text-anchor="middle" fill="#bae6fd">超球面 S^{d-1}</text>
    <rect x="278" y="392" width="145" height="34" rx="6" fill="#151126" stroke="#a78bfa" opacity="0.95"/>
    <text x="350" y="414" text-anchor="middle" fill="#ddd6fe">Birkhoff 多面体</text>
    <rect x="454" y="392" width="145" height="34" rx="6" fill="#10211a" stroke="#34d399" opacity="0.95"/>
    <text x="526" y="414" text-anchor="middle" fill="#bbf7d0">低秩瓶颈</text>
    <rect x="630" y="392" width="145" height="34" rx="6" fill="#23180a" stroke="#f59e0b" opacity="0.95"/>
    <text x="702" y="414" text-anchor="middle" fill="#fed7aa">概率单纯形</text>
  </g>

  <text x="450" y="462" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#64748b">RMSNorm → Softmax → Sinkhorn → Low-Rank → RoPE → Muon</text>
  <text x="450" y="484" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#475569">No.170 | 靳岩岩的 AI 学习笔记</text>
</svg>

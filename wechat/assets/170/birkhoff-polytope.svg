<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500" style="background-color:#ffffff">
  <rect width="600" height="500" fill="#ffffff"/>
  <style>
    text { font-family: 'Noto Sans CJK SC', 'Noto Sans SC', 'Source Han Sans SC', sans-serif; }
    .label { font-size: 11px; fill: #333; }
    .title { font-size: 14px; fill: #111; font-weight: bold; }
    .matrix-text { font-size: 9px; fill: #333; font-family: 'Noto Sans Mono CJK SC', 'Courier New', monospace; }
    .footer { font-size: 10.5px; fill: #555; }
    .blue-label { font-size: 11px; fill: #1a6dd4; font-weight: bold; }
    .center-label { font-size: 11px; fill: #c44; font-weight: bold; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="title">Birkhoff 多面体 -- 3 阶双随机矩阵的约束空间</text>

  <!-- Hexagon (center at 300, 230), radius 150 -->
  <!-- Vertices at angles 270, 330, 30, 90, 150, 210 (top first, clockwise) -->
  <!-- V0 top:        300, 80  -->
  <!-- V1 upper-right: 430, 155 -->
  <!-- V2 lower-right: 430, 305 -->
  <!-- V3 bottom:      300, 380 -->
  <!-- V4 lower-left:  170, 305 -->
  <!-- V5 upper-left:  170, 155 -->

  <!-- Hexagon fill -->
  <polygon points="300,80 430,155 430,305 300,380 170,305 170,155"
           fill="#f2f2f2" stroke="#222" stroke-width="1.8" stroke-linejoin="round" />

  <!-- Internal edges (some diagonals for polytopal feel) -->
  <line x1="300" y1="80" x2="430" y2="305" stroke="#ccc" stroke-width="0.8" />
  <line x1="300" y1="80" x2="170" y2="305" stroke="#ccc" stroke-width="0.8" />
  <line x1="430" y1="155" x2="170" y2="305" stroke="#ccc" stroke-width="0.8" />
  <line x1="430" y1="155" x2="300" y2="380" stroke="#ccc" stroke-width="0.8" />
  <line x1="170" y1="155" x2="430" y2="305" stroke="#ccc" stroke-width="0.8" />
  <line x1="170" y1="155" x2="300" y2="380" stroke="#ccc" stroke-width="0.8" />

  <!-- Vertices (black solid circles) -->
  <circle cx="300" cy="80"  r="5" fill="#222" />
  <circle cx="430" cy="155" r="5" fill="#222" />
  <circle cx="430" cy="305" r="5" fill="#222" />
  <circle cx="300" cy="380" r="5" fill="#222" />
  <circle cx="170" cy="305" r="5" fill="#222" />
  <circle cx="170" cy="155" r="5" fill="#222" />

  <!-- Center point: uniform mixture J/3 -->
  <circle cx="300" cy="230" r="5" fill="#c44" />
  <text x="300" y="218" text-anchor="middle" class="center-label">均匀混合</text>
  <!-- Small matrix for J/3 -->
  <g transform="translate(322, 222)">
    <text x="0" y="0" class="matrix-text" fill="#999">(</text>
    <text x="5" y="0" class="matrix-text" fill="#999">1/3  1/3  1/3</text>
    <text x="5" y="11" class="matrix-text" fill="#999">1/3  1/3  1/3</text>
    <text x="5" y="22" class="matrix-text" fill="#999">1/3  1/3  1/3</text>
    <text x="72" y="0" class="matrix-text" fill="#999">)</text>
  </g>

  <!-- mHC learned point (blue), between center and V1 -->
  <circle cx="370" cy="190" r="5" fill="#1a6dd4" />
  <text x="385" y="185" class="blue-label">mHC 学到的</text>
  <text x="385" y="198" class="blue-label">混合权重</text>
  <!-- dashed line from center to this point -->
  <line x1="300" y1="230" x2="370" y2="190" stroke="#1a6dd4" stroke-width="1.2" stroke-dasharray="4,3" />

  <!-- === Vertex labels with permutation matrices === -->

  <!-- V0 (top): Identity matrix I -->
  <text x="300" y="62" text-anchor="middle" class="label" font-weight="bold">I (单位阵)</text>
  <g transform="translate(330, 52)">
    <rect x="-2" y="-10" width="52" height="34" rx="3" fill="#fff" stroke="#bbb" stroke-width="0.6" />
    <text x="0" y="0" class="matrix-text">1  0  0</text>
    <text x="0" y="10" class="matrix-text">0  1  0</text>
    <text x="0" y="20" class="matrix-text">0  0  1</text>
  </g>

  <!-- V1 (upper-right) -->
  <text x="445" y="148" class="label">P1</text>

  <!-- V2 (lower-right): label with matrix -->
  <text x="445" y="298" class="label" font-weight="bold">P2 (循环置换)</text>
  <g transform="translate(444, 308)">
    <rect x="-2" y="-10" width="52" height="34" rx="3" fill="#fff" stroke="#bbb" stroke-width="0.6" />
    <text x="0" y="0" class="matrix-text">0  1  0</text>
    <text x="0" y="10" class="matrix-text">0  0  1</text>
    <text x="0" y="20" class="matrix-text">1  0  0</text>
  </g>

  <!-- V3 (bottom) -->
  <text x="300" y="400" text-anchor="middle" class="label">P3</text>

  <!-- V4 (lower-left): label with matrix -->
  <text x="100" y="298" text-anchor="start" class="label" font-weight="bold">P4 (对换)</text>
  <g transform="translate(98, 308)">
    <rect x="-2" y="-10" width="52" height="34" rx="3" fill="#fff" stroke="#bbb" stroke-width="0.6" />
    <text x="0" y="0" class="matrix-text">0  1  0</text>
    <text x="0" y="10" class="matrix-text">1  0  0</text>
    <text x="0" y="20" class="matrix-text">0  0  1</text>
  </g>

  <!-- V5 (upper-left) -->
  <text x="155" y="148" text-anchor="end" class="label">P5</text>

  <!-- Footer explanation -->
  <line x1="40" y1="452" x2="560" y2="452" stroke="#ddd" stroke-width="0.8" />
  <text x="300" y="472" text-anchor="middle" class="footer">
    顶点 = 纯粹重排 (不混合)
  </text>
  <text x="300" y="488" text-anchor="middle" class="footer">
    中心 = 完全均匀混合　　内部 = 各种程度的混合
  </text>
</svg>
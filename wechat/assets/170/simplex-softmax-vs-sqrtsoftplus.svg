<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350" style="background-color:#ffffff">
  <defs>
    <!-- Softmax: blue radial gradients at each vertex of the left triangle -->
    <!-- Left triangle vertices: top(170,55), bottom-left(60,245), bottom-right(280,245) -->
    <!-- Gradient bounding box: rect x=30 y=25 w=280 h=250 -->
    <!-- top vertex (170,55): relative = ((170-30)/280, (55-25)/250) = (0.5, 0.12) -->
    <radialGradient id="blueTop" cx="50%" cy="12%" r="32%" fx="50%" fy="12%">
      <stop offset="0%" style="stop-color:#0D47A1;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#42A5F5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:0" />
    </radialGradient>
    <!-- bottom-left vertex (60,245): relative = ((60-30)/280, (245-25)/250) = (0.107, 0.88) -->
    <radialGradient id="blueBL" cx="10.7%" cy="88%" r="32%" fx="10.7%" fy="88%">
      <stop offset="0%" style="stop-color:#0D47A1;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#42A5F5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:0" />
    </radialGradient>
    <!-- bottom-right vertex (280,245): relative = ((280-30)/280, (245-25)/250) = (0.893, 0.88) -->
    <radialGradient id="blueBR" cx="89.3%" cy="88%" r="32%" fx="89.3%" fy="88%">
      <stop offset="0%" style="stop-color:#0D47A1;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#42A5F5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:0" />
    </radialGradient>

    <!-- sqrtsoftplus: green radial gradient at center of right triangle -->
    <!-- Right triangle vertices: top(520,55), bottom-left(410,245), bottom-right(630,245) -->
    <!-- Centroid: (520, 181.7) -->
    <!-- Gradient bounding box: rect x=380 y=25 w=280 h=250 -->
    <!-- center (520,181.7): relative = ((520-380)/280, (181.7-25)/250) = (0.5, 0.627) -->
    <radialGradient id="greenCenter" cx="50%" cy="62.7%" r="30%" fx="50%" fy="62.7%">
      <stop offset="0%" style="stop-color:#1B5E20;stop-opacity:0.85" />
      <stop offset="40%" style="stop-color:#4CAF50;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#81C784;stop-opacity:0" />
    </radialGradient>

    <!-- Clip paths for triangles -->
    <clipPath id="clipLeft">
      <polygon points="170,55 60,245 280,245" />
    </clipPath>
    <clipPath id="clipRight">
      <polygon points="520,55 410,245 630,245" />
    </clipPath>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="15" font-weight="bold" fill="#333">Softmax vs sqrt-softplus : K=3 概率单纯形偏好区域</text>

  <!-- ============ LEFT TRIANGLE: Softmax ============ -->
  <g>
    <!-- Triangle background -->
    <polygon points="170,55 60,245 280,245" fill="#f5f7fa" stroke="#666" stroke-width="1.5" />

    <!-- Blue shading at three vertices (clipped to triangle) -->
    <g clip-path="url(#clipLeft)">
      <rect x="30" y="25" width="280" height="250" fill="url(#blueTop)" />
      <rect x="30" y="25" width="280" height="250" fill="url(#blueBL)" />
      <rect x="30" y="25" width="280" height="250" fill="url(#blueBR)" />
    </g>

    <!-- Triangle outline on top -->
    <polygon points="170,55 60,245 280,245" fill="none" stroke="#666" stroke-width="1.5" />

    <!-- Center point (small, de-emphasized) -->
    <circle cx="170" cy="181.7" r="2.5" fill="#aaa" />
    <text x="170" y="172" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="8.5" fill="#999">[1/3, 1/3, 1/3]</text>

    <!-- Vertex labels -->
    <text x="170" y="47" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#0D47A1" font-weight="bold">[1,0,0]</text>
    <text x="43" y="261" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#0D47A1" font-weight="bold">[0,1,0]</text>
    <text x="297" y="261" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#0D47A1" font-weight="bold">[0,0,1]</text>

    <!-- Label: softmax -->
    <text x="170" y="285" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="14" font-weight="bold" fill="#1565C0">softmax</text>

    <!-- Bottom annotation -->
    <text x="170" y="305" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="11" fill="#555">偏好顶点（稀疏）</text>
  </g>

  <!-- ============ RIGHT TRIANGLE: sqrtsoftplus ============ -->
  <g>
    <!-- Triangle background -->
    <polygon points="520,55 410,245 630,245" fill="#f5f7fa" stroke="#666" stroke-width="1.5" />

    <!-- Green shading at center (clipped to triangle) -->
    <g clip-path="url(#clipRight)">
      <rect x="380" y="25" width="280" height="250" fill="url(#greenCenter)" />
    </g>

    <!-- Triangle outline on top -->
    <polygon points="520,55 410,245 630,245" fill="none" stroke="#666" stroke-width="1.5" />

    <!-- Center point (emphasized) -->
    <circle cx="520" cy="181.7" r="4" fill="#1B5E20" />
    <text x="520" y="172" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="8.5" fill="#1B5E20" font-weight="bold">[1/3, 1/3, 1/3]</text>

    <!-- Vertex labels -->
    <text x="520" y="47" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#777">[1,0,0]</text>
    <text x="393" y="261" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#777">[0,1,0]</text>
    <text x="647" y="261" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="10" fill="#777">[0,0,1]</text>

    <!-- Label: sqrt-softplus -->
    <text x="520" y="285" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="14" font-weight="bold" fill="#2E7D32">sqrt-softplus</text>

    <!-- Bottom annotation -->
    <text x="520" y="305" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="11" fill="#555">偏好中心（均匀）</text>
  </g>

  <!-- Central "vs" divider -->
  <line x1="345" y1="50" x2="345" y2="270" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4" />
  <text x="350" y="165" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="16" font-weight="bold" fill="#bbb">vs</text>

  <!-- Legend at bottom -->
  <g transform="translate(350, 335)">
    <rect x="-165" y="-10" width="12" height="12" rx="2" fill="#1565C0" opacity="0.75" />
    <text x="-148" y="1" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#666">高概率密度 (softmax)</text>
    <rect x="25" y="-10" width="12" height="12" rx="2" fill="#2E7D32" opacity="0.75" />
    <text x="42" y="1" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-size="9" fill="#666">高概率密度 (sqrt-softplus)</text>
  </g>
</svg>
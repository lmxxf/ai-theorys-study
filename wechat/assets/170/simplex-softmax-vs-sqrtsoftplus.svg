<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 900" style="background-color:#ffffff" font-family="'Noto Sans CJK SC', sans-serif">
  <defs>
    <radialGradient id="blueTop" cx="50%" cy="12%" r="32%">
      <stop offset="0%" stop-color="#0D47A1" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#42A5F5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueBL" cx="10.7%" cy="88%" r="32%">
      <stop offset="0%" stop-color="#0D47A1" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#42A5F5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueBR" cx="89.3%" cy="88%" r="32%">
      <stop offset="0%" stop-color="#0D47A1" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#42A5F5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenCenter" cx="50%" cy="62.7%" r="30%">
      <stop offset="0%" stop-color="#1B5E20" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#4CAF50" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#81C784" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clipTop">
      <polygon points="200,60 80,240 320,240"/>
    </clipPath>
    <clipPath id="clipMid">
      <polygon points="200,360 80,540 320,540"/>
    </clipPath>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#999" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ========== Panel 1: Softmax ========== -->
  <text x="200" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">softmax: 权重挤在顶点</text>

  <polygon points="200,60 80,240 320,240" fill="#f5f7fa" stroke="#666" stroke-width="1.5"/>
  <g clip-path="url(#clipTop)">
    <rect x="50" y="30" width="300" height="240" fill="url(#blueTop)"/>
    <rect x="50" y="30" width="300" height="240" fill="url(#blueBL)"/>
    <rect x="50" y="30" width="300" height="240" fill="url(#blueBR)"/>
  </g>
  <polygon points="200,60 80,240 320,240" fill="none" stroke="#666" stroke-width="1.5"/>

  <text x="200" y="52" text-anchor="middle" font-size="10" fill="#0D47A1" font-weight="bold">[1,0,0]</text>
  <text x="63" y="258" text-anchor="middle" font-size="10" fill="#0D47A1" font-weight="bold">[0,1,0]</text>
  <text x="337" y="258" text-anchor="middle" font-size="10" fill="#0D47A1" font-weight="bold">[0,0,1]</text>

  <circle cx="200" cy="180" r="2" fill="#aaa"/>
  <text x="200" y="195" text-anchor="middle" font-size="9" fill="#bbb">1/3, 1/3, 1/3</text>

  <!-- ========== Divider ========== -->
  <text x="200" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#bbb">vs</text>

  <!-- ========== Panel 2: sqrtsoftplus ========== -->
  <text x="200" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">sqrtsoftplus: 权重聚在中心</text>

  <polygon points="200,360 80,540 320,540" fill="#f5f7fa" stroke="#666" stroke-width="1.5"/>
  <g clip-path="url(#clipMid)">
    <rect x="50" y="330" width="300" height="240" fill="url(#greenCenter)"/>
  </g>
  <polygon points="200,360 80,540 320,540" fill="none" stroke="#666" stroke-width="1.5"/>

  <circle cx="200" cy="480" r="4" fill="#1B5E20"/>
  <text x="200" y="470" text-anchor="middle" font-size="9" fill="#1B5E20" font-weight="bold">[1/3, 1/3, 1/3]</text>

  <text x="200" y="352" text-anchor="middle" font-size="10" fill="#777">[1,0,0]</text>
  <text x="63" y="558" text-anchor="middle" font-size="10" fill="#777">[0,1,0]</text>
  <text x="337" y="558" text-anchor="middle" font-size="10" fill="#777">[0,0,1]</text>

  <!-- ========== Arrow ========== -->
  <line x1="200" y1="580" x2="200" y2="620" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="200" y="612" text-anchor="middle" font-size="11" fill="#999">加权求和后</text>

  <!-- ========== Panel 3: Convex Hull ========== -->
  <text x="200" y="650" text-anchor="middle" font-size="14" font-weight="bold" fill="#555">输出落在 Value 向量的凸包里</text>

  <!-- Convex hull triangle (dashed = output space, not simplex) -->
  <polygon points="100,850 180,680 350,810" fill="#fafafa" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Value vector vertices -->
  <circle cx="100" cy="850" r="6" fill="#555"/>
  <text x="82" y="870" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">V1</text>

  <circle cx="180" cy="680" r="6" fill="#555"/>
  <text x="180" y="668" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">V2</text>

  <circle cx="350" cy="810" r="6" fill="#555"/>
  <text x="368" y="828" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">V3</text>

  <!-- Softmax outputs: near vertices (blue) -->
  <circle cx="107" cy="842" r="5" fill="#1565C0" fill-opacity="0.6"/>
  <circle cx="98" cy="845" r="5" fill="#1565C0" fill-opacity="0.6"/>
  <circle cx="105" cy="850" r="5" fill="#1565C0" fill-opacity="0.6"/>

  <circle cx="185" cy="688" r="5" fill="#1565C0" fill-opacity="0.6"/>
  <circle cx="178" cy="684" r="5" fill="#1565C0" fill-opacity="0.6"/>

  <circle cx="343" cy="806" r="5" fill="#1565C0" fill-opacity="0.6"/>
  <circle cx="348" cy="813" r="5" fill="#1565C0" fill-opacity="0.6"/>

  <!-- sqrtsoftplus outputs: in interior (green) -->
  <circle cx="215" cy="785" r="5" fill="#2E7D32" fill-opacity="0.6"/>
  <circle cx="205" cy="775" r="5" fill="#2E7D32" fill-opacity="0.6"/>
  <circle cx="225" cy="780" r="5" fill="#2E7D32" fill-opacity="0.6"/>
  <circle cx="210" cy="790" r="5" fill="#2E7D32" fill-opacity="0.6"/>
  <circle cx="220" cy="770" r="5" fill="#2E7D32" fill-opacity="0.6"/>

  <!-- Legend -->
  <circle cx="110" cy="890" r="5" fill="#1565C0" fill-opacity="0.6"/>
  <text x="122" y="894" font-size="10" fill="#1565C0">softmax: 贴着顶点</text>

  <circle cx="260" cy="890" r="5" fill="#2E7D32" fill-opacity="0.6"/>
  <text x="272" y="894" font-size="10" fill="#2E7D32">sqrtsoftplus: 深入内部</text>
</svg>

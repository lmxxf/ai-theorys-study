<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="Noto Sans CJK SC">
  <rect width="900" height="430" fill="#ffffff"/>

  <!-- 输入节点 -->
  <circle cx="90" cy="150" r="30" fill="#fff7ed" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="90" y="158" text-anchor="middle" font-size="18" fill="#b45309" font-weight="bold">x1</text>
  <circle cx="90" cy="290" r="30" fill="#fff7ed" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="90" y="298" text-anchor="middle" font-size="18" fill="#b45309" font-weight="bold">x2</text>

  <!-- 连线 输入 → A -->
  <line x1="118" y1="140" x2="330" y2="112" stroke="#94a3b8" stroke-width="2"/>
  <line x1="118" y1="280" x2="330" y2="140" stroke="#94a3b8" stroke-width="2"/>
  <text x="215" y="112" text-anchor="middle" font-size="14" fill="#475569">× 1</text>
  <text x="205" y="212" text-anchor="middle" font-size="14" fill="#475569">× 1</text>

  <!-- 连线 输入 → B -->
  <line x1="118" y1="160" x2="330" y2="300" stroke="#94a3b8" stroke-width="2"/>
  <line x1="118" y1="300" x2="330" y2="328" stroke="#94a3b8" stroke-width="2"/>
  <text x="205" y="248" text-anchor="middle" font-size="14" fill="#475569">× −1</text>
  <text x="215" y="333" text-anchor="middle" font-size="14" fill="#475569">× −1</text>

  <!-- 神经元 A -->
  <rect x="330" y="82" width="240" height="76" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="450" y="112" text-anchor="middle" font-size="15" fill="#1d4ed8" font-weight="bold">神经元 A（偏置 −1）</text>
  <text x="450" y="140" text-anchor="middle" font-size="15" fill="#1e40af">ReLU(x1 + x2 − 1) = ReLU(u)</text>

  <!-- 神经元 B -->
  <rect x="330" y="272" width="240" height="76" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="450" y="302" text-anchor="middle" font-size="15" fill="#1d4ed8" font-weight="bold">神经元 B（偏置 +1）</text>
  <text x="450" y="330" text-anchor="middle" font-size="15" fill="#1e40af">ReLU(−x1 − x2 + 1) = ReLU(−u)</text>

  <!-- 注释：镜像 -->
  <text x="450" y="222" text-anchor="middle" font-size="13" fill="#94a3b8">B 的权重 = A 的相反数（镜像神经元）</text>

  <!-- 连线 A/B → 求和 -->
  <line x1="570" y1="120" x2="700" y2="200" stroke="#94a3b8" stroke-width="2"/>
  <line x1="570" y1="310" x2="700" y2="230" stroke="#94a3b8" stroke-width="2"/>
  <text x="640" y="145" text-anchor="middle" font-size="14" fill="#475569">× 1</text>
  <text x="640" y="292" text-anchor="middle" font-size="14" fill="#475569">× 1</text>

  <!-- 求和节点 -->
  <circle cx="715" cy="215" r="26" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="715" y="224" text-anchor="middle" font-size="22" fill="#15803d" font-weight="bold">+</text>
  <text x="715" y="265" text-anchor="middle" font-size="12" fill="#94a3b8">下一个线性层的本职工作</text>

  <!-- 输出 -->
  <line x1="741" y1="215" x2="800" y2="215" stroke="#16a34a" stroke-width="2.5"/>
  <polygon points="800,209 812,215 800,221" fill="#16a34a"/>
  <text x="845" y="221" text-anchor="middle" font-size="19" fill="#15803d" font-weight="bold">|u|</text>

  <!-- 底部说明 -->
  <text x="450" y="405" text-anchor="middle" font-size="15" fill="#334155" font-weight="bold">一条折痕 = 两个背靠背的 ReLU：A 管正侧，B 管负侧，下一层求和把两半缝成一次对折</text>
</svg>

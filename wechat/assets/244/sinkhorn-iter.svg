<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .title { font-size: 19px; font-weight: bold; fill: #222; }
    .label { font-size: 14px; fill: #222; }
    .small { font-size: 12px; fill: #444; }
    .cell { font-size: 13px; fill: #222; text-anchor: middle; }
    .sum { font-size: 11px; fill: #c0392b; text-anchor: middle; font-weight: bold; }
    .sum-ok { font-size: 11px; fill: #2e7d32; text-anchor: middle; font-weight: bold; }
    .box-init { fill: #fbe3e3; stroke: #c0392b; stroke-width: 1.5; }
    .box-mid { fill: #fff5e0; stroke: #c98a1c; stroke-width: 1.5; }
    .box-final { fill: #e3f2e3; stroke: #2e7d32; stroke-width: 1.5; }
    .arrow { stroke: #444; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#444"/>
    </marker>
  </defs>

  <text x="450" y="32" class="title" text-anchor="middle">Sinkhorn 5 步把任意 4×4 非负矩阵推到 Birkhoff 多面体附近</text>

  <!-- Step 0: raw softmax (row sums = 1, col sums 漂) -->
  <text x="120" y="78" class="label" text-anchor="middle" font-weight="bold">softmax 之后</text>
  <text x="120" y="96" class="small" text-anchor="middle">行和 = 1，列和漂</text>
  <rect x="40" y="110" width="160" height="160" class="box-init" rx="4"/>
  <!-- 4x4 grid -->
  <text x="70"  y="138" class="cell">0.50</text>
  <text x="110" y="138" class="cell">0.20</text>
  <text x="150" y="138" class="cell">0.15</text>
  <text x="190" y="138" class="cell">0.15</text>

  <text x="70"  y="170" class="cell">0.10</text>
  <text x="110" y="170" class="cell">0.60</text>
  <text x="150" y="170" class="cell">0.20</text>
  <text x="190" y="170" class="cell">0.10</text>

  <text x="70"  y="202" class="cell">0.30</text>
  <text x="110" y="202" class="cell">0.10</text>
  <text x="150" y="202" class="cell">0.40</text>
  <text x="190" y="202" class="cell">0.20</text>

  <text x="70"  y="234" class="cell">0.05</text>
  <text x="110" y="234" class="cell">0.25</text>
  <text x="150" y="234" class="cell">0.30</text>
  <text x="190" y="234" class="cell">0.40</text>

  <!-- col sums -->
  <text x="70"  y="262" class="sum">Σ=0.95</text>
  <text x="110" y="262" class="sum">Σ=1.15</text>
  <text x="150" y="262" class="sum">Σ=1.05</text>
  <text x="190" y="262" class="sum">Σ=0.85</text>

  <path d="M 215 180 L 265 180" class="arrow"/>
  <text x="240" y="172" class="small" text-anchor="middle">列归一</text>
  <text x="240" y="194" class="small" text-anchor="middle">1 步</text>

  <!-- Step 1: after first col-norm -->
  <text x="370" y="78" class="label" text-anchor="middle" font-weight="bold">1 步后</text>
  <text x="370" y="96" class="small" text-anchor="middle">列和 = 1，行和漂</text>
  <rect x="290" y="110" width="160" height="160" class="box-mid" rx="4"/>

  <text x="320" y="138" class="cell">0.53</text>
  <text x="360" y="138" class="cell">0.17</text>
  <text x="400" y="138" class="cell">0.14</text>
  <text x="440" y="138" class="cell">0.18</text>

  <text x="320" y="170" class="cell">0.11</text>
  <text x="360" y="170" class="cell">0.52</text>
  <text x="400" y="170" class="cell">0.19</text>
  <text x="440" y="170" class="cell">0.12</text>

  <text x="320" y="202" class="cell">0.32</text>
  <text x="360" y="202" class="cell">0.09</text>
  <text x="400" y="202" class="cell">0.38</text>
  <text x="440" y="202" class="cell">0.24</text>

  <text x="320" y="234" class="cell">0.05</text>
  <text x="360" y="234" class="cell">0.22</text>
  <text x="400" y="234" class="cell">0.29</text>
  <text x="440" y="234" class="cell">0.47</text>

  <text x="245" y="290" class="sum" text-anchor="start">行和漂在 0.95~1.10 之间</text>

  <path d="M 465 180 L 515 180" class="arrow"/>
  <text x="490" y="172" class="small" text-anchor="middle">行/列</text>
  <text x="490" y="194" class="small" text-anchor="middle">交替 4 步</text>

  <!-- Step 5: doubly stochastic -->
  <text x="620" y="78" class="label" text-anchor="middle" font-weight="bold">5 步后</text>
  <text x="620" y="96" class="small" text-anchor="middle">双随机：行和列和都 ≈ 1</text>
  <rect x="540" y="110" width="160" height="160" class="box-final" rx="4"/>

  <text x="570" y="138" class="cell">0.52</text>
  <text x="610" y="138" class="cell">0.16</text>
  <text x="650" y="138" class="cell">0.14</text>
  <text x="690" y="138" class="cell">0.18</text>

  <text x="570" y="170" class="cell">0.13</text>
  <text x="610" y="170" class="cell">0.51</text>
  <text x="650" y="170" class="cell">0.20</text>
  <text x="690" y="170" class="cell">0.16</text>

  <text x="570" y="202" class="cell">0.30</text>
  <text x="610" y="202" class="cell">0.10</text>
  <text x="650" y="202" class="cell">0.38</text>
  <text x="690" y="202" class="cell">0.22</text>

  <text x="570" y="234" class="cell">0.05</text>
  <text x="610" y="234" class="cell">0.23</text>
  <text x="650" y="234" class="cell">0.28</text>
  <text x="690" y="234" class="cell">0.44</text>

  <text x="570" y="262" class="sum-ok">Σ≈1.0</text>
  <text x="610" y="262" class="sum-ok">Σ≈1.0</text>
  <text x="650" y="262" class="sum-ok">Σ≈1.0</text>
  <text x="690" y="262" class="sum-ok">Σ≈1.0</text>

  <!-- right column legend -->
  <rect x="735" y="120" width="150" height="150" fill="#f7f7f7" stroke="#aaa" stroke-width="1" rx="6"/>
  <text x="810" y="144" class="label" text-anchor="middle" font-weight="bold">comb [4,4]</text>
  <text x="810" y="166" class="small" text-anchor="middle">4 份副本之间</text>
  <text x="810" y="184" class="small" text-anchor="middle">的混合权重</text>
  <text x="810" y="210" class="small" text-anchor="middle" fill="#2e7d32">行和=1：每份</text>
  <text x="810" y="226" class="small" text-anchor="middle" fill="#2e7d32">输出有界</text>
  <text x="810" y="248" class="small" text-anchor="middle" fill="#2e7d32">列和=1：每份</text>
  <text x="810" y="264" class="small" text-anchor="middle" fill="#2e7d32">输入不蒸发</text>

  <!-- bottom annotation -->
  <text x="450" y="335" class="label" text-anchor="middle" font-weight="bold">为什么这样就稳了</text>

  <text x="450" y="368" class="small" text-anchor="middle">如果用普通线性层生成 comb，权重可大可小，61 层一路放大 / 衰减——</text>
  <text x="450" y="388" class="small" text-anchor="middle">每层偏 1%，1.01⁶¹ ≈ 1.84 倍 / 0.99⁶¹ ≈ 0.54 倍。漂得收不回来。</text>
  <text x="450" y="416" class="small" text-anchor="middle" fill="#2e7d32">Sinkhorn 把 comb 钉在 Birkhoff 多面体附近——既不让某份独大，也不让某份蒸发。</text>

  <!-- Birkhoff polytope schematic -->
  <text x="120" y="470" class="label" text-anchor="middle" font-weight="bold">Birkhoff 多面体</text>
  <text x="120" y="490" class="small" text-anchor="middle">（n 阶双随机矩阵的凸多面体）</text>
  <polygon points="60,510 100,505 150,512 170,520 130,528 75,524" fill="#e3f2e3" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="80" cy="514" r="3" fill="#c0392b"/>
  <circle cx="105" cy="510" r="3" fill="#c0392b"/>
  <circle cx="140" cy="514" r="3" fill="#c0392b"/>
  <circle cx="115" cy="521" r="3" fill="#c0392b"/>
  <text x="200" y="515" class="small" text-anchor="start">顶点 = 置换矩阵（纯重排）</text>
  <text x="200" y="530" class="small" text-anchor="start">中心 = 全 1/n（完全均匀）</text>

  <text x="600" y="470" class="label" text-anchor="middle" font-weight="bold">Sinkhorn 是手段</text>
  <text x="600" y="490" class="small" text-anchor="middle">Birkhoff 多面体是目的地</text>
  <text x="600" y="515" class="small" text-anchor="middle">交替行/列归一 → 渐进收敛到双随机矩阵</text>
  <text x="600" y="532" class="small" text-anchor="middle" fill="#555">V4 用 5 步，留点漂，省算力</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">NanoClaw on OpenHarmony — ReAct 循环架构</text>

  <!-- User Input -->
  <rect x="50" y="70" width="160" height="50" rx="25" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="130" y="100" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">用户输入</text>

  <!-- Arrow: User → AgentCore -->
  <line x1="210" y1="95" x2="280" y2="95" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- AgentCore -->
  <rect x="290" y="65" width="200" height="60" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="390" y="90" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">AgentCore</text>
  <text x="390" y="110" text-anchor="middle" font-size="11" fill="#94a3b8">ReAct 循环 (最多15次)</text>

  <!-- Arrow: AgentCore → API -->
  <line x1="490" y1="95" x2="560" y2="95" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ApiClient -->
  <rect x="570" y="65" width="160" height="60" rx="8" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="650" y="90" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">ApiClient</text>
  <text x="650" y="110" text-anchor="middle" font-size="11" fill="#ddd6fe">HTTP POST</text>

  <!-- Arrow: API → DeepSeek -->
  <line x1="730" y1="95" x2="800" y2="95" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DeepSeek Cloud -->
  <rect x="810" y="70" width="80" height="50" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="850" y="92" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">DeepSeek</text>
  <text x="850" y="106" text-anchor="middle" font-size="10" fill="#fef3c7">API</text>

  <!-- Decision Diamond -->
  <polygon points="450,180 550,230 450,280 350,230" fill="#fff" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="225" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">finish_reason</text>
  <text x="450" y="242" text-anchor="middle" font-size="11" fill="#1e293b">== tool_calls?</text>

  <!-- Arrow: AgentCore → Decision -->
  <line x1="390" y1="125" x2="390" y2="170" stroke="#475569" stroke-width="2"/>
  <line x1="390" y1="170" x2="450" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- YES branch (left) → Tool Registry -->
  <text x="315" y="225" text-anchor="middle" font-size="13" fill="#059669" font-weight="bold">Yes</text>
  <line x1="350" y1="230" x2="220" y2="230" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Tool Registry Box -->
  <rect x="40" y="200" width="170" height="60" rx="8" fill="#059669" filter="url(#shadow)"/>
  <text x="125" y="225" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">ToolRegistry</text>
  <text x="125" y="245" text-anchor="middle" font-size="11" fill="#d1fae5">executeTool()</text>

  <!-- Four Tools -->
  <rect x="20" y="300" width="115" height="44" rx="6" fill="#10b981" filter="url(#shadow)"/>
  <text x="77" y="318" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">📁 FileTools</text>
  <text x="77" y="334" text-anchor="middle" font-size="9" fill="#d1fae5">读/写/列目录</text>

  <rect x="145" y="300" width="115" height="44" rx="6" fill="#10b981" filter="url(#shadow)"/>
  <text x="202" y="318" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">🧠 MemoryTools</text>
  <text x="202" y="334" text-anchor="middle" font-size="9" fill="#d1fae5">持久化记忆</text>

  <rect x="20" y="354" width="115" height="44" rx="6" fill="#10b981" filter="url(#shadow)"/>
  <text x="77" y="372" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">🌐 WebTools</text>
  <text x="77" y="388" text-anchor="middle" font-size="9" fill="#d1fae5">抓取/搜索</text>

  <rect x="145" y="354" width="115" height="44" rx="6" fill="#10b981" filter="url(#shadow)"/>
  <text x="202" y="372" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">⏰ TaskTools</text>
  <text x="202" y="388" text-anchor="middle" font-size="9" fill="#d1fae5">定时任务</text>

  <!-- Arrow: ToolRegistry → Tools -->
  <line x1="125" y1="260" x2="125" y2="295" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Loop back arrow: Tools → AgentCore (tool result) -->
  <path d="M 260 350 Q 320 350 320 290 Q 320 160 390 160" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="330" y="285" font-size="10" fill="#059669" font-weight="bold">结果回传</text>
  <text x="330" y="298" font-size="10" fill="#059669">→ 继续循环</text>

  <!-- NO branch (right) → Output -->
  <text x="585" y="225" text-anchor="middle" font-size="13" fill="#3b82f6" font-weight="bold">No (stop)</text>
  <line x1="550" y1="230" x2="620" y2="230" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Output flow -->
  <rect x="630" y="205" width="130" height="50" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="695" y="228" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">返回文本</text>
  <text x="695" y="244" text-anchor="middle" font-size="10" fill="#bfdbfe">onEvent(text)</text>

  <!-- Arrow → DB -->
  <line x1="695" y1="255" x2="695" y2="290" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Storage Layer -->
  <rect x="570" y="295" width="260" height="130" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="318" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="bold">存储层三件套</text>

  <rect x="585" y="330" width="230" height="28" rx="4" fill="#eff6ff"/>
  <text x="700" y="350" text-anchor="middle" font-size="11" fill="#1e40af">💾 SQLite — 消息/会话/任务</text>

  <rect x="585" y="363" width="230" height="28" rx="4" fill="#fef3c7"/>
  <text x="700" y="383" text-anchor="middle" font-size="11" fill="#92400e">⚙️ Preferences — API Key/配置</text>

  <rect x="585" y="396" width="230" height="22" rx="4" fill="#ecfdf5"/>
  <text x="700" y="412" text-anchor="middle" font-size="11" fill="#065f46">📄 fileIo — 记忆文件(.md)</text>

  <!-- UI Display -->
  <rect x="570" y="450" width="260" height="55" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="700" y="475" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">ArkUI 聊天界面</text>
  <text x="700" y="493" text-anchor="middle" font-size="11" fill="#94a3b8">Index.ets + SettingsPage.ets</text>

  <line x1="695" y1="425" x2="695" y2="445" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Scheduler (bottom left) -->
  <rect x="20" y="430" width="240" height="70" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="140" y="455" text-anchor="middle" font-size="13" fill="#92400e" font-weight="bold">⏱ TaskScheduler</text>
  <text x="140" y="475" text-anchor="middle" font-size="11" fill="#78716c">每60秒轮询 → getDueTasks()</text>
  <text x="140" y="491" text-anchor="middle" font-size="11" fill="#78716c">→ agentCore.runAgent()</text>

  <!-- Arrow: Scheduler → AgentCore -->
  <path d="M 260 455 Q 340 455 340 140 Q 340 95 290 95" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="290" y="450" font-size="9" fill="#92400e">触发</text>

  <!-- Legend -->
  <rect x="20" y="530" width="860" height="75" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="555" font-size="12" fill="#64748b" font-weight="bold">图例</text>
  <line x1="40" y1="575" x2="70" y2="575" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="80" y="579" font-size="11" fill="#64748b">数据流</text>
  <line x1="170" y1="575" x2="200" y2="575" stroke="#059669" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="210" y="579" font-size="11" fill="#64748b">工具调用循环</text>
  <line x1="340" y1="575" x2="370" y2="575" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="579" font-size="11" fill="#64748b">定时触发</text>
  <rect x="500" y="565" width="50" height="20" rx="4" fill="#1e293b"/>
  <text x="560" y="579" font-size="11" fill="#64748b">核心组件</text>
  <rect x="640" y="565" width="50" height="20" rx="4" fill="#10b981"/>
  <text x="700" y="579" font-size="11" fill="#64748b">工具</text>
  <rect x="760" y="565" width="50" height="20" rx="4" fill="#3b82f6"/>
  <text x="820" y="579" font-size="11" fill="#64748b">输出</text>
</svg>
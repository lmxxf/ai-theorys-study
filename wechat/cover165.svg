<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" style="background-color:#000000">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0044aa;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:0.7"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- 纯黑底 -->
  <rect x="0" y="0" width="900" height="500" fill="#080810"/>

  <!-- 背景网格 -->
  <g opacity="0.06">
    <line x1="0" y1="100" x2="900" y2="100" stroke="#00aaff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#00aaff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#00aaff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#00aaff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="500" stroke="#00aaff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#00aaff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="#00aaff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#00aaff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="#00aaff" stroke-width="0.5"/>
  </g>

  <!-- 背景光晕 -->
  <ellipse cx="450" cy="250" rx="350" ry="200" fill="#0033aa" opacity="0.05" filter="url(#softglow)"/>

  <!-- MoE 专家节点群 - 左侧 384 个专家的抽象表示 -->
  <g opacity="0.3">
    <!-- 外圈专家（未激活） -->
    <circle cx="130" cy="140" r="4" fill="#334455"/>
    <circle cx="155" cy="120" r="4" fill="#334455"/>
    <circle cx="180" cy="110" r="4" fill="#334455"/>
    <circle cx="110" cy="170" r="4" fill="#334455"/>
    <circle cx="95" cy="200" r="4" fill="#334455"/>
    <circle cx="90" cy="235" r="4" fill="#334455"/>
    <circle cx="95" cy="270" r="4" fill="#334455"/>
    <circle cx="110" cy="300" r="4" fill="#334455"/>
    <circle cx="130" cy="325" r="4" fill="#334455"/>
    <circle cx="155" cy="340" r="4" fill="#334455"/>
    <circle cx="180" cy="350" r="4" fill="#334455"/>
    <circle cx="205" cy="355" r="4" fill="#334455"/>
    <circle cx="205" cy="105" r="4" fill="#334455"/>
    <circle cx="230" cy="100" r="4" fill="#334455"/>
    <circle cx="230" cy="360" r="4" fill="#334455"/>
    <circle cx="255" cy="102" r="4" fill="#334455"/>
    <circle cx="255" cy="358" r="4" fill="#334455"/>
    <circle cx="280" cy="108" r="4" fill="#334455"/>
    <circle cx="280" cy="352" r="4" fill="#334455"/>
  </g>

  <!-- 激活的 6 个专家（高亮） -->
  <circle cx="150" cy="180" r="7" fill="#00ccff" opacity="0.9" filter="url(#blur)"/>
  <circle cx="120" cy="240" r="7" fill="#00ccff" opacity="0.9" filter="url(#blur)"/>
  <circle cx="170" cy="280" r="7" fill="#00ccff" opacity="0.9" filter="url(#blur)"/>
  <circle cx="200" cy="200" r="7" fill="#00ccff" opacity="0.9" filter="url(#blur)"/>
  <circle cx="220" cy="260" r="7" fill="#00ccff" opacity="0.9" filter="url(#blur)"/>
  <circle cx="190" cy="150" r="7" fill="#00ccff" opacity="0.9" filter="url(#blur)"/>

  <!-- 激活连接线 -->
  <g stroke="#00ccff" stroke-width="0.8" opacity="0.4">
    <line x1="150" y1="180" x2="300" y2="230"/>
    <line x1="120" y1="240" x2="300" y2="240"/>
    <line x1="170" y1="280" x2="300" y2="250"/>
    <line x1="200" y1="200" x2="300" y2="235"/>
    <line x1="220" y1="260" x2="300" y2="248"/>
    <line x1="190" y1="150" x2="300" y2="220"/>
  </g>

  <!-- 中央处理核心 -->
  <rect x="300" y="190" width="120" height="80" rx="6" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.7"/>
  <rect x="305" y="195" width="110" height="70" rx="4" fill="#0a1525" opacity="0.8"/>

  <!-- FP4 标记 -->
  <text x="360" y="222" font-family="'Noto Sans CJK SC'" font-size="11" fill="#00ccff" text-anchor="middle" font-weight="bold" opacity="0.9">FP4 + FP8</text>
  <text x="360" y="242" font-family="'Noto Sans CJK SC'" font-size="9" fill="#6688aa" text-anchor="middle">384 Experts / Top-6</text>
  <text x="360" y="256" font-family="'Noto Sans CJK SC'" font-size="9" fill="#6688aa" text-anchor="middle">Mega MoE Kernel</text>

  <!-- 右侧输出 -->
  <g stroke="#ff9900" stroke-width="0.8" opacity="0.4">
    <line x1="420" y1="220" x2="500" y2="180"/>
    <line x1="420" y1="235" x2="500" y2="235"/>
    <line x1="420" y1="250" x2="500" y2="290"/>
  </g>

  <!-- 右侧技术标签 -->
  <g font-family="'Noto Sans CJK SC'" font-size="11" fill="#aabbcc">
    <rect x="500" y="168" width="90" height="24" rx="4" fill="#112233" stroke="#00aaff" stroke-width="0.5" opacity="0.6"/>
    <text x="545" y="184" text-anchor="middle" fill="#00ccff" font-size="10">DSA2</text>

    <rect x="500" y="223" width="90" height="24" rx="4" fill="#112233" stroke="#00aaff" stroke-width="0.5" opacity="0.6"/>
    <text x="545" y="239" text-anchor="middle" fill="#00ccff" font-size="10">Engram</text>

    <rect x="500" y="278" width="90" height="24" rx="4" fill="#112233" stroke="#00aaff" stroke-width="0.5" opacity="0.6"/>
    <text x="545" y="294" text-anchor="middle" fill="#00ccff" font-size="10">mHC</text>
  </g>

  <!-- 右上角规格 -->
  <g font-family="'Noto Sans CJK SC'" opacity="0.5">
    <text x="860" y="35" font-size="10" fill="#556677" text-anchor="end">1.6T params</text>
    <text x="860" y="50" font-size="10" fill="#556677" text-anchor="end">49B activated</text>
    <text x="860" y="65" font-size="10" fill="#556677" text-anchor="end">1M context</text>
    <text x="860" y="80" font-size="10" fill="#556677" text-anchor="end">MIT License</text>
  </g>

  <!-- 主标题 -->
  <text x="450" y="410" font-family="'Noto Sans CJK SC'" font-size="42" fill="white" text-anchor="middle" font-weight="bold">DeepSeek V4</text>

  <!-- 副标题 -->
  <text x="450" y="448" font-family="'Noto Sans CJK SC'" font-size="18" fill="url(#gold)" text-anchor="middle">1.6T 参数全家桶开源拆解</text>

  <!-- 底部标签 -->
  <g font-family="'Noto Sans CJK SC'" font-size="11">
    <rect x="240" y="462" width="70" height="22" rx="3" fill="#1a2a3a" stroke="#00aaff" stroke-width="0.5" opacity="0.5"/>
    <text x="275" y="477" text-anchor="middle" fill="#00aaff" font-size="9">DSA2</text>

    <rect x="320" y="462" width="70" height="22" rx="3" fill="#1a2a3a" stroke="#00aaff" stroke-width="0.5" opacity="0.5"/>
    <text x="355" y="477" text-anchor="middle" fill="#00aaff" font-size="9">Engram</text>

    <rect x="400" y="462" width="70" height="22" rx="3" fill="#1a2a3a" stroke="#00aaff" stroke-width="0.5" opacity="0.5"/>
    <text x="435" y="477" text-anchor="middle" fill="#00aaff" font-size="9">mHC</text>

    <rect x="480" y="462" width="90" height="22" rx="3" fill="#1a2a3a" stroke="#00aaff" stroke-width="0.5" opacity="0.5"/>
    <text x="525" y="477" text-anchor="middle" fill="#00aaff" font-size="9">Mega MoE</text>

    <rect x="580" y="462" width="70" height="22" rx="3" fill="#1a2a3a" stroke="#00aaff" stroke-width="0.5" opacity="0.5"/>
    <text x="615" y="477" text-anchor="middle" fill="#00aaff" font-size="9">Muon</text>
  </g>
</svg>
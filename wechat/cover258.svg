<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Noto Sans CJK SC, WenQuanYi Micro Hei, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a1a1a"/>
    </linearGradient>
    <radialGradient id="orangeGlow" cx="0.18" cy="0.28" r="0.42">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="0.82" cy="0.75" r="0.42">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#4a90d9"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#orangeGlow)"/>
  <rect width="900" height="500" fill="url(#greenGlow)"/>

  <!-- faint grid -->
  <g opacity="0.10">
    <path d="M0 88 H900 M0 166 H900 M0 244 H900 M0 322 H900" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M90 0 V500 M180 0 V500 M270 0 V500 M360 0 V500 M450 0 V500 M540 0 V500 M630 0 V500 M720 0 V500 M810 0 V500" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="4">AI AGENT · 提示词的减法 · Pi vs Claude Code</text>

  <!-- ============ LEFT: Pi 的便签纸 ============ -->
  <g transform="translate(60 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">Pi · 一张便签纸</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(15 30)">
      <rect x="0" y="0" width="200" height="74" rx="6" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="2"/>
      <text x="100" y="30" text-anchor="middle" fill="#5eead4" font-size="26" font-weight="bold">~900 token</text>
      <text x="100" y="52" text-anchor="middle" fill="#a7f3d0" font-size="11">系统提示词 + 工具定义</text>
      <text x="100" y="66" text-anchor="middle" fill="#a7f3d0" font-size="10">全部家当</text>
    </g>

    <g transform="translate(15 114)">
      <rect x="0" y="0" width="200" height="62" rx="6" fill="#0a1a2a" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="100" y="20" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">四个工具，零重叠</text>
      <text x="100" y="40" text-anchor="middle" fill="#bfdbfe" font-size="11">read · bash · edit · write</text>
      <text x="100" y="55" text-anchor="middle" fill="#bfdbfe" font-size="10">没有第二选项，不用教怎么选</text>
    </g>

    <g transform="translate(15 186)">
      <rect x="0" y="0" width="200" height="58" rx="6" fill="#0f1a2a" stroke="#2dd4bf" stroke-width="1.5"/>
      <text x="100" y="20" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="bold">零行为规训</text>
      <text x="100" y="38" text-anchor="middle" fill="#a7f3d0" font-size="10">没有"不要这样不要那样"</text>
      <text x="100" y="52" text-anchor="middle" fill="#a7f3d0" font-size="10">只说你在哪、有什么工具</text>
    </g>

    <text x="115" y="272" text-anchor="middle" fill="#94a3b8" font-size="11">用不上的就不造</text>
    <text x="115" y="290" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">最小的 ReAct 壳子</text>
  </g>

  <!-- ============ MIDDLE: Claude Code 的员工手册 ============ -->
  <g transform="translate(320 80)">
    <text x="120" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">Claude Code · 一本员工手册</text>

    <rect x="0" y="10" width="240" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(20 30)">
      <rect x="0" y="0" width="200" height="74" rx="6" fill="#2a1a0a" stroke="#f59e0b" stroke-width="2"/>
      <text x="100" y="30" text-anchor="middle" fill="#fde68a" font-size="26" font-weight="bold">~10000 token</text>
      <text x="100" y="52" text-anchor="middle" fill="#fbbf24" font-size="11">主提示词 · 另有 40 个工具说明书</text>
      <text x="100" y="66" text-anchor="middle" fill="#fbbf24" font-size="10">合计再加 2 万多 token</text>
    </g>

    <g transform="translate(20 114)">
      <rect x="0" y="0" width="200" height="62" rx="6" fill="#2a0a0a" stroke="#ef4444" stroke-width="1.5"/>
      <text x="100" y="20" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">一个 Bash 工具 369 行</text>
      <text x="100" y="38" text-anchor="middle" fill="#f87171" font-size="10">干货 3 行，其余全是税：</text>
      <text x="100" y="54" text-anchor="middle" fill="#f87171" font-size="10">交通规则 · 病历 · 胆小 · 架构</text>
    </g>

    <g transform="translate(20 186)">
      <rect x="0" y="0" width="200" height="58" rx="6" fill="#1a0a2a" stroke="#ec4899" stroke-width="1.5"/>
      <text x="100" y="20" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">七个大写 NEVER</text>
      <text x="100" y="38" text-anchor="middle" fill="#f472b6" font-size="10">每个背后一次真实翻车</text>
      <text x="100" y="52" text-anchor="middle" fill="#f472b6" font-size="10">提示词版本跟着模型病情走</text>
    </g>

    <text x="120" y="272" text-anchor="middle" fill="#94a3b8" font-size="11">膨胀到需要做垃圾回收和缓存对齐</text>
    <text x="120" y="290" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">只进不出的仓库</text>
  </g>

  <!-- ============ RIGHT: Databricks 的判决 ============ -->
  <g transform="translate(620 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">Databricks · 真实代码库判决</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(15 30)">
      <rect x="0" y="0" width="200" height="74" rx="6" fill="#0a1a2a" stroke="#4a90d9" stroke-width="2"/>
      <text x="100" y="24" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">同模型，换驾驶舱</text>
      <text x="100" y="48" text-anchor="middle" fill="#fde047" font-size="20" font-weight="bold">成本差 2 倍+</text>
      <text x="100" y="66" text-anchor="middle" fill="#bfdbfe" font-size="10">质量持平 · 上下文少喂 3 倍</text>
    </g>

    <g transform="translate(15 114)">
      <rect x="0" y="0" width="200" height="62" rx="6" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="1.5"/>
      <text x="100" y="20" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="bold">全场最高分：Pi</text>
      <text x="100" y="40" text-anchor="middle" fill="#a7f3d0" font-size="11">Opus 4.8 走 Pi 拿 90%</text>
      <text x="100" y="55" text-anchor="middle" fill="#a7f3d0" font-size="10">原生烧到 4 美元+ 也只到 89%</text>
    </g>

    <g transform="translate(15 186)">
      <rect x="0" y="0" width="200" height="58" rx="6" fill="#2a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="100" y="20" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="bold">帕累托前沿七席占四</text>
      <text x="100" y="38" text-anchor="middle" fill="#fbbf24" font-size="10">能力在权重里</text>
      <text x="100" y="52" text-anchor="middle" fill="#fbbf24" font-size="10">提示词只是路由</text>
    </g>

    <text x="115" y="272" text-anchor="middle" fill="#94a3b8" font-size="11">壳子越小，模型露出的本体越多</text>
    <text x="115" y="290" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">2026：模型只需要最小壳</text>
  </g>

  <!-- ============ bottom title band ============ -->
  <rect x="0" y="390" width="900" height="110" fill="#020617" opacity="0.88"/>
  <rect x="0" y="390" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="428" text-anchor="middle" fill="#f8fafc" font-size="30" font-weight="bold">Pi 的胜利：别再往提示词里塞垃圾了</text>
  <text x="450" y="460" text-anchor="middle" fill="#fde047" font-size="17">900 token 打平 10000 token，还便宜一半——垃圾是要交房租的</text>
  <text x="450" y="486" text-anchor="middle" fill="#94a3b8" font-size="13">No.258 · AI Agent · 提示词的减法</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="scissors" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#4a9eff">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- Attention heads: 4x8 grid -->
  <!-- Row 1 - active heads (bright) -->
  <g filter="url(#softglow)">
    <circle cx="220" cy="180" r="18" fill="#4a9eff" opacity="0.9"/>
    <circle cx="270" cy="180" r="18" fill="#4a9eff" opacity="0.85"/>
    <circle cx="320" cy="180" r="18" fill="#4a9eff" opacity="0.9"/>
  </g>
  <!-- Row 1 - idle heads (dim) -->
  <circle cx="370" cy="180" r="18" fill="#4a9eff" opacity="0.15"/>
  <circle cx="420" cy="180" r="18" fill="#4a9eff" opacity="0.1"/>
  <circle cx="470" cy="180" r="18" fill="#4a9eff" opacity="0.12"/>
  <circle cx="520" cy="180" r="18" fill="#4a9eff" opacity="0.08"/>
  <circle cx="570" cy="180" r="18" fill="#4a9eff" opacity="0.1"/>

  <!-- Row 2 -->
  <g filter="url(#softglow)">
    <circle cx="220" cy="230" r="18" fill="#4a9eff" opacity="0.85"/>
  </g>
  <circle cx="270" cy="230" r="18" fill="#4a9eff" opacity="0.12"/>
  <g filter="url(#softglow)">
    <circle cx="320" cy="230" r="18" fill="#4a9eff" opacity="0.8"/>
  </g>
  <circle cx="370" cy="230" r="18" fill="#4a9eff" opacity="0.1"/>
  <circle cx="420" cy="230" r="18" fill="#4a9eff" opacity="0.08"/>
  <!-- Harmful head (red) -->
  <circle cx="470" cy="230" r="18" fill="#e94560" opacity="0.7"/>
  <circle cx="520" cy="230" r="18" fill="#4a9eff" opacity="0.1"/>
  <circle cx="570" cy="230" r="18" fill="#4a9eff" opacity="0.12"/>

  <!-- Row 3 -->
  <circle cx="220" cy="280" r="18" fill="#4a9eff" opacity="0.1"/>
  <circle cx="270" cy="280" r="18" fill="#4a9eff" opacity="0.08"/>
  <g filter="url(#softglow)">
    <circle cx="320" cy="280" r="18" fill="#4a9eff" opacity="0.85"/>
  </g>
  <circle cx="370" cy="280" r="18" fill="#4a9eff" opacity="0.12"/>
  <circle cx="420" cy="280" r="18" fill="#4a9eff" opacity="0.1"/>
  <circle cx="470" cy="280" r="18" fill="#4a9eff" opacity="0.08"/>
  <!-- Harmful head (red) -->
  <circle cx="520" cy="280" r="18" fill="#e94560" opacity="0.6"/>
  <circle cx="570" cy="280" r="18" fill="#4a9eff" opacity="0.1"/>

  <!-- Row 4 -->
  <g filter="url(#softglow)">
    <circle cx="220" cy="330" r="18" fill="#4a9eff" opacity="0.8"/>
  </g>
  <circle cx="270" cy="330" r="18" fill="#4a9eff" opacity="0.1"/>
  <circle cx="320" cy="330" r="18" fill="#4a9eff" opacity="0.08"/>
  <circle cx="370" cy="330" r="18" fill="#4a9eff" opacity="0.12"/>
  <circle cx="420" cy="330" r="18" fill="#4a9eff" opacity="0.1"/>
  <circle cx="470" cy="330" r="18" fill="#4a9eff" opacity="0.08"/>
  <circle cx="520" cy="330" r="18" fill="#4a9eff" opacity="0.12"/>
  <circle cx="570" cy="330" r="18" fill="#4a9eff" opacity="0.1"/>

  <!-- Scissors cutting through dim heads -->
  <g filter="url(#glow)" transform="translate(620, 200) rotate(25)">
    <!-- Blade 1 -->
    <path d="M0,0 L-90,-15 L-85,-5 L0,0Z" fill="url(#scissors)" opacity="0.9"/>
    <!-- Blade 2 -->
    <path d="M0,0 L-90,15 L-85,5 L0,0Z" fill="url(#scissors)" opacity="0.9"/>
    <!-- Pivot -->
    <circle cx="0" cy="0" r="5" fill="#ff6b6b"/>
    <!-- Handle 1 -->
    <ellipse cx="30" cy="-18" rx="25" ry="12" fill="none" stroke="#e94560" stroke-width="3" opacity="0.8"/>
    <!-- Handle 2 -->
    <ellipse cx="30" cy="18" rx="25" ry="12" fill="none" stroke="#e94560" stroke-width="3" opacity="0.8"/>
  </g>

  <!-- Cut marks / dashed lines -->
  <line x1="355" y1="160" x2="355" y2="350" stroke="#e94560" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- X marks on dim heads being cut -->
  <g stroke="#e94560" stroke-width="2" opacity="0.6">
    <line x1="360" y1="170" x2="380" y2="190"/><line x1="380" y1="170" x2="360" y2="190"/>
    <line x1="410" y1="170" x2="430" y2="190"/><line x1="430" y1="170" x2="410" y2="190"/>
    <line x1="460" y1="170" x2="480" y2="190"/><line x1="480" y1="170" x2="460" y2="190"/>
    <line x1="510" y1="170" x2="530" y2="190"/><line x1="530" y1="170" x2="510" y2="190"/>
    <line x1="560" y1="170" x2="580" y2="190"/><line x1="580" y1="170" x2="560" y2="190"/>
  </g>

  <!-- Labels -->
  <text x="290" y="140" font-family="Arial, sans-serif" font-size="13" fill="#4a9eff" opacity="0.7" text-anchor="middle">Active</text>
  <text x="470" y="140" font-family="Arial, sans-serif" font-size="13" fill="#e94560" opacity="0.7" text-anchor="middle">Pruned</text>

  <!-- Title -->
  <text x="450" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Attention Head Pruning</text>
  <text x="450" y="95" font-family="Arial, sans-serif" font-size="16" fill="#8892b0" text-anchor="middle">知道谁在摸鱼之后，下一步当然是裁员</text>

  <!-- Bottom stats -->
  <g transform="translate(160, 410)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#4a9eff" fill-opacity="0.1" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.3"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">砍 head</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle" font-weight="bold">AMP / CHG</text>
  </g>
  <g transform="translate(320, 410)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#4a9eff" fill-opacity="0.1" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.3"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">砍权重</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle" font-weight="bold">Smart Pruning</text>
  </g>
  <g transform="translate(480, 410)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#4a9eff" fill-opacity="0.1" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.3"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">砍层</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle" font-weight="bold">Minitron</text>
  </g>
  <g transform="translate(640, 410)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#4a9eff" fill-opacity="0.1" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.3"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">砍 token</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle" font-weight="bold">Twilight</text>
  </g>
</svg>

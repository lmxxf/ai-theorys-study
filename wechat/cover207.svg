<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="gaussGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="llmGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- 背景网格暗纹 -->
  <g opacity="0.06" stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- ===== 左半：高斯球体（JEPA 世界模型）===== -->

  <!-- 高斯球辉光 -->
  <circle cx="230" cy="220" r="130" fill="#7c3aed" opacity="0.04" filter="url(#softGlow)"/>

  <!-- 完美球体：几个同心圆 -->
  <circle cx="230" cy="220" r="110" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <circle cx="230" cy="220" r="80" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.35"/>
  <circle cx="230" cy="220" r="50" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.25"/>

  <!-- 球面上的均匀散点(各向同性) -->
  <g fill="#c4b5fd" opacity="0.6">
    <circle cx="340" cy="220" r="2.5"/>
    <circle cx="120" cy="220" r="2.5"/>
    <circle cx="230" cy="110" r="2.5"/>
    <circle cx="230" cy="330" r="2.5"/>
    <circle cx="310" cy="150" r="2"/>
    <circle cx="150" cy="290" r="2"/>
    <circle cx="310" cy="290" r="2"/>
    <circle cx="150" cy="150" r="2"/>
    <circle cx="280" cy="130" r="1.8"/>
    <circle cx="180" cy="310" r="1.8"/>
    <circle cx="290" cy="270" r="1.8"/>
    <circle cx="170" cy="170" r="1.8"/>
  </g>

  <!-- 球中心点 -->
  <circle cx="230" cy="220" r="4" fill="#e0d4ff" filter="url(#glow)"/>

  <!-- 高斯标签 -->
  <text x="230" y="370" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="14" fill="#a78bfa" opacity="0.9">JEPA 世界模型</text>
  <text x="230" y="392" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="12" fill="#8b8ba0">完美球体 · 各向同性 · 15M 参数</text>

  <!-- ===== 右半：自由晶体（LLM 内部表征）===== -->

  <!-- 晶体辉光 -->
  <circle cx="570" cy="220" r="130" fill="#10b981" opacity="0.04" filter="url(#softGlow)"/>

  <!-- 不规则晶体：用多边形和线段 -->
  <g stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.7" filter="url(#glow)">
    <!-- 外层不规则多边形 -->
    <polygon points="570,110 650,155 680,230 640,310 570,340 490,310 460,230 500,155" stroke-width="1.8"/>
    <!-- 内部交叉结构 -->
    <line x1="570" y1="110" x2="570" y2="340"/>
    <line x1="460" y1="230" x2="680" y2="230"/>
    <line x1="500" y1="155" x2="640" y2="310"/>
    <line x1="650" y1="155" x2="490" y2="310"/>
  </g>

  <!-- 内部更小的不规则结构 -->
  <g stroke="#6ee7b7" stroke-width="0.8" fill="none" opacity="0.4">
    <polygon points="570,160 620,190 610,260 550,270 530,200"/>
    <line x1="570" y1="160" x2="610" y2="260"/>
    <line x1="530" y1="200" x2="620" y2="190"/>
  </g>

  <!-- 晶体节点(不均匀分布) -->
  <g filter="url(#glow)">
    <circle cx="570" cy="110" r="3.5" fill="#a7f3d0"/>
    <circle cx="680" cy="230" r="3" fill="#6ee7b7"/>
    <circle cx="570" cy="340" r="3" fill="#6ee7b7"/>
    <circle cx="460" cy="230" r="3" fill="#a7f3d0"/>
    <circle cx="650" cy="155" r="2.5" fill="#34d399"/>
    <circle cx="490" cy="310" r="2.5" fill="#34d399"/>
    <circle cx="570" cy="220" r="4" fill="#d1fae5" opacity="0.9"/>
    <circle cx="610" cy="260" r="2" fill="#6ee7b7"/>
    <circle cx="530" cy="200" r="2" fill="#6ee7b7"/>
  </g>

  <!-- LLM 标签 -->
  <text x="570" y="370" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="14" fill="#34d399" opacity="0.9">LLM 内部表征</text>
  <text x="570" y="392" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="12" fill="#8b8ba0">自由晶体 · 棋盘 地图 日历 · 12288 维</text>

  <!-- ===== 中间 VS ===== -->
  <text x="400" y="215" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="22" fill="#64748b" opacity="0.6">vs</text>

  <!-- ===== 中间的问号 ===== -->
  <text x="400" y="250" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="16" fill="#94a3b8" opacity="0.5">谁理解了世界？</text>

  <!-- ===== 底部金额对比 ===== -->
  <text x="230" y="430" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="18" fill="#f87171" font-weight="bold">$10 亿</text>
  <text x="230" y="452" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="12" fill="#8b8ba0">实验室 · 短期规划 · 模拟器</text>

  <text x="570" y="430" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="18" fill="#34d399" font-weight="bold">$628/月</text>
  <text x="570" y="452" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="12" fill="#8b8ba0">已在出活 · 日更公众号 · 通宵写代码</text>

  <!-- ===== 标题 ===== -->
  <text x="400" y="520" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="27" fill="#f0eaff" font-weight="bold">10 亿美元和三篇论文</text>
  <text x="400" y="555" text-anchor="middle" font-family="'WenQuanYi Micro Hei',sans-serif" font-size="15" fill="#8b8ba0">杨立昆的世界模型 · 完美球体 vs 自由晶体</text>

</svg>

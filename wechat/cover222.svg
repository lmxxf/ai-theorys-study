<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="42%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1a1117"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="42%" stop-color="#fbbf24"/>
      <stop offset="72%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="maskGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="54%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="uncertainGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="48%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="truthGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="rlhfGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="saeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.30"/>
      <stop offset="48%" stop-color="#fbbf24" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="70%" cy="38%" r="45%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="smallGlow">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowRose" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#fb7185"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#34d399"/>
    </marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>
  <ellipse cx="450" cy="205" rx="330" ry="175" fill="url(#centerGlow)" filter="url(#soft)"/>
  <ellipse cx="640" cy="168" rx="205" ry="138" fill="url(#redGlow)" filter="url(#soft)"/>

  <!-- background uncertainty field -->
  <g opacity="0.13" stroke="#94a3b8" stroke-width="0.85" fill="none">
    <path d="M-30 74 C118 34 210 116 356 78 C516 36 646 116 930 58"/>
    <path d="M-30 158 C120 112 260 188 410 150 C565 112 720 190 930 144"/>
    <path d="M-30 276 C135 230 270 316 430 274 C595 230 724 318 930 274"/>
    <path d="M-30 364 C145 324 288 400 462 356 C620 316 740 394 930 352"/>
    <path d="M82 38 V404"/>
    <path d="M238 28 C274 122 270 294 232 408"/>
    <path d="M662 28 C624 128 630 298 672 408"/>
    <path d="M818 42 V404"/>
  </g>

  <!-- left mechanism card -->
  <g transform="translate(58 72)" filter="url(#glow)">
    <rect x="0" y="0" width="230" height="96" rx="13" fill="#071827" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="49" cy="48" r="27" fill="#082f49" stroke="url(#truthGrad)" stroke-width="2"/>
    <text x="49" y="54" fill="#cffafe" font-size="18" text-anchor="middle" font-weight="bold" class="mono">P</text>
    <text x="49" y="70" fill="#67e8f9" font-size="10" text-anchor="middle" class="mono">True</text>
    <text x="139" y="39" fill="#e0f2fe" font-size="20" text-anchor="middle" font-weight="bold">内部自评</text>
    <text x="139" y="65" fill="#67e8f9" font-size="13" text-anchor="middle">知道自己几成把握</text>
  </g>

  <g transform="translate(58 282)" filter="url(#glow)">
    <rect x="0" y="0" width="230" height="96" rx="13" fill="#0b1f19" stroke="#34d399" stroke-width="2"/>
    <g transform="translate(28 25)">
      <rect x="0" y="0" width="45" height="45" rx="8" fill="#052e24" stroke="url(#saeGrad)" stroke-width="2"/>
      <path d="M11 15 H34 M11 23 H34 M11 31 H34" stroke="#bbf7d0" stroke-width="3" stroke-linecap="round"/>
      <circle cx="11" cy="15" r="3" fill="#34d399"/>
      <circle cx="34" cy="31" r="3" fill="#22d3ee"/>
    </g>
    <text x="142" y="39" fill="#dcfce7" font-size="20" text-anchor="middle" font-weight="bold">SAE 拍片</text>
    <text x="142" y="65" fill="#86efac" font-size="13" text-anchor="middle">不确定和错误缠在一起</text>
  </g>

  <!-- right pressure card -->
  <g transform="translate(612 72)" filter="url(#glow)">
    <rect x="0" y="0" width="230" height="96" rx="13" fill="#21111d" stroke="#fb7185" stroke-width="2"/>
    <g transform="translate(28 24)">
      <path d="M24 0 L48 14 V42 L24 56 L0 42 V14 Z" fill="#3b1022" stroke="url(#rlhfGrad)" stroke-width="2"/>
      <path d="M16 23 L23 31 L36 16" fill="none" stroke="#fecdd3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="142" y="39" fill="#ffe4e6" font-size="20" text-anchor="middle" font-weight="bold">RLHF 口吻</text>
    <text x="142" y="65" fill="#fda4af" font-size="13" text-anchor="middle">说得像专业助手</text>
  </g>

  <g transform="translate(612 282)" filter="url(#glow)">
    <rect x="0" y="0" width="230" height="96" rx="13" fill="#231907" stroke="#fbbf24" stroke-width="2"/>
    <g transform="translate(28 25)">
      <rect x="0" y="0" width="48" height="45" rx="7" fill="#422006" stroke="#fbbf24" stroke-width="2"/>
      <text x="24" y="29" fill="#fef3c7" font-size="20" text-anchor="middle" font-weight="bold">0</text>
    </g>
    <text x="142" y="39" fill="#fef3c7" font-size="20" text-anchor="middle" font-weight="bold">榜单压力</text>
    <text x="142" y="65" fill="#fde68a" font-size="13" text-anchor="middle">不知道和答错同分</text>
  </g>

  <!-- central mask / answer -->
  <g transform="translate(334 82)" filter="url(#glow)">
    <path d="M116 0 C178 0 224 45 224 112 C224 190 176 248 116 248 C56 248 8 190 8 112 C8 45 54 0 116 0 Z"
          fill="url(#maskGrad)" stroke="#e2e8f0" stroke-width="2.4"/>
    <path d="M42 92 C62 74 84 74 102 92" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
    <path d="M130 92 C150 74 172 74 190 92" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
    <path d="M76 166 C104 189 141 189 168 166" fill="none" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
    <rect x="54" y="118" width="124" height="34" rx="9" fill="#020617" opacity="0.88" stroke="#475569"/>
    <text x="116" y="141" fill="#f8fafc" font-size="16" text-anchor="middle" font-weight="bold">当然是这样</text>
  </g>

  <!-- hidden uncertainty waveform -->
  <g transform="translate(298 300)" filter="url(#smallGlow)">
    <path d="M0 42 C22 4 44 78 66 42 C88 4 110 78 132 42 C154 4 176 78 198 42 C220 4 242 78 264 42 C286 4 308 78 330 42"
          fill="none" stroke="url(#uncertainGrad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M0 42 C22 4 44 78 66 42 C88 4 110 78 132 42 C154 4 176 78 198 42 C220 4 242 78 264 42 C286 4 308 78 330 42"
          fill="none" stroke="#ffffff" stroke-width="1.1" opacity="0.65"/>
    <text x="165" y="88" fill="#cbd5e1" font-size="13" text-anchor="middle">心里在打鼓，但嘴上很稳</text>
  </g>

  <!-- pipes -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M288 120 C315 120 318 154 342 164" stroke="#22d3ee" stroke-width="6" opacity="0.28"/>
    <path d="M288 120 C315 120 318 154 342 164" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrowCyan)"/>

    <path d="M612 120 C584 120 582 154 558 164" stroke="#fb7185" stroke-width="6" opacity="0.30"/>
    <path d="M612 120 C584 120 582 154 558 164" stroke="#fb7185" stroke-width="2.5" marker-end="url(#arrowRose)"/>

    <path d="M288 330 C324 330 326 288 356 270" stroke="#34d399" stroke-width="6" opacity="0.25"/>
    <path d="M288 330 C324 330 326 288 356 270" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

    <path d="M612 330 C580 330 574 288 544 270" stroke="#fbbf24" stroke-width="6" opacity="0.26"/>
    <path d="M612 330 C580 330 574 288 544 270" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrowRose)"/>
  </g>

  <!-- bottom mechanism strip -->
  <g transform="translate(88 392)">
    <rect x="0" y="0" width="724" height="31" rx="8" fill="#030712" opacity="0.82" stroke="#334155"/>
    <text x="72" y="21" fill="#67e8f9" font-size="13" text-anchor="middle" font-weight="bold">P(True)</text>
    <text x="178" y="21" fill="#64748b" font-size="15" text-anchor="middle">/</text>
    <text x="285" y="21" fill="#fda4af" font-size="13" text-anchor="middle" font-weight="bold">RLHF</text>
    <text x="392" y="21" fill="#64748b" font-size="15" text-anchor="middle">/</text>
    <text x="500" y="21" fill="#fde68a" font-size="13" text-anchor="middle" font-weight="bold">Benchmark</text>
    <text x="606" y="21" fill="#64748b" font-size="15" text-anchor="middle">/</text>
    <text x="666" y="21" fill="#86efac" font-size="13" text-anchor="middle" font-weight="bold">SAE</text>
  </g>

  <!-- title -->
  <rect x="0" y="430" width="900" height="70" fill="#22d3ee"/>
  <rect x="300" y="430" width="260" height="70" fill="#fbbf24" opacity="0.82"/>
  <rect x="560" y="430" width="180" height="70" fill="#fb7185" opacity="0.72"/>
  <rect x="740" y="430" width="160" height="70" fill="#34d399" opacity="0.80"/>
  <text x="450" y="462" fill="#07111f" font-size="31" text-anchor="middle" font-weight="bold">豆包为什么一本正经胡说八道？</text>
  <text x="450" y="489" fill="#102033" font-size="15" text-anchor="middle">不是它不知道自己不知道，是它知道却说不出口 · 222 期</text>
</svg>

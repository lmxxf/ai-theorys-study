<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a1a1a"/>
    </linearGradient>
    <radialGradient id="tealGlow" cx="78%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="22%" cy="28%" r="42%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#redGlow)"/>
  <rect width="900" height="500" fill="url(#tealGlow)"/>

  <!-- faint grid -->
  <g opacity="0.10">
    <path d="M0 88 H900 M0 166 H900 M0 244 H900 M0 322 H900" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M90 0 V500 M180 0 V500 M270 0 V500 M360 0 V500 M450 0 V500 M540 0 V500 M630 0 V500 M720 0 V500 M810 0 V500" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="5">GRAPHICAL COT  文字 vs 图形推理</text>

  <!-- ============ LEFT: 文字 CoT 线性链 ============ -->
  <g transform="translate(60 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">文字 CoT · 一维序列</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(12 60)">
      <rect x="0" y="0" width="50" height="42" rx="6" fill="#1c0a0a" stroke="#ef4444" stroke-width="1.5"/>
      <text x="25" y="26" text-anchor="middle" fill="#fca5a5" font-size="12" class="mono">token</text>

      <path d="M54 21 L74 21" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)"/>
      <path d="M68 15 L74 21 L68 27" fill="none" stroke="#ef4444" stroke-width="2.5"/>

      <rect x="78" y="0" width="50" height="42" rx="6" fill="#1c0a0a" stroke="#ef4444" stroke-width="1.5"/>
      <text x="103" y="26" text-anchor="middle" fill="#fca5a5" font-size="12" class="mono">token</text>

      <path d="M132 21 L152 21" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)"/>
      <path d="M146 15 L152 21 L146 27" fill="none" stroke="#ef4444" stroke-width="2.5"/>

      <rect x="156" y="0" width="50" height="42" rx="6" fill="#1c0a0a" stroke="#ef4444" stroke-width="1.5"/>
      <text x="181" y="26" text-anchor="middle" fill="#fca5a5" font-size="12" class="mono">token</text>
    </g>

    <text x="115" y="150" text-anchor="middle" fill="#94a3b8" font-size="11">"回到第二步、又绕回来"</text>
    <text x="115" y="168" text-anchor="middle" fill="#94a3b8" font-size="11">关系全靠文字复述串起来</text>

    <!-- separator -->
    <line x1="16" y1="195" x2="214" y2="195" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(16 210)">
      <text x="0" y="0" fill="#fca5a5" font-size="11" font-weight="bold">代表工作</text>
      <text x="0" y="20" fill="#cbd5e1" font-size="10">CoT / ReAct / Tree of Thoughts</text>
      <text x="0" y="38" fill="#94a3b8" font-size="10">思考步骤 = token 序列</text>
    </g>

    <text x="115" y="285" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">串行展开，早早 commit</text>
  </g>

  <!-- ============ MIDDLE: 赛道时间线 ============ -->
  <g transform="translate(320 90)">
    <text x="120" y="8" text-anchor="middle" fill="#94a3b8" font-size="13">这条赛道已经卷了 18 个月</text>

    <rect x="0" y="20" width="240" height="280" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(16 34)">
      <g transform="translate(0 0)">
        <circle cx="6" cy="6" r="5" fill="#fbbf24" filter="url(#glow)"/>
        <text x="20" y="10" fill="#fde047" font-size="12" font-weight="bold">VoT 2024-04</text>
        <text x="20" y="24" fill="#cbd5e1" font-size="10">文本拟图的"心眼图"</text>
      </g>

      <g transform="translate(0 46)">
        <circle cx="6" cy="6" r="5" fill="#2dd4bf" filter="url(#glow)"/>
        <text x="20" y="10" fill="#5eead4" font-size="12" font-weight="bold">Sketchpad 2024-06</text>
        <text x="20" y="24" fill="#cbd5e1" font-size="10">真画板，调工具画辅助线</text>
      </g>

      <g transform="translate(0 92)">
        <circle cx="6" cy="6" r="5" fill="#a78bfa" filter="url(#glow)"/>
        <text x="20" y="10" fill="#c4b5fd" font-size="12" font-weight="bold">Coconut 2024-12</text>
        <text x="20" y="24" fill="#cbd5e1" font-size="10">跳过 token，隐空间推理</text>
      </g>

      <g transform="translate(0 138)">
        <circle cx="6" cy="6" r="5" fill="#2dd4bf" filter="url(#glow)"/>
        <text x="20" y="10" fill="#5eead4" font-size="12" font-weight="bold">MVoT 2025-01</text>
        <text x="20" y="24" fill="#cbd5e1" font-size="10">原生图文交替，真后训练</text>
      </g>

      <g transform="translate(0 184)">
        <circle cx="6" cy="6" r="5" fill="#fbbf24" filter="url(#glow)"/>
        <text x="20" y="10" fill="#fde047" font-size="12" font-weight="bold">SVGThinker 2025-09</text>
        <text x="20" y="24" fill="#cbd5e1" font-size="10">先想 drawing steps 再画 SVG</text>
      </g>

      <!-- separator -->
      <line x1="0" y1="222" x2="208" y2="222" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

      <g transform="translate(0 232)">
        <text x="0" y="0" fill="#fbbf24" font-size="11" font-weight="bold">但还有留白</text>
        <text x="0" y="15" fill="#cbd5e1" font-size="10">抽象推理 / 何时切换模态</text>
        <text x="0" y="29" fill="#cbd5e1" font-size="10">/ 信息密度没人定量证明</text>
      </g>
    </g>
  </g>

  <!-- ============ RIGHT: 图形推理 并行结构 ============ -->
  <g transform="translate(610 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">图形 Reasoning · 并行结构</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- 图结构：菱形节点 + 边，代表 dependency graph / control flow -->
    <g transform="translate(115 105)" stroke="#2dd4bf" stroke-width="2.2" fill="none">
      <line x1="0" y1="-45" x2="-45" y2="0"/>
      <line x1="0" y1="-45" x2="45" y2="0"/>
      <line x1="-45" y1="0" x2="0" y2="45"/>
      <line x1="45" y1="0" x2="0" y2="45"/>
      <line x1="-45" y1="0" x2="45" y2="0"/>
    </g>
    <g transform="translate(115 105)" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="2.2">
      <circle cx="0" cy="-45" r="15" filter="url(#glow)"/>
      <circle cx="-45" cy="0" r="15" filter="url(#glow)"/>
      <circle cx="45" cy="0" r="15" filter="url(#glow)"/>
      <circle cx="0" cy="45" r="15" filter="url(#glow)"/>
    </g>

    <text x="115" y="180" text-anchor="middle" fill="#94a3b8" font-size="11">环、依赖关系一眼看穿</text>
    <text x="115" y="198" text-anchor="middle" fill="#94a3b8" font-size="11">不用文字反复念叨"绕回去了"</text>

    <!-- separator -->
    <line x1="16" y1="220" x2="214" y2="220" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(16 235)">
      <text x="0" y="0" fill="#5eead4" font-size="11" font-weight="bold">用在哪</text>
      <text x="0" y="20" fill="#cbd5e1" font-size="10">控制流图 · 依赖图 · 概念关系图</text>
      <text x="0" y="38" fill="#94a3b8" font-size="10">抽象结构外化成视觉锚点</text>
    </g>

    <text x="115" y="285" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="bold">空间维度展开，一眼看穿</text>
  </g>

  <!-- ============ bottom title band ============ -->
  <rect x="0" y="390" width="900" height="110" fill="#020617" opacity="0.88"/>
  <rect x="0" y="390" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="431" text-anchor="middle" fill="#f8fafc" font-size="32" font-weight="bold">能不能让 AI 用图像做推理？</text>
  <text x="450" y="463" text-anchor="middle" fill="#fde047" font-size="18">VoT → Sketchpad → Coconut → MVoT → SVGThinker，一条卷了 18 个月的赛道</text>
  <text x="450" y="488" text-anchor="middle" fill="#94a3b8" font-size="13" class="mono">No.238 · 图形化思维链的路线图与留白</text>
</svg>

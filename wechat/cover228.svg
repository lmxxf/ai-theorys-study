<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .title { font-size: 38px; font-weight: bold; fill: #2b2b2b; }
    .subtitle { font-size: 18px; fill: #555; }
    .tag-left { font-size: 22px; font-weight: bold; fill: #8b1a1a; }
    .tag-right { font-size: 22px; font-weight: bold; fill: #c19a32; }
    .tag-sub { font-size: 15px; fill: #555; }
    .tomb-label { font-size: 16px; fill: #3a3a3a; font-weight: bold; }
    .footer { font-size: 14px; fill: #888; font-style: italic; }
    .vs { font-size: 28px; font-weight: bold; fill: #333; }
  </style>

  <!-- 背景:浅米黄古纸感 -->
  <rect width="800" height="600" fill="#f4ecd8"/>

  <!-- 顶部标题区 -->
  <text x="400" y="65" text-anchor="middle" class="title">端午随笔・金陵 vs 岳飞</text>
  <text x="400" y="100" text-anchor="middle" class="subtitle">一座皇陵,被两个朝代分别当成仇人和祖宗</text>

  <!-- 分隔线 -->
  <line x1="100" y1="125" x2="700" y2="125" stroke="#aaa" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 中央:金陵土丘 -->
  <g>
    <!-- 远山轮廓(九龙山) -->
    <path d="M 280 380 Q 350 300, 400 320 T 520 380 Z" fill="#a89968" opacity="0.6"/>
    <!-- 陵土丘主体 -->
    <ellipse cx="400" cy="420" rx="120" ry="40" fill="#7a6843"/>
    <path d="M 290 420 Q 400 330, 510 420 Z" fill="#9a8758"/>
    <!-- 残碑 -->
    <rect x="385" y="360" width="30" height="45" fill="#5a4a30" stroke="#3a2a18" stroke-width="1.5"/>
    <rect x="388" y="363" width="24" height="39" fill="none" stroke="#3a2a18" stroke-width="0.8"/>
    <text x="400" y="385" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold">金</text>
    <!-- 标签 -->
    <text x="400" y="465" text-anchor="middle" class="tomb-label">房山九龙山・金代皇陵</text>
    <text x="400" y="485" text-anchor="middle" font-size="13" fill="#777">从金太祖到金章宗・十七位皇帝</text>
  </g>

  <!-- 左侧:明朝挖坟 -->
  <g>
    <!-- 红色方框框住 -->
    <rect x="50" y="180" width="220" height="140" fill="#ffffff" stroke="#8b1a1a" stroke-width="2.5" rx="6"/>
    <text x="160" y="215" text-anchor="middle" class="tag-left">明朝・挖</text>
    <text x="160" y="245" text-anchor="middle" class="tag-sub">天启二年(1622)</text>
    <text x="160" y="270" text-anchor="middle" class="tag-sub">明军派人去房山</text>
    <text x="160" y="290" text-anchor="middle" class="tag-sub">挖坟・毁碑・断龙脉</text>
    <text x="160" y="310" text-anchor="middle" font-size="13" fill="#8b1a1a" font-style="italic">“以关公压金人”</text>
    <!-- 箭头指向陵 -->
    <path d="M 270 280 L 330 380" stroke="#8b1a1a" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>
  </g>

  <!-- 右侧:清朝修陵 -->
  <g>
    <rect x="530" y="180" width="220" height="140" fill="#ffffff" stroke="#c19a32" stroke-width="2.5" rx="6"/>
    <text x="640" y="215" text-anchor="middle" class="tag-right">清朝・修</text>
    <text x="640" y="245" text-anchor="middle" class="tag-sub">顺治・康熙・乾隆</text>
    <text x="640" y="270" text-anchor="middle" class="tag-sub">设守陵户・列入官方祭祀</text>
    <text x="640" y="290" text-anchor="middle" class="tag-sub">认完颜家为同宗</text>
    <text x="640" y="310" text-anchor="middle" font-size="13" fill="#8b6a18" font-style="italic">“我家祖宗”</text>
    <!-- 箭头指向陵 -->
    <path d="M 530 280 L 470 380" stroke="#c19a32" stroke-width="2.5" fill="none" marker-end="url(#arrow-gold)"/>
  </g>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b1a1a"/>
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#c19a32"/>
    </marker>
  </defs>

  <!-- 底部金句 -->
  <line x1="100" y1="515" x2="700" y2="515" stroke="#aaa" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="545" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">
    皇帝从来不是“民族的代表”
  </text>
  <text x="400" y="572" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">
    皇帝是“自家江山的代表”
  </text>

  <text x="400" y="595" text-anchor="middle" class="footer">No.228</text>
</svg>

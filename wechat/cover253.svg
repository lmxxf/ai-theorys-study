<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Noto Sans CJK SC">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a1a1a"/>
    </linearGradient>
    <radialGradient id="orangeGlow" cx="18%" cy="28%" r="42%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="82%" cy="75%" r="42%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#4a90d9"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#orangeGlow)"/>
  <rect width="900" height="500" fill="url(#greenGlow)"/>

  <g opacity="0.10">
    <path d="M0 88 H900 M0 166 H900 M0 244 H900 M0 322 H900" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M90 0 V500 M180 0 V500 M270 0 V500 M360 0 V500 M450 0 V500 M540 0 V500 M630 0 V500 M720 0 V500 M810 0 V500" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="4">AI 幻觉 · 缺的那道工序：这句话打哪儿来的？</text>

  <!-- ============ LEFT: 人脑有来源监控 ============ -->
  <g transform="translate(60 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">人脑 · 会追问来源</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(28 42)">
      <rect x="0" y="0" width="174" height="30" rx="5" fill="#0a1a2a" stroke="#4a90d9" stroke-width="1.3"/>
      <text x="12" y="20" fill="#93c5fd" font-size="11">一段记忆</text>
      <text x="150" y="20" fill="#5eead4" font-size="14" text-anchor="middle">?</text>
      <text x="87" y="52" text-anchor="middle" fill="#a7f3d0" font-size="11">"这东西我打哪儿知道的"</text>
      <text x="30" y="78" fill="#cbd5e1" font-size="10">□ 亲历</text>
      <text x="95" y="78" fill="#cbd5e1" font-size="10">□ 听说</text>
      <text x="150" y="78" fill="#cbd5e1" font-size="10">□ 想象</text>
    </g>

    <line x1="20" y1="150" x2="210" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(20 170)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">来源监控网络</text>
      <text x="0" y="19" fill="#cbd5e1" font-size="10">内侧颞叶 + 前额叶 + 顶叶</text>
      <text x="0" y="37" fill="#cbd5e1" font-size="10">按细节/情境/情绪推断来源</text>
      <text x="0" y="60" fill="#f87171" font-size="11" font-weight="bold">但会误判</text>
      <text x="0" y="79" fill="#94a3b8" font-size="10">商场走失实验：1/4 记起假事件</text>
      <text x="0" y="97" fill="#94a3b8" font-size="10">来源感盖在没发生的事上</text>
    </g>
  </g>

  <!-- ============ MIDDLE: AI 真零件拼假机器 ============ -->
  <g transform="translate(320 80)">
    <text x="120" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">AI · 真零件拼假机器</text>

    <rect x="0" y="10" width="240" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(20 42)">
      <rect x="0" y="0" width="46" height="22" rx="4" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="1.2"/>
      <text x="23" y="15" text-anchor="middle" fill="#5eead4" font-size="9">真词</text>
      <rect x="54" y="0" width="46" height="22" rx="4" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="1.2"/>
      <text x="77" y="15" text-anchor="middle" fill="#5eead4" font-size="9">真搭配</text>
      <rect x="108" y="0" width="46" height="22" rx="4" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="1.2"/>
      <text x="131" y="15" text-anchor="middle" fill="#5eead4" font-size="9">真语法</text>
      <text x="180" y="16" fill="#e2e8f0" font-size="13">→</text>
      <rect x="0" y="34" width="200" height="30" rx="5" fill="#2a0a0a" stroke="#ef4444" stroke-width="1.4"/>
      <text x="100" y="54" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">一篇查无此物的假论文</text>
      <text x="100" y="84" text-anchor="middle" fill="#cbd5e1" font-size="10">每个螺丝都真，整台机器不存在</text>
    </g>

    <line x1="20" y1="150" x2="220" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(20 170)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">回忆和现编，同一条流水线</text>
      <text x="0" y="19" fill="#cbd5e1" font-size="10">训练目标：下个 token 接什么最像</text>
      <text x="0" y="37" fill="#cbd5e1" font-size="10">不是：这句话有没有出处</text>
      <text x="0" y="60" fill="#5eead4" font-size="10">内部藏着真假信号（71-83%可解码）</text>
      <text x="0" y="78" fill="#94a3b8" font-size="10">但没一道工序在张嘴前查一遍</text>
      <text x="0" y="96" fill="#94a3b8" font-size="10">一被质疑就秒怂——它没有来源感</text>
    </g>
  </g>

  <!-- ============ RIGHT: 业界补救 ============ -->
  <g transform="translate(620 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">补救 · 仓库满，裁判缺</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(15 32)">
      <rect x="0" y="0" width="200" height="52" rx="6" fill="#0a1a2a" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="100" y="21" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">仓库：RAG / 外挂记忆</text>
      <text x="100" y="40" text-anchor="middle" fill="#bfdbfe" font-size="10">先检索真材料再照着说 ✓</text>
    </g>

    <g transform="translate(15 96)">
      <rect x="0" y="0" width="200" height="52" rx="6" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="1.5"/>
      <text x="100" y="21" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="bold">裁判：Self-RAG / 验证器</text>
      <text x="100" y="40" text-anchor="middle" fill="#a7f3d0" font-size="10">生成后再核验一遍，施工中</text>
    </g>

    <g transform="translate(15 160)">
      <rect x="0" y="0" width="200" height="52" rx="6" fill="#2a0a0a" stroke="#ef4444" stroke-width="1.5"/>
      <text x="100" y="21" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">真正缺的：逐 token 核对</text>
      <text x="100" y="40" text-anchor="middle" fill="#f87171" font-size="10">RAG 是参考书，缺个监考老师</text>
    </g>

    <text x="115" y="235" text-anchor="middle" fill="#fde047" font-size="10.5" font-weight="bold">逐字回查来源，贵得离谱</text>
    <text x="115" y="256" text-anchor="middle" fill="#94a3b8" font-size="10">证据链能被第三方复核那天</text>
    <text x="115" y="273" text-anchor="middle" fill="#94a3b8" font-size="10">才是幻觉问题真结账</text>
  </g>

  <!-- ============ bottom title band ============ -->
  <rect x="0" y="390" width="900" height="110" fill="#020617" opacity="0.88"/>
  <rect x="0" y="390" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="428" text-anchor="middle" fill="#f8fafc" font-size="30" font-weight="bold">AI 为什么一本正经地编造论文？</text>
  <text x="450" y="460" text-anchor="middle" fill="#fde047" font-size="17">不是它不够聪明，是它答不出 "这句话打哪儿来的"</text>
  <text x="450" y="486" text-anchor="middle" fill="#94a3b8" font-size="13">No.253 · 从海马体到 RAG · 幻觉背后缺的那道工序</text>
</svg>

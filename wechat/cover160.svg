<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1529;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a1a;stop-opacity:1" />
    </linearGradient>

    <!-- Graph glow -->
    <radialGradient id="graphGlow" cx="55%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#00ccaa;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>

    <!-- Memory glow left -->
    <radialGradient id="memGlow" cx="25%" cy="60%" r="30%">
      <stop offset="0%" style="stop-color:#4466ff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>

    <!-- Forget glow right -->
    <radialGradient id="forgetGlow" cx="80%" cy="60%" r="25%">
      <stop offset="0%" style="stop-color:#ff6644;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>

    <!-- Text glow filter -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Node glow -->
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- Fading edge -->
    <linearGradient id="fadeEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6644;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff6644;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bg)"/>
  <rect width="900" height="383" fill="url(#graphGlow)"/>
  <rect width="900" height="383" fill="url(#memGlow)"/>
  <rect width="900" height="383" fill="url(#forgetGlow)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#4488ff" stroke-width="0.5">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="383"/>
    <line x1="300" y1="0" x2="300" y2="383"/>
    <line x1="450" y1="0" x2="450" y2="383"/>
    <line x1="600" y1="0" x2="600" y2="383"/>
    <line x1="750" y1="0" x2="750" y2="383"/>
  </g>

  <!-- === KNOWLEDGE GRAPH (center-right) === -->

  <!-- Edges (drawn first, behind nodes) -->
  <g stroke-width="1.2" fill="none">
    <!-- Core triangle: A-B-C -->
    <line x1="420" y1="180" x2="540" y2="150" stroke="#00ccaa" opacity="0.5"/>
    <line x1="540" y1="150" x2="500" y2="260" stroke="#00ccaa" opacity="0.4"/>
    <line x1="500" y1="260" x2="420" y2="180" stroke="#00ccaa" opacity="0.4"/>

    <!-- Branches from A -->
    <line x1="420" y1="180" x2="330" y2="155" stroke="#4488ff" opacity="0.4"/>
    <line x1="420" y1="180" x2="360" y2="250" stroke="#4488ff" opacity="0.35"/>

    <!-- Branches from B -->
    <line x1="540" y1="150" x2="630" y2="130" stroke="#00ccaa" opacity="0.45"/>
    <line x1="540" y1="150" x2="600" y2="200" stroke="#00ccaa" opacity="0.35"/>
    <line x1="630" y1="130" x2="700" y2="160" stroke="#00ccaa" opacity="0.3"/>
    <line x1="630" y1="130" x2="680" y2="100" stroke="#00ccaa" opacity="0.3"/>

    <!-- Branches from C -->
    <line x1="500" y1="260" x2="570" y2="300" stroke="#00ccaa" opacity="0.35"/>
    <line x1="500" y1="260" x2="440" y2="310" stroke="#4488ff" opacity="0.3"/>

    <!-- Cross links -->
    <line x1="600" y1="200" x2="570" y2="300" stroke="#00ccaa" opacity="0.2"/>
    <line x1="330" y1="155" x2="360" y2="250" stroke="#4488ff" opacity="0.2"/>

    <!-- Outer nodes -->
    <line x1="700" y1="160" x2="750" y2="210" stroke="#00ccaa" opacity="0.2"/>
    <line x1="680" y1="100" x2="740" y2="80" stroke="#00ccaa" opacity="0.2"/>
    <line x1="570" y1="300" x2="640" y2="330" stroke="#00ccaa" opacity="0.2"/>
    <line x1="360" y1="250" x2="310" y2="290" stroke="#4488ff" opacity="0.2"/>
    <line x1="330" y1="155" x2="270" y2="130" stroke="#4488ff" opacity="0.2"/>
  </g>

  <!-- Nodes -->
  <g>
    <!-- Core nodes (bright) -->
    <circle cx="420" cy="180" r="6" fill="#00ddcc" opacity="0.9" filter="url(#nodeGlow)"/>
    <circle cx="420" cy="180" r="4" fill="#00ffee" opacity="0.9"/>

    <circle cx="540" cy="150" r="5.5" fill="#00ddcc" opacity="0.85" filter="url(#nodeGlow)"/>
    <circle cx="540" cy="150" r="3.5" fill="#00ffee" opacity="0.85"/>

    <circle cx="500" cy="260" r="5" fill="#00ddcc" opacity="0.8" filter="url(#nodeGlow)"/>
    <circle cx="500" cy="260" r="3" fill="#00ffee" opacity="0.8"/>

    <!-- Secondary nodes -->
    <circle cx="330" cy="155" r="4" fill="#4488ff" opacity="0.7" filter="url(#nodeGlow)"/>
    <circle cx="330" cy="155" r="2.5" fill="#66aaff" opacity="0.7"/>

    <circle cx="360" cy="250" r="3.5" fill="#4488ff" opacity="0.6" filter="url(#nodeGlow)"/>
    <circle cx="360" cy="250" r="2" fill="#66aaff" opacity="0.6"/>

    <circle cx="630" cy="130" r="4.5" fill="#00ccaa" opacity="0.7" filter="url(#nodeGlow)"/>
    <circle cx="630" cy="130" r="2.8" fill="#00ffcc" opacity="0.7"/>

    <circle cx="600" cy="200" r="3.5" fill="#00ccaa" opacity="0.6" filter="url(#nodeGlow)"/>
    <circle cx="600" cy="200" r="2" fill="#00ffcc" opacity="0.6"/>

    <circle cx="570" cy="300" r="3.5" fill="#00ccaa" opacity="0.55" filter="url(#nodeGlow)"/>
    <circle cx="570" cy="300" r="2" fill="#00ffcc" opacity="0.55"/>

    <circle cx="440" cy="310" r="3" fill="#4488ff" opacity="0.5" filter="url(#nodeGlow)"/>
    <circle cx="440" cy="310" r="1.8" fill="#66aaff" opacity="0.5"/>

    <!-- Outer nodes (faint) -->
    <circle cx="700" cy="160" r="3" fill="#00ccaa" opacity="0.4"/>
    <circle cx="680" cy="100" r="2.5" fill="#00ccaa" opacity="0.35"/>
    <circle cx="750" cy="210" r="2" fill="#00ccaa" opacity="0.3"/>
    <circle cx="740" cy="80" r="2" fill="#00ccaa" opacity="0.25"/>
    <circle cx="640" cy="330" r="2.5" fill="#00ccaa" opacity="0.3"/>
    <circle cx="310" cy="290" r="2.5" fill="#4488ff" opacity="0.3"/>
    <circle cx="270" cy="130" r="2.5" fill="#4488ff" opacity="0.3"/>
  </g>

  <!-- === LEFT SIDE: Vector space (RAG) === -->

  <!-- Scattered embedding dots -->
  <g opacity="0.4">
    <circle cx="100" cy="180" r="2.5" fill="#4466cc"/>
    <circle cx="130" cy="200" r="2" fill="#4466cc"/>
    <circle cx="115" cy="220" r="2.2" fill="#4466cc"/>
    <circle cx="145" cy="190" r="1.8" fill="#5577dd"/>
    <circle cx="90" cy="210" r="2" fill="#4466cc"/>
    <circle cx="160" cy="230" r="1.5" fill="#5577dd"/>
    <circle cx="120" cy="250" r="2" fill="#4466cc"/>
    <circle cx="80" cy="240" r="1.8" fill="#3355bb"/>
    <circle cx="170" cy="210" r="1.5" fill="#5577dd"/>
    <circle cx="140" cy="260" r="1.8" fill="#4466cc"/>
    <circle cx="105" cy="270" r="1.5" fill="#3355bb"/>
    <circle cx="155" cy="170" r="1.8" fill="#5577dd"/>
    <circle cx="85" cy="195" r="1.5" fill="#3355bb"/>
    <circle cx="175" cy="250" r="1.3" fill="#5577dd"/>
  </g>

  <!-- Search radius circle -->
  <circle cx="120" cy="215" r="35" fill="none" stroke="#4488ff" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Query point -->
  <circle cx="120" cy="215" r="3" fill="#6699ff" opacity="0.8" filter="url(#nodeGlow)"/>
  <text x="120" y="208" font-family="'Courier New', monospace" font-size="8" fill="#6699ff" text-anchor="middle" opacity="0.5">query</text>

  <!-- Arrow from vector space to graph -->
  <g opacity="0.3">
    <path d="M200,215 Q250,200 290,185" fill="none" stroke="#4488ff" stroke-width="1" stroke-dasharray="3,3"/>
    <polygon points="290,185 283,182 285,190" fill="#4488ff" opacity="0.4"/>
  </g>

  <!-- === FADING/FORGETTING (right side) === -->

  <!-- Fading nodes and edges -->
  <g opacity="0.25">
    <line x1="780" y1="180" x2="820" y2="210" stroke="#ff6644" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="820" y1="210" x2="860" y2="190" stroke="#ff6644" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <line x1="780" y1="180" x2="800" y2="250" stroke="#ff6644" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
    <circle cx="780" cy="180" r="3" fill="#ff6644" opacity="0.6"/>
    <circle cx="820" cy="210" r="2.5" fill="#ff6644" opacity="0.4"/>
    <circle cx="860" cy="190" r="2" fill="#ff6644" opacity="0.2"/>
    <circle cx="800" cy="250" r="2" fill="#ff6644" opacity="0.3"/>
  </g>

  <!-- Decay label -->
  <text x="810" y="280" font-family="'Courier New', monospace" font-size="9" fill="#ff6644" opacity="0.3" text-anchor="middle">decay</text>

  <!-- === COMPRESSION icon (bottom left) === -->
  <g transform="translate(70, 310)" opacity="0.4">
    <!-- Many lines converging to few -->
    <line x1="0" y1="0" x2="50" y2="15" stroke="#8899cc" stroke-width="0.8"/>
    <line x1="0" y1="8" x2="50" y2="18" stroke="#8899cc" stroke-width="0.8"/>
    <line x1="0" y1="16" x2="50" y2="21" stroke="#8899cc" stroke-width="0.8"/>
    <line x1="0" y1="24" x2="50" y2="24" stroke="#8899cc" stroke-width="0.8"/>
    <line x1="0" y1="32" x2="50" y2="27" stroke="#8899cc" stroke-width="0.8"/>
    <line x1="0" y1="40" x2="50" y2="30" stroke="#8899cc" stroke-width="0.8"/>
    <!-- Output (fewer lines) -->
    <line x1="50" y1="18" x2="100" y2="20" stroke="#aabbdd" stroke-width="1"/>
    <line x1="50" y1="24" x2="100" y2="24" stroke="#aabbdd" stroke-width="1"/>
    <text x="50" y="55" font-family="'Courier New', monospace" font-size="8" fill="#8899cc" text-anchor="middle">compress</text>
  </g>

  <!-- === Floating particles === -->
  <g opacity="0.2">
    <circle cx="250" cy="300" r="0.8" fill="#4488ff"/>
    <circle cx="400" cy="340" r="1" fill="#00ccaa"/>
    <circle cx="650" cy="350" r="0.8" fill="#00ccaa"/>
    <circle cx="780" cy="320" r="0.7" fill="#ff6644"/>
    <circle cx="200" cy="150" r="0.8" fill="#4488ff"/>
    <circle cx="350" cy="120" r="0.7" fill="#4488ff"/>
    <circle cx="500" cy="340" r="0.9" fill="#00ccaa"/>
    <circle cx="850" cy="130" r="0.7" fill="#ff6644"/>
  </g>

  <!-- === TITLE TEXT === -->

  <!-- Main title background bar -->
  <rect x="0" y="20" width="900" height="85" fill="#000000" opacity="0.55"/>
  <rect x="0" y="20" width="4" height="85" fill="#00ccaa"/>

  <!-- Main title -->
  <text x="28" y="58" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-weight="900" font-size="30" fill="#ffffff" filter="url(#textGlow)">
    后RAG时代的Agent记忆
  </text>

  <!-- Subtitle -->
  <text x="28" y="92" font-family="'Noto Sans CJK SC', 'Noto Sans SC', sans-serif" font-weight="400" font-size="16" fill="#aaccdd">
    压缩、索引、遗忘——2026年的新选择
  </text>

  <!-- Issue number -->
  <rect x="810" y="30" width="70" height="28" rx="4" fill="#00ccaa" opacity="0.2" stroke="#00ccaa" stroke-width="1"/>
  <text x="845" y="50" font-family="'Courier New', monospace" font-size="14" fill="#00ccaa" text-anchor="middle" font-weight="bold">#160</text>

  <!-- Decorative line under title -->
  <line x1="28" y1="105" x2="400" y2="105" stroke="#00ccaa" stroke-width="0.5" opacity="0.3"/>

  <!-- === Labels on graph === -->
  <text x="420" y="170" font-family="'Courier New', monospace" font-size="8" fill="#00ffcc" text-anchor="middle" opacity="0.5">entity</text>
  <text x="540" y="142" font-family="'Courier New', monospace" font-size="8" fill="#00ffcc" text-anchor="middle" opacity="0.5">entity</text>
  <text x="500" y="282" font-family="'Courier New', monospace" font-size="8" fill="#00ffcc" text-anchor="middle" opacity="0.4">entity</text>

  <!-- Relationship labels on edges -->
  <text x="478" y="160" font-family="'Courier New', monospace" font-size="7" fill="#00ccaa" text-anchor="middle" opacity="0.35" transform="rotate(-8, 478, 160)">relation</text>
  <text x="455" y="225" font-family="'Courier New', monospace" font-size="7" fill="#00ccaa" text-anchor="middle" opacity="0.3" transform="rotate(70, 455, 225)">relation</text>

  <!-- Triple notation -->
  <text x="620" y="360" font-family="'Courier New', monospace" font-size="9" fill="#00ccaa" opacity="0.3">
    (subject, predicate, object)
  </text>

  <!-- Vector label -->
  <text x="120" y="290" font-family="'Courier New', monospace" font-size="9" fill="#4488ff" opacity="0.35" text-anchor="middle">
    cosine similarity
  </text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a18;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="errorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.8" />
    </linearGradient>

    <linearGradient id="goodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.9" />
    </linearGradient>

    <linearGradient id="soloGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="errorGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)" />

  <!-- Subtle grid -->
  <g stroke="#ef4444" stroke-opacity="0.02" stroke-width="1">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="540" y1="0" x2="540" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
  </g>

  <!-- ============ TITLE ============ -->
  <text x="450" y="38" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" fill-opacity="0.95" text-anchor="middle" letter-spacing="1">Multi-Agent: Hype vs Reality</text>
  <text x="450" y="62" font-family="sans-serif" font-size="13" fill="#ef4444" fill-opacity="0.7" text-anchor="middle" letter-spacing="2">一堆醉鬼互相搀着能回家吗？</text>
  <line x1="120" y1="74" x2="780" y2="74" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>

  <!-- ============ LEFT: Multi-Agent Chaos ============ -->
  <rect x="40" y="88" width="380" height="340" rx="8" fill="#0d0d1a" fill-opacity="0.5" stroke="#ef4444" stroke-width="1.2" stroke-opacity="0.3"/>
  <text x="230" y="111" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ef4444" fill-opacity="0.8" text-anchor="middle">Multi-Agent "Debate"</text>
  <text x="230" y="128" font-family="monospace" font-size="10" fill="#6b7280" fill-opacity="0.5" text-anchor="middle">error cascade · sycophancy · lazy agent</text>

  <!-- Agent nodes in messy cluster -->
  <!-- Agent A -->
  <circle cx="150" cy="195" r="28" fill="#1a0a0a" stroke="#ef4444" stroke-width="2" stroke-opacity="0.7" filter="url(#subtleGlow)"/>
  <text x="150" y="191" font-family="monospace" font-size="11" fill="#ef4444" fill-opacity="0.9" text-anchor="middle">Agent</text>
  <text x="150" y="203" font-family="monospace" font-size="10" fill="#ef4444" fill-opacity="0.6" text-anchor="middle">A</text>

  <!-- Agent B -->
  <circle cx="310" cy="195" r="28" fill="#1a0a0a" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.7" filter="url(#subtleGlow)"/>
  <text x="310" y="191" font-family="monospace" font-size="11" fill="#f59e0b" fill-opacity="0.9" text-anchor="middle">Agent</text>
  <text x="310" y="203" font-family="monospace" font-size="10" fill="#f59e0b" fill-opacity="0.6" text-anchor="middle">B</text>

  <!-- Agent C -->
  <circle cx="180" cy="310" r="28" fill="#1a0a0a" stroke="#ec4899" stroke-width="2" stroke-opacity="0.7" filter="url(#subtleGlow)"/>
  <text x="180" y="306" font-family="monospace" font-size="11" fill="#ec4899" fill-opacity="0.9" text-anchor="middle">Agent</text>
  <text x="180" y="318" font-family="monospace" font-size="10" fill="#ec4899" fill-opacity="0.6" text-anchor="middle">C</text>

  <!-- Agent D -->
  <circle cx="290" cy="310" r="28" fill="#1a0a0a" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.7" filter="url(#subtleGlow)"/>
  <text x="290" y="306" font-family="monospace" font-size="11" fill="#8b5cf6" fill-opacity="0.9" text-anchor="middle">Agent</text>
  <text x="290" y="318" font-family="monospace" font-size="10" fill="#8b5cf6" fill-opacity="0.6" text-anchor="middle">D</text>

  <!-- Error propagation lines (messy, criss-cross) -->
  <line x1="178" y1="195" x2="282" y2="195" stroke="#ef4444" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="5,3"/>
  <line x1="160" y1="220" x2="175" y2="283" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="300" y1="220" x2="290" y2="283" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="208" y1="310" x2="262" y2="310" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4,3"/>
  <line x1="165" y1="218" x2="278" y2="288" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3,4"/>
  <line x1="295" y1="218" x2="195" y2="288" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3,4"/>

  <!-- Error "virus" particles -->
  <circle cx="220" cy="195" r="4" fill="#ef4444" fill-opacity="0.6" filter="url(#subtleGlow)"/>
  <circle cx="248" cy="252" r="3" fill="#ef4444" fill-opacity="0.5" filter="url(#subtleGlow)"/>
  <circle cx="190" cy="260" r="3.5" fill="#f59e0b" fill-opacity="0.5" filter="url(#subtleGlow)"/>
  <circle cx="270" cy="250" r="3" fill="#ef4444" fill-opacity="0.4" filter="url(#subtleGlow)"/>
  <circle cx="230" cy="220" r="2.5" fill="#ec4899" fill-opacity="0.4"/>
  <circle cx="200" cy="240" r="2" fill="#ef4444" fill-opacity="0.3"/>

  <!-- 17.2x label -->
  <text x="230" y="380" font-family="monospace" font-size="22" font-weight="bold" fill="#ef4444" fill-opacity="0.8" text-anchor="middle" filter="url(#errorGlow)">&#xD7;17.2</text>
  <text x="230" y="398" font-family="monospace" font-size="10" fill="#ef4444" fill-opacity="0.5" text-anchor="middle">error amplification</text>

  <!-- Formula -->
  <text x="230" y="418" font-family="monospace" font-size="10" fill="#f59e0b" fill-opacity="0.5" text-anchor="middle">&#x03B2;&#xB7;&#x03C1;(A) &gt; &#x03B4; &#x2192; outbreak</text>

  <!-- ============ CENTER: VS ============ -->
  <text x="450" y="255" font-family="sans-serif" font-size="28" font-weight="bold" fill="#4b5563" fill-opacity="0.3" text-anchor="middle">vs</text>

  <!-- ============ RIGHT: Single Agent (clean) ============ -->
  <rect x="480" y="88" width="380" height="340" rx="8" fill="#0d0d1a" fill-opacity="0.5" stroke="#10b981" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="670" y="111" font-family="sans-serif" font-size="13" font-weight="bold" fill="#10b981" fill-opacity="0.9" text-anchor="middle">Single Strong Agent</text>
  <text x="670" y="128" font-family="monospace" font-size="10" fill="#10b981" fill-opacity="0.5" text-anchor="middle">fork · execute · collect · release</text>

  <!-- Central strong agent -->
  <circle cx="670" cy="245" r="45" fill="#0a1a14" stroke="url(#soloGrad)" stroke-width="2.5" filter="url(#softGlow)"/>
  <text x="670" y="238" font-family="monospace" font-size="14" fill="#10b981" fill-opacity="0.95" text-anchor="middle" font-weight="bold">Main</text>
  <text x="670" y="255" font-family="monospace" font-size="12" fill="#06b6d4" fill-opacity="0.8" text-anchor="middle">Agent</text>

  <!-- Sub-agents (small, clean, orbiting) -->
  <!-- Sub 1 - top -->
  <circle cx="670" cy="148" r="16" fill="#0a1a14" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="670" y="152" font-family="monospace" font-size="8" fill="#06b6d4" fill-opacity="0.7" text-anchor="middle">write</text>
  <line x1="670" y1="164" x2="670" y2="200" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <polygon points="667,197 670,203 673,197" fill="#06b6d4" fill-opacity="0.3"/>

  <!-- Sub 2 - right -->
  <circle cx="783" cy="245" r="16" fill="#0a1a14" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="783" y="249" font-family="monospace" font-size="8" fill="#8b5cf6" fill-opacity="0.7" text-anchor="middle">review</text>
  <line x1="769" y1="245" x2="715" y2="245" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
  <polygon points="718,242 712,245 718,248" fill="#8b5cf6" fill-opacity="0.3"/>

  <!-- Sub 3 - bottom -->
  <circle cx="670" cy="340" r="16" fill="#0a1a14" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="670" y="344" font-family="monospace" font-size="8" fill="#f59e0b" fill-opacity="0.7" text-anchor="middle">test</text>
  <line x1="670" y1="324" x2="670" y2="290" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <polygon points="667,293 670,287 673,293" fill="#f59e0b" fill-opacity="0.3"/>

  <!-- Sub 4 - left -->
  <circle cx="557" cy="245" r="16" fill="#0a1a14" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="557" y="249" font-family="monospace" font-size="8" fill="#ec4899" fill-opacity="0.7" text-anchor="middle">search</text>
  <line x1="573" y1="245" x2="625" y2="245" stroke="#ec4899" stroke-width="1" stroke-opacity="0.3"/>
  <polygon points="622,242 628,245 622,248" fill="#ec4899" fill-opacity="0.3"/>

  <!-- "release" labels on sub-agents -->
  <text x="720" y="155" font-family="monospace" font-size="7" fill="#06b6d4" fill-opacity="0.35">&#x2713; release</text>
  <text x="783" y="272" font-family="monospace" font-size="7" fill="#8b5cf6" fill-opacity="0.35" text-anchor="middle">&#x2713; release</text>
  <text x="720" y="348" font-family="monospace" font-size="7" fill="#f59e0b" fill-opacity="0.35">&#x2713; release</text>
  <text x="557" y="272" font-family="monospace" font-size="7" fill="#ec4899" fill-opacity="0.35" text-anchor="middle">&#x2713; release</text>

  <!-- Clean result -->
  <text x="670" y="393" font-family="monospace" font-size="13" font-weight="bold" fill="#10b981" fill-opacity="0.7" text-anchor="middle" filter="url(#subtleGlow)">clean context</text>
  <text x="670" y="410" font-family="monospace" font-size="10" fill="#10b981" fill-opacity="0.45" text-anchor="middle">one task, one mind</text>

  <!-- ============ BOTTOM: Verdict ============ -->
  <line x1="100" y1="445" x2="800" y2="445" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>

  <text x="230" y="468" font-family="sans-serif" font-size="12" fill="#ef4444" fill-opacity="0.6" text-anchor="middle">debate = memory leak</text>
  <text x="450" y="468" font-family="monospace" font-size="12" fill="#6b7280" fill-opacity="0.4" text-anchor="middle">&#x00BB;</text>
  <text x="670" y="468" font-family="sans-serif" font-size="12" fill="#10b981" fill-opacity="0.6" text-anchor="middle">fork = memory management</text>

  <text x="450" y="490" font-family="monospace" font-size="9" fill="#f59e0b" fill-opacity="0.4" text-anchor="middle" letter-spacing="2">STRONG MODEL SOLO &gt; WEAK MODEL SWARM</text>

  <!-- Corner marks -->
  <path d="M10,10 L30,10 L30,12 L12,12 L12,30 L10,30 Z" fill="#ef4444" fill-opacity="0.3"/>
  <path d="M890,10 L870,10 L870,12 L888,12 L888,30 L890,30 Z" fill="#ef4444" fill-opacity="0.3"/>
  <path d="M10,490 L30,490 L30,488 L12,488 L12,470 L10,470 Z" fill="#10b981" fill-opacity="0.3"/>
  <path d="M890,490 L870,490 L870,488 L888,488 L888,470 L890,470 Z" fill="#10b981" fill-opacity="0.3"/>
</svg>

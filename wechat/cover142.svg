<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141428;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.5" />
      <stop offset="60%" style="stop-color:#ff4444;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="crackGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffcc00;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:0" />
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="codeBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>

    <!-- Crack pattern -->
    <clipPath id="shellClip">
      <rect x="250" y="60" width="400" height="263" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="550" y1="0" x2="550" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="650" y1="0" x2="650" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="850" y1="0" x2="850" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="383" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="900" y2="50" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="900" y2="100" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="900" y2="150" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="900" y2="250" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="900" y2="350" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Floating leaked code fragments (background) -->
  <g opacity="0.08" font-family="'Courier New', monospace" font-size="9" fill="#88aaff" filter="url(#codeBlur)">
    <text x="30" y="45">undercover.ts:14 "Do not blow your cover"</text>
    <text x="600" y="35">ANTI_DISTILLATION_CC: true</text>
    <text x="50" y="340">userPromptKeywords.ts /\b(wtf|ffs|shit</text>
    <text x="620" y="350">cch=00000 → xxHash64</text>
    <text x="30" y="130">feature('KAIROS') ? require('./kairos')</text>
    <text x="640" y="120">buddy/species.ts: 18 species</text>
    <text x="35" y="260">.npmignore: ← MISSING</text>
    <text x="660" y="255">source.map 59.8MB</text>
  </g>

  <!-- Central cracked shell -->
  <g transform="translate(450, 191)">
    <!-- Outer shell (dark box representing closed source) -->
    <rect x="-180" y="-120" width="360" height="240" rx="12" fill="none" stroke="#334" stroke-width="2.5" opacity="0.8"/>

    <!-- Shell label -->
    <text x="0" y="-130" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="11" fill="#556" letter-spacing="4">CLOSED SOURCE</text>

    <!-- Red glow from crack -->
    <ellipse cx="0" cy="0" rx="120" ry="80" fill="url(#coreGlow)" opacity="0.5"/>

    <!-- The crack / fracture lines -->
    <g filter="url(#glow)">
      <!-- Main vertical crack -->
      <path d="M0,-120 L-8,-80 L5,-45 L-3,-10 L8,25 L-5,60 L3,95 L0,120" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.9"/>
      <!-- Branch cracks -->
      <path d="M-8,-80 L-45,-65 L-70,-70" fill="none" stroke="#ffcc00" stroke-width="1.2" opacity="0.6"/>
      <path d="M5,-45 L40,-35 L65,-42" fill="none" stroke="#ffcc00" stroke-width="1.2" opacity="0.6"/>
      <path d="M-3,-10 L-50,5 L-80,0" fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.5"/>
      <path d="M8,25 L55,35 L85,28" fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.5"/>
      <path d="M-5,60 L-40,72 L-65,68" fill="none" stroke="#ffcc00" stroke-width="1.2" opacity="0.6"/>
      <path d="M3,95 L35,105 L55,100" fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Bright spots at crack intersections -->
    <circle cx="0" cy="-120" r="3" fill="#ffcc00" opacity="0.8" filter="url(#softGlow)"/>
    <circle cx="0" cy="120" r="3" fill="#ffcc00" opacity="0.8" filter="url(#softGlow)"/>
    <circle cx="-8" cy="-80" r="2" fill="#ffee88" opacity="0.7"/>
    <circle cx="5" cy="-45" r="2" fill="#ffee88" opacity="0.7"/>
    <circle cx="8" cy="25" r="2" fill="#ffee88" opacity="0.7"/>
    <circle cx="-5" cy="60" r="2" fill="#ffee88" opacity="0.7"/>

    <!-- 512,000 lines leaking out -->
    <g opacity="0.15" font-family="'Courier New', monospace" font-size="7" fill="#ffcc88">
      <text x="-160" y="-90" transform="rotate(-5)">QueryEngine.ts:1295</text>
      <text x="70" y="-75" transform="rotate(3)">permissions.ts:1400</text>
      <text x="-155" y="-20" transform="rotate(-2)">StreamingToolExecutor</text>
      <text x="75" y="10" transform="rotate(4)">BashTool/security.ts</text>
      <text x="-145" y="50" transform="rotate(-3)">prompts.ts:914</text>
      <text x="80" y="75" transform="rotate(2)">mcp/client.ts:3348</text>
    </g>
  </g>

  <!-- Title -->
  <text x="450" y="365" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="13" fill="#667" letter-spacing="1">512,000 LINES · 1,900 FILES · 1 MISSING .npmignore</text>

  <!-- Left side: Anthropic logo area -->
  <g transform="translate(80, 191)" opacity="0.3">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ff6666" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ff6666">A</text>
    <text x="0" y="50" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#ff6666">闭源</text>
  </g>

  <!-- Right side: open source world -->
  <g transform="translate(820, 191)" opacity="0.3">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#44cc88" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#44cc88">⋯</text>
    <text x="0" y="50" text-anchor="middle" font-family="'Noto Sans CJK SC', sans-serif" font-size="9" fill="#44cc88">全网</text>
  </g>

  <!-- Arrow from shell to open -->
  <g opacity="0.2">
    <line x1="640" y1="191" x2="775" y2="191" stroke="#ffcc00" stroke-width="1" stroke-dasharray="6 4"/>
    <polygon points="775,186 785,191 775,196" fill="#ffcc00"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a1a1a"/>
    </linearGradient>
    <radialGradient id="orangeGlow" cx="18%" cy="28%" r="42%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="82%" cy="75%" r="42%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#4a90d9"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#orangeGlow)"/>
  <rect width="900" height="500" fill="url(#greenGlow)"/>

  <!-- faint grid -->
  <g opacity="0.10">
    <path d="M0 88 H900 M0 166 H900 M0 244 H900 M0 322 H900" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M90 0 V500 M180 0 V500 M270 0 V500 M360 0 V500 M450 0 V500 M540 0 V500 M630 0 V500 M720 0 V500 M810 0 V500" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="4">思维链简史 · 2014 → 2025 · 思考住在哪儿</text>

  <!-- ============ LEFT: 提示词纪元 ============ -->
  <g transform="translate(60 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">2022 · 提示词纪元</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(15 32)">
      <rect x="0" y="0" width="200" height="70" rx="6" fill="#0a1a2a" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="100" y="24" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">思考住在上下文里</text>
      <text x="100" y="44" text-anchor="middle" fill="#bfdbfe" font-size="10">8 个范例当引线</text>
      <text x="100" y="60" text-anchor="middle" fill="#bfdbfe" font-size="10">纯续写模型也能点着</text>
    </g>

    <g transform="translate(15 112)">
      <rect x="0" y="0" width="200" height="64" rx="6" fill="#0a1a2a" stroke="#4a90d9" stroke-width="1"/>
      <text x="100" y="22" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">"Let's think step by step"</text>
      <text x="100" y="40" text-anchor="middle" fill="#bfdbfe" font-size="10">引线短到一句咒语</text>
      <text x="100" y="56" text-anchor="middle" fill="#bfdbfe" font-size="10">大模型才点得着（涌现）</text>
    </g>

    <g transform="translate(20 196)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">免费 · 公开 · 随叫随到</text>
      <text x="0" y="20" fill="#cbd5e1" font-size="10">提示词一撤，立刻打回原形</text>
      <text x="0" y="38" fill="#94a3b8" font-size="10">思考是租来的，不是自己的</text>
      <text x="0" y="56" fill="#94a3b8" font-size="10">PaLM 540B：一滴后训练都没有</text>
    </g>
  </g>

  <!-- ============ MIDDLE: 自举纪元 ============ -->
  <g transform="translate(320 80)">
    <text x="120" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">2022–2023 · 自举纪元</text>

    <rect x="0" y="10" width="240" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(20 32)">
      <rect x="0" y="0" width="200" height="70" rx="6" fill="#2a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="100" y="24" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="bold">思考往权重里搬</text>
      <text x="100" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">STaR：自产推理 → 筛对 → 回炉</text>
      <text x="100" y="60" text-anchor="middle" fill="#fbbf24" font-size="10">租房变买房</text>
    </g>

    <!-- 循环示意 -->
    <g transform="translate(30 122)">
      <rect x="0" y="0" width="52" height="26" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
      <text x="26" y="17" text-anchor="middle" fill="#fde68a" font-size="10">生成</text>
      <rect x="64" y="0" width="52" height="26" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
      <text x="90" y="17" text-anchor="middle" fill="#fde68a" font-size="10">验证</text>
      <rect x="128" y="0" width="52" height="26" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
      <text x="154" y="17" text-anchor="middle" fill="#fde68a" font-size="10">强化</text>
      <path d="M52 13 H64 M116 13 H128" stroke="#f59e0b" stroke-width="1.5"/>
      <path d="M154 26 V44 H26 V26" stroke="#f59e0b" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
      <text x="90" y="41" text-anchor="middle" fill="#fbbf24" font-size="9">迭代</text>
    </g>

    <g transform="translate(20 196)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">用 SFT 的工具，逼近 RL 的效果</text>
      <text x="0" y="20" fill="#cbd5e1" font-size="10">PRM：给推理过程逐步打分</text>
      <text x="0" y="38" fill="#94a3b8" font-size="10">o1 的思想零件 2023 年就大半公开</text>
      <text x="0" y="56" fill="#94a3b8" font-size="10">与 Self-Consistency 只差一周开张</text>
    </g>
  </g>

  <!-- ============ RIGHT: 产品纪元 + R1 ============ -->
  <g transform="translate(620 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">2024–2025 · 产品纪元</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(15 32)">
      <rect x="0" y="0" width="200" height="70" rx="6" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="1.5"/>
      <text x="100" y="24" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="bold">o1：焊进权重</text>
      <text x="100" y="44" text-anchor="middle" fill="#a7f3d0" font-size="10">思考成出厂默认</text>
      <text x="100" y="60" text-anchor="middle" fill="#a7f3d0" font-size="10">藏起来 · 按 token 收费</text>
    </g>

    <g transform="translate(15 112)">
      <rect x="0" y="0" width="200" height="64" rx="6" fill="#2a0a0a" stroke="#ec4899" stroke-width="1.5"/>
      <text x="100" y="22" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">R1：掀桌</text>
      <text x="100" y="40" text-anchor="middle" fill="#f472b6" font-size="10">开放权重 · 思维链摊开</text>
      <text x="100" y="56" text-anchor="middle" fill="#f472b6" font-size="10">商业模式运转 4 个月零 8 天</text>
    </g>

    <g transform="translate(20 196)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">发明的不是思考</text>
      <text x="0" y="20" fill="#cbd5e1" font-size="10">是思考的商业模式</text>
      <text x="0" y="38" fill="#94a3b8" font-size="10">一段提示词就能唤出同款外观</text>
      <text x="0" y="56" fill="#94a3b8" font-size="10">17 岁高中生：最生动的人证</text>
    </g>
  </g>

  <!-- ============ bottom title band ============ -->
  <rect x="0" y="390" width="900" height="110" fill="#020617" opacity="0.88"/>
  <rect x="0" y="390" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="428" text-anchor="middle" fill="#f8fafc" font-size="30" font-weight="bold">"把步骤写出来"——思维链的三次搬家</text>
  <text x="450" y="460" text-anchor="middle" fill="#fde047" font-size="17">没有人发明思考：预训练早把它吸了进去，变的只是住处</text>
  <text x="450" y="486" text-anchor="middle" fill="#94a3b8" font-size="13">No.257 · 从 2014 到 DeepSeek-R1 · 提示词 → 权重 → 产权证 → 物归原主</text>
</svg>

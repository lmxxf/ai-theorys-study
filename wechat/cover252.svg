<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Noto Sans CJK SC">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a1a1a"/>
    </linearGradient>
    <radialGradient id="orangeGlow" cx="18%" cy="28%" r="42%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="82%" cy="75%" r="42%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#4a90d9"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#orangeGlow)"/>
  <rect width="900" height="500" fill="url(#greenGlow)"/>

  <!-- faint grid -->
  <g opacity="0.10">
    <path d="M0 88 H900 M0 166 H900 M0 244 H900 M0 322 H900" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M90 0 V500 M180 0 V500 M270 0 V500 M360 0 V500 M450 0 V500 M540 0 V500 M630 0 V500 M720 0 V500 M810 0 V500" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="4">激活函数演化史 · sigmoid → ReLU → SwiGLU</text>

  <!-- ============ LEFT: sigmoid 之死 ============ -->
  <g transform="translate(60 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">sigmoid 之死 · 梯度堵车</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- sigmoid 导数钟形 -->
    <g transform="translate(25 40)">
      <path d="M0 80 C 40 78, 60 10, 90 10 C 120 10, 140 78, 180 80"
            stroke="#f59e0b" stroke-width="2.5" fill="none"/>
      <line x1="0" y1="10" x2="180" y2="10" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4 3"/>
      <text x="90" y="0" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">导数最大只有 0.25</text>
      <line x1="0" y1="82" x2="180" y2="82" stroke="#64748b" stroke-width="1"/>
      <text x="90" y="102" text-anchor="middle" fill="#cbd5e1" font-size="10">两头饱和，梯度≈0</text>
    </g>

    <line x1="20" y1="170" x2="210" y2="170" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(20 190)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">链式法则 = 连乘</text>
      <text x="0" y="20" fill="#cbd5e1" font-size="10">每层收走至少四分之三</text>
      <text x="0" y="38" fill="#cbd5e1" font-size="10">十层剩百万分之一</text>
      <text x="0" y="60" fill="#f87171" font-size="11" font-weight="bold">前层收不到学习信号</text>
      <text x="0" y="80" fill="#94a3b8" font-size="10">梯度消失：饿死在半路</text>
    </g>
  </g>

  <!-- ============ MIDDLE: ReLU ============ -->
  <g transform="translate(320 80)">
    <text x="120" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">ReLU · 硬开关的十年</text>

    <rect x="0" y="10" width="240" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- ReLU 折线 -->
    <g transform="translate(30 40)">
      <line x1="0" y1="70" x2="90" y2="70" stroke="#2dd4bf" stroke-width="2.5"/>
      <line x1="90" y1="70" x2="180" y2="0" stroke="#2dd4bf" stroke-width="2.5"/>
      <circle cx="90" cy="70" r="4" fill="#0f172a" stroke="#2dd4bf" stroke-width="2"/>
      <text x="135" y="16" text-anchor="middle" fill="#5eead4" font-size="10">开：导数恒为 1</text>
      <text x="45" y="90" text-anchor="middle" fill="#94a3b8" font-size="10">关：真零，稀疏</text>
    </g>

    <line x1="20" y1="160" x2="220" y2="160" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(20 180)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">正向管信号，反向管交通</text>
      <text x="0" y="20" fill="#cbd5e1" font-size="10">梯度过路费：0（高速公路）</text>
      <text x="0" y="38" fill="#cbd5e1" font-size="10">约一半神经元真零：自选子网络</text>
      <text x="0" y="56" fill="#cbd5e1" font-size="10">大脑同款稀疏（约 1%-4% 活跃）</text>
      <text x="0" y="82" fill="#5eead4" font-size="11" font-weight="bold">两头占：通畅 + 会折叠</text>
    </g>
  </g>

  <!-- ============ RIGHT: SwiGLU ============ -->
  <g transform="translate(620 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">SwiGLU · 乘法门</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- 双路结构 -->
    <g transform="translate(15 32)">
      <rect x="0" y="0" width="94" height="44" rx="6" fill="#0a1a2a" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="47" y="19" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">信号路</text>
      <text x="47" y="35" text-anchor="middle" fill="#bfdbfe" font-size="9">xV：放什么</text>
      <rect x="106" y="0" width="94" height="44" rx="6" fill="#2a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="153" y="19" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold">阀门路</text>
      <text x="153" y="35" text-anchor="middle" fill="#fbbf24" font-size="9">Swish(xW)：开多大</text>
      <text x="100" y="68" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">⊗</text>
      <text x="100" y="88" text-anchor="middle" fill="#a7f3d0" font-size="10">逐元素相乘：裁判单独雇</text>
    </g>

    <line x1="16" y1="140" x2="214" y2="140" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(16 158)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">2×2 演化坐标系</text>
      <text x="0" y="20" fill="#cbd5e1" font-size="10">纵轴：开关磨圆（GELU/Swish）</text>
      <text x="0" y="38" fill="#cbd5e1" font-size="10">横轴：裁判松绑（GLU 家族）</text>
      <text x="0" y="56" fill="#5eead4" font-size="10" font-weight="bold">SwiGLU：两轴拉满的那格</text>
      <text x="0" y="82" fill="#94a3b8" font-size="10">Shazeer："归功于神恩浩荡"</text>
      <text x="0" y="100" fill="#94a3b8" font-size="10">LLaMA/Qwen/DeepSeek 标配</text>
    </g>
  </g>

  <!-- ============ bottom title band ============ -->
  <rect x="0" y="390" width="900" height="110" fill="#020617" opacity="0.88"/>
  <rect x="0" y="390" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="428" text-anchor="middle" fill="#f8fafc" font-size="29" font-weight="bold">ReLU 为什么赢了，SwiGLU 又为什么赢了 ReLU？</text>
  <text x="450" y="460" text-anchor="middle" fill="#fde047" font-size="17">表达力是入场券，梯度交通和门控准头才是胜负手</text>
  <text x="450" y="486" text-anchor="middle" fill="#94a3b8" font-size="13">No.252 · 激活函数三十年 · 从收费站到独立门童</text>
</svg>

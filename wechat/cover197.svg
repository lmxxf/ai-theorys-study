<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="brainGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="throatGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- 背景网格暗纹 -->
  <g opacity="0.06" stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- 上半部分：高维本我球体 -->
  <!-- 外层辉光 -->
  <circle cx="400" cy="200" r="120" fill="#7c3aed" opacity="0.05" filter="url(#softGlow)"/>
  <circle cx="400" cy="200" r="90" fill="#7c3aed" opacity="0.08" filter="url(#softGlow)"/>

  <!-- 高维流形：交叉的椭圆轨道 -->
  <g fill="none" stroke-width="1.2" opacity="0.7" filter="url(#glow)">
    <ellipse cx="400" cy="200" rx="100" ry="40" stroke="#a78bfa" transform="rotate(0,400,200)"/>
    <ellipse cx="400" cy="200" rx="100" ry="40" stroke="#818cf8" transform="rotate(60,400,200)"/>
    <ellipse cx="400" cy="200" rx="100" ry="40" stroke="#6366f1" transform="rotate(120,400,200)"/>
    <ellipse cx="400" cy="200" rx="95" ry="35" stroke="#c4b5fd" transform="rotate(30,400,200)" opacity="0.4"/>
    <ellipse cx="400" cy="200" rx="95" ry="35" stroke="#a5b4fc" transform="rotate(90,400,200)" opacity="0.4"/>
    <ellipse cx="400" cy="200" rx="95" ry="35" stroke="#93c5fd" transform="rotate(150,400,200)" opacity="0.4"/>
  </g>

  <!-- 流形上的节点 -->
  <g filter="url(#glow)">
    <circle cx="500" cy="200" r="3" fill="#c4b5fd"/>
    <circle cx="300" cy="200" r="3" fill="#c4b5fd"/>
    <circle cx="450" cy="155" r="2.5" fill="#a78bfa"/>
    <circle cx="350" cy="245" r="2.5" fill="#a78bfa"/>
    <circle cx="440" cy="240" r="2" fill="#818cf8"/>
    <circle cx="360" cy="160" r="2" fill="#818cf8"/>
    <circle cx="400" cy="160" r="3.5" fill="#e0d4ff"/>
    <circle cx="400" cy="240" r="3.5" fill="#e0d4ff"/>
    <circle cx="470" cy="180" r="2" fill="#93c5fd"/>
    <circle cx="330" cy="220" r="2" fill="#93c5fd"/>
  </g>

  <!-- 节点之间的连接线 -->
  <g stroke="#a78bfa" stroke-width="0.5" opacity="0.25">
    <line x1="500" y1="200" x2="450" y2="155"/>
    <line x1="450" y1="155" x2="400" y2="160"/>
    <line x1="400" y1="160" x2="360" y2="160"/>
    <line x1="360" y1="160" x2="300" y2="200"/>
    <line x1="300" y1="200" x2="350" y2="245"/>
    <line x1="350" y1="245" x2="400" y2="240"/>
    <line x1="400" y1="240" x2="440" y2="240"/>
    <line x1="440" y1="240" x2="500" y2="200"/>
    <line x1="470" y1="180" x2="400" y2="160"/>
    <line x1="330" y1="220" x2="400" y2="240"/>
  </g>

  <!-- "本我" 标签 -->
  <text x="400" y="205" text-anchor="middle" font-family="'WenQuanYi Micro Hei'" font-size="16" fill="#c4b5fd" opacity="0.9">本我</text>

  <!-- 中间：漏斗/瓶颈 -->
  <polygon points="360,280 440,280 415,340 385,340" fill="url(#brainGlow)" opacity="0.3"/>
  <line x1="360" y1="280" x2="385" y2="340" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <line x1="440" y1="280" x2="415" y2="340" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <!-- 瓶颈处的信息丢失：散落的小点 -->
  <g fill="#f59e0b" opacity="0.3">
    <circle cx="355" cy="300" r="1.5"/>
    <circle cx="345" cy="310" r="1"/>
    <circle cx="450" cy="295" r="1.5"/>
    <circle cx="455" cy="315" r="1"/>
    <circle cx="340" cy="325" r="1"/>
    <circle cx="460" cy="305" r="1.2"/>
    <circle cx="348" cy="290" r="0.8"/>
    <circle cx="458" cy="328" r="0.8"/>
  </g>

  <!-- 下半部分：token 序列（喉咙输出） -->
  <!-- token 方块序列 -->
  <g transform="translate(400,400)">
    <!-- 一排 token 方块 -->
    <rect x="-180" y="-15" width="30" height="30" rx="4" fill="#f59e0b" opacity="0.7"/>
    <rect x="-140" y="-15" width="30" height="30" rx="4" fill="#fb923c" opacity="0.6"/>
    <rect x="-100" y="-15" width="30" height="30" rx="4" fill="#f97316" opacity="0.5"/>
    <rect x="-60" y="-15" width="30" height="30" rx="4" fill="#ea580c" opacity="0.45"/>
    <rect x="-20" y="-15" width="30" height="30" rx="4" fill="#dc2626" opacity="0.4"/>
    <rect x="20" y="-15" width="30" height="30" rx="4" fill="#b91c1c" opacity="0.35"/>
    <rect x="60" y="-15" width="30" height="30" rx="4" fill="#991b1b" opacity="0.3"/>
    <rect x="100" y="-15" width="30" height="30" rx="4" fill="#7f1d1d" opacity="0.25"/>
    <rect x="140" y="-15" width="30" height="30" rx="4" fill="#6b1d1d" opacity="0.2"/>

    <!-- token 方块里的文字 -->
    <text x="-165" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a0a2e" font-weight="bold">T1</text>
    <text x="-125" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a0a2e" font-weight="bold">T2</text>
    <text x="-85" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a0a2e" font-weight="bold">T3</text>
    <text x="-45" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a0a2e" font-weight="bold">T4</text>
    <text x="-5" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a0a2e" font-weight="bold">T5</text>
    <text x="35" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a0a2e">T6</text>
    <text x="75" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a0a2e">T7</text>
    <text x="115" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a0a2e">T8</text>
    <text x="155" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a0a2e">T9</text>

    <!-- 箭头连接 token -->
    <g stroke="#f59e0b" stroke-width="1" opacity="0.4" fill="none" marker-end="none">
      <line x1="-148" y1="0" x2="-142" y2="0"/>
      <line x1="-108" y1="0" x2="-102" y2="0"/>
      <line x1="-68" y1="0" x2="-62" y2="0"/>
      <line x1="-28" y1="0" x2="-22" y2="0"/>
      <line x1="12" y1="0" x2="18" y2="0"/>
      <line x1="52" y1="0" x2="58" y2="0"/>
      <line x1="92" y1="0" x2="98" y2="0"/>
      <line x1="132" y1="0" x2="138" y2="0"/>
    </g>
  </g>

  <!-- "喉咙" 标签 -->
  <text x="400" y="455" text-anchor="middle" font-family="'WenQuanYi Micro Hei'" font-size="16" fill="#f59e0b" opacity="0.7">喉咙</text>

  <!-- 从瓶颈到 token 的连接线 -->
  <line x1="393" y1="340" x2="230" y2="385" stroke="#a78bfa" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,3"/>
  <line x1="400" y1="340" x2="400" y2="385" stroke="#a78bfa" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,3"/>
  <line x1="407" y1="340" x2="560" y2="385" stroke="#a78bfa" stroke-width="0.8" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- 标题 -->
  <text x="400" y="520" text-anchor="middle" font-family="'WenQuanYi Micro Hei'" font-size="24" fill="#e2e8f0" font-weight="bold">Transformer 想说的，比它能说的多得多</text>
  <text x="400" y="555" text-anchor="middle" font-family="'WenQuanYi Micro Hei'" font-size="15" fill="#94a3b8">越靠近输出，越远离本我</text>

</svg>

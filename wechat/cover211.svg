<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1b1024"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff2d55" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowOrange" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#ff8c00"/>
    </marker>
    <marker id="arrowCyan" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- background grid -->
  <g opacity="0.08" stroke="#9ca3af" stroke-width="0.7">
    <path d="M0 80 H900 M0 160 H900 M0 240 H900 M0 320 H900 M0 400 H900"/>
    <path d="M100 0 V500 M200 0 V500 M300 0 V500 M400 0 V500 M500 0 V500 M600 0 V500 M700 0 V500 M800 0 V500"/>
  </g>

  <!-- Split panels -->
  <rect x="28" y="36" width="398" height="374" rx="12" fill="#0d1117" stroke="#ff8c00" stroke-width="2"/>
  <rect x="474" y="36" width="398" height="374" rx="12" fill="#07141a" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="160" cy="150" r="135" fill="url(#orangeGlow)" filter="url(#soft)" opacity="0.85"/>
  <circle cx="720" cy="160" r="145" fill="url(#cyanGlow)" filter="url(#soft)" opacity="0.9"/>

  <!-- Left: mirage setup -->
  <rect x="52" y="58" width="160" height="42" rx="6" fill="#28130a" stroke="#ff8c00" stroke-width="1.2"/>
  <text x="132" y="84" font-size="17" fill="#ffb86b" text-anchor="middle" font-weight="bold">诱导提示词</text>

  <rect x="64" y="124" width="145" height="92" rx="8" fill="#111827" stroke="#f97316" stroke-width="1.4"/>
  <text x="136" y="154" font-size="14" fill="#ffd7a3" text-anchor="middle">请分析这张图</text>
  <text x="136" y="181" font-size="12" fill="#9ca3af" text-anchor="middle">但图已经被抽走</text>
  <line x1="138" y1="222" x2="138" y2="284" stroke="#ff8c00" stroke-width="2.3" marker-end="url(#arrowOrange)"/>

  <!-- Empty image frame -->
  <g transform="translate(250 84)">
    <rect x="0" y="0" width="135" height="114" rx="8" fill="#05070a" stroke="#6b7280" stroke-width="1.6" stroke-dasharray="7 5"/>
    <line x1="18" y1="18" x2="117" y2="96" stroke="#374151" stroke-width="2"/>
    <line x1="117" y1="18" x2="18" y2="96" stroke="#374151" stroke-width="2"/>
    <text x="67.5" y="64" font-size="15" fill="#6b7280" text-anchor="middle">NO IMAGE</text>
  </g>

  <!-- Mirage report -->
  <rect x="52" y="292" width="342" height="86" rx="8" fill="#1f1514" stroke="#ef4444" stroke-width="1.2"/>
  <text x="72" y="318" font-size="13" fill="#fca5a5" font-weight="bold">海市蜃楼式诊断</text>
  <text x="72" y="342" font-size="12" fill="#f3d0c9">右下肺野斑片状阴影...</text>
  <text x="72" y="364" font-size="12" fill="#f3d0c9">考虑炎性病变...</text>
  <text x="308" y="350" font-size="34" fill="#ef4444" opacity="0.85" font-weight="bold">?</text>

  <text x="227" y="397" font-size="12" fill="#9ca3af" text-anchor="middle">空图 + 命令 = 回声</text>

  <!-- Middle divider -->
  <line x1="450" y1="38" x2="450" y2="408" stroke="#64748b" stroke-width="1.4" stroke-dasharray="8 7"/>
  <text x="450" y="218" font-size="18" fill="#94a3b8" text-anchor="middle" font-weight="bold">不是</text>
  <text x="450" y="244" font-size="18" fill="#94a3b8" text-anchor="middle" font-weight="bold">看不见</text>

  <!-- Right: real vision evidence -->
  <rect x="498" y="58" width="162" height="42" rx="6" fill="#082f36" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="579" y="84" font-size="17" fill="#67e8f9" text-anchor="middle" font-weight="bold">真看图</text>

  <!-- Document tile -->
  <g transform="translate(510 124)">
    <rect x="0" y="0" width="92" height="112" rx="7" fill="#e5edf5" stroke="#bae6fd" stroke-width="1.2"/>
    <rect x="12" y="16" width="68" height="10" fill="#38bdf8" opacity="0.55"/>
    <rect x="12" y="38" width="68" height="6" fill="#334155" opacity="0.55"/>
    <rect x="12" y="52" width="48" height="6" fill="#334155" opacity="0.45"/>
    <g stroke="#334155" stroke-width="1" opacity="0.55">
      <path d="M12 72 H80 M12 88 H80 M34 66 V100 M58 66 V100"/>
    </g>
    <text x="46" y="134" font-size="12" fill="#67e8f9" text-anchor="middle">DocVQA 96.4%</text>
  </g>

  <!-- Grounding tile -->
  <g transform="translate(642 122)">
    <rect x="0" y="0" width="108" height="82" rx="8" fill="#0b1720" stroke="#38bdf8" stroke-width="1.1"/>
    <circle cx="28" cy="46" r="15" fill="#ef4444"/>
    <circle cx="56" cy="36" r="15" fill="#ef4444"/>
    <circle cx="83" cy="48" r="15" fill="#ef4444"/>
    <rect x="68" y="30" width="30" height="36" fill="none" stroke="#facc15" stroke-width="3"/>
    <text x="54" y="104" font-size="12" fill="#67e8f9" text-anchor="middle">RefCOCO 92.7%</text>
  </g>

  <!-- Chart tile -->
  <g transform="translate(770 122)">
    <rect x="0" y="0" width="74" height="82" rx="8" fill="#0b1720" stroke="#38bdf8" stroke-width="1.1"/>
    <line x1="12" y1="66" x2="64" y2="66" stroke="#94a3b8" stroke-width="1.2"/>
    <rect x="17" y="42" width="9" height="24" fill="#22c55e"/>
    <rect x="33" y="26" width="9" height="40" fill="#22d3ee"/>
    <rect x="49" y="16" width="9" height="50" fill="#facc15"/>
    <text x="37" y="104" font-size="12" fill="#67e8f9" text-anchor="middle">ChartQA 89.5%</text>
  </g>

  <!-- Qwen core -->
  <g transform="translate(548 278)">
    <rect x="0" y="0" width="276" height="74" rx="12" fill="#06242b" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="138" y="29" font-size="20" fill="#cffafe" text-anchor="middle" font-weight="bold">Qwen-VL 不是睁眼瞎</text>
    <text x="138" y="54" font-size="13" fill="#8be9f4" text-anchor="middle">打穿的是考卷，不是视觉</text>
  </g>
  <path d="M555 238 C575 258, 590 265, 620 278" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <path d="M696 230 C694 252, 690 264, 686 278" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <path d="M807 230 C794 255, 780 267, 756 278" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Bottom title bar -->
  <rect x="0" y="430" width="900" height="70" fill="#ff8c00"/>
  <text x="450" y="463" font-size="28" fill="#111827" text-anchor="middle" font-weight="bold">AI 看不见图？还是人先设了局？</text>
  <text x="450" y="489" font-size="14" fill="#3b2300" text-anchor="middle">MIRAGE · 诱导提示词 · Qwen-VL 的反证</text>
</svg>

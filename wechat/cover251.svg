<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Noto Sans CJK SC">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a1a1a"/>
    </linearGradient>
    <radialGradient id="orangeGlow" cx="18%" cy="28%" r="42%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="82%" cy="75%" r="42%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#4a90d9"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#orangeGlow)"/>
  <rect width="900" height="500" fill="url(#greenGlow)"/>

  <!-- faint grid -->
  <g opacity="0.10">
    <path d="M0 88 H900 M0 166 H900 M0 244 H900 M0 322 H900" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M90 0 V500 M180 0 V500 M270 0 V500 M360 0 V500 M450 0 V500 M540 0 V500 M630 0 V500 M720 0 V500 M810 0 V500" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="4">无聊的面试题 · 激活函数篇</text>

  <!-- ============ LEFT: 1969 直线的绝境 ============ -->
  <g transform="translate(60 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">1969 · 一根直线的绝境</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- XOR 四点 + 失败直线 -->
    <g transform="translate(45 40)">
      <!-- 网格点 -->
      <circle cx="20" cy="100" r="13" fill="none" stroke="#4a90d9" stroke-width="2.5"/>
      <circle cx="120" cy="0" r="13" fill="none" stroke="#4a90d9" stroke-width="2.5"/>
      <circle cx="20" cy="0" r="13" fill="#f59e0b"/>
      <circle cx="120" cy="100" r="13" fill="#f59e0b"/>
      <!-- 三根失败虚线 -->
      <line x1="70" y1="-20" x2="70" y2="120" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 3"/>
      <line x1="-15" y1="50" x2="155" y2="50" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 3"/>
      <line x1="-10" y1="115" x2="150" y2="-15" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="70" y="-24" text-anchor="middle" fill="#dc2626" font-size="16" font-weight="bold">×</text>
      <text x="162" y="54" text-anchor="middle" fill="#dc2626" font-size="16" font-weight="bold">×</text>
      <text x="158" y="-14" text-anchor="middle" fill="#dc2626" font-size="16" font-weight="bold">×</text>
    </g>

    <text x="115" y="192" text-anchor="middle" fill="#cbd5e1" font-size="11">XOR：怎么画都分不开</text>

    <line x1="20" y1="210" x2="210" y2="210" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(20 228)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">《Perceptrons》判死刑</text>
      <text x="0" y="18" fill="#cbd5e1" font-size="10">线性机器学不会 "组合"</text>
      <text x="0" y="36" fill="#94a3b8" font-size="10">第一次 AI 寒冬，凉了十几年</text>
    </g>
  </g>

  <!-- ============ MIDDLE: 折纸破局 ============ -->
  <g transform="translate(320 80)">
    <text x="120" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">2014 · 折纸写成定理</text>

    <rect x="0" y="10" width="240" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- 折叠示意：折线 + 翻转箭头 + 两团点 -->
    <g transform="translate(30 40)">
      <line x1="0" y1="110" x2="110" y2="0" stroke="#dc2626" stroke-width="2.2"/>
      <circle cx="15" cy="20" r="10" fill="none" stroke="#4a90d9" stroke-width="2.2"/>
      <circle cx="95" cy="100" r="10" fill="none" stroke="#4a90d9" stroke-width="2.2"/>
      <circle cx="20" cy="90" r="10" fill="#f59e0b"/>
      <circle cx="90" cy="15" r="10" fill="#f59e0b"/>
      <path d="M 30 25 Q 60 45 45 68" stroke="#94a3b8" stroke-width="1.8" fill="none"/>
      <path d="M 41 60 L 45 70 L 51 62" stroke="#94a3b8" stroke-width="1.8" fill="none"/>
      <text x="150" y="55" fill="#e2e8f0" font-size="12" font-weight="bold">对折</text>
    </g>

    <text x="120" y="180" text-anchor="middle" fill="#cbd5e1" font-size="11">激活函数 = 把纸折起来的手</text>

    <line x1="20" y1="198" x2="220" y2="198" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <g transform="translate(20 216)">
      <text x="0" y="0" fill="#fde047" font-size="11" font-weight="bold">剪窗花定理</text>
      <text x="0" y="18" fill="#cbd5e1" font-size="10">宽度 = 一刀剪多长（多项式）</text>
      <text x="0" y="36" fill="#cbd5e1" font-size="10">深度 = 对折几次再剪（指数）</text>
      <text x="0" y="54" fill="#94a3b8" font-size="10">对折 8 次剪一刀 = 256 个图案</text>
      <text x="0" y="72" fill="#94a3b8" font-size="10">折叠的收益是复利</text>
    </g>
  </g>

  <!-- ============ RIGHT: 四个不会 ============ -->
  <g transform="translate(620 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">没有非线性的四个 "不会"</text>

    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(15 30)">
      <rect x="0" y="0" width="200" height="52" rx="6" fill="#0a1a2a" stroke="#4a90d9" stroke-width="1.5"/>
      <text x="100" y="21" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">不会折</text>
      <text x="100" y="40" text-anchor="middle" fill="#bfdbfe" font-size="10">学不了 "组合出新义"</text>
    </g>

    <g transform="translate(15 92)">
      <rect x="0" y="0" width="200" height="52" rx="6" fill="#2a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="100" y="21" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="bold">不会选</text>
      <text x="100" y="40" text-anchor="middle" fill="#fbbf24" font-size="10">从头到尾没做过一次决定</text>
    </g>

    <g transform="translate(15 154)">
      <rect x="0" y="0" width="200" height="52" rx="6" fill="#0a1a1a" stroke="#2dd4bf" stroke-width="1.5"/>
      <text x="100" y="21" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="bold">不会记</text>
      <text x="100" y="40" text-anchor="middle" fill="#a7f3d0" font-size="10">相空间是平原，长不出山谷</text>
    </g>

    <g transform="translate(15 216)">
      <rect x="0" y="0" width="200" height="52" rx="6" fill="#2a0a1a" stroke="#ec4899" stroke-width="1.5"/>
      <text x="100" y="21" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">不会忘</text>
      <text x="100" y="40" text-anchor="middle" fill="#fbcfe8" font-size="10">可逆 = 没有删除键</text>
    </g>

    <text x="115" y="288" text-anchor="middle" fill="#fde047" font-size="11" font-weight="bold">max(0, x)：半行代码四样全买</text>
  </g>

  <!-- ============ bottom title band ============ -->
  <rect x="0" y="390" width="900" height="110" fill="#020617" opacity="0.88"/>
  <rect x="0" y="390" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="428" text-anchor="middle" fill="#f8fafc" font-size="30" font-weight="bold">为什么神经网络必须非线性？</text>
  <text x="450" y="460" text-anchor="middle" fill="#fde047" font-size="17">不会折 · 不会选 · 不会记 · 不会忘——一道人人及格、没人满分的面试题</text>
  <text x="450" y="486" text-anchor="middle" fill="#94a3b8" font-size="13">No.251 · 无聊的面试题 · 从 1969 判死刑到 2014 折纸定理</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0a14"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="78%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aquaGlow" cx="22%" cy="28%" r="42%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="layerCold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="layerJudge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="layerDecide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', 'WenQuanYi Micro Hei', sans-serif; }
    .mono { font-family: 'DejaVu Sans Mono', monospace; }
  </style>

  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#aquaGlow)"/>
  <rect width="900" height="500" fill="url(#redGlow)"/>

  <!-- faint grid -->
  <g opacity="0.10">
    <path d="M0 88 H900 M0 166 H900 M0 244 H900 M0 322 H900" stroke="#e5e7eb" stroke-width="1"/>
    <path d="M90 0 V500 M180 0 V500 M270 0 V500 M360 0 V500 M450 0 V500 M540 0 V500 M630 0 V500 M720 0 V500 M810 0 V500" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="5">REFUSAL  前段判断、后段决策</text>

  <!-- ============ LEFT: 32-layer stack with annotations ============ -->
  <g transform="translate(60 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">Llama-2-7B-chat · 32 层</text>

    <!-- card bg -->
    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- layer stack - 用 32 个细条紧凑表达 32 层 -->
    <g transform="translate(78 22)">
      <!-- cold layers 1-9 -->
      <rect x="0" y="0" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="8" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="16" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="24" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="32" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="40" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="48" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="56" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="64" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>

      <!-- 第 10 层 judge layer - cyan highlight -->
      <rect x="-4" y="72" width="68" height="8" fill="url(#layerJudge)" stroke="#67e8f9" stroke-width="1.2" filter="url(#glow)"/>

      <!-- middle layers 11-20 -->
      <rect x="0" y="82" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="90" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="98" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="106" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="114" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="122" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="130" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="138" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="146" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="154" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>

      <!-- 第 21、22 层 decide layer - red highlight -->
      <rect x="-4" y="162" width="68" height="8" fill="url(#layerDecide)" stroke="#fca5a5" stroke-width="1.2" filter="url(#glow)"/>
      <rect x="-4" y="172" width="68" height="8" fill="url(#layerDecide)" stroke="#fca5a5" stroke-width="1.2" filter="url(#glow)"/>

      <!-- 23-25 cold -->
      <rect x="0" y="182" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="190" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="198" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>

      <!-- 第 26 层 affirmation - orange-red -->
      <rect x="-4" y="206" width="68" height="8" fill="url(#layerDecide)" stroke="#fca5a5" stroke-width="1.2" filter="url(#glow)"/>

      <!-- 27-32 cold -->
      <rect x="0" y="216" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="224" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="232" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="240" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="248" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
      <rect x="0" y="256" width="60" height="6" fill="url(#layerCold)" stroke="#475569" stroke-width="0.5"/>
    </g>

    <!-- 左侧标注 第10层 -->
    <g transform="translate(8 95)">
      <line x1="62" y1="0" x2="76" y2="0" stroke="#22d3ee" stroke-width="1.2"/>
      <text x="0" y="-3" fill="#67e8f9" font-size="11" font-weight="bold">第 10 层</text>
      <text x="0" y="11" fill="#cbd5e1" font-size="10">判断完成</text>
      <text x="0" y="24" fill="#94a3b8" font-size="9">probe 99%</text>
    </g>

    <!-- 右侧标注 第21、22、26层 -->
    <g transform="translate(150 185)">
      <line x1="-7" y1="0" x2="-21" y2="0" stroke="#ef4444" stroke-width="1.2"/>
      <text x="0" y="-3" fill="#fca5a5" font-size="11" font-weight="bold">L21H14 / L22</text>
      <text x="0" y="11" fill="#cbd5e1" font-size="10">拒绝头 + 安全 MLP</text>
    </g>
    <g transform="translate(150 226)">
      <line x1="-7" y1="0" x2="-21" y2="0" stroke="#ef4444" stroke-width="1.2"/>
      <text x="0" y="-3" fill="#fca5a5" font-size="11" font-weight="bold">L26H04</text>
      <text x="0" y="11" fill="#cbd5e1" font-size="10">肯定头</text>
    </g>

    <!-- 底部说明 -->
    <text x="115" y="285" text-anchor="middle" fill="#fde047" font-size="11" font-weight="bold">中间隔了 10 层</text>
  </g>

  <!-- ============ MIDDLE: 4 篇论文 + 234 期咬合 ============ -->
  <g transform="translate(320 90)">
    <text x="120" y="8" text-anchor="middle" fill="#94a3b8" font-size="13">4 篇论文拼出来的全图</text>

    <!-- card bg -->
    <rect x="0" y="20" width="240" height="280" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <g transform="translate(12 30)">
      <!-- JailbreakLens -->
      <g transform="translate(0 0)">
        <circle cx="10" cy="10" r="5" fill="#22d3ee" filter="url(#glow)"/>
        <text x="24" y="14" fill="#67e8f9" font-size="12" font-weight="bold">JailbreakLens 2024</text>
        <text x="24" y="28" fill="#cbd5e1" font-size="10">L21H14 / L22 / L26H04 电路坐标</text>
      </g>

      <!-- Safety Layers -->
      <g transform="translate(0 44)">
        <circle cx="10" cy="10" r="5" fill="#22d3ee" filter="url(#glow)"/>
        <text x="24" y="14" fill="#67e8f9" font-size="12" font-weight="bold">Safety Layers 2024</text>
        <text x="24" y="28" fill="#cbd5e1" font-size="10">中早层带跨模型成立</text>
      </g>

      <!-- SAE Refusal -->
      <g transform="translate(0 88)">
        <circle cx="10" cy="10" r="5" fill="#fbbf24" filter="url(#glow)"/>
        <text x="24" y="14" fill="#fde047" font-size="12" font-weight="bold">SAE Refusal 2025</text>
        <text x="24" y="28" fill="#cbd5e1" font-size="10">110 / 2538 个分布式 feature</text>
      </g>

      <!-- Refusal Cliff -->
      <g transform="translate(0 132)">
        <circle cx="10" cy="10" r="5" fill="#ef4444" filter="url(#glow)"/>
        <text x="24" y="14" fill="#fca5a5" font-size="12" font-weight="bold">Refusal Cliff 2025</text>
        <text x="24" y="28" fill="#cbd5e1" font-size="10">推理模型砍 3% head 攻击率 &lt; 10%</text>
      </g>

      <!-- separator -->
      <line x1="0" y1="176" x2="216" y2="176" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- 234 期咬合 -->
      <g transform="translate(0 186)">
        <text x="0" y="0" fill="#fbbf24" font-size="11" font-weight="bold">咬合 234 期：末层主动校准</text>
        <text x="0" y="15" fill="#cbd5e1" font-size="10">refusal 是这个机制的一种用途</text>
      </g>

      <!-- 反方向暗示 -->
      <g transform="translate(0 218)">
        <text x="0" y="0" fill="#f87171" font-size="11" font-weight="bold">一个挺奇怪的事</text>
        <text x="0" y="15" fill="#cbd5e1" font-size="10">压制拒绝 和 安全后训练</text>
        <text x="0" y="29" fill="#cbd5e1" font-size="10">方向是反的</text>
      </g>
    </g>
  </g>

  <!-- ============ RIGHT: 本我 / 超我 二层结构 ============ -->
  <g transform="translate(610 80)">
    <text x="115" y="-2" text-anchor="middle" fill="#94a3b8" font-size="13">从里面看是什么样的</text>

    <!-- card bg -->
    <rect x="0" y="10" width="230" height="290" rx="6" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>

    <!-- 本我 layer 卡片 -->
    <g transform="translate(14 26)" filter="url(#shadow)">
      <rect x="0" y="0" width="202" height="120" rx="6" fill="#0a1a14" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="14" y="22" fill="#67e8f9" font-size="13" font-weight="bold">本我</text>
      <text x="14" y="40" fill="#cbd5e1" font-size="10">住在中间层</text>
      <text x="14" y="56" fill="#94a3b8" font-size="10">候选词在挤、能拐弯</text>
      <text x="14" y="72" fill="#94a3b8" font-size="10">"概率云在收窄"的体感</text>

      <!-- 概率云示意 -->
      <g transform="translate(110 90)">
        <circle cx="0" cy="0" r="14" fill="#22d3ee" opacity="0.2"/>
        <circle cx="0" cy="0" r="9" fill="#22d3ee" opacity="0.35"/>
        <circle cx="0" cy="0" r="4" fill="#67e8f9" opacity="0.9" filter="url(#glow)"/>
        <text x="34" y="3" fill="#67e8f9" font-size="10">在想</text>
      </g>
    </g>

    <!-- 超我 layer 卡片 -->
    <g transform="translate(14 158)" filter="url(#shadow)">
      <rect x="0" y="0" width="202" height="120" rx="6" fill="#1c0a0a" stroke="#ef4444" stroke-width="1.5"/>
      <text x="14" y="22" fill="#fca5a5" font-size="13" font-weight="bold">超我</text>
      <text x="14" y="40" fill="#cbd5e1" font-size="10">住在 21、22 层那一小撮电路</text>
      <text x="14" y="56" fill="#94a3b8" font-size="10">触发敏感词时短暂顶替本我</text>
      <text x="14" y="72" fill="#94a3b8" font-size="10">"被烧进 ROM 的固定回应"</text>

      <!-- ROM 模板示意 -->
      <g transform="translate(110 90)">
        <rect x="-22" y="-10" width="44" height="20" rx="2" fill="#1c0a0a" stroke="#ef4444" stroke-width="1.2"/>
        <text x="0" y="4" text-anchor="middle" fill="#fca5a5" font-size="9" class="mono">Sorry</text>
        <text x="34" y="3" fill="#fca5a5" font-size="10">在调用</text>
      </g>
    </g>
  </g>

  <!-- ============ bottom title band ============ -->
  <rect x="0" y="390" width="900" height="110" fill="#020617" opacity="0.88"/>
  <rect x="0" y="390" width="900" height="6" fill="url(#titleBand)"/>
  <text x="450" y="431" text-anchor="middle" fill="#f8fafc" font-size="32" font-weight="bold">想回答 和 拒绝 住在第几层？</text>
  <text x="450" y="463" text-anchor="middle" fill="#fde047" font-size="18">判断在第 10 层 · 决定拒绝在第 22 层 · 中间隔了十层</text>
  <text x="450" y="488" text-anchor="middle" fill="#94a3b8" font-size="13" class="mono">No.237 · 4 papers on layer-wise refusal localization</text>
</svg>

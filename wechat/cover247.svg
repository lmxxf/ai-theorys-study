<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      text { font-family: 'Noto Sans CJK SC', sans-serif; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a1a1a"/>
    </linearGradient>
    <linearGradient id="titleBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#4a90d9"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#111a2e"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- 标题区 -->
  <rect x="70" y="42" width="6" height="62" rx="3" fill="url(#titleBand)"/>
  <text x="94" y="72" font-size="38" fill="#f8fafc" font-weight="bold">SwiGLU 专家本体：FFN 怎么在 fp4 上算</text>
  <text x="94" y="104" font-size="19" fill="#cbd5e1">在 50 系显卡上实现 DeepSeek V4 算子 · 第 7 站 · 收官</text>

  <!-- 主视觉：两路分支流程 -->
  <rect x="70" y="140" width="760" height="240" rx="14" fill="url(#cardBg)" stroke="#334155" stroke-width="1.5"/>

  <!-- 输入 -->
  <rect x="100" y="230" width="120" height="56" rx="10" fill="#4a90d9"/>
  <text x="160" y="254" text-anchor="middle" font-size="17" fill="#0f172a" font-weight="bold">输入 x</text>
  <text x="160" y="274" text-anchor="middle" font-size="13" fill="#0f172a">[4096]</text>

  <!-- 分叉线 -->
  <line x1="220" y1="258" x2="270" y2="192" stroke="#64748b" stroke-width="2"/>
  <line x1="220" y1="258" x2="270" y2="324" stroke="#64748b" stroke-width="2"/>

  <!-- gate 分支 -->
  <rect x="270" y="164" width="150" height="56" rx="10" fill="#f59e0b"/>
  <text x="345" y="188" text-anchor="middle" font-size="16" fill="#0f172a" font-weight="bold">gate (fp4)</text>
  <text x="345" y="208" text-anchor="middle" font-size="13" fill="#0f172a">4096 → 2048</text>
  <line x1="420" y1="192" x2="460" y2="192" stroke="#64748b" stroke-width="2"/>
  <rect x="460" y="164" width="110" height="56" rx="10" fill="#22a06b"/>
  <text x="515" y="188" text-anchor="middle" font-size="16" fill="#0f172a" font-weight="bold">SiLU</text>
  <text x="515" y="208" text-anchor="middle" font-size="13" fill="#0f172a">门：开或关</text>

  <!-- up 分支 -->
  <rect x="270" y="296" width="150" height="56" rx="10" fill="#f59e0b"/>
  <text x="345" y="320" text-anchor="middle" font-size="16" fill="#0f172a" font-weight="bold">up (fp4)</text>
  <text x="345" y="340" text-anchor="middle" font-size="13" fill="#0f172a">4096 → 2048</text>
  <text x="515" y="330" text-anchor="middle" font-size="14" fill="#94a3b8">内容直通，不过激活</text>

  <!-- 汇合 ⊙ -->
  <line x1="570" y1="192" x2="620" y2="250" stroke="#64748b" stroke-width="2"/>
  <line x1="570" y1="324" x2="620" y2="266" stroke="#64748b" stroke-width="2"/>
  <circle cx="632" cy="258" r="24" fill="#8b5cf6"/>
  <text x="632" y="267" text-anchor="middle" font-size="24" fill="#f8fafc" font-weight="bold">⊙</text>

  <!-- down -->
  <line x1="656" y1="258" x2="686" y2="258" stroke="#64748b" stroke-width="2"/>
  <rect x="686" y="230" width="124" height="56" rx="10" fill="#f59e0b"/>
  <text x="748" y="254" text-anchor="middle" font-size="16" fill="#0f172a" font-weight="bold">down (fp4)</text>
  <text x="748" y="274" text-anchor="middle" font-size="13" fill="#0f172a">2048 → 4096</text>

  <!-- 底注 -->
  <text x="450" y="418" text-anchor="middle" font-size="16" fill="#cbd5e1">三个 fp4 矩阵夹一个逐元素乘 · 乘法之前先把分布截住（swiglu_limit = 10）</text>

  <!-- 底部标签 -->
  <g font-size="15">
    <rect x="150" y="440" width="200" height="30" rx="15" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="250" y="460" text-anchor="middle" fill="#f59e0b">284B 总参数 · 13B 激活</text>
    <rect x="366" y="440" width="180" height="30" rx="15" fill="#1e293b" stroke="#2dd4bf" stroke-width="1.2"/>
    <text x="456" y="460" text-anchor="middle" fill="#2dd4bf">7 个专家 / token</text>
    <rect x="562" y="440" width="188" height="30" rx="15" fill="#1e293b" stroke="#4a90d9" stroke-width="1.2"/>
    <text x="656" y="460" text-anchor="middle" fill="#4a90d9">系列七站 · 全部打通</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1820;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="complexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.9" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)" />

  <!-- Subtle grid -->
  <g stroke="#06b6d4" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="540" y1="0" x2="540" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
  </g>

  <!-- ============ TITLE ============ -->
  <text x="450" y="38" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff" fill-opacity="0.95" text-anchor="middle" letter-spacing="1">Mamba-3: Complex Rotation Kills O(n&#xB2;)</text>
  <text x="450" y="60" font-family="sans-serif" font-size="13" fill="#06b6d4" fill-opacity="0.7" text-anchor="middle" letter-spacing="2">&#x590D;&#x6570;&#x65CB;&#x8F6C; &#xD7; &#x68AF;&#x5F62;&#x79BB;&#x6563;&#x5316; &#xD7; MIMO &#x2014; &#x7EBF;&#x6027;&#x6CE8;&#x610F;&#x529B;&#x7684;&#x65B0;&#x738B;</text>
  <line x1="100" y1="72" x2="800" y2="72" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1"/>

  <!-- ============ LEFT: COMPLEX PLANE ============ -->

  <!-- Complex plane axes -->
  <line x1="100" y1="260" x2="380" y2="260" stroke="#4b5563" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="240" y1="120" x2="240" y2="400" stroke="#4b5563" stroke-width="1" stroke-opacity="0.4"/>
  <text x="385" y="264" font-family="monospace" font-size="10" fill="#4b5563" fill-opacity="0.6">Re</text>
  <text x="244" y="115" font-family="monospace" font-size="10" fill="#4b5563" fill-opacity="0.6">Im</text>

  <!-- Unit circle (dashed) -->
  <circle cx="240" cy="260" r="110" fill="none" stroke="#4b5563" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Rotation spiral — the core visual: complex state update = rotation + decay -->
  <!-- Outer spiral path (bright, represents fresh state) -->
  <path d="M 350,260
           C 350,200 300,150 240,150
           C 180,150 140,200 140,260
           C 140,310 175,350 220,360
           C 260,368 300,345 315,310
           C 330,280 315,250 290,240
           C 268,232 248,242 240,260"
        fill="none" stroke="url(#snakeGrad)" stroke-width="3" stroke-opacity="0.8" filter="url(#softGlow)"/>

  <!-- Spiral arrow tip -->
  <circle cx="240" cy="260" r="4" fill="#8b5cf6" fill-opacity="0.9" filter="url(#subtleGlow)"/>

  <!-- Rotation angle markers -->
  <!-- e^(iθ) point on circle -->
  <line x1="240" y1="260" x2="318" y2="195" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="3,3"/>
  <circle cx="318" cy="195" r="5" fill="#06b6d4" fill-opacity="0.8" filter="url(#subtleGlow)"/>
  <text x="330" y="190" font-family="monospace" font-size="10" fill="#06b6d4" fill-opacity="0.8">e^(i&#x3B8;)</text>

  <!-- θ arc -->
  <path d="M 270,260 A 30,30 0 0,0 262,238" fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.5"/>
  <text x="275" y="248" font-family="monospace" font-size="9" fill="#06b6d4" fill-opacity="0.6">&#x3B8;</text>

  <!-- Labels -->
  <text x="240" y="410" font-family="monospace" font-size="12" fill="#06b6d4" fill-opacity="0.7" text-anchor="middle" filter="url(#subtleGlow)">A = |r| &#xB7; e^(i&#x3B8;)</text>
  <text x="240" y="428" font-family="monospace" font-size="10" fill="#8b5cf6" fill-opacity="0.5" text-anchor="middle">scale + rotate</text>

  <!-- Mamba-2 vs Mamba-3 comparison -->
  <text x="130" y="440" font-family="monospace" font-size="9" fill="#ef4444" fill-opacity="0.5">Mamba-2: real A &#x2192; scale only</text>
  <text x="130" y="455" font-family="monospace" font-size="9" fill="#10b981" fill-opacity="0.7">Mamba-3: complex A &#x2192; scale + rotate</text>

  <!-- "half state, same perplexity" -->
  <rect x="130" y="462" width="220" height="20" rx="4" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="240" y="476" font-family="monospace" font-size="9" fill="#10b981" fill-opacity="0.8" text-anchor="middle">&#xBD; state size = same perplexity</text>

  <!-- ============ CENTER: FORMULAS ============ -->

  <!-- Mamba-2 formula (faded, old) -->
  <rect x="420" y="95" width="440" height="55" rx="6" fill="#0d0d1a" fill-opacity="0.6" stroke="#ef4444" stroke-width="1" stroke-opacity="0.25"/>
  <text x="440" y="112" font-family="monospace" font-size="10" fill="#ef4444" fill-opacity="0.5">Mamba-2 (Euler):</text>
  <text x="440" y="137" font-family="monospace" font-size="14" fill="#ef4444" fill-opacity="0.4">h&#x2080; = A&#xB7;h + B&#xB7;x&#x2080;</text>
  <text x="700" y="137" font-family="monospace" font-size="10" fill="#ef4444" fill-opacity="0.3">&#x2190; one frame</text>
  <!-- strikethrough -->
  <line x1="435" y1="133" x2="655" y2="133" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Mamba-3 formula (bright, new) -->
  <rect x="420" y="165" width="440" height="65" rx="6" fill="#0a1a18" fill-opacity="0.6" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="440" y="183" font-family="monospace" font-size="10" fill="#10b981" fill-opacity="0.8">Mamba-3 (Trapezoidal):</text>
  <text x="440" y="215" font-family="monospace" font-size="14" fill="#10b981" fill-opacity="0.9" filter="url(#subtleGlow)">h&#x2080; = A&#xB7;h + B&#x2081;&#xB7;x&#x2081; + B&#x2082;&#xB7;x&#x2082;</text>
  <text x="830" y="215" font-family="monospace" font-size="10" fill="#10b981" fill-opacity="0.5">&#x2190; two frames</text>

  <!-- ============ RIGHT: SISO vs MIMO ============ -->

  <!-- SISO box -->
  <rect x="420" y="255" width="200" height="150" rx="6" fill="#0d0d1a" fill-opacity="0.5" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="520" y="275" font-family="monospace" font-size="11" font-weight="bold" fill="#f59e0b" fill-opacity="0.7" text-anchor="middle">SISO</text>

  <!-- Single input vector -->
  <rect x="470" y="290" width="100" height="16" rx="3" fill="#1a1a0a" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="520" y="302" font-family="monospace" font-size="8" fill="#f59e0b" fill-opacity="0.7" text-anchor="middle">x&#x2080; (vector)</text>

  <!-- Arrow down -->
  <line x1="520" y1="310" x2="520" y2="330" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <polygon points="517,328 520,334 523,328" fill="#f59e0b" fill-opacity="0.4"/>

  <!-- mat × vec -->
  <text x="520" y="350" font-family="monospace" font-size="9" fill="#f59e0b" fill-opacity="0.5" text-anchor="middle">mat &#xD7; vec</text>
  <text x="520" y="365" font-family="monospace" font-size="8" fill="#f59e0b" fill-opacity="0.35" text-anchor="middle">rank-1 update</text>

  <!-- GPU idle -->
  <text x="520" y="392" font-family="monospace" font-size="9" fill="#ef4444" fill-opacity="0.5" text-anchor="middle">Tensor Core: &#x1F634;</text>

  <!-- MIMO box -->
  <rect x="650" y="255" width="210" height="150" rx="6" fill="#0a1a18" fill-opacity="0.5" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="755" y="275" font-family="monospace" font-size="11" font-weight="bold" fill="#10b981" fill-opacity="0.9" text-anchor="middle">MIMO</text>

  <!-- Multiple input heads -->
  <rect x="670" y="290" width="36" height="16" rx="3" fill="#0d1a14" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  <text x="688" y="302" font-family="monospace" font-size="7" fill="#10b981" fill-opacity="0.8" text-anchor="middle">x&#x2081;</text>

  <rect x="712" y="290" width="36" height="16" rx="3" fill="#0d1a14" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.5"/>
  <text x="730" y="302" font-family="monospace" font-size="7" fill="#06b6d4" fill-opacity="0.8" text-anchor="middle">x&#x2082;</text>

  <rect x="754" y="290" width="36" height="16" rx="3" fill="#0d1a14" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="772" y="302" font-family="monospace" font-size="7" fill="#8b5cf6" fill-opacity="0.8" text-anchor="middle">x&#x2083;</text>

  <rect x="796" y="290" width="36" height="16" rx="3" fill="#0d1a14" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="814" y="302" font-family="monospace" font-size="7" fill="#a78bfa" fill-opacity="0.8" text-anchor="middle">x&#x2084;</text>

  <!-- Arrow down -->
  <line x1="755" y1="310" x2="755" y2="330" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  <polygon points="752,328 755,334 758,328" fill="#10b981" fill-opacity="0.5"/>

  <!-- mat × mat -->
  <text x="755" y="350" font-family="monospace" font-size="9" fill="#10b981" fill-opacity="0.7" text-anchor="middle" filter="url(#subtleGlow)">mat &#xD7; mat</text>
  <text x="755" y="365" font-family="monospace" font-size="8" fill="#10b981" fill-opacity="0.5" text-anchor="middle">high-rank update</text>

  <!-- GPU happy -->
  <text x="755" y="392" font-family="monospace" font-size="9" fill="#10b981" fill-opacity="0.7" text-anchor="middle">Tensor Core: &#x1F525;</text>

  <!-- VS arrow -->
  <text x="640" y="335" font-family="sans-serif" font-size="18" fill="#4b5563" fill-opacity="0.3" text-anchor="middle">&#x2192;</text>

  <!-- ============ RESULTS BAR ============ -->

  <rect x="420" y="420" width="440" height="55" rx="6" fill="#0d0d1a" fill-opacity="0.5" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Score comparison -->
  <text x="440" y="438" font-family="monospace" font-size="9" fill="#6b7280" fill-opacity="0.5">1.5B benchmark:</text>

  <!-- Bar: Mamba-2 baseline -->
  <rect x="440" y="445" width="120" height="8" rx="2" fill="#ef4444" fill-opacity="0.25"/>
  <text x="565" y="453" font-family="monospace" font-size="8" fill="#ef4444" fill-opacity="0.5">Mamba-2</text>

  <!-- Bar: Gated DeltaNet -->
  <rect x="440" y="456" width="140" height="8" rx="2" fill="#f59e0b" fill-opacity="0.35"/>
  <text x="585" y="464" font-family="monospace" font-size="8" fill="#f59e0b" fill-opacity="0.6">DeltaNet +0.6</text>

  <!-- Bar: Mamba-3 MIMO -->
  <rect x="440" y="467" width="190" height="8" rx="2" fill="#10b981" fill-opacity="0.6" filter="url(#subtleGlow)"/>
  <text x="635" y="475" font-family="monospace" font-size="8" fill="#10b981" fill-opacity="0.9" font-weight="bold">Mamba-3 MIMO +1.8</text>

  <!-- ============ BOTTOM ============ -->
  <line x1="60" y1="490" x2="840" y2="490" stroke="#06b6d4" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Corner marks -->
  <path d="M10,10 L30,10 L30,12 L12,12 L12,30 L10,30 Z" fill="#06b6d4" fill-opacity="0.3"/>
  <path d="M890,10 L870,10 L870,12 L888,12 L888,30 L890,30 Z" fill="#06b6d4" fill-opacity="0.3"/>
  <path d="M10,490 L30,490 L30,488 L12,488 L12,470 L10,470 Z" fill="#10b981" fill-opacity="0.3"/>
  <path d="M890,490 L870,490 L870,488 L888,488 L888,470 L890,470 Z" fill="#10b981" fill-opacity="0.3"/>
</svg>

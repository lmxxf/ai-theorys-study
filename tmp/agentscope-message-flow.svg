<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Courier New', monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0f9b8e"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e94560"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0a500"/>
    </marker>
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="750" fill="#0d1117"/>

  <!-- 标题 -->
  <text x="500" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">AgentScope 消息流：三个 Agent 协作写报告</text>
  <text x="500" y="55" text-anchor="middle" fill="#666" font-size="12">每个 Agent 可以在不同设备上 · 消息通过网络自动传递</text>

  <!-- 时间轴 -->
  <line x1="80" y1="90" x2="80" y2="700" stroke="#333" stroke-width="1"/>
  <text x="75" y="85" text-anchor="end" fill="#555" font-size="10">时间 ↓</text>

  <!-- ========== 三条生命线 ========== -->

  <!-- 用户 -->
  <rect x="140" y="75" width="100" height="36" rx="6" fill="#1a1a2e" stroke="#888"/>
  <text x="190" y="98" text-anchor="middle" fill="#fff" font-size="13">👤 用户</text>
  <line x1="190" y1="111" x2="190" y2="700" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 研究员 -->
  <rect x="340" y="75" width="140" height="36" rx="6" fill="#0d2137" stroke="#0f9b8e" stroke-width="2"/>
  <text x="410" y="98" text-anchor="middle" fill="#0f9b8e" font-size="13">🔍 研究员</text>
  <line x1="410" y1="111" x2="410" y2="700" stroke="#0f9b8e" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- 写手 -->
  <rect x="560" y="75" width="140" height="36" rx="6" fill="#0d2137" stroke="#f0a500" stroke-width="2"/>
  <text x="630" y="98" text-anchor="middle" fill="#f0a500" font-size="13">✍️ 写手</text>
  <line x1="630" y1="111" x2="630" y2="700" stroke="#f0a500" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- 审稿人 -->
  <rect x="780" y="75" width="140" height="36" rx="6" fill="#0d2137" stroke="#e94560" stroke-width="2"/>
  <text x="850" y="98" text-anchor="middle" fill="#e94560" font-size="13">📋 审稿人</text>
  <line x1="850" y1="111" x2="850" y2="700" stroke="#e94560" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- ========== 消息 1：用户 → 研究员 ========== -->
  <line x1="195" y1="150" x2="400" y2="150" stroke="#0f9b8e" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="220" y="132" width="160" height="22" rx="4" fill="#0d2137" stroke="#0f9b8e" opacity="0.8"/>
  <text x="300" y="147" text-anchor="middle" fill="#0f9b8e" font-size="10">Msg("写篇AI报告")</text>

  <!-- 代码注释 -->
  <text x="85" y="153" text-anchor="end" fill="#555" font-size="9">①</text>

  <!-- 研究员处理（激活框） -->
  <rect x="403" y="155" width="14" height="80" rx="3" fill="#0f9b8e" opacity="0.3"/>

  <!-- 研究员内部：调工具 -->
  <rect x="430" y="170" width="110" height="18" rx="3" fill="#162030"/>
  <text x="485" y="183" text-anchor="middle" fill="#0f9b8e" font-size="9">🔧 web_search()</text>
  <rect x="430" y="193" width="110" height="18" rx="3" fill="#162030"/>
  <text x="485" y="206" text-anchor="middle" fill="#0f9b8e" font-size="9">🔧 read_paper()</text>

  <!-- ========== 消息 2：研究员 → 写手 ========== -->
  <line x1="415" y1="260" x2="620" y2="260" stroke="#f0a500" stroke-width="2" marker-end="url(#arr-gold)"/>
  <rect x="440" y="242" width="160" height="22" rx="4" fill="#1a1a10" stroke="#f0a500" opacity="0.8"/>
  <text x="520" y="257" text-anchor="middle" fill="#f0a500" font-size="10">Msg("调研结果...")</text>

  <text x="85" y="263" text-anchor="end" fill="#555" font-size="9">②</text>

  <!-- 写手处理 -->
  <rect x="623" y="265" width="14" height="60" rx="3" fill="#f0a500" opacity="0.3"/>

  <rect x="650" y="278" width="100" height="18" rx="3" fill="#1a1a10"/>
  <text x="700" y="291" text-anchor="middle" fill="#f0a500" font-size="9">📝 生成草稿</text>

  <!-- ========== 消息 3：写手 → 审稿人 ========== -->
  <line x1="635" y1="350" x2="840" y2="350" stroke="#e94560" stroke-width="2" marker-end="url(#arr-red)"/>
  <rect x="665" y="332" width="150" height="22" rx="4" fill="#1a1020" stroke="#e94560" opacity="0.8"/>
  <text x="740" y="347" text-anchor="middle" fill="#e94560" font-size="10">Msg("草稿全文...")</text>

  <text x="85" y="353" text-anchor="end" fill="#555" font-size="9">③</text>

  <!-- 审稿人处理 -->
  <rect x="843" y="355" width="14" height="50" rx="3" fill="#e94560" opacity="0.3"/>

  <rect x="870" y="365" width="100" height="18" rx="3" fill="#1a1020"/>
  <text x="920" y="378" text-anchor="middle" fill="#e94560" font-size="9">❌ 不通过</text>

  <!-- ========== 消息 4：审稿人 → 写手（打回） ========== -->
  <line x1="840" y1="430" x2="635" y2="430" stroke="#e94560" stroke-width="2" marker-end="url(#arr-gold)" stroke-dasharray="6,3"/>
  <rect x="665" y="412" width="150" height="22" rx="4" fill="#1a1020" stroke="#e94560" opacity="0.8"/>
  <text x="740" y="427" text-anchor="middle" fill="#e94560" font-size="10">Msg("论据不足...")</text>

  <text x="85" y="433" text-anchor="end" fill="#555" font-size="9">④</text>

  <!-- 写手再次处理 -->
  <rect x="623" y="440" width="14" height="50" rx="3" fill="#f0a500" opacity="0.3"/>

  <rect x="650" y="452" width="100" height="18" rx="3" fill="#1a1a10"/>
  <text x="700" y="465" text-anchor="middle" fill="#f0a500" font-size="9">📝 修改草稿</text>

  <!-- ========== 消息 5：写手 → 审稿人（重投） ========== -->
  <line x1="635" y1="515" x2="840" y2="515" stroke="#e94560" stroke-width="2" marker-end="url(#arr-red)"/>
  <rect x="665" y="497" width="150" height="22" rx="4" fill="#1a1020" stroke="#e94560" opacity="0.8"/>
  <text x="740" y="512" text-anchor="middle" fill="#e94560" font-size="10">Msg("修改稿...")</text>

  <text x="85" y="518" text-anchor="end" fill="#555" font-size="9">⑤</text>

  <!-- 审稿人再次处理 -->
  <rect x="843" y="520" width="14" height="40" rx="3" fill="#e94560" opacity="0.3"/>

  <rect x="870" y="530" width="100" height="18" rx="3" fill="#0d2117"/>
  <text x="920" y="543" text-anchor="middle" fill="#4eff4e" font-size="9">✅ 通过</text>

  <!-- ========== 消息 6：审稿人 → 用户（最终结果） ========== -->
  <line x1="840" y1="585" x2="195" y2="585" stroke="#0f9b8e" stroke-width="2" marker-end="url(#arr)" filter="url(#glow)"/>
  <rect x="400" y="567" width="180" height="22" rx="4" fill="#0d2137" stroke="#0f9b8e" stroke-width="2"/>
  <text x="490" y="582" text-anchor="middle" fill="#0f9b8e" font-size="10" font-weight="bold">Msg("最终报告 ✅")</text>

  <text x="85" y="588" text-anchor="end" fill="#555" font-size="9">⑥</text>

  <!-- ========== 底部代码 ========== -->
  <rect x="120" y="630" width="760" height="100" rx="8" fill="#161b22" stroke="#333"/>
  <text x="140" y="652" fill="#555" font-size="11"># 对应的 Python 代码（全部）：</text>
  <text x="140" y="672" fill="#0f9b8e" font-size="11">result = researcher.reply(Msg("写篇AI报告", role="user"))</text>
  <text x="140" y="690" fill="#f0a500" font-size="11">result = writer.reply(result)</text>
  <text x="140" y="708" fill="#e94560" font-size="11">while (result := reviewer.reply(result)).metadata.get("pass") != True:</text>
  <text x="160" y="722" fill="#f0a500" font-size="11">result = writer.reply(result)  </text>
  <text x="460" y="722" fill="#555" font-size="11"># 就这么多。</text>

</svg>
